    <line x1="0" y1="0" x2="420" y2="0" stroke="#E8DFC8"/>
    <text x="80" y="36" text-anchor="middle" font-size="11" fill="#9A9A95">Today</text>
    <circle cx="210" cy="30" r="22" fill="#1A1A1A"/>
    <text x="210" y="37" text-anchor="middle" font-size="22" fill="#F7F5F0">+</text>
    <text x="340" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Trends</text>
