    <!-- Type legend chips: tap to filter. Run selected. Dynamic — these come from what's logged. -->
    <g transform="translate(18 384)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#9A9A95" letter-spacing="1">TAP TO FILTER</text>
      <!-- Run (selected) -->
