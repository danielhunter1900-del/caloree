        <rect width="90" height="28" rx="14" fill="transparent" stroke="#D8D4CB"/>
        <circle cx="14" cy="14" r="4" fill="#5C9A6E"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#5C5C58">Mobility · 9</text>
      </g>
      <!-- Calis -->
      <g transform="translate(0 46)">
        <rect width="72" height="28" rx="14" fill="transparent" stroke="#D8D4CB"/>
        <circle cx="14" cy="14" r="4" fill="#E0A24A"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#5C5C58">Calis · 2</text>
      </g>
      <!-- HIIT -->
