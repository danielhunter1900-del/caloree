        <rect width="76" height="28" rx="14" fill="#5FA8C9"/>
        <circle cx="14" cy="14" r="4" fill="#FFFFFF"/>
        <text x="26" y="18" font-size="12" font-weight="700" fill="#FFFFFF">Run · 7</text>
      </g>
      <!-- Strength -->
      <g transform="translate(84 10)">
        <rect width="92" height="28" rx="14" fill="transparent" stroke="#D8D4CB"/>
        <circle cx="14" cy="14" r="4" fill="#D96B5C"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#5C5C58">Strength · 6</text>
      </g>
      <!-- Cycling -->
      <g transform="translate(184 10)">
        <rect width="88" height="28" rx="14" fill="transparent" stroke="#D8D4CB"/>
        <circle cx="14" cy="14" r="4" fill="#7A8BD1"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#5C5C58">Cycling · 3</text>
      </g>
      <!-- Mobility -->
