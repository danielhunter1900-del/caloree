        <text x="102" y="13" font-size="9" fill="#1A1A1A" font-weight="600">8</text>
        <circle cx="112" cy="30" r="5" fill="#5FA8C9"/>
        <circle cx="124" cy="30" r="4" fill="#E6E3DC"/>
