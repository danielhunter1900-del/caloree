      <text x="72" text-anchor="middle">T</text>
      <text x="120" text-anchor="middle">W</text>
      <text x="168" text-anchor="middle">T</text>
      <text x="216" text-anchor="middle">F</text>
      <text x="264" text-anchor="middle">S</text>
      <text x="312" text-anchor="middle">S</text>
