      <rect x="0" y="55" width="14" height="45" rx="2" fill="#5FA8C9"/>
      <rect x="0" y="40" width="14" height="15" fill="#E6E3DC"/>
      <!-- day 2: mobility only -->
      <rect x="24" y="80" width="14" height="20" rx="2" fill="#E6E3DC"/>
      <!-- day 3: strength + mobility, no run -->
