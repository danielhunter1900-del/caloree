        <text x="198" y="13" font-size="9" fill="#C6C3BC">24</text>
        <rect x="240" y="0" width="44" height="44" rx="6" fill="#FAF8F3" stroke="#ECEAE4"/>
        <text x="246" y="13" font-size="9" fill="#C6C3BC">25</text>
        <rect x="288" y="0" width="44" height="44" rx="6" fill="#FAF8F3" stroke="#ECEAE4"/>
        <text x="294" y="13" font-size="9" fill="#C6C3BC">26</text>
