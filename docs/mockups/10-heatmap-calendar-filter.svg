        <text x="102" y="13" font-size="9" fill="#1A1A1A" font-weight="600">15</text>
        <circle cx="118" cy="30" r="5" fill="#5FA8C9"/>
        <!-- Apr 16 Thu: Mobility (faded) -->
        <rect x="144" y="0" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#E6E3DC"/>
        <text x="150" y="13" font-size="9" fill="#9A9A95">16</text>
        <circle cx="166" cy="30" r="4" fill="#E6E3DC"/>
