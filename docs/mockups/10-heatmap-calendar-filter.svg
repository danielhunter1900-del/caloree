    <text x="14" y="22" font-size="11" font-weight="700" fill="#8A6B1A">BEHAVIOUR</text>
    <text x="14" y="42" font-size="11" fill="#5C5C58">• Tapping Run chip colors matching bars + days; others fade.</text>
    <text x="14" y="58" font-size="11" fill="#5C5C58">• Calendar layout — actual Apr 2026 with weekday columns.</text>
    <text x="14" y="74" font-size="11" fill="#5C5C58">• Chips auto-populate — log a new type, a new chip appears</text>
    <text x="14" y="88" font-size="11" fill="#5C5C58">  (Swim dashed border = newly seen this month).</text>
