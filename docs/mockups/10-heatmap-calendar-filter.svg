        <rect width="68" height="28" rx="14" fill="transparent" stroke="#D8D4CB"/>
        <circle cx="14" cy="14" r="4" fill="#C25A8E"/>
        <text x="26" y="18" font-size="12" font-weight="600" fill="#5C5C58">HIIT · 1</text>
      </g>
      <!-- Swim (new — added automatically when user logs it) -->
      <g transform="translate(156 46)">
        <rect width="80" height="28" rx="14" fill="transparent" stroke="#D8D4CB" stroke-dasharray="3 2"/>
        <circle cx="14" cy="14" r="4" fill="#3FA3C2"/>
