        <text x="246" y="13" font-size="9" fill="#9A9A95">11</text>
        <circle cx="262" cy="30" r="4" fill="#E6E3DC"/>
        <!-- Apr 12 Sun: Mobility (faded) -->
        <rect x="288" y="0" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#E6E3DC"/>
        <text x="294" y="13" font-size="9" fill="#9A9A95">12</text>
        <circle cx="310" cy="30" r="4" fill="#E6E3DC"/>
      </g>

