        <!-- Apr 6 Mon: Cycling (faded) -->
        <rect x="0" y="0" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#E6E3DC"/>
        <text x="6" y="13" font-size="9" fill="#9A9A95">6</text>
