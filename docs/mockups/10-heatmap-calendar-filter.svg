      <text x="246" y="13" font-size="9" fill="#9A9A95">4</text>
      <circle cx="262" cy="30" r="4" fill="#E6E3DC"/>
      <!-- Apr 5 Sun: Run + Mobility -->
      <rect x="288" y="0" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#E6E3DC"/>
      <text x="294" y="13" font-size="9" fill="#9A9A95">5</text>
      <circle cx="304" cy="30" r="5" fill="#5FA8C9"/>
      <circle cx="316" cy="30" r="4" fill="#E6E3DC"/>

      <!-- Row 2: Apr 6–12 -->
