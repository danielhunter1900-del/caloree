<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="-apple-system, system-ui, sans-serif">
  <rect width="400" height="280" rx="14" fill="#FFFFFF"/>
  <!-- Title -->
  <text x="20" y="26" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">CALORIES BURNED · APR 12 — APR 18</text>
  <!-- Filter chips row -->
  <g transform="translate(20 42)">
    <rect x="0"  y="0" width="58" height="22" rx="11" fill="#5FA8C9"/>
    <text x="29" y="15" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">🏃 Run</text>
    <rect x="64" y="0" width="78" height="22" rx="11" fill="#D96B5C"/>
    <text x="103" y="15" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">🏋️ Strength</text>
    <rect x="148" y="0" width="100" height="22" rx="11" fill="none" stroke="#D9D9D2" stroke-width="1"/>
    <text x="198" y="15" font-size="11" font-weight="500" fill="#9A9A95" text-anchor="middle">🤸 Calisthenics</text>
    <rect x="254" y="0" width="78" height="22" rx="11" fill="none" stroke="#D9D9D2" stroke-width="1"/>
    <text x="293" y="15" font-size="11" font-weight="500" fill="#9A9A95" text-anchor="middle">🚴 Cycling</text>
  </g>
  <!-- Goal line -->
  <line x1="20" y1="120" x2="380" y2="120" stroke="#9A9A95" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="376" y="115" font-size="9" font-weight="600" fill="#5C5C58" text-anchor="end">GOAL 400</text>
  <!-- Stacked bars (some types filtered out) -->
  <g transform="translate(40 90)">
    <!-- Day 1: Run + Strength -->
    <rect x="0"  y="60" width="22" height="120" rx="3" fill="#5FA8C9"/>
    <rect x="0"  y="40" width="22" height="20"  fill="#D96B5C"/>
    <!-- Day 2: Strength only -->
    <rect x="50" y="100" width="22" height="80"  rx="3" fill="#D96B5C"/>
    <!-- Day 3: Run -->
    <rect x="100" y="80" width="22" height="100" rx="3" fill="#5FA8C9"/>
    <!-- Day 4: empty -->
    <rect x="150" y="170" width="22" height="10" rx="3" fill="#ECECE8"/>
    <!-- Day 5: Strength -->
    <rect x="200" y="60" width="22" height="120" rx="3" fill="#D96B5C"/>
    <!-- Day 6: Run + Strength -->
    <rect x="250" y="50" width="22" height="130" rx="3" fill="#5FA8C9"/>
    <rect x="250" y="35" width="22" height="15"  fill="#D96B5C"/>
    <!-- Day 7: Run -->
    <rect x="300" y="30" width="22" height="150" rx="3" fill="#5FA8C9"/>
    <!-- x-axis -->
    <g font-size="10" fill="#9A9A95" font-weight="500">
      <text x="11" y="200" text-anchor="middle">M</text>
      <text x="61" y="200" text-anchor="middle">T</text>
      <text x="111" y="200" text-anchor="middle">W</text>
      <text x="161" y="200" text-anchor="middle">T</text>
      <text x="211" y="200" text-anchor="middle">F</text>
      <text x="261" y="200" text-anchor="middle">S</text>
      <text x="311" y="200" text-anchor="middle">S</text>
    </g>
  </g>
  <text x="20" y="265" font-size="10" fill="#9A9A95">Tap a chip to fade/show that type. Stacked totals stay readable.</text>
</svg>
