      <rect x="120" y="0" width="14" height="14" rx="2" fill="#5FA8C9" opacity="1"/>
      <rect x="140" y="0" width="14" height="14" rx="2" fill="#5FA8C9" opacity="0.6"/>
      <rect x="160" y="0" width="14" height="14" rx="2" fill="#ECECE8"/>
