<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="-apple-system, system-ui, sans-serif">
  <rect width="400" height="280" rx="14" fill="#FFFFFF"/>
  <text x="20" y="26" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">EXERCISE HEATMAP · APR</text>
  <text x="20" y="44" font-size="10" fill="#9A9A95">Darker = more minutes</text>
  <!-- Day labels (top, sample 14 days) -->
  <g transform="translate(110 60)" font-size="9" fill="#9A9A95">
    <text x="0">M</text><text x="20">T</text><text x="40">W</text><text x="60">T</text><text x="80">F</text>
    <text x="100">S</text><text x="120">S</text><text x="140">M</text><text x="160">T</text><text x="180">W</text>
    <text x="200">T</text><text x="220">F</text><text x="240">S</text><text x="260">S</text>
  </g>
  <!-- Type rows -->
  <g transform="translate(20 80)" font-size="11" font-weight="600" fill="#5C5C58">
    <text x="0" y="13">🏃 Run</text>
    <text x="0" y="43">🏋️ Strength</text>
    <text x="0" y="73">🤸 Calisthenics</text>
    <text x="0" y="103">🚴 Cycling</text>
    <text x="0" y="133">🧘 Mobility</text>
    <text x="0" y="163">🔥 HIIT</text>
  </g>
