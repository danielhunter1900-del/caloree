      <rect x="160" y="0" width="14" height="14" rx="2" fill="#ECECE8"/>
      <rect x="180" y="0" width="14" height="14" rx="2" fill="#ECECE8"/>
      <rect x="200" y="0" width="14" height="14" rx="2" fill="#E0A24A" opacity="0.85"/>
