      <rect x="20" y="0" width="14" height="14" rx="2" fill="#D96B5C" opacity="0.85"/>
      <rect x="40" y="0" width="14" height="14" rx="2" fill="#ECECE8"/>
      <rect x="60" y="0" width="14" height="14" rx="2" fill="#D96B5C" opacity="0.7"/>
      <rect x="80" y="0" width="14" height="14" rx="2" fill="#ECECE8"/>
      <rect x="100" y="0" width="14" height="14" rx="2" fill="#D96B5C" opacity="1"/>
