<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="-apple-system, system-ui, sans-serif">
  <rect width="400" height="280" rx="14" fill="#FFFFFF"/>
  <text x="20" y="22" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">CALORIES BURNED · APR 12 — APR 18</text>
  <!-- Top: stacked bars (compressed) -->
  <g transform="translate(40 35)">
    <rect x="0"   y="50" width="22" height="50" rx="3" fill="#5FA8C9"/>
    <rect x="0"   y="35" width="22" height="15" fill="#D96B5C"/>
    <rect x="50"  y="60" width="22" height="40" rx="3" fill="#D96B5C"/>
    <rect x="100" y="40" width="22" height="60" rx="3" fill="#5FA8C9"/>
    <rect x="150" y="80" width="22" height="20" rx="3" fill="#E0A24A"/>
    <rect x="200" y="30" width="22" height="70" rx="3" fill="#D96B5C"/>
    <rect x="250" y="25" width="22" height="65" rx="3" fill="#5FA8C9"/>
    <rect x="250" y="20" width="22" height="5"  fill="#D96B5C"/>
    <rect x="300" y="10" width="22" height="90" rx="3" fill="#5FA8C9"/>
  </g>
  <!-- Sparklines below per type -->
  <g transform="translate(20 160)" font-family="-apple-system, system-ui, sans-serif">
    <text x="0" y="9" font-size="10" font-weight="600" fill="#5FA8C9">RUN</text>
    <polyline points="60,8 110,4 160,12 210,2 260,4 310,0" fill="none" stroke="#5FA8C9" stroke-width="2" stroke-linecap="round"/>
    <text x="350" y="9" font-size="9" fill="#5C5C58">8.2km</text>
  </g>
  <g transform="translate(20 188)" font-family="-apple-system, system-ui, sans-serif">
    <text x="0" y="9" font-size="10" font-weight="600" fill="#D96B5C">STRENGTH</text>
    <polyline points="80,4 110,12 160,2 210,12 260,5 310,12" fill="none" stroke="#D96B5C" stroke-width="2" stroke-linecap="round"/>
    <text x="350" y="9" font-size="9" fill="#5C5C58">3 sess</text>
  </g>
  <g transform="translate(20 216)">
    <text x="0" y="9" font-size="10" font-weight="600" fill="#E0A24A">CALI</text>
    <polyline points="60,12 110,12 160,4 210,12 260,12 310,12" fill="none" stroke="#E0A24A" stroke-width="2" stroke-linecap="round"/>
    <text x="350" y="9" font-size="9" fill="#5C5C58">1 sess</text>
  </g>
  <g transform="translate(20 244)">
    <text x="0" y="9" font-size="10" font-weight="600" fill="#7A8BD1">CYCLE</text>
    <polyline points="60,12 110,8 160,12 210,12 260,12 310,4" fill="none" stroke="#7A8BD1" stroke-width="2" stroke-linecap="round"/>
    <text x="350" y="9" font-size="9" fill="#5C5C58">22km</text>
  </g>
  <text x="20" y="270" font-size="9" fill="#9A9A95">Stacked total + sparkline per type. See totals AND each trend at once.</text>
</svg>
