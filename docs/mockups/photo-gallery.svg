<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 900" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="900" fill="#F7F5F0"/>

  <!-- Status -->
  <text x="20" y="28" font-size="13" font-weight="600" fill="#1A1A1A">9:41</text>

  <!-- Header -->
  <text x="20" y="72" font-size="32" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">Journal</text>

  <!-- Range filter -->
  <g transform="translate(20 96)">
    <rect width="74" height="30" rx="15" fill="#1A1A1A"/>
    <text x="37" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#F7F5F0">7 days</text>
    <rect x="82" width="74" height="30" rx="15" fill="transparent" stroke="#D8D4CB"/>
    <text x="119" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#9A9A95">Month</text>
    <rect x="164" width="70" height="30" rx="15" fill="transparent" stroke="#D8D4CB"/>
    <text x="199" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#9A9A95">Year</text>
    <rect x="242" width="74" height="30" rx="15" fill="transparent" stroke="#D8D4CB"/>
    <text x="279" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#9A9A95">All time</text>
  </g>

  <!-- Stats strip -->
  <g transform="translate(16 140)">
    <rect width="388" height="54" rx="10" fill="#FFFFFF"/>
    <g transform="translate(16 12)">
      <text font-size="10" font-weight="600" fill="#9A9A95" letter-spacing="1">PHOTOS</text>
      <text y="22" font-size="18" font-weight="700" fill="#1A1A1A">18</text>
    </g>
    <g transform="translate(130 12)">
      <text font-size="10" font-weight="600" fill="#9A9A95" letter-spacing="1">AVG KCAL</text>
      <text y="22" font-size="18" font-weight="700" fill="#1A1A1A">527</text>
    </g>
    <g transform="translate(240 12)">
      <text font-size="10" font-weight="600" fill="#9A9A95" letter-spacing="1">TOP MEAL</text>
      <text y="22" font-size="13" font-weight="600" fill="#1A1A1A">Chicken rice bowl</text>
    </g>
  </g>

  <!-- Day header 1 -->
  <text x="20" y="224" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">MONDAY · APR 21</text>
  <text x="400" y="224" text-anchor="end" font-size="11" fill="#9A9A95">1,940 kcal</text>

  <!-- Grid 3x2 for Monday -->
  <g transform="translate(20 236)">
    <!-- row 1 -->
    <g transform="translate(0 0)">
      <rect width="122" height="122" rx="12" fill="#E8D7BF"/>
      <circle cx="40" cy="48" r="20" fill="#F4CFA2"/>
      <rect x="60" y="58" width="42" height="22" rx="4" fill="#BD8A62"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">BREAKFAST</text>
    </g>
    <g transform="translate(130 0)">
      <rect width="122" height="122" rx="12" fill="#C7D9BE"/>
      <circle cx="60" cy="70" r="32" fill="#8FB18B"/>
      <circle cx="85" cy="48" r="14" fill="#E0A24A"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">LUNCH</text>
    </g>
    <g transform="translate(260 0)">
      <rect width="122" height="122" rx="12" fill="#CFAE8C"/>
      <rect x="26" y="36" width="70" height="50" rx="6" fill="#A56E4A"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">DINNER</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(0 130)">
      <rect width="122" height="122" rx="12" fill="#D9D2C2"/>
      <rect x="28" y="34" width="66" height="54" rx="6" fill="#9D8768"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">SNACK</text>
    </g>
    <g transform="translate(130 130)">
      <rect width="122" height="122" rx="12" fill="#C2AF98"/>
      <circle cx="60" cy="60" r="38" fill="#E8C67A"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">SNACK</text>
    </g>
    <g transform="translate(260 130)">
      <rect width="122" height="122" rx="12" fill="#F1EADA" stroke="#D8D4CB"/>
      <text x="61" y="64" text-anchor="middle" font-size="28" fill="#C6C3BC">+</text>
      <text x="61" y="80" text-anchor="middle" font-size="9" fill="#9A9A95">ADD PHOTO</text>
    </g>
  </g>

  <!-- Day header 2 -->
  <text x="20" y="526" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">SUNDAY · APR 20</text>
  <text x="400" y="526" text-anchor="end" font-size="11" fill="#9A9A95">2,140 kcal</text>

  <!-- Grid 3x1 for Sunday -->
  <g transform="translate(20 538)">
    <g transform="translate(0 0)">
      <rect width="122" height="122" rx="12" fill="#DAB6A2"/>
      <rect x="22" y="30" width="78" height="62" rx="6" fill="#A86848"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">BREAKFAST</text>
    </g>
    <g transform="translate(130 0)">
      <rect width="122" height="122" rx="12" fill="#BDCDAE"/>
      <circle cx="60" cy="60" r="34" fill="#7B9B6E"/>
      <rect x="90" y="40" width="18" height="32" rx="3" fill="#E0A24A"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">LUNCH</text>
    </g>
    <g transform="translate(260 0)">
      <rect width="122" height="122" rx="12" fill="#D6BEA6"/>
      <rect x="28" y="36" width="66" height="50" rx="6" fill="#8E6A49"/>
      <text x="8" y="110" font-size="10" font-weight="600" fill="#FFFFFF">DINNER</text>
    </g>
  </g>

  <!-- Interaction notes -->
  <g transform="translate(16 690)">
    <rect width="388" height="160" rx="10" fill="#FFFFFF"/>
    <text x="16" y="26" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">INTERACTIONS</text>
    <g transform="translate(16 40)" font-size="12" fill="#5C5C58">
      <text y="0">• Tap a tile → opens the meal's Food Detail sheet (same as Home).</text>
      <text y="20">• Long-press → share/save original photo.</text>
      <text y="40">• Pinch / tap "Month" → switches to larger grid (6 cols of smaller tiles).</text>
      <text y="60">• Empty slot for today → shortcut to Log → AI Photo flow.</text>
      <text y="80">• Top strip: number of photos, avg kcal per logged meal, most-photographed dish.</text>
      <text y="100">• Filter chips: macro-heavy (protein-only / low-carb), or by meal section.</text>
    </g>
  </g>

  <!-- Tab bar -->
  <g transform="translate(0 860)">
    <rect width="420" height="60" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="420" y2="0" stroke="#E8DFC8"/>
    <text x="70" y="36" text-anchor="middle" font-size="11" fill="#9A9A95">Today</text>
    <circle cx="210" cy="30" r="22" fill="#1A1A1A"/>
    <text x="210" y="37" text-anchor="middle" font-size="22" fill="#F7F5F0">+</text>
    <text x="350" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Journal</text>
  </g>
</svg>
