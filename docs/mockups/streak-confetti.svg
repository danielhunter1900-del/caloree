<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 760" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="760" fill="#F7F5F0"/>
  <text x="20" y="34" font-size="14" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Milestone celebration</text>
  <text x="20" y="54" font-size="11" fill="#9A9A95">Shown ONCE when crossing 7, 30, 100, or 365 days.</text>

  <!-- Phone frame -->
  <g transform="translate(30 80)">
    <rect width="360" height="620" rx="36" fill="#1A1A1A"/>
    <rect x="8" y="8" width="344" height="604" rx="30" fill="#F7F5F0"/>
    <rect x="160" y="8" width="40" height="22" rx="11" fill="#1A1A1A"/>

    <!-- Background app content (dimmed / blurred) -->
    <g opacity="0.25" transform="translate(18 40)">
      <text x="0" y="50" font-size="30" font-weight="700" fill="#1A1A1A">Today</text>
      <rect x="0" y="72" width="324" height="200" rx="14" fill="#FFFFFF"/>
      <circle cx="162" cy="172" r="68" fill="none" stroke="#ECEAE4" stroke-width="10"/>
      <circle cx="162" cy="172" r="68" fill="none" stroke="#2B7A5C" stroke-width="10" stroke-dasharray="360 427" transform="rotate(-90 162 172)"/>
      <text x="162" y="182" text-anchor="middle" font-size="34" font-weight="700" fill="#1A1A1A">1,612</text>
      <rect x="0" y="286" width="324" height="80" rx="14" fill="#FFFFFF"/>
      <rect x="0" y="378" width="324" height="80" rx="14" fill="#FFFFFF"/>
      <rect x="0" y="470" width="324" height="80" rx="14" fill="#FFFFFF"/>
    </g>

    <!-- Dim overlay -->
    <rect x="8" y="8" width="344" height="604" rx="30" fill="rgba(0,0,0,0.35)"/>

    <!-- Confetti particles -->
    <g>
      <rect x="60" y="60" width="10" height="6" fill="#E0A24A" transform="rotate(-20 65 63)"/>
      <circle cx="110" cy="80" r="4" fill="#2B7A5C"/>
      <rect x="170" y="50" width="8" height="8" fill="#3A6FC2" transform="rotate(25 174 54)"/>
      <rect x="240" y="70" width="6" height="10" fill="#D96B5C" transform="rotate(-10 243 75)"/>
      <circle cx="295" cy="60" r="3" fill="#5544A8"/>
      <rect x="40" y="140" width="10" height="6" fill="#D6A74A"/>
      <circle cx="80" cy="210" r="4" fill="#3A6FC2"/>
      <rect x="260" y="150" width="8" height="8" fill="#2B7A5C" transform="rotate(45 264 154)"/>
      <rect x="310" y="180" width="6" height="10" fill="#D96B5C" transform="rotate(15 313 185)"/>
      <circle cx="35" cy="280" r="3" fill="#E0A24A"/>
      <rect x="300" y="260" width="10" height="6" fill="#5544A8" transform="rotate(-30 305 263)"/>
      <circle cx="120" cy="310" r="3" fill="#D96B5C"/>
      <rect x="280" y="320" width="8" height="8" fill="#2B7A5C" transform="rotate(10 284 324)"/>
      <circle cx="55" cy="380" r="4" fill="#3A6FC2"/>
      <rect x="200" y="400" width="10" height="6" fill="#E0A24A" transform="rotate(35 205 403)"/>
    </g>

    <!-- Celebration card -->
    <g transform="translate(48 180)">
      <rect width="264" height="260" rx="22" fill="#FFFFFF"/>

      <!-- Big flame -->
      <g transform="translate(132 60)">
        <circle r="42" fill="#FFF4E5"/>
        <path d="M 0 26 c -6 -8 -6 -20 2 -28 c -2 8 3 13 5 13 c 0 -8 8 -14 13 -22 c 0 17 14 22 14 36 c 0 10 -8 18 -17 18 c -8 0 -17 -7 -17 -17 z"
          fill="#E0A24A" transform="translate(-17 -22)"/>
      </g>

      <!-- Milestone number -->
      <text x="132" y="160" text-anchor="middle" font-size="40" font-weight="700" fill="#1A1A1A" letter-spacing="-1">100</text>
      <text x="132" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="2.5">DAY STREAK</text>

      <!-- Hero line -->
      <text x="132" y="212" text-anchor="middle" font-size="13" fill="#5C5C58">You've logged 100 days in a row.</text>

      <!-- CTA -->
      <rect x="32" y="228" width="200" height="38" rx="10" fill="#2B7A5C"/>
      <text x="132" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Keep going</text>
    </g>
  </g>

  <!-- Notes -->
  <g transform="translate(20 720)" font-size="11" fill="#5C5C58">
    <text x="0" y="0">Fires once per milestone (7, 30, 100, 365) · dismiss tap or Continue · auto-dismiss 5s · never repeats for that tier.</text>
  </g>
</svg>
