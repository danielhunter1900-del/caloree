<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 540" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="540" fill="#F7F5F0"/>

  <!-- BEFORE label -->
  <text x="20" y="28" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="2">BEFORE</text>

  <!-- Before row -->
  <g transform="translate(16 44)">
    <rect width="388" height="60" rx="14" fill="#FFFFFF"/>
    <text x="20" y="38" font-size="28" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">Today</text>
    <circle cx="360" cy="30" r="18" fill="#E8E4D4"/>
    <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#5C5C58">D</text>
  </g>

  <!-- AFTER label -->
  <text x="20" y="146" font-size="11" font-weight="700" fill="#2B7A5C" letter-spacing="2">AFTER</text>

  <!-- After row -->
  <g transform="translate(16 162)">
    <rect width="388" height="72" rx="14" fill="#FFFFFF"/>
    <text x="20" y="44" font-size="28" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">Today</text>

    <!-- Streak chip -->
    <g transform="translate(190 22)">
      <rect width="98" height="34" rx="17" fill="#FFF4E5"/>
      <!-- Flame -->
      <path d="M 13 24 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z"
        fill="#E0A24A"/>
      <text x="52" y="22" font-family="-apple-system" font-size="15" font-weight="700" fill="#8A5A1F">14</text>
      <text x="68" y="22" font-size="10" font-weight="700" fill="#8A5A1F">day</text>
    </g>

    <!-- Profile avatar -->
    <circle cx="360" cy="36" r="18" fill="#E8E4D4"/>
    <text x="360" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#5C5C58">D</text>
  </g>

  <!-- Variations label -->
  <text x="20" y="276" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="2">STATES</text>

  <!-- Active streak (≥3 days) -->
  <g transform="translate(16 292)">
    <rect width="388" height="50" rx="10" fill="#FFFFFF"/>
    <g transform="translate(14 10)">
      <rect width="98" height="30" rx="15" fill="#FFF4E5"/>
      <path d="M 13 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#E0A24A"/>
      <text x="52" y="20" font-size="14" font-weight="700" fill="#8A5A1F">14</text>
      <text x="68" y="20" font-size="10" font-weight="700" fill="#8A5A1F">day</text>
    </g>
    <text x="130" y="30" font-size="12" fill="#5C5C58"><tspan font-weight="700" fill="#1A1A1A">Active streak</tspan> · 3+ consecutive logged days</text>
  </g>

  <!-- Early streak (1-2 days) -->
  <g transform="translate(16 352)">
    <rect width="388" height="50" rx="10" fill="#FFFFFF"/>
    <g transform="translate(14 10)">
      <rect width="70" height="30" rx="15" fill="#F7F5F0" stroke="#E8DFC8"/>
      <path d="M 13 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#C6C3BC"/>
      <text x="40" y="20" font-size="14" font-weight="700" fill="#5C5C58">2</text>
      <text x="50" y="20" font-size="10" font-weight="700" fill="#5C5C58">day</text>
    </g>
    <text x="102" y="30" font-size="12" fill="#5C5C58"><tspan font-weight="700" fill="#1A1A1A">Building</tspan> · muted until day 3</text>
  </g>

  <!-- At risk (logged yesterday but not today) -->
  <g transform="translate(16 412)">
    <rect width="388" height="50" rx="10" fill="#FFFFFF"/>
    <g transform="translate(14 10)">
      <rect width="110" height="30" rx="15" fill="#FDECEA"/>
      <path d="M 13 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#D96B5C"/>
      <text x="52" y="20" font-size="14" font-weight="700" fill="#B3261E">14</text>
      <text x="68" y="20" font-size="10" font-weight="700" fill="#B3261E">at risk</text>
    </g>
    <text x="142" y="30" font-size="12" fill="#5C5C58"><tspan font-weight="700" fill="#1A1A1A">At risk</tspan> · logged yesterday but not today yet</text>
  </g>

  <!-- No streak -->
  <g transform="translate(16 472)">
    <rect width="388" height="50" rx="10" fill="#FFFFFF"/>
    <text x="14" y="30" font-size="12" fill="#5C5C58"><tspan font-weight="700" fill="#1A1A1A">None</tspan> · nothing shown · avoid guilt for zero-day</text>
  </g>
</svg>
