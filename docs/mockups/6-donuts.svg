<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="-apple-system, system-ui, sans-serif">
  <rect width="400" height="280" rx="14" fill="#FFFFFF"/>
  <text x="20" y="22" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">CALORIES BURNED · APR 12 — APR 18</text>
  <!-- 7 donuts -->
  <g transform="translate(35 70)">
    <!-- Day 1 -->
    <circle r="22" cx="0" cy="0" fill="none" stroke="#ECECE8" stroke-width="6"/>
    <circle r="22" cx="0" cy="0" fill="none" stroke="#5FA8C9" stroke-width="6" stroke-dasharray="80 138" transform="rotate(-90)"/>
    <circle r="22" cx="0" cy="0" fill="none" stroke="#D96B5C" stroke-width="6" stroke-dasharray="40 178" stroke-dashoffset="-80" transform="rotate(-90)"/>
    <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">320</text>
    <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">M</text>

    <!-- Day 2 -->
    <g transform="translate(50 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#D96B5C" stroke-width="6" stroke-dasharray="60 138" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">220</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">T</text>
    </g>
    <!-- Day 3 -->
    <g transform="translate(100 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#5FA8C9" stroke-width="6" stroke-dasharray="100 138" transform="rotate(-90)"/>
      <circle r="22" fill="none" stroke="#7A8BD1" stroke-width="6" stroke-dasharray="38 178" stroke-dashoffset="-100" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">410</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">W</text>
    </g>
    <!-- Day 4 -->
    <g transform="translate(150 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#E0A24A" stroke-width="6" stroke-dasharray="30 138" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">110</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">T</text>
    </g>
    <!-- Day 5 -->
    <g transform="translate(200 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#D96B5C" stroke-width="6" stroke-dasharray="120 138" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">450</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">F</text>
    </g>
    <!-- Day 6 -->
    <g transform="translate(250 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#5FA8C9" stroke-width="6" stroke-dasharray="90 138" transform="rotate(-90)"/>
      <circle r="22" fill="none" stroke="#D96B5C" stroke-width="6" stroke-dasharray="20 178" stroke-dashoffset="-90" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">370</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">S</text>
    </g>
    <!-- Day 7 -->
    <g transform="translate(300 0)">
      <circle r="22" fill="none" stroke="#ECECE8" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#5FA8C9" stroke-width="6" stroke-dasharray="135 138" transform="rotate(-90)"/>
      <text y="4" font-size="11" font-weight="700" fill="#0A0A0A" text-anchor="middle">520</text>
      <text y="44" font-size="9" fill="#9A9A95" text-anchor="middle">S</text>
    </g>
  </g>
  <!-- Legend -->
  <g transform="translate(20 170)" font-size="10" font-weight="600">
    <rect x="0" y="0" width="9" height="9" rx="2" fill="#5FA8C9"/><text x="14" y="9" fill="#5C5C58">Run</text>
    <rect x="60" y="0" width="9" height="9" rx="2" fill="#D96B5C"/><text x="74" y="9" fill="#5C5C58">Strength</text>
    <rect x="140" y="0" width="9" height="9" rx="2" fill="#E0A24A"/><text x="154" y="9" fill="#5C5C58">Calisthenics</text>
    <rect x="230" y="0" width="9" height="9" rx="2" fill="#7A8BD1"/><text x="244" y="9" fill="#5C5C58">Cycling</text>
  </g>
  <text x="20" y="270" font-size="10" fill="#9A9A95">Per-day donut. Beautiful, shows mix at a glance. Hard to compare totals.</text>
</svg>
