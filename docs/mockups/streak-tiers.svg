<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 1100" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="1100" fill="#F7F5F0"/>
  <text x="20" y="34" font-size="14" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Streak tiers</text>
  <text x="20" y="54" font-size="11" fill="#9A9A95">Flame progressively hotter and bigger as the streak grows. Tap chip to toggle label style.</text>

  <!-- Reusable flame symbols: outer + optional inner core -->
  <defs>
    <!-- Base flame shape — scaled per tier via transforms -->
    <symbol id="flame" viewBox="0 0 24 28">
      <path d="M 6 24 c -4 -4 -3 -11 2 -14 c 0 3 2 4 3 4 c 0 -4 4 -6 6 -10 c 0 8 6 10 6 16 c 0 5 -4 8 -8 8 c -4 0 -9 -2 -9 -4 z"/>
    </symbol>
    <!-- Inner core — slightly smaller, brighter -->
    <symbol id="flameCore" viewBox="0 0 24 28">
      <path d="M 9 22 c -2 -2 -2 -6 1 -8 c 0 2 1 2 2 2 c 0 -2 3 -3 4 -5 c 0 4 3 5 3 9 c 0 3 -2 4 -5 4 c -3 0 -5 -1 -5 -2 z"/>
    </symbol>
  </defs>

  <!-- Row template positions -->
  <g font-family="-apple-system, system-ui">

    <!-- DAYS 1–2: hidden -->
    <g transform="translate(16 78)">
      <rect width="388" height="62" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="1.5">DAYS 1–2</text>
      <text x="16" y="46" font-size="13" fill="#5C5C58">(nothing shown)</text>
      <text x="372" y="40" text-anchor="end" font-size="11" fill="#9A9A95">streak undefined</text>
    </g>

    <!-- 3–6: tiny grey flame -->
    <g transform="translate(16 148)">
      <rect width="388" height="62" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="1.5">DAYS 3–6</text>
      <g transform="translate(266 18)">
        <rect width="106" height="28" rx="14" fill="#F2EFE4"/>
        <g transform="translate(10 5)">
          <use href="#flame" width="14" height="18" fill="#C6C3BC"/>
        </g>
        <text x="54" y="20" font-size="13" font-weight="700" fill="#5C5C58">3 days</text>
      </g>
      <text x="16" y="48" font-size="11" fill="#9A9A95">small, dim — still forming</text>
    </g>

    <!-- 7–13: small warm amber -->
    <g transform="translate(16 218)">
      <rect width="388" height="62" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#E0A24A" letter-spacing="1.5">DAYS 7–13</text>
      <g transform="translate(262 18)">
        <rect width="110" height="28" rx="14" fill="#FFF4E5"/>
        <g transform="translate(10 4)">
          <use href="#flame" width="15" height="20" fill="#E0A24A"/>
        </g>
        <text x="54" y="20" font-size="13" font-weight="700" fill="#8A5A1F">1 week</text>
      </g>
      <text x="16" y="48" font-size="11" fill="#9A9A95">warm tan · first real streak</text>
    </g>

    <!-- 14–29: brighter orange -->
    <g transform="translate(16 288)">
      <rect width="388" height="66" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#E38817" letter-spacing="1.5">DAYS 14–29</text>
      <g transform="translate(258 16)">
        <rect width="114" height="30" rx="15" fill="#FFE9C2"/>
        <g transform="translate(10 4)">
          <use href="#flame" width="17" height="22" fill="#E38817"/>
        </g>
        <text x="56" y="21" font-size="13" font-weight="700" fill="#6B4415">2 weeks</text>
      </g>
      <text x="16" y="50" font-size="11" fill="#9A9A95">deeper orange · routine forming</text>
    </g>

    <!-- 30–59 — orange -->
    <g transform="translate(16 362)">
      <rect width="388" height="68" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#E86F28" letter-spacing="1.5">DAYS 30–59</text>
      <g transform="translate(250 14)">
        <rect width="122" height="34" rx="17" fill="#FFDDB3"/>
        <g transform="translate(10 5)">
          <use href="#flame" width="20" height="24" fill="#E86F28"/>
        </g>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#5A2F0F">1 month</text>
      </g>
      <text x="16" y="52" font-size="11" fill="#9A9A95">orange · habit threshold</text>
    </g>

    <!-- 60–99 — bright orange w/ small core -->
    <g transform="translate(16 438)">
      <rect width="388" height="72" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#F26A0F" letter-spacing="1.5">DAYS 60–99</text>
      <g transform="translate(244 12)">
        <rect width="128" height="38" rx="19" fill="#FFD09E"/>
        <g transform="translate(10 6)">
          <use href="#flame" width="22" height="26" fill="#F26A0F"/>
          <use href="#flameCore" width="22" height="26" fill="#FFD15E"/>
        </g>
        <text x="62" y="24" font-size="14" font-weight="700" fill="#5A2F0F">2 months</text>
      </g>
      <text x="16" y="54" font-size="11" fill="#9A9A95">bright · yellow core starts to show</text>
    </g>

    <!-- 100–179 — orange-yellow -->
    <g transform="translate(16 518)">
      <rect width="388" height="76" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#F08C10" letter-spacing="1.5">DAYS 100–179</text>
      <g transform="translate(242 10)">
        <rect width="130" height="42" rx="21" fill="#FFE08F"/>
        <g transform="translate(10 6)">
          <use href="#flame" width="24" height="30" fill="#F08C10"/>
          <use href="#flameCore" width="24" height="30" fill="#FFDE5C"/>
        </g>
        <text x="62" y="26" font-size="14" font-weight="700" fill="#5A3F0B">100 days</text>
      </g>
      <text x="16" y="56" font-size="11" fill="#9A9A95">richer yellow mid-flame · pulses once on day 100</text>
    </g>

    <!-- 180–364 — vibrant yellow-gold -->
    <g transform="translate(16 602)">
      <rect width="388" height="80" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#D99B16" letter-spacing="1.5">DAYS 180–364</text>
      <g transform="translate(236 8)">
        <rect width="136" height="46" rx="23" fill="#FFEB9E"/>
        <g transform="translate(10 6)">
          <use href="#flame" width="26" height="32" fill="#F0A81A"/>
          <use href="#flameCore" width="26" height="32" fill="#FFF0B3"/>
        </g>
        <text x="62" y="28" font-size="14" font-weight="700" fill="#634208">6 months</text>
      </g>
      <text x="16" y="58" font-size="11" fill="#9A9A95">vibrant gold · white-hot inner core</text>
    </g>

    <!-- 365–729 — gold / trophy -->
    <g transform="translate(16 690)">
      <rect width="388" height="90" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#B8921D" letter-spacing="1.5">DAYS 365–729</text>
      <g transform="translate(218 4)">
        <rect width="154" height="56" rx="28" fill="#FFF3BE" stroke="#E8C541" stroke-width="2"/>
        <g transform="translate(12 10)">
          <use href="#flame" width="30" height="36" fill="#E8A80F"/>
          <use href="#flameCore" width="30" height="36" fill="#FFFBE0"/>
        </g>
        <text x="68" y="34" font-size="15" font-weight="700" fill="#4F3807">1 year 🏆</text>
      </g>
      <text x="16" y="66" font-size="11" fill="#9A9A95">gold rim + trophy · full-screen burst on crossing</text>
    </g>

    <!-- 730+ — max flame -->
    <g transform="translate(16 788)">
      <rect width="388" height="94" rx="10" fill="#FFFFFF"/>
      <text x="16" y="24" font-size="11" font-weight="700" fill="#B8921D" letter-spacing="1.5">DAYS 730+</text>
      <g transform="translate(210 2)">
        <rect width="162" height="60" rx="30" fill="#FFEA8A"/>
        <g transform="translate(12 12)">
          <use href="#flame" width="32" height="38" fill="#F2A400"/>
          <use href="#flameCore" width="32" height="38" fill="#FFFFFF"/>
        </g>
        <!-- sparkles -->
        <circle cx="142" cy="12" r="2" fill="#FFFBE0"/>
        <circle cx="150" cy="24" r="1.5" fill="#FFFBE0"/>
        <circle cx="138" cy="38" r="1.6" fill="#FFFBE0"/>
        <circle cx="30" cy="2" r="1.5" fill="#FFFBE0"/>
        <text x="70" y="36" font-size="15" font-weight="700" fill="#4F3807">2 years</text>
      </g>
      <text x="16" y="68" font-size="11" fill="#9A9A95">max intensity · white core · sparkles</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="910" x2="400" y2="910" stroke="#ECEAE4"/>

    <!-- Toggle interaction -->
    <text x="20" y="940" font-size="12" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Tap to toggle label</text>
    <text x="20" y="958" font-size="11" fill="#9A9A95">Short labels feel celebratory; exact day counts satisfy the numbers lovers. Preference persists.</text>

    <!-- Before -->
    <g transform="translate(16 972)">
      <rect width="180" height="56" rx="10" fill="#FFFFFF"/>
      <text x="12" y="18" font-size="9" font-weight="700" fill="#9A9A95" letter-spacing="1.5">DEFAULT</text>
      <g transform="translate(30 26)">
        <rect width="128" height="26" rx="13" fill="#FFDDB3"/>
        <g transform="translate(8 2)">
          <use href="#flame" width="18" height="22" fill="#E86F28"/>
        </g>
        <text x="60" y="18" font-size="13" font-weight="700" fill="#5A2F0F">1 month</text>
      </g>
    </g>

    <!-- Arrow -->
    <g transform="translate(200 1000)">
      <path d="M 0 0 L 20 0" stroke="#9A9A95" stroke-width="1.5"/>
      <path d="M 14 -4 L 20 0 L 14 4" fill="none" stroke="#9A9A95" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="10" y="-8" text-anchor="middle" font-size="10" fill="#9A9A95">tap</text>
    </g>

    <!-- After -->
    <g transform="translate(224 972)">
      <rect width="180" height="56" rx="10" fill="#FFFFFF"/>
      <text x="12" y="18" font-size="9" font-weight="700" fill="#2B7A5C" letter-spacing="1.5">TOGGLED</text>
      <g transform="translate(30 26)">
        <rect width="128" height="26" rx="13" fill="#FFDDB3"/>
        <g transform="translate(8 2)">
          <use href="#flame" width="18" height="22" fill="#E86F28"/>
        </g>
        <text x="60" y="18" font-size="13" font-weight="700" fill="#5A2F0F">30 days</text>
      </g>
    </g>

    <!-- Override states -->
    <text x="20" y="1058" font-size="12" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Override states · replace flame colour only</text>
    <text x="20" y="1076" font-size="11" fill="#9A9A95">At risk (after 9pm) → red · Streak freeze → blue snowflake · Fresh start → green day-1</text>
  </g>
</svg>
