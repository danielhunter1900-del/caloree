<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 920" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="920" fill="#F7F5F0"/>
  <text x="20" y="34" font-size="14" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Streak tiers</text>
  <text x="20" y="54" font-size="11" fill="#9A9A95">Every row shows what appears in the Home header chip.</text>

  <!-- Tier rows -->
  <g font-family="-apple-system, system-ui">
    <!-- 1–2: hidden -->
    <g transform="translate(16 80)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="1.5">DAYS 1–2</text>
      <text x="16" y="40" font-size="13" fill="#5C5C58">(nothing shown)</text>
      <text x="370" y="35" text-anchor="end" font-size="11" fill="#9A9A95">streak undefined</text>
    </g>

    <!-- 3–6: grey flame -->
    <g transform="translate(16 144)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#9A9A95" letter-spacing="1.5">DAYS 3–6</text>
      <g transform="translate(260 16)">
        <rect width="90" height="28" rx="14" fill="#F2EFE4" stroke="#E8DFC8"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#C6C3BC"/>
        <text x="44" y="20" font-size="13" font-weight="700" fill="#5C5C58">3 day</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">muted grey flame · building</text>
    </g>

    <!-- 7+: amber warm -->
    <g transform="translate(16 208)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#E0A24A" letter-spacing="1.5">DAYS 7–13</text>
      <g transform="translate(260 16)">
        <rect width="90" height="28" rx="14" fill="#FFF4E5"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#E0A24A"/>
        <text x="44" y="20" font-size="13" font-weight="700" fill="#8A5A1F">1 week</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">warm amber · first visible win</text>
    </g>

    <!-- 14+: bolder amber -->
    <g transform="translate(16 272)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#E0A24A" letter-spacing="1.5">DAYS 14–29</text>
      <g transform="translate(260 16)">
        <rect width="90" height="28" rx="14" fill="#FFF0D4"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#D6851F"/>
        <text x="44" y="20" font-size="13" font-weight="700" fill="#6B4415">2 weeks</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">same amber · routine forming</text>
    </g>

    <!-- 30+: green habit -->
    <g transform="translate(16 336)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#2B7A5C" letter-spacing="1.5">DAYS 30–59</text>
      <g transform="translate(240 16)">
        <rect width="110" height="28" rx="14" fill="#E8F5E9"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#2B7A5C"/>
        <text x="40" y="20" font-size="12" font-weight="700" fill="#1C5A3F">30 day · habit</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">green · habit threshold</text>
    </g>

    <!-- 60+: teal -->
    <g transform="translate(16 400)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#2F7D8A" letter-spacing="1.5">DAYS 60–99</text>
      <g transform="translate(260 16)">
        <rect width="90" height="28" rx="14" fill="#E0F0F2"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#2F7D8A"/>
        <text x="44" y="20" font-size="13" font-weight="700" fill="#1F5965">60 day</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">teal · reassurance tier</text>
    </g>

    <!-- 100+: blue celebration -->
    <g transform="translate(16 464)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#3A6FC2" letter-spacing="1.5">DAYS 100–179</text>
      <g transform="translate(254 16)">
        <rect width="96" height="28" rx="14" fill="#E3ECF7"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#3A6FC2"/>
        <text x="42" y="20" font-size="13" font-weight="700" fill="#274A83">100 day</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">blue · chip pulses once on day 100</text>
    </g>

    <!-- 180+: indigo -->
    <g transform="translate(16 528)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#5544A8" letter-spacing="1.5">DAYS 180–364</text>
      <g transform="translate(252 16)">
        <rect width="98" height="28" rx="14" fill="#EAE6F5"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#5544A8"/>
        <text x="42" y="20" font-size="13" font-weight="700" fill="#3A2F77">6 months</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">indigo · half-year badge</text>
    </g>

    <!-- 365+: gold trophy -->
    <g transform="translate(16 592)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#B8921D" letter-spacing="1.5">DAYS 365–729</text>
      <g transform="translate(236 14)">
        <rect width="114" height="32" rx="16" fill="#FFF9E0" stroke="#E8C541" stroke-width="1.4"/>
        <path d="M 14 24 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#E8C541"/>
        <text x="40" y="22" font-size="13" font-weight="700" fill="#6B5210">1 year 🏆</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">gold rim + trophy · full-screen burst once</text>
    </g>

    <!-- 730+: long-haul -->
    <g transform="translate(16 656)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#B8921D" letter-spacing="1.5">DAYS 730+</text>
      <g transform="translate(244 14)">
        <rect width="106" height="32" rx="16" fill="#FFF5C2"/>
        <path d="M 14 24 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#C79E12"/>
        <circle cx="90" cy="10" r="2" fill="#F7E890"/>
        <circle cx="96" cy="22" r="1.5" fill="#F7E890"/>
        <circle cx="85" cy="24" r="1.5" fill="#F7E890"/>
        <text x="42" y="22" font-size="13" font-weight="700" fill="#6B5210">2 years</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">gold flame + subtle sparkle</text>
    </g>

    <!-- Override states -->
    <text x="20" y="744" font-size="12" font-weight="700" fill="#1A1A1A" letter-spacing="-0.3">Override states</text>

    <!-- At risk (after 9pm) -->
    <g transform="translate(16 760)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#B3261E" letter-spacing="1.5">AFTER 9 PM, NOT LOGGED YET</text>
      <g transform="translate(240 16)">
        <rect width="110" height="28" rx="14" fill="#FDECEA"/>
        <path d="M 14 22 c -2 -3 -2 -7 1 -10 c -1 3 1 5 2 5 c 0 -3 3 -5 5 -8 c 0 6 5 8 5 13 c 0 4 -3 7 -7 7 c -3 0 -6 -3 -6 -7 z" fill="#D96B5C"/>
        <text x="40" y="20" font-size="12" font-weight="700" fill="#B3261E">14 · at risk</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">red · nudge only in the evening window</text>
    </g>

    <!-- Streak freeze -->
    <g transform="translate(16 824)">
      <rect width="388" height="56" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#3A6FC2" letter-spacing="1.5">STREAK FREEZE (1/MONTH)</text>
      <g transform="translate(238 16)">
        <rect width="112" height="28" rx="14" fill="#E3ECF7"/>
        <text x="14" y="20" font-size="14">❄</text>
        <text x="34" y="20" font-size="12" font-weight="700" fill="#274A83">14 · frozen</text>
      </g>
      <text x="16" y="44" font-size="11" fill="#9A9A95">skipped day covered — streak intact</text>
    </g>

    <!-- Comeback -->
    <g transform="translate(16 888)">
      <rect width="388" height="50" rx="10" fill="#FFFFFF"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#2B7A5C" letter-spacing="1.5">COMEBACK</text>
      <g transform="translate(222 12)">
        <rect width="128" height="26" rx="13" fill="#E8F5E9"/>
        <text x="64" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1C5A3F">Fresh start · day 1</text>
      </g>
      <text x="16" y="40" font-size="11" fill="#9A9A95">resuming after a break — no shame</text>
    </g>
  </g>
</svg>
