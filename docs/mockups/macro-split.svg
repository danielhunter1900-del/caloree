<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 820" font-family="-apple-system, system-ui, sans-serif">
  <rect width="420" height="820" fill="#F7F5F0"/>
  <text x="20" y="28" font-size="13" font-weight="600" fill="#1A1A1A">9:41</text>
  <text x="20" y="72" font-size="32" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">Today</text>

  <!-- Calorie ring card -->
  <g transform="translate(16 100)">
    <rect width="388" height="460" rx="16" fill="#FFFFFF"/>
    <text x="22" y="28" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">CALORIES</text>
    <text x="22" y="46" font-size="12" fill="#9A9A95">Goal 2,150 kcal</text>

    <!-- Ring -->
    <g transform="translate(194 180)">
      <circle r="92" fill="none" stroke="#ECEAE4" stroke-width="14"/>
      <circle r="92" fill="none" stroke="#2B7A5C" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="432 578" transform="rotate(-90)"/>
      <text text-anchor="middle" y="6" font-family="-apple-system" font-size="44" font-weight="700" fill="#1A1A1A">1,612</text>
      <text text-anchor="middle" y="30" font-size="11" font-weight="600" fill="#9A9A95" letter-spacing="1">538 REMAINING</text>
    </g>

    <!-- NEW: Macro split target bar -->
    <g transform="translate(22 296)">
      <text font-size="10" font-weight="700" fill="#9A9A95" letter-spacing="1.5">SPLIT · ACTUAL vs TARGET</text>

      <!-- Target strip (reference) -->
      <g transform="translate(0 14)">
        <text font-size="9" fill="#9A9A95" letter-spacing="1">TARGET</text>
        <g transform="translate(0 6)">
          <rect width="344" height="10" rx="5" fill="#F3EFE4"/>
          <!-- 40 / 25 / 35 target split -->
          <rect x="0"   width="138" height="10" rx="5" fill="#D6A74A" opacity="0.55"/>
          <rect x="138" width="86"  height="10" fill="#D96B5C" opacity="0.55"/>
          <rect x="224" width="120" height="10" rx="5" fill="#7A5C3A" opacity="0.55"/>
        </g>
      </g>

      <!-- Actual strip -->
      <g transform="translate(0 48)">
        <text font-size="9" fill="#9A9A95" letter-spacing="1">ACTUAL</text>
        <g transform="translate(0 6)">
          <rect width="344" height="16" rx="8" fill="#F3EFE4"/>
          <!-- actual 45 / 22 / 33 -->
          <rect x="0"   width="155" height="16" rx="8" fill="#D6A74A"/>
          <rect x="155" width="75"  height="16" fill="#D96B5C"/>
          <rect x="230" width="114" height="16" rx="8" fill="#7A5C3A"/>
          <!-- target tick markers -->
          <line x1="138" y1="-4" x2="138" y2="20" stroke="#9A9A95" stroke-width="1.2" stroke-dasharray="2 2"/>
          <line x1="224" y1="-4" x2="224" y2="20" stroke="#9A9A95" stroke-width="1.2" stroke-dasharray="2 2"/>
        </g>
      </g>

      <!-- Legend row -->
      <g transform="translate(0 94)">
        <g transform="translate(0 0)">
          <circle cx="6" cy="6" r="4" fill="#D6A74A"/>
          <text x="16" y="4" font-size="10" font-weight="700" fill="#1A1A1A">CARBS</text>
          <text x="16" y="18" font-family="-apple-system" font-size="13" font-weight="600" fill="#1A1A1A">181g</text>
          <text x="54" y="18" font-size="10" fill="#9A9A95">/ 240g</text>
          <text x="16" y="32" font-size="10" font-weight="600" fill="#D6A74A">+5% vs goal</text>
        </g>
        <g transform="translate(118 0)">
          <circle cx="6" cy="6" r="4" fill="#D96B5C"/>
          <text x="16" y="4" font-size="10" font-weight="700" fill="#1A1A1A">PROTEIN</text>
          <text x="16" y="18" font-family="-apple-system" font-size="13" font-weight="600" fill="#1A1A1A">88g</text>
          <text x="54" y="18" font-size="10" fill="#9A9A95">/ 160g</text>
          <text x="16" y="32" font-size="10" font-weight="600" fill="#B3261E">−3% vs goal</text>
        </g>
        <g transform="translate(236 0)">
          <circle cx="6" cy="6" r="4" fill="#7A5C3A"/>
          <text x="16" y="4" font-size="10" font-weight="700" fill="#1A1A1A">FAT</text>
          <text x="16" y="18" font-family="-apple-system" font-size="13" font-weight="600" fill="#1A1A1A">59g</text>
          <text x="54" y="18" font-size="10" fill="#9A9A95">/ 70g</text>
          <text x="16" y="32" font-size="10" font-weight="600" fill="#2B7A5C">−2% vs goal</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Explanatory card -->
  <g transform="translate(16 580)">
    <rect width="388" height="204" rx="14" fill="#FFFFFF"/>
    <text x="16" y="26" font-size="11" font-weight="700" fill="#5C5C58" letter-spacing="1.5">WHAT IT SHOWS</text>
    <g transform="translate(16 42)" font-size="12" fill="#5C5C58">
      <text y="0">Two stacked bars layered over each other:</text>
      <text y="22"><tspan font-weight="700" fill="#9A9A95">· Target</tspan> (top, faded) — the split your daily goals</text>
      <text y="36">  dictate, e.g. 40% C / 25% P / 35% F.</text>
      <text y="58"><tspan font-weight="700" fill="#1A1A1A">· Actual</tspan> (bottom, solid) — your current intake as a</text>
      <text y="72">  share of calories consumed so far.</text>
      <text y="94">Dashed vertical ticks mark where your target splits sit,</text>
      <text y="108">so you can see at a glance whether you're skewing carb-heavy</text>
      <text y="122">or protein-light vs plan. Delta % per macro under the legend.</text>
      <text y="144" font-weight="700" fill="#1A1A1A">Why it's useful</text>
      <text y="160">The calorie ring tells you "how much" — this tells you</text>
      <text y="174">"of what". Much faster than reading three separate bars.</text>
    </g>
  </g>
</svg>
