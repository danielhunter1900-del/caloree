              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <div style={{
                  fontFamily: theme.font, fontSize: 14, fontWeight: 500, color: theme.ink,
                }}>{r.food.name}</div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 14, color: theme.ink, fontWeight: theme.numWeight,
                }}>{r.amount.toFixed(1)}{drill.unit}</div>
              </div>
              <div style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                marginTop: 4, gap: 8,

                <div style={{
                  flex: 1, height: 4, borderRadius: 2,
                  background: theme.ring.track, overflow: 'hidden',

                  <div style={{
                    width: `${pct}%`, height: '100%', background: drill.color,
                  }}/>
                </div>
                <div style={{
                  fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
                  minWidth: 80, textAlign: 'right',
                }}>{r.entry.meal} · {Math.round(pct)}%</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>,
    document.body
  );
}

// Small badge that shows how many pending writes are queued offline.
// Tap to force a drain attempt. Vanishes when the queue is empty.
function UnsyncedBadge({ theme }) {
  const [count, setCount] = React.useState(
    (window.sbQueue && window.sbQueue.size && window.sbQueue.size()) || 0
  );
  React.useEffect(() => {
    if (!window.sbQueue) return;
    return window.sbQueue.subscribe(setCount);
  }, []);
  if (!count) return null;
  return (
    <button onClick={() => window.sbQueue && window.sbQueue.drain()} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '6px 10px', borderRadius: 999,
      background: '#FFF2DB', border: '1px solid #E6C37A',
      color: '#8A5A1F', cursor: 'pointer',
      fontFamily: theme.font, fontSize: 11, fontWeight: 700,
      letterSpacing: '0.02em',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 3, background: '#E0A24A' }}/>
      {count} unsynced
    </button>
  );
}

// Streak-tier definitions. Kept close to Header so both the tier logic
// and the chip colours live in one place. Outer flame colour + optional
// brighter "core" layer + chip bg tint + chip text colour. Size in px
// for the flame svg; chip scales to fit.
const STREAK_TIERS = [
  { min: 730, size: 22, outer: '#F2A400', core: '#FFFFFF', bg: '#FFEA8A',  fg: '#4F3807', label: '2 years'  },
  { min: 365, size: 20, outer: '#E8A80F', core: '#FFFBE0', bg: '#FFF3BE',  fg: '#4F3807', label: '1 year'   },
  { min: 180, size: 18, outer: '#F0A81A', core: '#FFF0B3', bg: '#FFEB9E',  fg: '#634208', label: '6 months' },
  { min: 100, size: 17, outer: '#F08C10', core: '#FFDE5C', bg: '#FFE08F',  fg: '#5A3F0B', label: '100 days' },
  { min:  60, size: 16, outer: '#F26A0F', core: '#FFD15E', bg: '#FFD09E',  fg: '#5A2F0F', label: '2 months' },
  { min:  30, size: 15, outer: '#E86F28', core: null,      bg: '#FFDDB3',  fg: '#5A2F0F', label: '1 month'  },
  { min:  14, size: 14, outer: '#E38817', core: null,      bg: '#FFE9C2',  fg: '#6B4415', label: '2 weeks'  },
  { min:   7, size: 13, outer: '#E0A24A', core: null,      bg: '#FFF4E5',  fg: '#8A5A1F', label: '1 week'   },
  { min:   3, size: 12, outer: '#C6C3BC', core: null,      bg: '#F2EFE4',  fg: '#5C5C58', label: null       }, // falls back to "N days"
];
function streakTier(days) {
  return STREAK_TIERS.find(t => days >= t.min) || null;
}
// Short-label generator. < 30 days = N days. 30-364 = months. 365+ = years.
function streakShortLabel(days) {
  if (days < 30) return `${days} ${days === 1 ? 'day' : 'days'}`;
  if (days < 365) {
    const m = Math.floor(days / 30);
    return `${m} ${m === 1 ? 'month' : 'months'}`;
  }
  const y = Math.floor(days / 365);
  return `${y} ${y === 1 ? 'year' : 'years'}`;
}

function StreakChip({ theme, streak, todayLogged, settings, setSettings }) {
  if (!streak || streak < 3) return null;
  const tier = streakTier(streak);
  if (!tier) return null;
  // At-risk state: streak alive but nothing yet logged today, after 9pm.
  const now = new Date();
  const atRisk = !todayLogged && now.getHours() >= 21;
  const mode = (settings && settings.streakLabelMode) || 'short';
  const labelText = mode === 'days'
    ? `${streak} ${streak === 1 ? 'day' : 'days'}`
    : (tier.label || `${streak} days`);
  const displayText = atRisk ? `${streak} · at risk` : labelText;
  const bg = atRisk ? '#FDECEA' : tier.bg;
  const fg = atRisk ? '#B3261E' : tier.fg;
  const outer = atRisk ? '#D96B5C' : tier.outer;
  const core = atRisk ? null : tier.core;
  const toggle = () => {
    if (!setSettings) return;
    setSettings({ ...(settings || {}), streakLabelMode: mode === 'short' ? 'days' : 'short' });
  };
  const flamePath = 'M 6 24 c -4 -4 -3 -11 2 -14 c 0 3 2 4 3 4 c 0 -4 4 -6 6 -10 c 0 8 6 10 6 16 c 0 5 -4 8 -8 8 c -4 0 -9 -2 -9 -4 z';
  const corePath = 'M 9 22 c -2 -2 -2 -6 1 -8 c 0 2 1 2 2 2 c 0 -2 3 -3 4 -5 c 0 4 3 5 3 9 c 0 3 -2 4 -5 4 c -3 0 -5 -1 -5 -2 z';
  return (
    <button onClick={toggle} title={mode === 'short' ? 'Show day count' : 'Show label'} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '5px 12px 5px 8px',
      borderRadius: 999, border: 'none',
      background: bg, color: fg,
      fontFamily: theme.font, fontSize: 12, fontWeight: 700,
      letterSpacing: '0.02em', cursor: 'pointer',
      whiteSpace: 'nowrap',
    }}>
      <svg width={tier.size} height={tier.size + 2} viewBox="0 0 24 28">
        <path d={flamePath} fill={outer}/>
        {core && <path d={corePath} fill={core}/>}
      </svg>
      {displayText}
    </button>
  );
}

function Header({ theme, onOpenProfile, selectedDate, setSelectedDate, log = [], settings, setSettings }) {
  const [calOpen, setCalOpen] = React.useState(false);
  const displayName = localStorage.getItem('cal_display_name') || 'You';
  const headerInitials = displayName.split(/\s+/).filter(Boolean)
    .map(w => w[0]).slice(0, 2).join('').toUpperCase() || '?';
  const todayIso = todayLocalIso();

  // Build a 7-day window ending on today (so today is the rightmost-1 cell, with 1 future day)
  const daysShort = ['S','M','T','W','T','F','S'];
  const days = [];
  const base = new Date();
  base.setHours(12, 0, 0, 0); // midday to avoid DST / timezone edge cases
  for (let i = -5; i <= 1; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    const iso = todayLocalIso(d);
    days.push({
      d: daysShort[d.getDay()], n: d.getDate(), iso,
      isToday: iso === todayIso,
      future: iso > todayIso,
    });
  }
  const selectedIdx = days.findIndex(x => x.iso === selectedDate);
  const isEditorial = theme.name === 'Editorial';
  return (
    <div style={{ padding: 'calc(env(safe-area-inset-top, 0px) + 8px) 16px 12px' }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
        marginBottom: 14,
      }}>
        <div>
          <div style={{
            fontFamily: theme.font, fontSize: 13, color: theme.inkSoft,
            letterSpacing: '0.04em',
          }}>{(() => {
            const dt = new Date(selectedDate + 'T00:00:00');
            return dt.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
          })()}</div>
          <div style={{
            fontFamily: theme.titleFont,
            fontSize: isEditorial ? 40 : 32,
            fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
            lineHeight: 1.05, marginTop: 2,
            textTransform: isEditorial ? 'uppercase' : 'none',
          }}>{selectedDate === todayIso ? (isEditorial ? 'Today' : (() => {
              const h = new Date().getHours();
              if (h < 5) return 'Late night';
              if (h < 12) return 'Good morning';
              if (h < 17) return 'Good afternoon';
              if (h < 22) return 'Good evening';
              return 'Good night';
            })()) : 'Day view'}</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {(() => {
            // Consecutive days ending today (or yesterday, if today not
            // logged yet) that have at least one meal.
            const hasLog = new Set(log.map(e => e.date || todayIso));
            const todayLogged = hasLog.has(todayIso);
            let streak = 0;
            // Use local-date arithmetic — toISOString() on a Date at
            // local midnight returns yesterday in timezones ahead of UTC,
            // which was the off-by-one-day bug in the first cut.
            const cur = new Date();
            cur.setHours(12, 0, 0, 0);
            if (!todayLogged) cur.setDate(cur.getDate() - 1);
            while (true) {
              const iso = todayLocalIso(cur);
              if (hasLog.has(iso)) { streak++; cur.setDate(cur.getDate() - 1); }
              else break;
            }
            return <StreakChip theme={theme} streak={streak} todayLogged={todayLogged}
              settings={settings} setSettings={setSettings}/>;
          })()}
          <UnsyncedBadge theme={theme} />
          <button onClick={onOpenProfile} style={{
            width: 36, height: 36, borderRadius: 18, border: 'none', cursor: 'pointer',
            background: theme.surfaceAlt,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span style={{
              fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,
            }}>{headerInitials}</span>
          </button>
        </div>
      </div>

      {/* Date scrubber — tap chevron to expand into calendar */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', gap: 4,
        alignItems: 'center',
      }}>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'space-between', gap: 4 }}>
          {days.map((d, i) => {
            const isSel = d.iso === selectedDate;
            const showDot = false; // dots live in calendar popover, keep scrubber clean
            return (
              <button key={i} onClick={() => !d.future && setSelectedDate(d.iso)} style={{
                flex: 1, padding: '10px 0 12px', border: 'none',
                cursor: d.future ? 'default' : 'pointer',
                background: isSel ? theme.ink : 'transparent',
                borderRadius: theme.radius.chip,
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                transition: 'background 0.2s', position: 'relative',
                opacity: d.future ? 0.4 : 1,
              }}>
                <span style={{
                  fontFamily: theme.font, fontSize: 10, fontWeight: 600,
                  color: isSel ? theme.bg : theme.inkMute,
                  letterSpacing: '0.08em', textTransform: 'uppercase',
                }}>{d.d}</span>
                <span style={{
                  fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
                  color: isSel ? theme.bg : (d.future ? theme.inkMute : theme.ink),
                  letterSpacing: theme.letter,
                }}>{d.n}</span>
                {showDot && (
                  <span style={{
                    position: 'absolute', bottom: 3,
                    width: 4, height: 4, borderRadius: 2,
                    background: isSel ? theme.bg : '#D96B5C',
                  }} title="No food logged"/>
                )}
              </button>
            );
          })}
        </div>
        <button onClick={() => setCalOpen(true)}
          title="Open calendar"
          style={{
            width: 28, height: 36, border: 'none', background: 'transparent',
            cursor: 'pointer', padding: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke={theme.inkMute} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>

      {calOpen && (
        <CalendarSheet theme={theme} onClose={() => setCalOpen(false)}
          onPickDate={(iso) => { setSelectedDate(iso); setCalOpen(false); }}/>
      )}
    </div>
  );
}

function CalendarSheet({ theme, onClose, onPickDate }) {
  // Start at the actual current month — not a hardcoded date.
  const todayDate = new Date();
  const [y, setY] = React.useState(todayDate.getFullYear());
  const [m, setM] = React.useState(todayDate.getMonth());

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay(); // 0=Sun

  const today = { y: todayDate.getFullYear(), m: todayDate.getMonth(), d: todayDate.getDate() };
  // Define "complete" as >= 50% of calorie goal (rough threshold to catch forgotten days)
  const completeThreshold = 1000;
  const dayStatus = (d) => {
    const h = HISTORY.find(x => x.y === y && x.m === m && x.d === d);
    if (!h || !h.kcal) return 'missed';
    if (h.kcal < completeThreshold) return 'incomplete';
    return 'logged';
  };

  const prev = () => { if (m === 0) { setY(y - 1); setM(11); } else setM(m - 1); };
  const next = () => { if (m === 11) { setY(y + 1); setM(0); } else setM(m + 1); };

  // Touch swipe to change months
  const touchX = React.useRef(null);
  const onTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (dx > 50) prev();
    else if (dx < -50) next();
    touchX.current = null;
  };

  // Grid cells: leading blanks + days
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      paddingTop: 60,
    }}>
      <div onClick={(e) => e.stopPropagation()}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        style={{
          width: '92%', maxWidth: 380, background: theme.surface,
          borderRadius: 18, padding: '18px 18px 22px',
          boxShadow: '0 20px 60px rgba(0,0,0,0.2)',
      }}>
        {/* Header: month nav */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 12,
        }}>
          <button onClick={prev} style={{
            width: 32, height: 32, border: 'none', background: theme.surfaceAlt,
            borderRadius: 16, cursor: 'pointer',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M9 2L3 7l6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 17, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{monthNames[m]} {y}</div>
          <button onClick={next} style={{
            width: 32, height: 32, border: 'none', background: theme.surfaceAlt,
            borderRadius: 16, cursor: 'pointer',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M5 2l6 5-6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
        </div>

        {/* Day-of-week row */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4,
        }}>
          {['S','M','T','W','T','F','S'].map((d, i) => (
            <div key={i} style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkMute, letterSpacing: '0.08em', textAlign: 'center',
            }}>{d}</div>
          ))}
        </div>

        {/* Day grid */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2,
        }}>
          {cells.map((d, i) => {
            if (d == null) return <div key={i}/>;
            const isToday = (y === today.y && m === today.m && d === today.d);
            const isFuture = (y > today.y) ||
              (y === today.y && m > today.m) ||
              (y === today.y && m === today.m && d > today.d);
            const status = dayStatus(d);
            const dotColor = status === 'logged' ? '#2B7A5C'
              : status === 'incomplete' ? '#E0A24A'
              : '#D96B5C';
            return (
              <button key={i} disabled={isFuture}
                onClick={() => {
                  if (isFuture) return;
                  const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                  onPickDate ? onPickDate(iso) : onClose();
                }} style={{
                aspectRatio: '1', border: 'none',
                background: isToday ? theme.ink : 'transparent',
                borderRadius: 8, cursor: isFuture ? 'default' : 'pointer',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', gap: 2,
                position: 'relative',
              }}>
                <span style={{
                  fontFamily: theme.numFont, fontSize: 14,
                  color: isToday ? theme.bg : (isFuture ? theme.inkMute : theme.ink),
                  fontWeight: isToday ? 700 : 500,
                }}>{d}</span>
                {!isFuture && (
                  <span style={{
                    width: 5, height: 5, borderRadius: 3,
                    background: isToday ? theme.bg : dotColor,
                  }}/>
                )}
              </button>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{
          display: 'flex', gap: 14, justifyContent: 'center', marginTop: 14, flexWrap: 'wrap',
          fontFamily: theme.font, fontSize: 11, color: theme.inkSoft,
        }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#2B7A5C' }}/>Logged
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#E0A24A' }}/>Incomplete
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#D96B5C' }}/>Missed
          </span>
        </div>
        <div style={{
          textAlign: 'center', marginTop: 8,
          fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
        }}>Swipe left/right to change months</div>
      </div>
    </div>
  );
}

function StatusBadge({ theme, kcal, target, kind = 'food' }) {
  const pct = target > 0 ? kcal / target : 0;
  let label, bg, fg;
  const emptyMsg = kind === 'exercise' ? 'No exercise yet' : 'No food yet';
  const startedMsg = kind === 'exercise' ? 'Just starting' : 'Just started';
  if (kcal <= 0) { label = emptyMsg; bg = 'rgba(217,107,92,0.15)'; fg = '#B3261E'; }
  else if (pct > 1.1)  {
    label = kind === 'exercise' ? `Over goal by ${Math.round((pct - 1) * 100)}%` : `Over by ${Math.round((pct - 1) * 100)}%`;
    bg = kind === 'exercise' ? 'rgba(79,138,112,0.15)' : 'rgba(217,107,92,0.15)';
    fg = kind === 'exercise' ? '#2B7A5C' : '#B3261E';
  }
  else if (pct >= 0.9) { label = 'On track'; bg = 'rgba(79,138,112,0.15)'; fg = '#2B7A5C'; }
  else if (pct >= 0.3) { label = `${Math.round(pct * 100)}% of goal`; bg = theme.chipBg; fg = theme.chipInk; }
  else                 { label = startedMsg; bg = theme.chipBg; fg = theme.chipInk; }
  return (
    <div style={{
      padding: '4px 10px', borderRadius: theme.radius.chip,
      background: bg, color: fg,
      fontFamily: theme.font, fontSize: 10, fontWeight: 600,
      letterSpacing: '0.08em', textTransform: 'uppercase',
      whiteSpace: 'nowrap',
    }}>{label}</div>
  );
}

function ThemeBadge({ theme }) {
  return (
    <div style={{
      padding: '4px 10px', borderRadius: theme.radius.chip,
      background: theme.chipBg, color: theme.chipInk,
      fontFamily: theme.font, fontSize: 10, fontWeight: 600,
      letterSpacing: '0.08em', textTransform: 'uppercase',
    }}>On track</div>
  );
}

// Meal section — collapsible, swipe-to-delete entries
