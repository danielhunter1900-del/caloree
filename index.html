function AskWeightSheet({ theme, weightLog, targets, onClose }) {
  const [messages, setMessages] = React.useState([
    { role: 'assistant', text: `I can see your weight history (${weightLog.length} entries). Ask me anything — trajectory, rate, goals, or just "summary".` },
  ]);
  const [input, setInput] = React.useState('');
  const [busy, setBusy] = React.useState(false);

  const ctx = weightLog.slice(-60).map(w => ({ date: w.iso, kg: +w.kg }));
  const systemPrompt = `You are analysing a user's weight history.
Daily target: ${targets.kcal} kcal, ${targets.c}g C / ${targets.p}g P / ${targets.f}g F.
Weight history (most recent ${ctx.length} entries): ${JSON.stringify(ctx)}

Rules:
- Compute rate of change per week using linear regression if useful.
- Cite specific dates and numbers.
- If the trend is plateauing, say so.
- If rate > 1kg/wk loss or gain, flag as aggressive.
- Be concise (<120 words) unless asked for more.
- No medical disclaimers.`;

  const send = async (override) => {
    const userText = (override ?? input).trim();
    if (!userText || busy) return;
    setInput('');
    setMessages(m => [...m, { role: 'user', text: userText }]);
    setBusy(true);
    try {
      const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
      if (!key) throw new Error('Set your Anthropic API key in Profile → Settings first.');
      const apiMsgs = messages.concat({ role: 'user', text: userText })
        .map(m => ({ role: m.role, content: m.text }));
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json', 'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 600,
          system: systemPrompt, messages: apiMsgs,
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const text = (j.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n') || '(no reply)';
      setMessages(m => [...m, { role: 'assistant', text }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'assistant', text: e.message, error: true }]);
    }
    setBusy(false);
  };

  const presets = ['Summarise trajectory', 'Rate per week', 'Am I plateauing?', 'What should I change?'];

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '88vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>Weight trend</div>
          <button onClick={onClose} style={{
            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
          }}>×</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {messages.map((m, i) => (
            <div key={i} style={{
              alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '85%',
              padding: '10px 14px', borderRadius: 14,
              background: m.role === 'user' ? theme.ink : theme.surface,
              color: m.role === 'user' ? theme.bg : (m.error ? '#C0392B' : theme.ink),
              fontFamily: theme.font, fontSize: 14, lineHeight: 1.45, whiteSpace: 'pre-wrap',
            }}>{m.text}</div>
          ))}
          {busy && <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute }}>Thinking…</div>}
        </div>

        {messages.length <= 1 && (
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', padding: '0 16px 8px' }}>
            {presets.map(p => (
              <button key={p} onClick={() => send(p)} style={{
                padding: '6px 10px', border: `1px solid ${theme.line}`,
                background: theme.surface, borderRadius: 14,
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, cursor: 'pointer',
              }}>{p}</button>
            ))}
          </div>
        )}

        <div style={{
          padding: '8px 12px 16px', borderTop: `1px solid ${theme.line}`, background: theme.surface,
          display: 'flex', gap: 8, alignItems: 'flex-end',
        }}>
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            rows={1} placeholder="Ask about your weight…"
            style={{
              flex: 1, padding: '10px 12px', border: `1px solid ${theme.line}`,
              borderRadius: 14, fontFamily: theme.font, fontSize: 14,
              resize: 'none', outline: 'none', background: theme.bg, color: theme.ink,
            }}/>
          <button onClick={() => send()} disabled={busy || !input.trim()} style={{
            width: 40, height: 40, borderRadius: 20, border: 'none',
            background: input.trim() && !busy ? theme.accent : theme.surfaceAlt,
            color: theme.accentInk, cursor: busy || !input.trim() ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8l12-5-5 12-2-5-5-2z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

function ApiKeyCard({ theme }) {
  const [value, setValue] = React.useState(() => localStorage.getItem('anthropic_api_key') || '');
  const [saved, setSaved] = React.useState(false);
  const [show, setShow] = React.useState(false);
  const masked = value ? value.slice(0, 8) + '…' + value.slice(-4) : '';
  const save = () => {
    // Strip ALL whitespace (catches accidental newlines / spaces from copy-paste)
    const cleaned = (value || '').replace(/\s+/g, '');
    if (cleaned && !cleaned.startsWith('sk-ant-')) {
      alert('Anthropic keys start with "sk-ant-". Double-check what you pasted.');
      return;
    }
    if (cleaned) localStorage.setItem('anthropic_api_key', cleaned);
    else localStorage.removeItem('anthropic_api_key');
    setValue(cleaned);
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  };
  const clear = () => {
    localStorage.removeItem('anthropic_api_key');
    setValue(''); setSaved(true); setTimeout(() => setSaved(false), 1500);
  };
  return (
    <div style={{
      margin: '0 16px 12px', padding: '14px 16px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
    }}>
      <div style={{
        fontFamily: theme.font, fontSize: 11, fontWeight: 600,
        color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
        marginBottom: 6,
      }}>Anthropic API key</div>
      <div style={{
        fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
        marginBottom: 10, lineHeight: 1.4,
      }}>
        Stored only in your browser (localStorage). Needed for the AI tab.
        Get one at console.anthropic.com.
      </div>
      <div style={{ display: 'flex', gap: 6 }}>
        <input type={show ? 'text' : 'password'}
          value={value} onChange={e => setValue(e.target.value)}
          placeholder="sk-ant-..."
          style={{
            flex: 1, padding: '8px 10px', border: `1px solid ${theme.line}`,
            borderRadius: theme.radius.btn, fontFamily: theme.numFont, fontSize: 12,
            background: theme.bg, color: theme.ink, outline: 'none',
          }}/>
        <button onClick={() => setShow(s => !s)} style={{
          padding: '0 10px', border: `1px solid ${theme.line}`,
          background: theme.surfaceAlt, color: theme.inkSoft, cursor: 'pointer',
          borderRadius: theme.radius.btn, fontFamily: theme.font, fontSize: 11, fontWeight: 600,
        }}>{show ? 'Hide' : 'Show'}</button>
      </div>
      <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
        <button onClick={save} style={{
          flex: 1, padding: '9px 0', border: 'none',
          background: theme.accent, color: theme.accentInk, cursor: 'pointer',
          borderRadius: theme.radius.btn, fontFamily: theme.font, fontSize: 13, fontWeight: 600,
        }}>{saved ? 'Saved' : 'Save'}</button>
        <button onClick={clear} style={{
          padding: '9px 14px', border: `1px solid ${theme.line}`,
          background: 'transparent', color: theme.inkSoft, cursor: 'pointer',
          borderRadius: theme.radius.btn, fontFamily: theme.font, fontSize: 13, fontWeight: 600,
        }}>Clear</button>
      </div>
      {masked && <div style={{
        fontFamily: theme.numFont, fontSize: 11, color: theme.inkMute, marginTop: 8,
      }}>Current: {masked}</div>}
    </div>
  );
}

        sb.from('exercise_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('weight_logs').select('*').eq('user_id', uid).order('iso'),
        sb.from('wellness_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('profiles').select('*').eq('user_id', uid).maybeSingle(),
      ]);
      const bundle = {
        exported_at: new Date().toISOString(),
        user_id: uid,
        profile: profR.data || null,
        meal_logs: mealsR.data || [],
        foods: foodsR.data || [],
        exercise_logs: exR.data || [],
        weight_logs: weightR.data || [],
        wellness_logs: wellnessR.data || [],
        display_name: localStorage.getItem('cal_display_name') || null,
      };
      const json = JSON.stringify(bundle, null, 2);
      const stamp = new Date().toISOString().slice(0, 10);
      downloadBlob(json, `caloree-export-${stamp}.json`, 'application/json;charset=utf-8');
    } catch (e) {
      alert('Export failed: ' + e.message);
    }
    setExportBusy(false);
  };

  const exportCSV = async () => {
    setExportBusy(true);
    try {
      const sb = window.sb;
      const uid = (await sb.auth.getUser()).data?.user?.id;
      if (!uid) throw new Error('Not signed in');
      const [mealsR, foodsR] = await Promise.all([
        sb.from('meal_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('foods').select('*').eq('user_id', uid),
      ]);
      const foodById = (id) => (foodsR.data || []).find(x => x.id === id);
      const rows = [['Date','Time','Meal','Food','Brand','Qty','Kcal','Carbs (g)','Protein (g)','Fat (g)','SatFat (g)','Sugar (g)','Fibre (g)']];
      (mealsR.data || []).forEach(e => {
        const f = foodById(e.food_id);
        if (!f) return;
        const q = +e.qty || 1;
        rows.push([
          e.date, e.time || '', e.meal || '', f.name || '', f.brand || '',
          q,
          Math.round((+f.kcal||0) * q),
          +((+f.c||0) * q).toFixed(1),
          +((+f.p||0) * q).toFixed(1),
          +((+f.f||0) * q).toFixed(1),
          f.sat_fat != null ? +((+f.sat_fat) * q).toFixed(1) : '',
          f.sugar   != null ? +((+f.sugar)   * q).toFixed(1) : '',
          f.fibre   != null ? +((+f.fibre)   * q).toFixed(1) : '',
        ]);
      });
      const csv = rows.map(r => r.map(v => {
        const s = String(v ?? '');
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
      }).join(',')).join('\n');
      const stamp = new Date().toISOString().slice(0, 10);
      downloadBlob(csv, `caloree-meals-${stamp}.csv`, 'text/csv;charset=utf-8');
    } catch (e) {
      alert('Export failed: ' + e.message);
    }
    setExportBusy(false);
  };

  function downloadBlob(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  const [editingGoals, setEditingGoals] = useStateProfile(false);
  const [draft, setDraft] = useStateProfile(targets);
  const [showWeightEntry, setShowWeightEntry] = useStateProfile(false);

  React.useEffect(() => { if (!editingGoals) setDraft(targets); }, [targets, editingGoals]);

  const saveGoals = () => {
    const clean = {
      kcal: Math.max(1000, Math.min(5000, +draft.kcal || targets.kcal)),
      c: Math.max(0, +draft.c || 0),
      p: Math.max(0, +draft.p || 0),
      f: Math.max(0, +draft.f || 0),
      satFat: Math.max(0, +draft.satFat || 0),
      sugar:  Math.max(0, +draft.sugar  || 0),
      fibre:  Math.max(0, +draft.fibre  || 0),
      exKcal: Math.max(0, +draft.exKcal || 0),
      exMin:  Math.max(0, +draft.exMin  || 0),
    };
    setTargets(clean); setEditingGoals(false);
  };

  // Derived: current weight trend
  const latest = weightLog[weightLog.length - 1];
  const first = weightLog[0];
  const delta = latest && first ? (latest.kg - first.kg) : 0;
  const lastDate = latest ? new Date(latest.iso) : null;
  const daysSince = lastDate ? Math.floor((new Date('2026-04-18') - lastDate) / 86400000) : null;
  const needsUpdate = daysSince != null && daysSince >= 10;

  // Trend: linear regression over last 4 weeks
  const weightTrend = (() => {
    if (weightLog.length < 2) return null;
    const todayMs = new Date('2026-04-18').getTime();
    const cutoff = todayMs - 28 * 86400000;
    const pts = weightLog
      .map(w => ({ t: new Date(w.iso).getTime(), kg: +w.kg }))
      .filter(p => p.t >= cutoff)
      .sort((a, b) => a.t - b.t);
    if (pts.length < 2) return null;
    // Least-squares slope (kg per ms) → kg per week
    const n = pts.length;
    const mx = pts.reduce((s, p) => s + p.t, 0) / n;
    const my = pts.reduce((s, p) => s + p.kg, 0) / n;
    let num = 0, den = 0;
    pts.forEach(p => { num += (p.t - mx) * (p.kg - my); den += (p.t - mx) ** 2; });
    const slope = den ? num / den : 0;
    const perWeek = slope * 7 * 86400000;
    const spanDays = Math.round((pts[pts.length - 1].t - pts[0].t) / 86400000);
    return { perWeek, spanDays, count: pts.length };
  })();
  const [askWeight, setAskWeight] = useStateProfile(false);

  // Chart scaling
  const wMin = weightLog.length ? Math.min(...weightLog.map(w => w.kg)) - 0.5 : 0;
  const wMax = weightLog.length ? Math.max(...weightLog.map(w => w.kg)) + 0.5 : 1;

  const [displayName, setDisplayName] = useStateProfile(() =>
    localStorage.getItem('cal_display_name') || 'Alex Rivera'
  );
  const [editingName, setEditingName] = useStateProfile(false);
  const [nameDraft, setNameDraft] = useStateProfile(displayName);
  const initials = (displayName || '?').split(/\s+/).filter(Boolean)
    .map(w => w[0]).slice(0, 2).join('').toUpperCase() || '?';
  const saveName = () => {
    const clean = (nameDraft || '').trim() || 'You';
    setDisplayName(clean);
    localStorage.setItem('cal_display_name', clean);
    setEditingName(false);
  };

  return (
    <div style={{ paddingBottom: 110, background: theme.bg, minHeight: '100%' }}>
      {/* Header */}
      <div style={{ padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 20px 16px', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{
          width: 56, height: 56, borderRadius: theme.name === 'Editorial' ? 4 : 28,
          background: theme.accent, display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: theme.titleFont, fontSize: 22, fontWeight: 700, color: theme.accentInk,
          letterSpacing: theme.letter,
        }}>{initials}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          {editingName ? (
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              <input autoFocus value={nameDraft}
                onChange={(e) => setNameDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') saveName(); if (e.key === 'Escape') setEditingName(false); }}
                style={{
                  flex: 1, padding: '6px 10px', border: `1px solid ${theme.line}`,
                  borderRadius: theme.radius.btn, fontFamily: theme.titleFont,
                  fontSize: 18, color: theme.ink, background: theme.surface, outline: 'none',
                }}/>
              <button onClick={saveName} style={{
                padding: '6px 12px', border: 'none', background: theme.accent,
                color: theme.accentInk, borderRadius: theme.radius.btn,
                fontFamily: theme.font, fontSize: 12, fontWeight: 600, cursor: 'pointer',
              }}>Save</button>
            </div>
          ) : (
            <div onClick={() => { setNameDraft(displayName); setEditingName(true); }}
              style={{ cursor: 'pointer' }} title="Tap to edit">
              <div style={{
                fontFamily: theme.titleFont,
                fontSize: theme.name === 'Editorial' ? 28 : 24,
                fontWeight: theme.titleWeight,
                color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.05,
                textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
              }}>{displayName}</div>
              <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute, marginTop: 2 }}>
                Tap to edit name
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Weight card */}
      <div style={{
        margin: '0 16px 12px', padding: '18px 20px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>Current weight</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 36, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.1, marginTop: 4,
            }}>{latest ? latest.kg.toFixed(1) : '—'}<span style={{
              fontSize: 14, color: theme.inkMute, marginLeft: 4, fontWeight: 400,
            }}>kg</span></div>
            {latest && first && (
              <div style={{
                fontFamily: theme.font, fontSize: 12,
                color: delta < 0 ? theme.macros.protein : theme.inkSoft, marginTop: 2,
              }}>
                {delta > 0 ? '+' : ''}{delta.toFixed(1)} kg since first entry
              </div>
            )}
            {!latest && (
              <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute, marginTop: 2 }}>
                Tap "Log weight" to start
              </div>
            )}
            {weightTrend && Math.abs(weightTrend.perWeek) > 0.02 && (
              <div style={{
                display: 'inline-flex', alignItems: 'center', gap: 6,
                marginTop: 8, padding: '4px 10px',
                background: Math.abs(weightTrend.perWeek) < 0.8 ? 'rgba(79,138,112,0.15)' : 'rgba(224,162,74,0.15)',
                borderRadius: theme.radius.chip,
                fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                color: Math.abs(weightTrend.perWeek) < 0.8 ? '#2B7A5C' : '#8A5A1F',
                letterSpacing: '0.04em',
              }}>
                {weightTrend.perWeek < 0 ? '↓' : '↑'}
                {' '}{Math.abs(weightTrend.perWeek).toFixed(2)} kg/wk
                <span style={{ color: theme.inkMute, fontWeight: 500 }}>· {weightTrend.spanDays}d</span>
              </div>
            )}
          </div>
          <button onClick={() => setShowWeightEntry(true)} style={{
            padding: '10px 14px', borderRadius: theme.radius.btn,
            background: theme.ink, color: theme.surface, border: 'none',
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
            letterSpacing: theme.letter,
          }}>Log weight</button>
        </div>

        {/* Tiny weight chart */}
        <div style={{
          marginTop: 18, height: 80, position: 'relative',
          display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 4,
        }}>
          {weightLog.map((w, i) => {
            const h = ((w.kg - wMin) / (wMax - wMin)) * 100;
            const isLast = i === weightLog.length - 1;
            return (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, height: '100%', justifyContent: 'flex-end' }}>
                <div style={{
                  width: 6, height: `${h}%`,
                  background: isLast ? theme.accent : theme.surfaceAlt,
                  border: isLast ? 'none' : `1px solid ${theme.line}`,
                  borderRadius: theme.name === 'Editorial' ? 0 : 3,
                }}/>
              </div>
            );
          })}
        </div>

        <button onClick={() => setAskWeight(true)} style={{
          width: '100%', marginTop: 14, padding: '10px 14px',
          border: `1px solid ${theme.line}`, background: theme.surfaceAlt,
          color: theme.ink, cursor: 'pointer',
          borderRadius: theme.radius.btn,
          fontFamily: theme.font, fontSize: 12, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z"
              stroke={theme.accent} strokeWidth="1.8" strokeLinejoin="round"
              fill={theme.accent} fillOpacity={0.12}/>
          </svg>
          Ask Claude about my weight trend
        </button>

        {askWeight && (
          <AskWeightSheet theme={theme}
            weightLog={weightLog} targets={targets}
            onClose={() => setAskWeight(false)}/>
        )}

        {needsUpdate && (
          <div style={{
            marginTop: 14, padding: '10px 12px',
            background: theme.surfaceAlt, borderRadius: theme.radius.btn,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <div style={{
              width: 6, height: 6, borderRadius: 3, background: theme.accent, flexShrink: 0,
            }}/>
            <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, flex: 1 }}>
              Last weigh-in was {daysSince} days ago. Log a new one to keep your trend accurate.
            </div>
          </div>
        )}
      </div>

      {/* Goals card */}
      <div style={{
        margin: '0 16px 12px', padding: '18px 20px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div style={{
            fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Daily goals</div>
          <button onClick={() => editingGoals ? saveGoals() : setEditingGoals(true)} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 0,
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.accent,
            letterSpacing: theme.letter,
          }}>{editingGoals ? 'Save' : 'Edit'}</button>
        </div>

        {[
          ['Calories', 'kcal', 'kcal', theme.ink],
          ['Carbs', 'c', 'g', theme.macros.carbs],
          ['Protein', 'p', 'g', theme.macros.protein],
          ['Fat', 'f', 'g', theme.macros.fat],
          ['Sat Fat', 'satFat', 'g', '#B8824A'],
          ['Sugar',   'sugar',  'g', '#C25A8E'],
          ['Fibre',   'fibre',  'g', '#5C9A6E'],
          ['Exercise time', 'exMin',  'min',  '#4F8A70'],
        ].map(([label, key, unit, color], i) => (
          <div key={key} style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '10px 0', borderTop: i === 0 ? 'none' : `1px solid ${theme.line}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: color }}/>
              <span style={{ fontFamily: theme.font, fontSize: 14, color: theme.ink, fontWeight: 500 }}>{label}</span>
            </div>
            {editingGoals ? (
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                <input type="number" value={draft[key]}
                  onChange={e => setDraft({ ...draft, [key]: e.target.value })}
                  style={{
                    width: 68, textAlign: 'right',
                    fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
                    color: theme.ink, background: theme.surfaceAlt,
                    border: `1px solid ${theme.line}`, borderRadius: 6, padding: '4px 8px',
                    letterSpacing: theme.letter,
                  }}/>
                <span style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute }}>{unit}</span>
              </div>
            ) : (
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                <span style={{
                  fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
                  color: theme.ink, letterSpacing: theme.letter,
                }}>{(targets[key] ?? 0).toLocaleString()}</span>
                <span style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute }}>{unit}</span>
              </div>
            )}
          </div>
        ))}

        {editingGoals && (
          <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${theme.line}` }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkMute, marginBottom: 6,
            }}>Suggested presets</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {[
                ['Cut',      { kcal: 1800, c: 180, p: 160, f: 55, satFat: 18, sugar: 40, fibre: 30, exKcal: 500, exMin: 45 }],
                ['Maintain', { kcal: 2150, c: 240, p: 160, f: 70, satFat: 20, sugar: 50, fibre: 30, exKcal: 400, exMin: 45 }],
                ['Bulk',     { kcal: 2600, c: 310, p: 180, f: 80, satFat: 25, sugar: 60, fibre: 35, exKcal: 350, exMin: 45 }],
              ].map(([label, preset]) => (
                <button key={label} onClick={() => setDraft(preset)} style={{
                  padding: '6px 12px', borderRadius: 999,
                  background: theme.surfaceAlt, border: `1px solid ${theme.line}`,
                  fontFamily: theme.font, fontSize: 12, color: theme.ink,
                  cursor: 'pointer', letterSpacing: theme.letter,
                }}>{label}</button>
              ))}
            </div>
          </div>
        )}

        {/* Exercise-adjusted calorie goal toggle */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginTop: 10, paddingTop: 10, borderTop: `1px solid ${theme.line}`,
        }}>
          <div style={{ flex: 1, paddingRight: 10 }}>
            <div style={{ fontFamily: theme.font, fontSize: 13, color: theme.ink, fontWeight: 500 }}>
              Add exercise to calorie goal
            </div>
            <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2 }}>
              When on, calories burned from logged exercise increase today's calorie goal.
            </div>
          </div>
          <Toggle
            on={!!settings.adjustForExercise}
            onChange={v => setSettings({ ...settings, adjustForExercise: v })}
            theme={theme}/>
        </div>
      </div>

      {/* Theme */}
      <div style={{
        margin: '0 16px 12px', padding: '12px 14px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
        }}>Theme</div>
        <div style={{
          flex: 1, display: 'flex', gap: 2, padding: 2,
          background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        }}>
          {[
            ['clinical', 'Clinical'],
            ['warm', 'Warm'],
            ['editorial', 'Editorial'],
          ].map(([k, label]) => (
            <button key={k} onClick={() => setThemeKey(k)} style={{
              flex: 1, padding: '7px 0', border: 'none',
              background: themeKey === k ? theme.surface : 'transparent',
              color: theme.ink, cursor: 'pointer',
              borderRadius: theme.radius.btn - 2,
              fontFamily: theme.font, fontSize: 12,
              fontWeight: themeKey === k ? 600 : 500,
              boxShadow: themeKey === k ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
              transition: 'background 0.15s',
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Photos gallery */}
      <PhotosGallery theme={theme} log={log}/>

      {/* Anthropic API key */}
      <ApiKeyCard theme={theme}/>

      {/* Footer actions */}
      <div style={{
        margin: '0 16px 12px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        overflow: 'hidden',
      }}>
        {[
          [exportBusy ? 'Exporting…' : 'Export all data (JSON)', null, exportAllJSON],
          ['Export meals as CSV', null, exportCSV],
          ['Sign out', theme.accent, () => window.sb.auth.signOut()],
        ].map(([label, color, onClick], i, arr) => (
          <div key={label} onClick={onClick || undefined} style={{
            padding: '14px 18px',
            borderBottom: i < arr.length - 1 ? `1px solid ${theme.line}` : 'none',
            fontFamily: theme.font, fontSize: 14, fontWeight: 500,
            color: color || theme.ink, cursor: 'pointer',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <span>{label}</span>
            {!color && (
              <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
                <path d="M2 2l6 6-6 6" stroke={theme.inkMute} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </div>
        ))}
      </div>

      <div style={{
        textAlign: 'center', padding: '20px 0 10px',
        fontFamily: theme.font, fontSize: 11, color: theme.inkMute, letterSpacing: '0.1em',
      }}>CALOREE · v0.1.0</div>

      {showWeightEntry && (
        <WeightEntrySheet theme={theme}
          onClose={() => setShowWeightEntry(false)}
          onSave={kg => {
            const iso = new Date('2026-04-18').toISOString().slice(0, 10);
            const filtered = weightLog.filter(w => w.iso !== iso);
            setWeightLog([...filtered, { iso, kg }]);
            setShowWeightEntry(false);
          }}
          current={latest ? latest.kg : 75}/>
      )}
    </div>
  );
}

// ── Toggle ──
function Toggle({ on, onChange, theme }) {
  return (
    <button onClick={() => onChange(!on)} style={{
      width: 44, height: 26, borderRadius: 13, padding: 2,
      background: on ? theme.accent : theme.surfaceAlt,
      border: `1px solid ${on ? theme.accent : theme.line}`,
      cursor: 'pointer', position: 'relative',
      transition: 'background 0.2s',
    }}>
      <div style={{
        width: 20, height: 20, borderRadius: 10,
        background: on ? theme.accentInk : theme.surface,
        transform: on ? 'translateX(18px)' : 'translateX(0)',
        transition: 'transform 0.2s',
        boxShadow: '0 1px 3px rgba(0,0,0,0.15)',
      }}/>
    </button>
  );
}

// ── Weight entry bottom sheet ──
function WeightEntrySheet({ theme, onClose, onSave, current }) {
  const [val, setVal] = React.useState(current.toFixed(1));

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: theme.bg,
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '20px 20px 32px',
      }}>
        <div style={{
          width: 36, height: 4, background: theme.inkMute,
          borderRadius: 2, margin: '0 auto 16px', opacity: 0.4,
        }}/>
        <div style={{
          fontFamily: theme.titleFont,
          fontSize: theme.name === 'Editorial' ? 24 : 20,
          fontWeight: theme.titleWeight, color: theme.ink,
          letterSpacing: theme.letter, marginBottom: 4,

function useAuthSession() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      setSession(data.session); setLoading(false);
    });
    const { data: sub } = window.sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  return { session, loading };
}

function LoginScreen() {
  const [mode, setMode] = React.useState('signin'); // 'signin' | 'signup'
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [msg, setMsg] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  const submit = async () => {
    setBusy(true); setMsg(null);
    try {
      if (mode === 'signup') {
        const { error } = await window.sb.auth.signUp({ email, password });
        if (error) throw error;
        setMsg({ type: 'ok', text: 'Account created. Check your email to confirm, then sign in.' });
      } else {
        const { error } = await window.sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (e) {
      setMsg({ type: 'err', text: e.message });
    }
    setBusy(false);
  };

  const reset = async () => {
    if (!email) { setMsg({ type: 'err', text: 'Enter your email first.' }); return; }
    const { error } = await window.sb.auth.resetPasswordForEmail(email);
    setMsg(error
      ? { type: 'err', text: error.message }
      : { type: 'ok', text: 'Password reset email sent.' });
  };

  return (
    <div style={{
      minHeight: '100vh', background: '#E8E8E5',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,

        borderRadius: 18, padding: '28px 24px',
        boxShadow: '0 1px 2px rgba(0,0,0,0.03), 0 12px 40px rgba(0,0,0,0.06)',
      }}>
        <div style={{
          fontSize: 26, fontWeight: 700, marginBottom: 4, color: '#0A0A0A',
          letterSpacing: '-0.02em',
        }}>Caloree</div>

    { k: 'Other',         met: 5.0,  icon: '⚡' },

  const [mode, setMode] = React.useState('manual'); // 'manual' | 'ai'
  const [type, setType] = React.useState('Run');

  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const weightKg = 75; // default for kcal estimate; refine later with real profile weight

  // Auto-estimate kcal when type/duration change (kcal = MET * weight * hours)
  React.useEffect(() => {
    const t = TYPES.find(x => x.k === type);
    const d = parseFloat(duration);

Workout: ${aiText.trim()}`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',

          'content-type': 'application/json',
          'x-api-key': key,

      const j = await res.json();

function PasteFromClaudeSheet({ theme, onClose, session, onDone }) {
  const [text, setText] = React.useState('');
  const [parsed, setParsed] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [copied, setCopied] = React.useState(false);

  const today = new Date().toISOString().slice(0, 10);
  const prompt = `Parse my meal notes into JSON. Return ONLY this JSON (no prose, no markdown, no code fences):
{
  "days": [
    {
      "date": "YYYY-MM-DD",
      "meals": [
        {
          "meal": "Breakfast" | "Lunch" | "Dinner" | "Snack",
          "items": [
            { "name": "", "brand": "", "kcal": 0, "c": 0, "p": 0, "f": 0, "satFat": 0, "sugar": 0, "fibre": 0, "g": 0 }
          ]
        }
      ]
    }
  ],
  "note": "one sentence"
}

Rules:
- All macros are per-item totals. c/p/f/satFat/sugar/fibre are grams. g = total grams. kcal = calories.
- Resolve dates to YYYY-MM-DD. If not specified, use ${today}.
- Never omit satFat/sugar/fibre — estimate conservatively.
- Keep names concise.

My meal(s):
`;

  const copyPrompt = async () => {
    try {
      await navigator.clipboard.writeText(prompt);
      setCopied(true); setTimeout(() => setCopied(false), 1500);
    } catch {
      setError('Copy failed — select the prompt manually.');
    }
  };

  const tryParse = (v) => {
    setText(v);
    if (!v.trim()) { setParsed(null); setError(null); return; }
    try {
      const clean = v.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      const p = JSON.parse(clean);
      let days;
      if (p.days && Array.isArray(p.days)) days = p.days;
      else if (p.meals && Array.isArray(p.meals)) days = [{ date: today, meals: p.meals }];

function GlobalToast() {
  const [toast, setToast] = React.useState(null);
  const timerRef = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => {
      const { message, undo, durationMs } = e.detail;
      if (timerRef.current) clearTimeout(timerRef.current);
      setToast({ message, undo });
      timerRef.current = setTimeout(() => setToast(null), durationMs || 5000);
    };
    window.addEventListener('caloree:toast', h);
    return () => window.removeEventListener('caloree:toast', h);
  }, []);
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 130, left: '50%', transform: 'translateX(-50%)',
      background: '#FFFFFF', color: '#1A1A1A',
      padding: '10px 10px 10px 16px', borderRadius: 22,
      display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.18)',
      border: '1px solid rgba(0,0,0,0.06)',
      zIndex: 400,
      fontFamily: '-apple-system, system-ui', fontSize: 14, fontWeight: 500,
      maxWidth: 'calc(100vw - 32px)',
    }}>
      <span>{toast.message}</span>
      {toast.undo && (
        <button onClick={() => {
          try { toast.undo(); } catch (e) { console.warn(e); }
          if (timerRef.current) clearTimeout(timerRef.current);
          setToast(null);
        }} style={{
          background: '#1A1A1A', border: 'none', color: '#FFFFFF',
          cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
          padding: '6px 12px', borderRadius: 14,
        }}>Undo</button>
      )}
      <button onClick={() => setToast(null)} style={{
        background: 'transparent', border: 'none', color: '#999',
        cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '2px 4px',
      }}>×</button>
    </div>
  );
}

  const [state, setState] = React.useState(null); // { url, caption }
  React.useEffect(() => {
    const onShow = (e) => setState(e.detail);
    window.addEventListener('caloree:showphoto', onShow);
    return () => window.removeEventListener('caloree:showphoto', onShow);
  }, []);
  if (!state) return null;
  return (
    <div onClick={() => setState(null)} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 300,
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: 20,
    }}>
      <img src={state.url} alt="" style={{
        maxWidth: '100%', maxHeight: '80vh', objectFit: 'contain',
        borderRadius: 12, boxShadow: '0 10px 40px rgba(0,0,0,0.6)',
      }}/>
      {state.caption && (
        <div style={{
          color: '#fff', marginTop: 14, fontSize: 14,
          fontFamily: '-apple-system, system-ui', opacity: 0.85,
        }}>{state.caption}</div>
      )}
      <button onClick={() => setState(null)} style={{
        position: 'absolute', top: 20, right: 20,
        width: 40, height: 40, borderRadius: 20, border: 'none',
        background: 'rgba(255,255,255,0.15)', color: '#fff',
        fontSize: 22, cursor: 'pointer', backdropFilter: 'blur(10px)',
      }}>×</button>
    </div>
  );
}

function AppRoot() {
  const { session, loading } = useAuthSession();
  if (loading) return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#E8E8E5', fontFamily: '-apple-system, system-ui, sans-serif', color: '#5C5C58', fontSize: 14,
    }}>Loading…</div>
  );
  if (!session) return <LoginScreen/>;
  return <><App session={session}/><PhotoViewer/><GlobalToast/></>;
}

function App({ session }) {
  const [themeKey, setThemeKey] = useStateApp(() =>
    localStorage.getItem('cal_theme') || 'clinical'
  );
  // Always start on Today after a login (don't restore last tab)
  const [tab, setTab] = useStateApp('home');
  // Rehydrate synthetic AI-added foods into FOODS before restoring log
  const [log, setLog] = useStateApp(() => {
    try {
      const foods = JSON.parse(localStorage.getItem('cal_ai_foods') || '[]');
      foods.forEach(f => { if (!FOODS.some(x => x.id === f.id)) FOODS.push(f); });
      // Apply locally saved favourites to FOODS
      const favIds = new Set(JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]'));
      FOODS.forEach(f => { if (favIds.has(f.id)) f.isFavourite = true; });
      const saved = JSON.parse(localStorage.getItem('cal_log'));
      if (saved) return saved;
    } catch {}
    return TODAY_LOG;
  });
  const [logScreenMeal, setLogScreenMeal] = useStateApp(null);
  const [detailFood, setDetailFood] = useStateApp(null);

  const [targets, setTargets] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_targets')) || DEFAULT_TARGETS; }
    catch { return DEFAULT_TARGETS; }
  });
  const [weightLog, setWeightLog] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_weight')) || DEFAULT_WEIGHT; }
    catch { return DEFAULT_WEIGHT; }
  });
  const [settings, setSettings] = useStateApp(() => {
    try {
      return JSON.parse(localStorage.getItem('cal_settings')) || {
        reminders: true, haptics: true, quickAdd: true, weeklySummary: false,
      };
    } catch {
      return { reminders: true, haptics: true, quickAdd: true, weeklySummary: false };
    }
  });

  const [exerciseLog, setExerciseLog] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_exercise') || '[]'); } catch { return []; }
  });
  const [wellness, setWellness] = useStateApp(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('cal_wellness'));
      if (saved) return saved;
    } catch {}
    return { coffees: 0, sleepHrs: 7.5, stress: 3, water: 0, energy: 3 };
  });

  const theme = THEMES[themeKey];

  // Cloud sync: pull on login, push on every change.
  const hydratingRef = React.useRef(true);
  React.useEffect(() => {
    if (!session) return;
    (async () => {
      const uid = session.user.id;
      const sb = window.sb;
      const [logsR, foodsR, profileR, weightR, wellnessR, exerciseR] = await Promise.all([
        sb.from('meal_logs').select('*').eq('user_id', uid),
        sb.from('foods').select('*').eq('user_id', uid),
        sb.from('profiles').select('*').eq('user_id', uid).maybeSingle(),
        sb.from('weight_logs').select('*').eq('user_id', uid).order('iso'),
        sb.from('wellness_logs').select('*').eq('user_id', uid).order('date', { ascending: false }).limit(1),
        sb.from('exercise_logs').select('*').eq('user_id', uid).order('date', { ascending: false }),
      ]);
      // Batch-sign photo URLs for foods with photo_path
      const photoPaths = (foodsR.data || [])
        .map(f => f.photo_path).filter(Boolean);
      let pathToUrl = {};
      if (photoPaths.length) {
        const { data: signed } = await sb.storage.from('meal-photos')
          .createSignedUrls(photoPaths, 3600);
        (signed || []).forEach(s => {
          if (s.path && s.signedUrl) pathToUrl[s.path] = s.signedUrl;
        });
      }
      (foodsR.data || []).forEach(f => {
        const existing = FOODS.findIndex(x => x.id === f.id);
        const rec = {
          id: f.id, name: f.name, brand: f.brand, servingG: +f.serving_g,
          kcal: +f.kcal, c: +f.c, p: +f.p, f: +f.f,
          satFat: f.sat_fat != null ? +f.sat_fat : undefined,
          sugar: f.sugar != null ? +f.sugar : undefined,
          fibre: f.fibre != null ? +f.fibre : undefined,
          photoPath: f.photo_path || null,
          photo: f.photo_path ? (pathToUrl[f.photo_path] || null) : null,
          isFavourite: !!f.is_favourite,
          ingredients: f.ingredients || null,
        };
        if (existing === -1) FOODS.push(rec);
        else FOODS[existing] = { ...FOODS[existing], ...rec };
      });
      if (logsR.data) {
        setLog(logsR.data.map(l => ({
          id: l.id, foodId: l.food_id, qty: +l.qty, meal: l.meal, time: l.time,
          date: l.date,
        })));
      }
      if (profileR.data) {
        if (profileR.data.targets) setTargets(profileR.data.targets);
        if (profileR.data.settings) setSettings(profileR.data.settings);
        if (profileR.data.theme) setThemeKey(profileR.data.theme);
      }
      if (weightR.data && weightR.data.length) {
        setWeightLog(weightR.data.map(w => ({ iso: w.iso, kg: +w.kg })));
      }
      if (wellnessR.data && wellnessR.data.length) {
        const w = wellnessR.data[0];
        setWellness({
          coffees: w.coffees || 0, water: w.water || 0,
          sleepHrs: +w.sleep_hrs || 0, stress: w.stress || 3, energy: w.energy || 3,
        });
      }
      if (exerciseR.data) {
        setExerciseLog(exerciseR.data.map(r => ({
          id: r.id, date: r.date, type: r.type,
          duration: r.duration_min != null ? +r.duration_min : null,
          distance: r.distance_km != null ? +r.distance_km : null,
          kcal: r.kcal != null ? +r.kcal : null,
          notes: r.notes || '', details: r.details || null,
        })));
      }

      // Rebuild HISTORY from cloud data so Trends populates
      const allWellness = await sb.from('wellness_logs').select('*').eq('user_id', uid);
      const wellnessByDate = {};
      (allWellness.data || []).forEach(w => { wellnessByDate[w.date] = w; });
      const foodById = {};
      (foodsR.data || []).forEach(f => { foodById[f.id] = f; });
      const byDate = {};
      (logsR.data || []).forEach(l => {
        const f = foodById[l.food_id]; if (!f) return;
        const q = +l.qty || 1;
        if (!byDate[l.date]) byDate[l.date] = { kcal: 0, c: 0, p: 0, f: 0, satFat: 0, sugar: 0, fibre: 0 };
        const d = byDate[l.date];
        d.kcal += (+f.kcal || 0) * q;
        d.c += (+f.c || 0) * q;
        d.p += (+f.p || 0) * q;
        d.f += (+f.f || 0) * q;
        d.satFat += (+f.sat_fat || 0) * q;
        d.sugar  += (+f.sugar  || 0) * q;
        d.fibre  += (+f.fibre  || 0) * q;
      });
      // Combine all dates that have any signal
      const allDates = new Set([...Object.keys(byDate), ...Object.keys(wellnessByDate)]);
      HISTORY.length = 0;
      [...allDates].sort().forEach(iso => {
        const d = new Date(iso + 'T00:00:00');
        const macros = byDate[iso] || { kcal:0, c:0, p:0, f:0, satFat:0, sugar:0, fibre:0 };
        const w = wellnessByDate[iso] || {};
        HISTORY.push({
          y: d.getFullYear(), m: d.getMonth(), d: d.getDate(),
          dow: d.getDay(), iso,
          kcal: Math.round(macros.kcal),
          c: Math.round(macros.c), p: Math.round(macros.p), f: Math.round(macros.f),
          satFat: Math.round(macros.satFat),
          sugar:  Math.round(macros.sugar),
          fibre:  Math.round(macros.fibre),
          coffees: w.coffees || 0,
          water: w.water || 0,
          sleepHrs: +w.sleep_hrs || 0,
          stress: w.stress || 0,
          energy: w.energy || 0,
        });
      });

      hydratingRef.current = false;
    })();
  }, [session]);

  // Push profile (targets/settings/theme)
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    window.sb.from('profiles').upsert({
      user_id: session.user.id, targets, settings, theme: themeKey, updated_at: new Date().toISOString(),
    }).then(r => r.error && console.warn('profile sync:', r.error.message));
  }, [targets, settings, themeKey, session]);

  // Push weight
  React.useEffect(() => {
    if (hydratingRef.current || !session || !weightLog.length) return;
    const rows = weightLog.map(w => ({ user_id: session.user.id, iso: w.iso, kg: w.kg }));
    window.sb.from('weight_logs').upsert(rows, { onConflict: 'user_id,iso' })
      .then(r => r.error && console.warn('weight sync:', r.error.message));
  }, [weightLog, session]);

  // Push wellness (today's date)
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    const today = new Date().toISOString().slice(0, 10);
    window.sb.from('wellness_logs').upsert({
      user_id: session.user.id, date: today,
      coffees: wellness.coffees, water: wellness.water,
      sleep_hrs: wellness.sleepHrs, stress: wellness.stress, energy: wellness.energy,
    }, { onConflict: 'user_id,date' })
      .then(r => r.error && console.warn('wellness sync:', r.error.message));
  }, [wellness, session]);

  // Push log + synthetic foods
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    const uid = session.user.id;
    const sb = window.sb;
    const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'));
    const foodRows = aiFoods.map(f => ({
      id: f.id, user_id: uid, name: f.name, brand: f.brand || null,
      serving_g: f.servingG || 100,
      kcal: f.kcal || 0, c: f.c || 0, p: f.p || 0, f: f.f || 0,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      photo_path: f.photoPath || null,
      is_favourite: !!f.isFavourite,
      ingredients: f.ingredients || null,
    }));
    const today = new Date().toISOString().slice(0, 10);
    const logRows = log.map(l => ({
      id: l.id, user_id: uid, date: l.date || today,
      meal: l.meal, food_id: l.foodId, qty: l.qty || 1, time: l.time || null,
    }));
    (async () => {
      if (foodRows.length) {
        const r = await sb.from('foods').upsert(foodRows, { onConflict: 'id' });
        if (r.error) console.warn('food sync:', r.error.message);
      }
      // Replace only today's logs (multi-day entries are inserted directly by bulk paths)
      const del = await sb.from('meal_logs').delete().eq('user_id', uid).eq('date', today);
      if (del.error) console.warn('log delete:', del.error.message);
      const todayRows = logRows.filter(r => r.date === today);
      if (todayRows.length) {
        const r = await sb.from('meal_logs').insert(todayRows);
        if (r.error) console.warn('log insert:', r.error.message);
      }
    })();
  }, [log, session]);

  React.useEffect(() => {
    try {
      localStorage.setItem('cal_log', JSON.stringify(log));
      // Persist only synthetic AI foods (ids that start with 'ai_')
      const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'));
      localStorage.setItem('cal_ai_foods', JSON.stringify(aiFoods));
    } catch (e) {
      // Likely quota exceeded (photos too big). Strip photos and retry once.
      try {
        const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'))
          .map(f => ({ ...f, photo: null }));
        localStorage.setItem('cal_ai_foods', JSON.stringify(aiFoods));
        localStorage.setItem('cal_log', JSON.stringify(log));
        console.warn('Photo(s) dropped from storage — localStorage quota hit.');
      } catch {}
    }
  }, [log]);
  React.useEffect(() => { localStorage.setItem('cal_theme', themeKey); }, [themeKey]);
  React.useEffect(() => { localStorage.setItem('cal_tab', tab); }, [tab]);
  React.useEffect(() => { localStorage.setItem('cal_targets', JSON.stringify(targets)); window.TARGETS = targets; }, [targets]);
  React.useEffect(() => { localStorage.setItem('cal_weight', JSON.stringify(weightLog)); }, [weightLog]);
  React.useEffect(() => { localStorage.setItem('cal_settings', JSON.stringify(settings)); }, [settings]);
  React.useEffect(() => { localStorage.setItem('cal_exercise', JSON.stringify(exerciseLog)); }, [exerciseLog]);

  // Push exercise logs (id-based upsert)
  React.useEffect(() => {
    if (hydratingRef.current || !session || !exerciseLog.length) return;
    const uid = session.user.id;
    const rows = exerciseLog.map(e => ({
      id: e.id, user_id: uid, date: e.date,
      type: e.type, duration_min: e.duration || null,
      distance_km: e.distance || null, kcal: e.kcal || null,
      notes: e.notes || null, details: e.details || null,
    }));
    window.sb.from('exercise_logs').upsert(rows, { onConflict: 'id' })
      .then(r => r.error && console.warn('exercise sync:', r.error.message));
  }, [exerciseLog, session]);

  React.useEffect(() => {
    localStorage.setItem('cal_wellness', JSON.stringify(wellness));
    // Mirror into today's HISTORY entry (if it exists) so Trends reflects today's state live
    const t = HISTORY[HISTORY.length - 1];
    if (t) Object.assign(t, wellness);
  }, [wellness]);

  const openLog = (meal) => setLogScreenMeal(meal || 'Snack');
  const closeLog = () => setLogScreenMeal(null);
  const [showAddPicker, setShowAddPicker] = useStateApp(false);
  const [showBulk, setShowBulk] = useStateApp(false);
  const [showPaste, setShowPaste] = useStateApp(false);
  const [showExercise, setShowExercise] = useStateApp(false);
  const openDetail = (foodId, meal) => setDetailFood({ foodId, meal });
  const closeDetail = () => setDetailFood(null);

  const addEntry = ({ foodId, qty, meal }) => {
    setLog([...log, { id: 'l' + Date.now(), foodId, qty, meal, time: '14:00' }]);
    setDetailFood(null);
    setLogScreenMeal(null);
  };

  // Bulk-add from AI: items come with inline nutrition (not from FOODS list).
  // Register each as a synthetic food so existing components keep working.
  // Accepts new shape { meals: [{meal, items, photo?}] } OR legacy { meal, items }.
  const addMany = async (payload) => {
    const groups = payload.meals
      ? payload.meals
      : (payload.meal && payload.items ? [{ meal: payload.meal, items: payload.items }] : []);
    const newFoods = [];
    const newEntries = [];
    const today = new Date().toISOString().slice(0, 10);
    // Upload photos first (if a group has a data-URL photo)
    for (const g of groups) {
      if (g.photo && g.photo.startsWith('data:') && session) {
        try {
          g.photoPath = await window.uploadMealPhoto(g.photo, session.user.id);
        } catch (e) { console.warn('photo upload failed:', e); }
      }
    }
    groups.forEach((g, gi) => {
      (g.items || []).forEach((it, i) => {
        const id = 'ai_' + Date.now() + '_' + gi + '_' + i;
        newFoods.push({
          id, name: it.name || 'Item',
          brand: it.brand || 'AI estimate',
          serving: 'serving', servingG: it.g || 100,
          kcal: it.kcal || 0, c: it.c || 0, p: it.p || 0, f: it.f || 0,
          satFat: it.satFat, sugar: it.sugar, fibre: it.fibre,
          ingredients: Array.isArray(it.ingredients) ? it.ingredients : null,
          // Photo only attaches to the FIRST item in a meal group (avoid duplicates)
          photo: i === 0 ? (g.photo || null) : null,
          photoPath: i === 0 ? (g.photoPath || null) : null,
        });
        newEntries.push({
          id: 'l_' + id, foodId: id, qty: 1, meal: g.meal || 'Snack', time: '14:00', date: today,
        });
      });
    });
    newFoods.forEach(f => FOODS.push(f));
    setLog([...log, ...newEntries]);
    setTab('home');
  };

  return (
    <div style={{
      minHeight: '100vh', background: theme.bg,
      fontFamily: '-apple-system, system-ui',
      position: 'relative',
    }}>
        <div style={{
          width: '100%', minHeight: '100vh', position: 'relative',
          background: theme.bg, overflow: 'hidden',
        }}>
          {/* Main scrollable content */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
            overflow: 'auto',
          }}>
            {tab === 'home' && (
              <HomeScreen theme={theme} log={log} setLog={setLog}
                targets={targets} settings={settings}
                wellness={wellness} setWellness={setWellness}
                exerciseLog={exerciseLog} setExerciseLog={setExerciseLog}
                onAddMeal={openLog} onOpenFood={openDetail}
                onOpenProfile={() => setTab('profile')}
                onAddExercise={() => setShowExercise(true)} />
            )}
            {tab === 'ai' && <AIScreen theme={theme} onAddMany={addMany} />}
            {tab === 'progress' && <ProgressScreen theme={theme} targets={targets} setTargets={setTargets}
              exerciseLog={exerciseLog} weightLog={weightLog} log={log} />}
            {tab === 'profile' && (
              <ProfileScreen theme={theme}
                themeKey={themeKey} setThemeKey={setThemeKey}
                targets={targets} setTargets={setTargets}
                weightLog={weightLog} setWeightLog={setWeightLog}
                settings={settings} setSettings={setSettings}
                log={log} />
            )}
          </div>

          {/* Tab bar */}
          <TabBar active={tab} setActive={setTab} theme={theme}
            onLogTap={() => setShowAddPicker(true)} />

          {showAddPicker && (
            <AddPickerSheet theme={theme}
              onClose={() => setShowAddPicker(false)}
              onManual={() => { setShowAddPicker(false); openLog('Snack'); }}
              onAI={() => { setShowAddPicker(false); setTab('ai'); }}
              onBulk={() => { setShowAddPicker(false); setShowBulk(true); }}
              onPaste={() => { setShowAddPicker(false); setShowPaste(true); }}
              onExercise={() => { setShowAddPicker(false); setShowExercise(true); }}/>
          )}

          {showExercise && (
            <ExerciseLogSheet theme={theme} session={session}
              onClose={() => setShowExercise(false)}
              onSave={(entry) => setExerciseLog(prev => [...prev, entry])}/>
          )}

          {showBulk && (
            <BulkNotesSheet theme={theme} session={session}
              onClose={() => setShowBulk(false)}
              onDone={() => {}}/>
          )}

          {showPaste && (
            <PasteFromClaudeSheet theme={theme} session={session}
              onClose={() => setShowPaste(false)}
              onDone={() => {}}/>
          )}

          {/* Modals */}
          {logScreenMeal && (
            <LogScreen theme={theme} defaultMeal={logScreenMeal}
              onClose={closeLog} onAdd={addEntry} onOpenFood={openDetail}
              onUseAI={(meal) => { closeLog(); setTab('ai'); }} />
          )}
          {detailFood && (
            <DetailScreen theme={theme}
              foodId={detailFood.foodId} defaultMeal={detailFood.meal}
              onClose={closeDetail} onAdd={addEntry} />
          )}
        </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);



</script>
</body>
</html>
