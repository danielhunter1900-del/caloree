function AskWeightSheet({ theme, weightLog, targets, onClose }) {
  const [messages, setMessages] = React.useState([
    { role: 'assistant', text: `I can see your weight history (${weightLog.length} entries). Ask me anything — trajectory, rate, goals, or just "summary".` },
  ]);
  const [input, setInput] = React.useState('');
  const [busy, setBusy] = React.useState(false);

  const ctx = weightLog.slice(-60).map(w => ({ date: w.iso, kg: +w.kg }));
  const systemPrompt = `You are analysing a user's weight history.
Daily target: ${targets.kcal} kcal, ${targets.c}g C / ${targets.p}g P / ${targets.f}g F.
Weight history (most recent ${ctx.length} entries): ${JSON.stringify(ctx)}

Rules:
- Compute rate of change per week using linear regression if useful.
- Cite specific dates and numbers.
- If the trend is plateauing, say so.
- If rate > 1kg/wk loss or gain, flag as aggressive.
- Be concise (<120 words) unless asked for more.
- No medical disclaimers.`;

  const send = async (override) => {
    const userText = (override ?? input).trim();
    if (!userText || busy) return;
    setInput('');
    setMessages(m => [...m, { role: 'user', text: userText }]);
    setBusy(true);
    try {
      const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
      if (!key) throw new Error('Set your Anthropic API key in Profile → Settings first.');
      const apiMsgs = messages.concat({ role: 'user', text: userText })
        .map(m => ({ role: m.role, content: m.text }));
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json', 'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 600,
          system: systemPrompt, messages: apiMsgs,
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const text = (j.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n') || '(no reply)';
      setMessages(m => [...m, { role: 'assistant', text }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'assistant', text: e.message, error: true }]);
    }
    setBusy(false);
  };

  const presets = ['Summarise trajectory', 'Rate per week', 'Am I plateauing?', 'What should I change?'];

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '88vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>Weight trend</div>
          <button onClick={onClose} style={{
            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
          }}>×</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {messages.map((m, i) => (
            <div key={i} style={{
              alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '85%',
              padding: '10px 14px', borderRadius: 14,
              background: m.role === 'user' ? theme.ink : theme.surface,
              color: m.role === 'user' ? theme.bg : (m.error ? '#C0392B' : theme.ink),
              fontFamily: theme.font, fontSize: 14, lineHeight: 1.45, whiteSpace: 'pre-wrap',
            }}>{m.text}</div>
          ))}
          {busy && <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute }}>Thinking…</div>}
        </div>

        {messages.length <= 1 && (
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', padding: '0 16px 8px' }}>
            {presets.map(p => (
              <button key={p} onClick={() => send(p)} style={{
                padding: '6px 10px', border: `1px solid ${theme.line}`,
                background: theme.surface, borderRadius: 14,
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, cursor: 'pointer',
              }}>{p}</button>
            ))}
          </div>
        )}

        <div style={{
          padding: '8px 12px 16px', borderTop: `1px solid ${theme.line}`, background: theme.surface,
          display: 'flex', gap: 8, alignItems: 'flex-end',
        }}>
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            rows={1} placeholder="Ask about your weight…"
            style={{
              flex: 1, padding: '10px 12px', border: `1px solid ${theme.line}`,
              borderRadius: 14, fontFamily: theme.font, fontSize: 14,
              resize: 'none', outline: 'none', background: theme.bg, color: theme.ink,
            }}/>
          <button onClick={() => send()} disabled={busy || !input.trim()} style={{
            width: 40, height: 40, borderRadius: 20, border: 'none',
            background: input.trim() && !busy ? theme.accent : theme.surfaceAlt,
            color: theme.accentInk, cursor: busy || !input.trim() ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8l12-5-5 12-2-5-5-2z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Strava connection card ──
// On mount: loads the user's strava_connections row via RLS.
// Connect button: redirects to Strava OAuth. The app root watches the
// URL for ?code=… after redirect and calls the strava-exchange edge
// function to finish the handshake.
const STRAVA_CLIENT_ID = '227929';
const STRAVA_REDIRECT_URI = 'https://danielhunter1900-del.github.io/caloree/';
const STRAVA_SCOPES = 'read,activity:read_all';

function stravaAuthUrl() {
  const u = new URL('https://www.strava.com/oauth/authorize');
  u.searchParams.set('client_id', STRAVA_CLIENT_ID);
  u.searchParams.set('redirect_uri', STRAVA_REDIRECT_URI);
  u.searchParams.set('response_type', 'code');
  u.searchParams.set('approval_prompt', 'auto');
  u.searchParams.set('scope', STRAVA_SCOPES);
  return u.toString();
}

function StravaCard({ theme, session }) {
  const [conn, setConn] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [lastResult, setLastResult] = React.useState(null);
  const [pendingCount, setPendingCount] = React.useState(0);
  const [showReview, setShowReview] = React.useState(false);
  const [showMore, setShowMore] = React.useState(false);

  const loadConn = React.useCallback(async () => {
    try {
      const { data } = await window.sb
        .from('strava_connections')
        .select('athlete_id, athlete_firstname, athlete_lastname, athlete_username, last_sync_at')
        .maybeSingle();
      setConn(data || null);
      // Also count pending activities for the review badge.
      const { count } = await window.sb
        .from('strava_activities')
        .select('activity_id', { count: 'exact', head: true })
        .eq('status', 'pending');
      setPendingCount(count || 0);
    } catch {}
    setLoading(false);
  }, []);

  React.useEffect(() => { loadConn(); }, [loadConn]);

  React.useEffect(() => {
    const h = () => loadConn();
    window.addEventListener('caloree:strava-connected', h);
    window.addEventListener('caloree:strava-synced', h);
    return () => {
      window.removeEventListener('caloree:strava-connected', h);
      window.removeEventListener('caloree:strava-synced', h);
    };
  }, [loadConn]);

  const connect = () => { window.location.href = stravaAuthUrl(); };

  const runFunction = async (slug, body = {}) => {
    setBusy(true); setError(null);
    try {
      const r = await window.sb.functions.invoke(slug, { body });
      if (r.error) throw new Error(r.error.message || 'function error');
      return r.data;
    } catch (e) {
      setError(e.message || String(e));
      return null;
    } finally { setBusy(false); }
  };

  const sync = async (full = false) => {
    const res = await runFunction('strava-sync', { full, weightKg: 75 });
    if (res) {
      setLastResult(res);
      window.dispatchEvent(new CustomEvent('caloree:strava-synced', { detail: res }));
    }
  };

  const disconnect = async () => {
    if (!confirm('Disconnect Strava? Existing imported activities stay in your log; pending/declined records will be removed.')) return;
    setBusy(true); setError(null);
    try {
      // Delete pending/declined review queue and the connection itself.
      await window.sb.from('strava_activities').delete().neq('activity_id', -1);
      const { error: delErr } = await window.sb
        .from('strava_connections').delete().neq('user_id', '00000000-0000-0000-0000-000000000000');
      if (delErr) throw delErr;
      setConn(null); setLastResult(null); setPendingCount(0);
    } catch (e) { setError(e.message || String(e)); }
    setBusy(false);
  };

  const subtle = {
    fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
  };
  const label = {
    fontFamily: theme.font, fontSize: 11, fontWeight: 600,
    color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
  };

  return (
    <div style={{
      margin: '0 16px 12px', padding: '18px 20px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
        <div style={label}>Strava</div>
        {conn && (
          <div style={{ ...subtle, fontSize: 11 }}>
            {conn.last_sync_at
              ? `Synced ${new Date(conn.last_sync_at).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}`
              : 'Not synced yet'}
          </div>
        )}
      </div>
      {loading ? (
        <div style={subtle}>Checking connection…</div>
      ) : conn ? (
        <React.Fragment>
          {/* Athlete name */}
          <div style={{ fontFamily: theme.font, fontSize: 15, color: theme.ink, marginBottom: 10 }}>
            {[conn.athlete_firstname, conn.athlete_lastname].filter(Boolean).join(' ') || conn.athlete_username || conn.athlete_id}
          </div>

          {/* Primary CTA — only when there's something to review */}
          {pendingCount > 0 && (
            <button onClick={() => setShowReview(true)} style={{
              display: 'block', width: '100%', marginBottom: 10,
              padding: '12px 14px', borderRadius: theme.radius.btn,
              background: '#FC4C02', color: '#FFFFFF', border: 'none',
              fontFamily: theme.font, fontSize: 14, fontWeight: 700,
              cursor: 'pointer', letterSpacing: '0.01em',
            }}>Review {pendingCount} new {pendingCount === 1 ? 'activity' : 'activities'}</button>
          )}

          {lastResult && (
            <div style={{ ...subtle, marginTop: pendingCount > 0 ? 0 : 4, marginBottom: 10, fontSize: 11 }}>
              {lastResult.newly_pending || 0} new · {lastResult.details_fetched || 0} detailed pulls
              {lastResult.rate_limited ? ' · rate-limited, run again later' : ''}
            </div>
          )}

          {/* Divider */}
          <div style={{ height: 1, background: theme.line, margin: '0 -4px 12px' }}/>

          {/* Sync now — full width */}
          <button onClick={() => sync(false)} disabled={busy} style={{
            display: 'block', width: '100%', marginBottom: 8,
            padding: '10px 14px', borderRadius: theme.radius.btn,
            background: theme.surfaceAlt, color: theme.ink,
            border: `1px solid ${theme.line}`,
            fontFamily: theme.font, fontSize: 13, fontWeight: 600,
            cursor: busy ? 'default' : 'pointer', opacity: busy ? 0.5 : 1,
          }}>{busy ? 'Syncing…' : 'Sync now'}</button>

          {/* More options toggle */}
          <button onClick={() => setShowMore(!showMore)} style={{
            display: 'block', width: '100%',
            padding: '10px 14px', borderRadius: theme.radius.btn,
            background: 'transparent', color: theme.inkSoft,
            border: `1px solid ${theme.line}`,
            fontFamily: theme.font, fontSize: 13, fontWeight: 600,
            cursor: 'pointer',
          }}>{showMore ? 'Fewer options ▴' : 'More options ▾'}</button>

          {showMore && (
            <div style={{ display: 'flex', marginTop: 8 }}>
              <button onClick={() => sync(true)} disabled={busy} style={{
                flex: 1, padding: '10px 8px',
                background: 'transparent', color: theme.inkSoft,
                border: 'none',
                borderRight: `1px solid ${theme.line}`,
                fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                cursor: busy ? 'default' : 'pointer',
              }}>Full re-sync · 1y</button>
              <button onClick={disconnect} disabled={busy} style={{
                flex: 1, padding: '10px 8px',
                background: 'transparent', color: '#B3261E',
                border: 'none',
                fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                cursor: busy ? 'default' : 'pointer',
              }}>Disconnect</button>
            </div>
          )}

          {showReview && (
            <StravaReviewSheet theme={theme}
              onClose={() => { setShowReview(false); loadConn(); }}/>
          )}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div style={{ ...subtle, marginBottom: 12 }}>
            Import runs, rides, swims and workouts (with HR, pace, splits, laps) straight into your exercise log.
          </div>
          <button onClick={connect} style={{
            padding: '12px 16px', borderRadius: theme.radius.btn,
            background: '#FC4C02', color: '#FFFFFF', border: 'none',
            fontFamily: theme.font, fontSize: 14, fontWeight: 700,
            cursor: 'pointer', letterSpacing: '0.02em',
          }}>Connect Strava</button>
        </React.Fragment>
      )}
      {error && (
        <div style={{
          marginTop: 10, padding: '10px 12px', borderRadius: 8,
          background: '#FDECEA', color: '#B3261E', fontSize: 13, fontFamily: theme.font,
        }}>{error}</div>
      )}
    </div>
  );
}

// Review + approve/decline pending Strava activities before they hit
// the exercise log.
function StravaReviewSheet({ theme, onClose }) {
  const [items, setItems] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { const id = requestAnimationFrame(() => setVisible(true)); return () => cancelAnimationFrame(id); }, []);

  const load = React.useCallback(async () => {
    try {
      const { data, error: qErr } = await window.sb
        .from('strava_activities')
        .select('activity_id, type, data, status')
        .eq('status', 'pending')
        .order('activity_id', { ascending: false });
      if (qErr) throw qErr;
      setItems(data || []);
    } catch (e) { setError(e.message || String(e)); }
  }, []);
  React.useEffect(() => { load(); }, [load]);

  const uid = () => (window.sb.auth.getSession()
    .then(r => r.data?.session?.user?.id));

  const approve = async (row) => {
    setBusy(true); setError(null);
    try {
      const u = await uid();
      if (!u) throw new Error('not signed in');
      const d = row.data || {};
      const logId = 'strava_' + row.activity_id;
      // Upsert into exercise_logs
      const { error: logErr } = await window.sb.from('exercise_logs').upsert([{
        id: logId, user_id: u,
        date: (d.start_date_local || d.start_date || new Date().toISOString()).slice(0, 10),
        type: d.mapped_type || row.type || 'Other',
        duration_min: d.duration_min || null,
        distance_km: d.distance_km != null ? +(+d.distance_km).toFixed(2) : null,
        kcal: d.kcal ?? null,
        notes: [d.name, d.description].filter(Boolean).join(' — ') || null,
        details: d,
      }], { onConflict: 'id' });
      if (logErr) throw logErr;
      // Mark approved
      const { error: updErr } = await window.sb.from('strava_activities')
        .update({ status: 'approved', exercise_log_id: logId, reviewed_at: new Date().toISOString() })
        .eq('activity_id', row.activity_id);
      if (updErr) throw updErr;
      setItems(prev => (prev || []).filter(i => i.activity_id !== row.activity_id));
      window.dispatchEvent(new CustomEvent('caloree:strava-synced'));
    } catch (e) { setError(e.message || String(e)); }
    setBusy(false);
  };

  const decline = async (row) => {
    setBusy(true); setError(null);
    try {
      const { error: updErr } = await window.sb.from('strava_activities')
        .update({ status: 'declined', reviewed_at: new Date().toISOString() })
        .eq('activity_id', row.activity_id);
      if (updErr) throw updErr;
      setItems(prev => (prev || []).filter(i => i.activity_id !== row.activity_id));
    } catch (e) { setError(e.message || String(e)); }
    setBusy(false);
  };

  const approveAll = async () => {
    if (!items || !items.length) return;
    if (!confirm(`Approve all ${items.length} activities? They'll be imported to your exercise log.`)) return;
    for (const row of items) {
      // eslint-disable-next-line no-await-in-loop
      await approve(row);
    }
    window.dispatchEvent(new CustomEvent('caloree:strava-approved'));
  };
  const declineAll = async () => {
    if (!items || !items.length) return;
    if (!confirm(`Decline all ${items.length} activities? They won't be imported.`)) return;
    for (const row of items) {
      // eslint-disable-next-line no-await-in-loop
      await decline(row);
    }
  };

  const fmtDuration = (min) => {
    if (!min) return '';
    const h = Math.floor(min / 60); const m = min % 60;
    return h > 0 ? `${h}h ${m}m` : `${m} min`;
  };
  const fmtPace = (s) => {
    if (!s) return '';
    const m = Math.floor(s / 60); const r = s % 60;
    return `${m}:${String(r).padStart(2, '0')}/km`;
  };

  return ReactDOM.createPortal(
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0,
      background: `rgba(0,0,0,${visible ? 0.45 : 0})`,
      zIndex: 10001, display: 'flex', alignItems: 'flex-end',
      transition: 'background 0.25s ease-out',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        maxHeight: '90vh', overflowY: 'auto',
        WebkitOverflowScrolling: 'touch',
        overscrollBehavior: 'contain',
        transform: visible ? 'translateY(0)' : 'translateY(100%)',
        transition: 'transform 0.36s cubic-bezier(0.32, 0.72, 0, 1)',
      }}>
        <div style={{ padding: '18px 18px 10px' }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: theme.line, margin: '0 auto 14px' }}/>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 20, fontWeight: theme.titleWeight,
              color: theme.ink, letterSpacing: theme.letter,
            }}>Review Strava imports</div>
            <button onClick={onClose} style={{
              background: 'none', border: 'none', color: theme.inkSoft, cursor: 'pointer',
              fontSize: 20, padding: 4, lineHeight: 1,
            }}>×</button>
          </div>
          <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2 }}>
            Approve each activity to add it to your exercise log, or decline to skip.
          </div>
          {items && items.length > 1 && (
            <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
              <button onClick={approveAll} disabled={busy} style={{
                flex: 1, padding: '9px 12px', borderRadius: theme.radius.btn,
                background: '#2B7A5C', color: '#fff', border: 'none',
                fontFamily: theme.font, fontSize: 12, fontWeight: 700, cursor: 'pointer', opacity: busy ? 0.5 : 1,
              }}>Approve all</button>
              <button onClick={declineAll} disabled={busy} style={{
                flex: 1, padding: '9px 12px', borderRadius: theme.radius.btn,
                background: 'transparent', color: theme.inkSoft, border: `1px solid ${theme.line}`,
                fontFamily: theme.font, fontSize: 12, fontWeight: 600, cursor: 'pointer',
              }}>Decline all</button>
            </div>
          )}
        </div>
        {error && (
          <div style={{
            margin: '0 18px 10px', padding: '10px 12px', borderRadius: 8,
            background: '#FDECEA', color: '#B3261E', fontSize: 13, fontFamily: theme.font,
          }}>{error}</div>
        )}
        <div style={{ padding: '0 14px 28px' }}>
          {items === null ? (
            <div style={{ padding: 20, fontFamily: theme.font, fontSize: 13, color: theme.inkMute, textAlign: 'center' }}>Loading…</div>
          ) : items.length === 0 ? (
            <div style={{ padding: 24, fontFamily: theme.font, fontSize: 13, color: theme.inkMute, textAlign: 'center' }}>
              No pending activities. Hit "Sync now" on Profile to check Strava again.
            </div>
          ) : (
            items.map((row) => {
              const d = row.data || {};
              const date = (d.start_date_local || d.start_date || '').slice(0, 10);
              const icon = { Run: '🏃', Cycling: '🚴', Walk: '🚶', Swim: '🏊', Strength: '🏋️', HIIT: '🔥', Mobility: '🧘', Other: '⚡' }[d.mapped_type] || '⚡';
              return (
                <div key={row.activity_id} style={{
                  margin: '8px 4px', padding: '14px 14px',
                  background: theme.surface, borderRadius: theme.radius.card,
                  border: `1px solid ${theme.line}`,
                }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                      <span style={{ fontSize: 18 }}>{icon}</span>
                      <div>
                        <div style={{ fontFamily: theme.font, fontSize: 14, fontWeight: 600, color: theme.ink }}>
                          {d.name || (d.mapped_type || 'Activity')}
                        </div>
                        <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkMute }}>
                          {date} · {d.strava_type}{d.runType ? ` · ${d.runType}` : ''}
                        </div>
                      </div>
                    </div>
                  </div>
                  <div style={{
                    display: 'flex', flexWrap: 'wrap', gap: 14,
                    fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 4,
                  }}>
                    {d.duration_min ? <span><b>{fmtDuration(d.duration_min)}</b></span> : null}
                    {d.distance_km ? <span>{d.distance_km.toFixed(2)} km</span> : null}
                    {d.pace_sec_per_km ? <span>{fmtPace(d.pace_sec_per_km)}</span> : null}
                    {d.average_heartrate ? <span>{Math.round(d.average_heartrate)} bpm{d.max_heartrate ? ` (max ${Math.round(d.max_heartrate)})` : ''}</span> : null}
                    {d.average_cadence ? <span>{Math.round(d.average_cadence * (d.mapped_type === 'Run' ? 2 : 1))}{d.mapped_type === 'Run' ? ' spm' : ' rpm'}</span> : null}
                    {d.average_watts ? <span>{Math.round(d.average_watts)} W</span> : null}
                    {d.elevation_gain_m ? <span>↑ {Math.round(d.elevation_gain_m)} m</span> : null}
                    {typeof d.kcal === 'number' ? <span>{d.kcal} kcal</span> : null}
                  </div>
                  {Array.isArray(d.splits_km) && d.splits_km.length > 0 && (
                    <div style={{
                      marginTop: 8, padding: '8px 10px', borderRadius: 8,
                      background: theme.surfaceAlt,
                      fontFamily: theme.font, fontSize: 11, color: theme.inkSoft,
                    }}>
                      {d.splits_km.length} splits · fastest {fmtPace(Math.min(...d.splits_km.map(s => s.pace_sec_per_km || 999999)))}
                    </div>
                  )}
                  <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                    <button onClick={() => approve(row)} disabled={busy} style={{
                      flex: 1, padding: '10px 0', borderRadius: theme.radius.btn,
                      background: '#2B7A5C', color: '#fff', border: 'none',
                      fontFamily: theme.font, fontSize: 13, fontWeight: 700, cursor: 'pointer', opacity: busy ? 0.5 : 1,
                    }}>Approve</button>
                    <button onClick={() => decline(row)} disabled={busy} style={{
                      flex: 1, padding: '10px 0', borderRadius: theme.radius.btn,
                      background: 'transparent', color: theme.inkSoft,
                      border: `1px solid ${theme.line}`,
                      fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
                    }}>Decline</button>
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>,
    document.body
  );
}

// Ask Claude to suggest goal numbers based on the user's own data.
// Inline-editable card showing the details captured during onboarding:
// sex, age, height, activity level, goal. The user's display name lives

          onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }}
          style={fieldStyle(theme)}/>

    },
    {
      k: 'activity', label: 'Activity',
      display: profile.activity ? ACTIVITY_LABELS[profile.activity] : '—',
      editor: (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {Object.entries(ACTIVITY_LABELS).map(([k, l]) => (
            <button key={k} onClick={() => { patch('activity', k); setEditing(null); }} style={{
              padding: '8px 10px', textAlign: 'left',
              borderRadius: theme.radius.btn,
              border: `1px solid ${profile.activity === k ? theme.ink : theme.line}`,
              background: profile.activity === k ? theme.surfaceAlt : 'transparent',
              fontFamily: theme.font, fontSize: 12,
              fontWeight: profile.activity === k ? 700 : 500,

              flex: 1, padding: '8px 0', borderRadius: theme.radius.btn,
              border: `1px solid ${profile.goal === k ? theme.ink : theme.line}`,
              background: profile.goal === k ? theme.ink : 'transparent',

        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',

          <span style={{ color: theme.inkMute, fontSize: 11 }}>{open ? '▾' : '›'}</span>
        </div>
        {latestWeight != null && (
          <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkMute }}>
            {open
              ? <>Weight: <span style={{ color: theme.ink, fontWeight: 600 }}>{latestWeight.toFixed(1)} kg</span> · edit on Trends</>
              : <>{profile.sex ? profile.sex[0].toUpperCase() + profile.sex.slice(1) : '—'}
                  {profile.age ? ` · ${profile.age}` : ''}
                  {profile.heightCm ? ` · ${profile.heightCm}cm` : ''}

          padding: '10px 0',
          borderTop: `0.5px solid ${theme.line}`,

          <div onClick={() => setEditing(editing === row.k ? null : row.k)} style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            cursor: 'pointer',
          }}>
            <span style={{ fontFamily: theme.font, fontSize: 13, color: theme.inkSoft }}>
              {row.label}

            <span style={{
              fontFamily: theme.font, fontSize: 14, fontWeight: 500, color: theme.ink,
              display: 'inline-flex', alignItems: 'center', gap: 6,
            }}>
              {row.display}
              <span style={{ color: theme.inkMute, fontSize: 10 }}>
                {editing === row.k ? '▾' : '›'}
              </span>
            </span>
          </div>
          {editing === row.k && (
            <div style={{ marginTop: 8 }}>
              {row.editor}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function AskClaudeGoalsButton({ theme, targets, log, weightLog, exerciseLog = [], wellnessMap = {}, onSuggest }) {
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null); // { fields, why }
  const [showFactors, setShowFactors] = React.useState(false);
  const [goal, setGoal] = React.useState('maintain'); // 'cut' | 'maintain' | 'gain'

  const run = async () => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) { setError('Set your Anthropic API key below first.'); return; }
    setBusy(true); setError(null); setPreview(null);
    try {
      // 14-day snapshot from HISTORY so Claude has real numbers.
      const HIST = window.HISTORY || [];
      const last14 = HIST.slice(-14).map(d => ({
        date: d.iso, kcal: d.kcal, c: d.c, p: d.p, f: d.f,
        satFat: d.satFat, sugar: d.sugar, fibre: d.fibre,
        energy: d.energy ?? null, sleep_hrs: d.sleepHrs ?? null,
        stress: d.stress ?? null,
      }));
      const weights = (weightLog || []).slice(-10).map(w => ({ iso: w.iso, kg: +w.kg }));

      // Weight trend kg/week from the slope across recent weighings.
      let weightTrend = null;
      if (weights.length >= 2) {
        const first = weights[0], last = weights[weights.length - 1];
        const days = (new Date(last.iso) - new Date(first.iso)) / 86400000;
        if (days > 0) {
          weightTrend = {
            kg_per_week: +((last.kg - first.kg) / days * 7).toFixed(2),
            span_days: Math.round(days),
            latest_kg: last.kg,
          };
        }
      }

      // Exercise rollup for the same 14-day window.
      const isoSet = new Set(last14.map(d => d.date));
      const restDaysSet = new Set(last14.map(d => d.date));
      const ex = { total_min: 0, total_kcal: 0, total_km: 0, sessions: 0, byType: {} };
      (exerciseLog || []).forEach(e => {
        if (!e.date || !isoSet.has(e.date)) return;
        ex.total_min  += +e.duration || 0;
        ex.total_kcal += +e.kcal     || 0;
        ex.total_km   += +e.distance || 0;
        ex.sessions   += 1;
        restDaysSet.delete(e.date);
        const t = e.type || 'Other';
        if (!ex.byType[t]) ex.byType[t] = { min: 0, count: 0 };
        ex.byType[t].min  += +e.duration || 0;
        ex.byType[t].count += 1;
      });
      ex.total_min  = Math.round(ex.total_min);
      ex.total_kcal = Math.round(ex.total_kcal);
      ex.total_km   = +ex.total_km.toFixed(1);
      ex.rest_days = restDaysSet.size;

      // Consistency: how often actual intake lands within ±10% of current kcal target.
      const kcalTarget = targets.kcal || 0;
      const onTarget = kcalTarget ? last14.filter(d => d.kcal && Math.abs(d.kcal - kcalTarget) / kcalTarget <= 0.10).length : 0;
      const consistency = { on_target_days: onTarget, total_days: last14.length };

      // Adherence to existing sub-macro limits (how often user exceeds current caps)
      const overSatFat = last14.filter(d => (d.satFat || 0) > (targets.satFat || 20)).length;
      const overSugar  = last14.filter(d => (d.sugar  || 0) > (targets.sugar  || 50)).length;
      const underFibre = last14.filter(d => (d.fibre  || 0) < (targets.fibre  || 30)).length;
      const adherence = { over_sat_fat_days: overSatFat, over_sugar_days: overSugar, under_fibre_days: underFibre };

      const goalLabel = {
        cut: 'CUT (lose fat — modest deficit, preserve protein for muscle)',
        maintain: 'MAINTAIN (hold current weight, optimise energy and performance)',
        gain: 'GAIN (add lean mass — moderate surplus, high protein)',
      }[goal];

      const prompt = `The user wants their daily targets suggested based on their real data.

USER'S STATED GOAL: ${goalLabel}

Current daily targets: ${JSON.stringify(targets)}

Last 14 days of logged food (each row includes wellness signals — energy, sleep, stress on a 1-5 scale):
${JSON.stringify(last14)}

Exercise in the same 14-day window: ${JSON.stringify(ex)}

Recent weights: ${JSON.stringify(weights)}
Weight trend: ${JSON.stringify(weightTrend)}

Consistency vs. current kcal target (±10% band): ${JSON.stringify(consistency)}
Adherence to current sub-macro limits: ${JSON.stringify(adherence)}

Reasoning guidelines:
1. CALORIES. Use the measured weight trend as the primary signal of maintenance:
   - flat (<0.05 kg/week change) → current avg intake ≈ maintenance
   - losing → current intake < maintenance; add back losses to find maintenance
   - gaining → current intake > maintenance
   Then apply the goal: cut = -15-20% from maintenance, maintain = match maintenance, gain = +10-15%.
2. PROTEIN. Scale with latest bodyweight: cut ~2.0 g/kg, maintain ~1.6 g/kg, gain ~1.8-2.0 g/kg.
   If exercise volume is high (>180 min/week OR strength sessions present), push protein up.
3. ENERGY & SLEEP. If average energy is low (<3/5) or sleep averaged <6.5h alongside a current deficit, DO NOT deepen the cut — hold kcal, raise carbs slightly, and flag it in "why".
4. TRAINING MIX. Strength/HIIT-heavy → raise protein. Endurance-heavy (Run/Cycling) → raise carbs. Use ex.byType.
5. REST DAYS. Many rest days (>8 of 14) suggests the user is under-recovering or has low volume; be conservative with surplus sizes.
6. CONSISTENCY. If actual intake is nowhere near target (on_target_days <3 of 14), the target isn't working — anchor closer to actual intake, then nudge toward the goal.
7. SUB-MACROS. Tighten sat fat / sugar limits if repeatedly exceeded; raise fibre target only if adherence is already strong.
8. Round kcal to the nearest 50, macros to the nearest 5.

Return ONLY JSON (no prose, no fences):
{"kcal": N, "c": N, "p": N, "f": N, "satFat": N, "sugar": N, "fibre": N, "exKcal": N, "exMin": N, "why": "one specific sentence citing the key factor — e.g. 'weight +0.2kg/wk stable, hold kcal, push protein to 2.0 g/kg for strength work' or 'energy 2.4/5 with sleep 6h avg, not deepening the cut'"}`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 500,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const textBlock = (j.content || []).find(b => b.type === 'text');
      const raw = textBlock?.text || '';
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("Couldn't parse response");
      const parsed = JSON.parse(m[0]);
      const { why, ...fields } = parsed;
      setPreview({ fields, why: why || null });
    } catch (e) { setError(e.message || String(e)); }
    setBusy(false);
  };

  const approve = () => {
    if (!preview) return;
    const prevTargets = { ...targets };
    onSuggest(preview.fields);
    const label = 'Applied Claude\'s macro suggestion';
    setPreview(null);
    if (window.showToast) {
      window.showToast(label, () => { onSuggest(prevTargets); });
    }
  };
  const decline = () => setPreview(null);

  // Summarize what Claude "sees" so the suggestion isn't a black box.
  const factors = (() => {
    const rows = (window.HISTORY || []).slice(-14);
    const n = rows.length;
    const avg = (key) => n ? Math.round(rows.reduce((s, d) => s + (d[key] || 0), 0) / n) : 0;
    const avgF = (key) => n ? +(rows.reduce((s, d) => s + (+d[key] || 0), 0) / n).toFixed(1) : 0;

    // Exercise rollup matching the 14-day window
    const isoSet = new Set(rows.map(r => r.iso));
    let exMin = 0, exKcal = 0, sessions = 0;
    const byType = {};
    (exerciseLog || []).forEach(e => {
      if (!e.date || !isoSet.has(e.date)) return;
      exMin  += +e.duration || 0;
      exKcal += +e.kcal     || 0;
      sessions += 1;
      byType[e.type || 'Other'] = (byType[e.type || 'Other'] || 0) + (+e.duration || 0);
    });
    const topTypes = Object.entries(byType).sort((a, b) => b[1] - a[1]).slice(0, 3)
      .map(([t, m]) => `${t} ${Math.round(m)}m`).join(', ');

    // Weight trend
    const wl = (weightLog || []).slice(-10);
    let weightLine = 'No weigh-ins';
    if (wl.length === 1) weightLine = `1 entry (${wl[0].kg} kg)`;
    else if (wl.length >= 2) {
      const first = +wl[0].kg, last = +wl[wl.length - 1].kg;
      const days = Math.max(1, (new Date(wl[wl.length - 1].iso) - new Date(wl[0].iso)) / 86400000);
      const perWeek = ((last - first) / days * 7).toFixed(2);
      weightLine = `${wl.length} entries · ${first.toFixed(1)} → ${last.toFixed(1)} kg (${perWeek > 0 ? '+' : ''}${perWeek}/wk)`;
    }

    // Consistency vs. kcal target
    const kcalTarget = targets.kcal || 0;
    const onTarget = kcalTarget
      ? rows.filter(d => d.kcal && Math.abs(d.kcal - kcalTarget) / kcalTarget <= 0.10).length
      : 0;

    const energyAvg = avgF('energy');
    const sleepAvg  = avgF('sleepHrs');
    const stressAvg = avgF('stress');

    return [
      {
        k: 'Current targets',
        v: `kcal ${targets.kcal} · c ${targets.c}g · p ${targets.p}g · f ${targets.f}g`
          + (targets.satFat != null ? ` · satFat ${targets.satFat}g` : '')
          + (targets.sugar  != null ? ` · sugar ${targets.sugar}g`   : '')
          + (targets.fibre  != null ? ` · fibre ${targets.fibre}g`   : ''),
      },
      {
        k: 'Actual intake · 14 days',
        v: n ? `kcal avg ${avg('kcal')} · c ${avg('c')}g · p ${avg('p')}g · f ${avg('f')}g` : 'No food logged yet',
      },
      {
        k: 'Adherence · 14 days',
        v: kcalTarget
          ? `${onTarget}/${n} days within ±10% of kcal target`
          : '—',
      },
      {
        k: 'Weight trend',
        v: weightLine,
      },
      {
        k: 'Exercise · 14 days',
        v: sessions
          ? `${sessions} sessions · ${Math.round(exMin)} min · ${Math.round(exKcal)} kcal${topTypes ? ' · ' + topTypes : ''}`
          : 'No exercise logged',
      },
      {
        k: 'Wellness · avg',
        v: energyAvg || sleepAvg || stressAvg
          ? `energy ${energyAvg}/5 · sleep ${sleepAvg}h · stress ${stressAvg}/5`
          : 'No wellness logged',
      },
    ];
  })();

  const fmt = (k, v) => {
    if (v == null) return '—';
    if (k === 'kcal') return Math.round(v).toLocaleString();
    if (k === 'exKcal') return Math.round(v);
    if (k === 'exMin') return Math.round(v) + ' min';
    return Math.round(v) + ' g';
  };
  const LABELS = {
    kcal: 'Calories', c: 'Carbs', p: 'Protein', f: 'Fat',
    satFat: 'Sat fat', sugar: 'Sugar', fibre: 'Fibre',
    exKcal: 'Ex kcal', exMin: 'Ex min',
  };
  const rowStyle = (delta) => ({
    display: 'grid', gridTemplateColumns: '80px 1fr 12px 1fr 50px', gap: 8,
    padding: '5px 0', alignItems: 'baseline',
    fontFamily: theme.font, fontSize: 12,
  });

  return (
    <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${theme.line}` }}>
      {/* Goal picker — required before Claude can tailor the targets */}
      <div style={{
        fontFamily: theme.font, fontSize: 10, fontWeight: 600,
        color: theme.inkMute, letterSpacing: '0.1em', marginBottom: 6,
      }}>GOAL</div>
      <div style={{ display: 'flex', gap: 4, marginBottom: 10 }}>
        {[
          ['cut', 'Lose weight'],
          ['maintain', 'Maintain'],
          ['gain', 'Gain weight'],
        ].map(([k, l]) => {
          const active = goal === k;
          return (
            <button key={k} onClick={() => setGoal(k)} style={{
              flex: 1, padding: '8px 0', borderRadius: theme.radius.btn,
              border: `1px solid ${active ? theme.ink : theme.line}`,
              background: active ? theme.ink : 'transparent',
              color: active ? theme.bg : theme.inkSoft,
              fontFamily: theme.font, fontSize: 12, fontWeight: active ? 700 : 500,
              cursor: 'pointer',
            }}>{l}</button>
          );
        })}
      </div>

      <button onClick={run} disabled={busy} style={{
        width: '100%', padding: '10px 14px', border: `1px solid ${theme.line}`,
        background: theme.surfaceAlt, color: theme.ink, cursor: busy ? 'default' : 'pointer',
        borderRadius: theme.radius.btn,
        fontFamily: theme.font, fontSize: 13, fontWeight: 600,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        opacity: busy ? 0.6 : 1,
      }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z"
            stroke={theme.accent} strokeWidth="1.8" strokeLinejoin="round"
            fill={theme.accent} fillOpacity="0.12"/>
        </svg>
        {busy ? 'Asking Claude…' : preview ? 'Ask again' : 'Ask Claude to suggest macros from my data'}
      </button>

      <button onClick={() => setShowFactors(!showFactors)} style={{
        marginTop: 6, background: 'none', border: 'none',
        padding: '2px 4px', cursor: 'pointer',
        fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
        letterSpacing: '0.04em',
      }}>
        {showFactors ? '▾' : '▸'} What Claude is looking at
      </button>
      {showFactors && (
        <div style={{
          marginTop: 4, padding: '8px 10px', background: theme.surfaceAlt,
          borderRadius: theme.radius.btn,
        }}>
          {factors.map(f => (
            <div key={f.k} style={{
              display: 'flex', flexDirection: 'column',
              padding: '4px 0', borderBottom: `0.5px solid ${theme.line}`,
            }}>
              <div style={{
                fontFamily: theme.font, fontSize: 10, fontWeight: 600,
                color: theme.inkMute, letterSpacing: '0.06em', textTransform: 'uppercase',
              }}>{f.k}</div>
              <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.ink }}>{f.v}</div>
            </div>
          ))}
          <div style={{
            fontFamily: theme.font, fontSize: 11, color: theme.inkMute, marginTop: 6, lineHeight: 1.4,
          }}>
            <div style={{ fontWeight: 600, color: theme.inkSoft, marginBottom: 2 }}>Not tracked (Claude can't use):</div>
            Age · height · sex · medical conditions · cycle · meal timing preferences · injuries.
            Adjust the suggestion manually after if any of these matter for you.
          </div>
        </div>
      )}

      {preview && (
        <div style={{
          marginTop: 10, padding: '12px 12px',
          background: theme.bg, border: `1.5px solid ${theme.accent}`,
          borderRadius: theme.radius.btn,
        }}>
          {preview.why && (
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.ink,
              marginBottom: 8, lineHeight: 1.4,
            }}>{preview.why}</div>
          )}
          <div style={{
            display: 'grid', gridTemplateColumns: '80px 1fr 12px 1fr 50px', gap: 8,
            paddingBottom: 4, borderBottom: `1px solid ${theme.line}`, marginBottom: 4,
            fontFamily: theme.font, fontSize: 10, fontWeight: 600, color: theme.inkMute,
            letterSpacing: '0.06em', textTransform: 'uppercase',
          }}>
            <span/><span>Current</span><span/><span>Suggested</span><span style={{ textAlign: 'right' }}>Δ</span>
          </div>
          {Object.keys(LABELS).map(k => {
            const cur = targets[k];
            const next = preview.fields[k];
            if (next == null) return null;
            const delta = (cur != null ? (next - cur) : null);
            return (
              <div key={k} style={rowStyle(delta)}>
                <span style={{ color: theme.inkSoft, fontWeight: 600 }}>{LABELS[k]}</span>
                <span style={{ color: theme.inkSoft }}>{fmt(k, cur)}</span>
                <span style={{ color: theme.inkMute }}>→</span>
                <span style={{ color: theme.ink, fontWeight: 600 }}>{fmt(k, next)}</span>
                <span style={{
                  textAlign: 'right', fontFamily: theme.numFont,
                  color: delta == null ? theme.inkMute : (delta > 0 ? '#2B7A5C' : delta < 0 ? '#B3261E' : theme.inkMute),
                }}>{delta == null ? '' : (delta > 0 ? '+' : '') + Math.round(delta)}</span>
              </div>
            );
          })}
          <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
            <button onClick={decline} style={{
              flex: 1, padding: '9px 0', border: `1px solid ${theme.line}`,
              background: 'transparent', color: theme.inkSoft, cursor: 'pointer',
              borderRadius: theme.radius.btn,
              fontFamily: theme.font, fontSize: 13, fontWeight: 600,
            }}>Decline</button>
            <button onClick={approve} style={{
              flex: 1, padding: '9px 0', border: 'none',
              background: theme.accent, color: theme.accentInk, cursor: 'pointer',
              borderRadius: theme.radius.btn,
              fontFamily: theme.font, fontSize: 13, fontWeight: 700,
            }}>Approve</button>
          </div>
        </div>
      )}

      {error && (
        <div style={{
          marginTop: 8, padding: '8px 10px', borderRadius: 8,
          background: '#FDECEA', color: '#B3261E', fontSize: 12, fontFamily: theme.font,
        }}>{error}</div>
      )}
    </div>
  );
}

        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

const { useState: useStateProfile } = React;

// ── Goal history: compact entry row on Profile + full timeline sheet ──
function GoalHistoryRow({ theme, targets, targetHistory = [], onOpen }) {
  const sorted = [...targetHistory].sort((a, b) =>
    (a.from_date || '').localeCompare(b.from_date || ''));
  const kcals = sorted.map(h => +(h.targets?.kcal) || 0).filter(Boolean);
  const W = 70, H = 22;
  // Step sparkline
  const sparkPath = (() => {
    if (kcals.length < 2) return '';
    const min = Math.min(...kcals), max = Math.max(...kcals);
    const range = max - min || 1;
    const step = W / (kcals.length - 1);
    let d = '';
    kcals.forEach((v, i) => {
      const x = i * step;
      const y = H - 2 - ((v - min) / range) * (H - 4);
      if (i === 0) d += `M${x},${y}`;
      else d += ` L${x},${y - (((kcals[i] === kcals[i-1]) ? 0 : 0))}`;
    });
    return d;
  })();
  const count = sorted.length;
  const subline = count === 0
    ? 'No changes yet'
    : count === 1
      ? '1 entry · set today'
      : `${count} changes · last ${sorted[sorted.length-1].from_date}`;
  return (
    <div onClick={onOpen} style={{
      margin: '0 16px 12px', padding: '14px 18px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      cursor: 'pointer',
    }}>
      <div>
        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
        }}>Goal history</div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkMute, marginTop: 3,
        }}>{subline}</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {kcals.length >= 2 && (
          <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
            <path d={sparkPath} fill="none" stroke={theme.accent}
              strokeWidth="1.5" strokeLinecap="round"/>
            <circle cx={W} cy={H - 2 - ((kcals[kcals.length-1] - Math.min(...kcals))
              / (Math.max(...kcals) - Math.min(...kcals) || 1)) * (H - 4)}
              r="2.5" fill={theme.accent}/>
          </svg>
        )}
        <span style={{ color: theme.inkMute, fontSize: 14 }}>›</span>
      </div>
    </div>
  );
}

function GoalHistorySheet({ theme, targets, setTargets, targetHistory = [], setTargetHistory, onClose }) {
  const [expanded, setExpanded] = React.useState(null); // from_date
  const sorted = [...targetHistory]
    .filter(h => h.from_date && h.targets)
    .sort((a, b) => b.from_date.localeCompare(a.from_date)); // newest first
  const chronological = [...sorted].reverse();

  const FIELDS = [
    ['kcal', 'Kcal'],
    ['p', 'Protein', 'g'],
    ['c', 'Carbs', 'g'],
    ['f', 'Fat', 'g'],
    ['fibre', 'Fibre', 'g'],
    ['satFat', 'Sat fat', 'g'],
    ['sugar', 'Sugar', 'g'],
    ['exMin', 'Ex min', 'min'],
    ['exKcal', 'Ex kcal', ''],
  ];

  const computeDelta = (entry, idx) => {
    // entry at idx (newest-first). prev = idx+1 in sorted.
    const prev = sorted[idx + 1];
    if (!prev) return [];
    const changes = [];
    FIELDS.forEach(([k, label]) => {
      const a = +prev.targets[k] || 0;
      const b = +entry.targets[k] || 0;
      if (Math.abs(a - b) > 0.01) changes.push({ k, label, from: a, to: b });
    });
    return changes;
  };

  const revert = (entry) => {
    if (!setTargets) return;
    if (!confirm(`Revert current targets to those from ${entry.from_date}?`)) return;
    setTargets({ ...entry.targets, _why: `Reverted to ${entry.from_date} state.` });
    onClose && onClose();
  };

  // Step sparkline across all entries (kcal over time)
  const W = 300, H = 70, PAD_L = 40, PAD_R = 8, PAD_T = 10, PAD_B = 18;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_T - PAD_B;
  const kcals = chronological.map(h => +h.targets.kcal || 0);
  const sparkPath = (() => {
    if (kcals.length < 2) return '';
    const min = Math.min(...kcals), max = Math.max(...kcals);
    const range = max - min || 1;
    const step = plotW / (kcals.length - 1);
    let d = '';
    kcals.forEach((v, i) => {
      const x = PAD_L + i * step;
      const y = PAD_T + plotH - ((v - min) / range) * plotH;
      if (i === 0) d += `M${x},${y}`;
      else {
        // step: horizontal at prev y, then vertical to new y, then to new x
        const prevY = PAD_T + plotH - ((kcals[i-1] - min) / range) * plotH;
        d += ` L${x},${prevY} L${x},${y}`;
      }
    });
    return d;
  })();

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 300,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '90vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          padding: '14px 18px 10px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: theme.line, margin: '0 auto 12px' }}/>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 20, fontWeight: theme.titleWeight,
              color: theme.ink,
            }}>Goal history</div>
            <button onClick={onClose} style={{
              border: 'none', background: 'none', cursor: 'pointer',
              fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
            }}>×</button>
          </div>
          <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 4 }}>
            {sorted.length} change{sorted.length === 1 ? '' : 's'} · tap an entry to expand or revert
          </div>
        </div>

        {/* Step sparkline */}
        {kcals.length >= 2 && (
          <div style={{ padding: '14px 18px 8px' }}>
            <div style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 700,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
              marginBottom: 6,
            }}>Kcal target over time</div>
            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
              style={{ display: 'block' }}>
              <path d={sparkPath} fill="none" stroke={theme.accent} strokeWidth="1.8" strokeLinejoin="round"/>
              {chronological.map((h, i) => {
                const step = plotW / (kcals.length - 1);
                const x = PAD_L + i * step;
                const v = kcals[i];
                const min = Math.min(...kcals), max = Math.max(...kcals);
                const y = PAD_T + plotH - ((v - min) / (max - min || 1)) * plotH;
                return <circle key={i} cx={x} cy={y} r="3" fill={theme.accent}/>;
              })}
              <text x={PAD_L - 4} y={PAD_T + 4} textAnchor="end"
                fontFamily={theme.font} fontSize="9" fill={theme.inkMute}>
                {Math.max(...kcals)}</text>
              <text x={PAD_L - 4} y={PAD_T + plotH + 2} textAnchor="end"
                fontFamily={theme.font} fontSize="9" fill={theme.inkMute}>
                {Math.min(...kcals)}</text>
              <text x={PAD_L} y={H - 4}
                fontFamily={theme.font} fontSize="9" fill={theme.inkMute}>
                {chronological[0].from_date}</text>
              <text x={W - PAD_R} y={H - 4} textAnchor="end"
                fontFamily={theme.font} fontSize="9" fill={theme.inkMute}>
                Now</text>
            </svg>
          </div>
        )}

        {/* Timeline list */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '6px 18px 24px' }}>
          {sorted.length === 0 && (
            <div style={{
              padding: 40, textAlign: 'center', color: theme.inkSoft,
              fontFamily: theme.font, fontSize: 13,
            }}>No changes logged yet. Edit your goals to start the timeline.</div>
          )}
          {sorted.map((entry, i) => {
            const isNow = i === 0;
            const isStart = i === sorted.length - 1;
            const changes = computeDelta(entry, i);
            const open = expanded === entry.from_date;
            const why = entry.why || entry.targets?._why || (entry.source === 'claude' ? 'Suggested by Claude.' : null);
            return (
              <div key={entry.from_date} onClick={() => setExpanded(open ? null : entry.from_date)}
                style={{
                  padding: '12px 0', borderTop: i === 0 ? 'none' : `1px solid ${theme.line}`,
                  cursor: 'pointer',
                }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div style={{
                    fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft,
                  }}>{entry.from_date}</div>
                  {isNow && (
                    <span style={{
                      padding: '1px 7px', borderRadius: 999,
                      background: theme.accent, color: theme.accentInk,
                      fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase',
                    }}>Now</span>
                  )}
                  {isStart && !isNow && (
                    <span style={{
                      padding: '1px 7px', borderRadius: 999,
                      background: theme.surfaceAlt, color: theme.inkSoft,
                      fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase',
                    }}>Start</span>
                  )}
                </div>
                {changes.length > 0 ? (
                  <div style={{
                    marginTop: 4, fontFamily: theme.font, fontSize: 13,
                    fontVariantNumeric: 'tabular-nums',
                  }}>
                    {changes.slice(0, 3).map((c, j) => (
                      <span key={c.k}>
                        <span style={{
                          display: 'inline-block', padding: '1px 6px', borderRadius: 4,
                          background: theme.ink, color: theme.bg, fontSize: 10,
                          fontWeight: 700, marginRight: 4,
                        }}>{c.label.toLowerCase()}</span>
                        {c.from} <span style={{ color: theme.inkMute }}>→</span>{' '}
                        <span style={{ color: c.to > c.from ? theme.accent : '#D96B5C', fontWeight: 600 }}>{c.to}</span>
                        {j < Math.min(2, changes.length - 1) && <span style={{ color: theme.inkMute }}> · </span>}
                      </span>
                    ))}
                    {changes.length > 3 && <span style={{ color: theme.inkMute }}> · +{changes.length - 3}</span>}
                  </div>
                ) : (
                  <div style={{ marginTop: 4, fontSize: 13, color: theme.inkMute, fontStyle: 'italic' }}>
                    Initial snapshot
                  </div>
                )}
                {why && (
                  <div style={{
                    marginTop: 4, fontFamily: theme.font, fontSize: 12,
                    fontStyle: 'italic', color: theme.inkSoft, lineHeight: 1.4,
                  }}>{why}</div>
                )}
                {open && (
                  <div style={{
                    marginTop: 10, padding: '10px 12px',
                    background: theme.surfaceAlt, borderRadius: 10,
                  }}>
                    <div style={{
                      fontFamily: theme.font, fontSize: 10, fontWeight: 700,
                      color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
                      marginBottom: 6,
                    }}>Full targets</div>
                    <div style={{
                      display: 'grid', gridTemplateColumns: '1fr auto', gap: '4px 12px',
                      fontFamily: theme.font, fontSize: 12,
                    }}>
                      {FIELDS.map(([k, label, unit]) => (
                        <React.Fragment key={k}>
                          <div style={{ color: theme.inkSoft }}>{label}</div>
                          <div style={{ fontVariantNumeric: 'tabular-nums', fontWeight: 600, textAlign: 'right' }}>
                            {entry.targets[k] ?? '—'}{unit ? ` ${unit}` : ''}
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                    {!isNow && (
                      <button onClick={(e) => { e.stopPropagation(); revert(entry); }}
                        style={{
                          marginTop: 10, padding: '6px 12px',
                          border: `1px solid ${theme.line}`, background: theme.surface,
                          color: '#D96B5C', cursor: 'pointer',
                          borderRadius: 999, fontFamily: theme.font,
                          fontSize: 12, fontWeight: 600,
                        }}>↶ Revert to these targets</button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ProfileScreen({ theme, themeKey, setThemeKey, targets, setTargets, targetHistory = [], setTargetHistory,
  weightLog, setWeightLog, settings, setSettings, log, session,
  exerciseLog = [], wellnessMap = {} }) {

  const [exportBusy, setExportBusy] = React.useState(false);

  const exportAllJSON = async () => {
    setExportBusy(true);
    try {
      const sb = window.sb;
      const uid = (await sb.auth.getUser()).data?.user?.id;
      if (!uid) throw new Error('Not signed in');
      const [mealsR, foodsR, exR, weightR, wellnessR, profR] = await Promise.all([
        sb.from('meal_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('foods').select('*').eq('user_id', uid),
        sb.from('exercise_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('weight_logs').select('*').eq('user_id', uid).order('iso'),
        sb.from('wellness_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('profiles').select('*').eq('user_id', uid).maybeSingle(),
      ]);
      const bundle = {
        exported_at: new Date().toISOString(),
        user_id: uid,
        profile: profR.data || null,
        meal_logs: mealsR.data || [],
        foods: foodsR.data || [],
        exercise_logs: exR.data || [],
        weight_logs: weightR.data || [],
        wellness_logs: wellnessR.data || [],
        display_name: localStorage.getItem('cal_display_name') || null,
      };
      const json = JSON.stringify(bundle, null, 2);
      const stamp = todayLocalIso();
      downloadBlob(json, `caloree-export-${stamp}.json`, 'application/json;charset=utf-8');
    } catch (e) {
      alert('Export failed: ' + e.message);
    }
    setExportBusy(false);
  };

  const exportCSV = async () => {
    setExportBusy(true);
    try {
      const sb = window.sb;
      const uid = (await sb.auth.getUser()).data?.user?.id;
      if (!uid) throw new Error('Not signed in');
      const [mealsR, foodsR] = await Promise.all([
        sb.from('meal_logs').select('*').eq('user_id', uid).order('date'),
        sb.from('foods').select('*').eq('user_id', uid),
      ]);
      const foodById = (id) => (foodsR.data || []).find(x => x.id === id);
      const rows = [['Date','Time','Meal','Food','Brand','Qty','Kcal','Carbs (g)','Protein (g)','Fat (g)','SatFat (g)','Sugar (g)','Fibre (g)']];
      (mealsR.data || []).forEach(e => {
        const f = foodById(e.food_id);
        if (!f) return;
        const q = +e.qty || 1;
        rows.push([
          e.date, e.time || '', e.meal || '', f.name || '', f.brand || '',
          q,
          Math.round((+f.kcal||0) * q),
          +((+f.c||0) * q).toFixed(1),
          +((+f.p||0) * q).toFixed(1),
          +((+f.f||0) * q).toFixed(1),
          f.sat_fat != null ? +((+f.sat_fat) * q).toFixed(1) : '',
          f.sugar   != null ? +((+f.sugar)   * q).toFixed(1) : '',
          f.fibre   != null ? +((+f.fibre)   * q).toFixed(1) : '',
        ]);
      });
      const csv = rows.map(r => r.map(v => {
        const s = String(v ?? '');
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
      }).join(',')).join('\n');
      const stamp = todayLocalIso();
      downloadBlob(csv, `caloree-meals-${stamp}.csv`, 'text/csv;charset=utf-8');
    } catch (e) {
      alert('Export failed: ' + e.message);
    }
    setExportBusy(false);
  };

  function downloadBlob(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  const [editingGoals, setEditingGoals] = useStateProfile(false);
  const [draft, setDraft] = useStateProfile(targets);
  const [showGoalHistory, setShowGoalHistory] = useStateProfile(false);

  React.useEffect(() => { if (!editingGoals) setDraft(targets); }, [targets, editingGoals]);

  const saveGoals = () => {
    const clean = {
      kcal: Math.max(1000, Math.min(5000, +draft.kcal || targets.kcal)),
      c: Math.max(0, +draft.c || 0),
      p: Math.max(0, +draft.p || 0),
      f: Math.max(0, +draft.f || 0),
      satFat: Math.max(0, +draft.satFat || 0),
      sugar:  Math.max(0, +draft.sugar  || 0),
      fibre:  Math.max(0, +draft.fibre  || 0),
      exKcal: Math.max(0, +draft.exKcal || 0),
      exMin:  Math.max(0, +draft.exMin  || 0),
    };
    setTargets(clean); setEditingGoals(false);
  };

  const [displayName, setDisplayName] = useStateProfile(() =>
    localStorage.getItem('cal_display_name') || 'Alex Rivera'
  );
  const [editingName, setEditingName] = useStateProfile(false);

function useAuthSession() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      setSession(data.session); setLoading(false);
    });
    const { data: sub } = window.sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  return { session, loading };
}

function LoginScreen() {
  const [mode, setMode] = React.useState('signin'); // 'signin' | 'signup'
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [msg, setMsg] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  const submit = async () => {
    setBusy(true); setMsg(null);
    try {
      if (mode === 'signup') {
        const { error } = await window.sb.auth.signUp({ email, password });
        if (error) throw error;
        setMsg({ type: 'ok', text: 'Account created. Check your email to confirm, then sign in.' });
      } else {
        const { error } = await window.sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (e) {
      setMsg({ type: 'err', text: e.message });
    }
    setBusy(false);
  };

  const reset = async () => {
    if (!email) { setMsg({ type: 'err', text: 'Enter your email first.' }); return; }
    const { error } = await window.sb.auth.resetPasswordForEmail(email);
    setMsg(error
      ? { type: 'err', text: error.message }
      : { type: 'ok', text: 'Password reset email sent.' });
  };

  return (
    <div style={{
      minHeight: '100vh', background: '#E8E8E5',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
      fontFamily: '-apple-system, system-ui, sans-serif',
    }}>
      <div style={{
        width: '100%', maxWidth: 360, background: '#fff',
        borderRadius: 18, padding: '28px 24px',
        boxShadow: '0 1px 2px rgba(0,0,0,0.03), 0 12px 40px rgba(0,0,0,0.06)',
      }}>
        <div style={{
          fontSize: 26, fontWeight: 700, marginBottom: 4, color: '#0A0A0A',
          letterSpacing: '-0.02em',
        }}>Caloree</div>
        <div style={{ fontSize: 13, color: '#5C5C58', marginBottom: 22 }}>
          {mode === 'signin' ? 'Sign in to sync across devices' : 'Create an account'}
        </div>

        <label style={{ display: 'block', fontSize: 12, color: '#5C5C58', marginBottom: 4 }}>Email</label>
        <input type="email" value={email} onChange={e => setEmail(e.target.value)} autoComplete="email"
          style={{ width: '100%', padding: '10px 12px', border: '1px solid rgba(10,10,10,0.12)',
            borderRadius: 10, fontSize: 14, outline: 'none', marginBottom: 12 }}/>

        <label style={{ display: 'block', fontSize: 12, color: '#5C5C58', marginBottom: 4 }}>Password</label>
        <input type="password" value={password} onChange={e => setPassword(e.target.value)}
          autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
          style={{ width: '100%', padding: '10px 12px', border: '1px solid rgba(10,10,10,0.12)',
            borderRadius: 10, fontSize: 14, outline: 'none', marginBottom: 16 }}/>

        {msg && <div style={{
          padding: '10px 12px', borderRadius: 8, marginBottom: 12, fontSize: 13,
          background: msg.type === 'ok' ? '#E8F5E9' : '#FDECEA',
          color: msg.type === 'ok' ? '#256029' : '#B3261E',
        }}>{msg.text}</div>}

        <button onClick={submit} disabled={busy || !email || !password} style={{
          width: '100%', padding: '11px 0', border: 'none',
          background: '#0A0A0A', color: '#fff', borderRadius: 10,
          fontSize: 14, fontWeight: 600, cursor: busy ? 'default' : 'pointer',
          opacity: busy || !email || !password ? 0.5 : 1,
        }}>{busy ? '…' : (mode === 'signup' ? 'Create account' : 'Sign in')}</button>

        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 14, fontSize: 13 }}>
          <button onClick={() => { setMode(mode === 'signin' ? 'signup' : 'signin'); setMsg(null); }}
            style={{ border: 'none', background: 'none', color: '#0A0A0A', cursor: 'pointer', padding: 0, textDecoration: 'underline' }}>
            {mode === 'signin' ? 'Create account' : 'Have an account? Sign in'}
          </button>
          {mode === 'signin' && (
            <button onClick={reset}
              style={{ border: 'none', background: 'none', color: '#5C5C58', cursor: 'pointer', padding: 0 }}>
              Forgot password?
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

const { useState: useStateApp } = React;

function HistorySheet({ theme, session, log, setLog, onClose }) {
  const [entries, setEntries] = React.useState(null); // [{ id, date, meal, food_id, qty, food: {...} }]
  const [error, setError] = React.useState(null);
  const [selected, setSelected] = React.useState(new Set());
  const [targetDate, setTargetDate] = React.useState(todayLocalIso());
  const [busy, setBusy] = React.useState(false);

  React.useEffect(() => {
    (async () => {
      try {
        const sb = window.sb;
        const uid = (await sb.auth.getUser()).data?.user?.id;
        if (!uid) throw new Error('Not signed in');
        const [logsR, foodsR] = await Promise.all([
          sb.from('meal_logs').select('*').eq('user_id', uid).order('date', { ascending: false }).limit(200),
          sb.from('foods').select('*').eq('user_id', uid),
        ]);
        if (logsR.error) throw logsR.error;
        if (foodsR.error) throw foodsR.error;
        const foodMap = {};
        (foodsR.data || []).forEach(f => { foodMap[f.id] = f; });
        const list = (logsR.data || []).map(l => ({
          ...l, food: foodMap[l.food_id] || { name: '(deleted)', kcal: 0 }
        }));
        setEntries(list);
      } catch (e) { setError(e.message); }
    })();
  }, []);

  const toggle = (id) => {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelected(next);
  };

  const doCopy = async () => {
    if (!selected.size) return;
    setBusy(true);
    try {
      const sb = window.sb;
      const uid = (await sb.auth.getUser()).data?.user?.id;
      const picked = entries.filter(e => selected.has(e.id));
      const newRows = picked.map((e, i) => ({
        id: 'l_copy_' + Date.now() + '_' + i,
        user_id: uid, date: targetDate,
        meal: e.meal, food_id: e.food_id,
        qty: e.qty, time: e.time || null,
      }));
      if (newRows.length) {
        const r = await sb.from('meal_logs').insert(newRows);
        if (r.error) throw r.error;
        // Add to local log if any are for today (HomeScreen filters by selectedDate)
        setLog(prev => [...prev, ...newRows.map(r => ({
          id: r.id, foodId: r.food_id, qty: +r.qty || 1, meal: r.meal, time: r.time, date: r.date,
        }))]);
        window.showToast && window.showToast(`Copied ${newRows.length} item${newRows.length === 1 ? '' : 's'} to ${targetDate}`);
      }
      onClose();
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  const doMove = async () => {
    if (!selected.size) return;
    setBusy(true);
    try {
      const sb = window.sb;
      const ids = [...selected];
      const r = await sb.from('meal_logs').update({ date: targetDate }).in('id', ids);
      if (r.error) throw r.error;
      // Update local log
      setLog(prev => prev.map(l => ids.includes(l.id) ? { ...l, date: targetDate } : l));
      window.showToast && window.showToast(`Moved ${ids.length} item${ids.length === 1 ? '' : 's'} to ${targetDate}`);
      onClose();
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  // Group entries by date
  const grouped = {};
  (entries || []).forEach(e => { (grouped[e.date] = grouped[e.date] || []).push(e); });

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '92vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
              color: theme.ink, letterSpacing: theme.letter,
            }}>From history</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>{selected.size} selected</div>
          </div>
          <button onClick={onClose} style={{
            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
          }}>×</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '12px 0' }}>
          {error && <div style={{
            margin: '0 16px', padding: '10px 12px', borderRadius: 8,
            background: '#FDECEA', color: '#B3261E', fontSize: 13,
          }}>{error}</div>}
          {!entries && !error && <div style={{
            padding: 24, textAlign: 'center', fontFamily: theme.font, fontSize: 13, color: theme.inkMute,
          }}>Loading…</div>}
          {entries && entries.length === 0 && <div style={{
            padding: 24, textAlign: 'center', fontFamily: theme.font, fontSize: 13, color: theme.inkMute,
          }}>No history yet.</div>}

function ExerciseLogSheet({ theme, onClose, session, onSave, customTypes = [], onAddCustomType, date, isRestDay = false, onToggleRestDay }) {
  const DEFAULT_TYPES = [
    { k: 'Run',           met: 9.8,  icon: '🏃' },
    { k: 'Cycling',       met: 7.5,  icon: '🚴' },
    { k: 'Walk',          met: 3.8,  icon: '🚶' },
    { k: 'Strength',      met: 5.0,  icon: '🏋️' },
    { k: 'Calisthenics',  met: 6.0,  icon: '🤸' },
    { k: 'HIIT',          met: 8.0,  icon: '🔥' },
    { k: 'Mobility',      met: 2.5,  icon: '🧘' },
    { k: 'Other',         met: 5.0,  icon: '⚡' },
  ];
  const TYPES = [
    ...DEFAULT_TYPES,
    ...customTypes.map(c => ({ k: c.name, met: +c.met || 5.0, icon: c.icon || '⚡' })),
  ];
  const [showNewType, setShowNewType] = React.useState(false);
  const [mode, setMode] = React.useState('manual'); // 'manual' | 'ai'
  const [type, setType] = React.useState('Run');
  const [runSubtype, setRunSubtype] = React.useState(null);
  const [duration, setDuration] = React.useState('');
  const [distance, setDistance] = React.useState('');
  const [kcal, setKcal] = React.useState('');
  const [notes, setNotes] = React.useState('');
  const [aiText, setAiText] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const weightKg = 75; // default for kcal estimate; refine later with real profile weight

  // Auto-estimate kcal when type/duration change (kcal = MET * weight * hours)
  React.useEffect(() => {
    const t = TYPES.find(x => x.k === type);
    const d = parseFloat(duration);
    if (t && d > 0) {
      const est = Math.round(t.met * weightKg * (d / 60));
      setKcal(String(est));
    }
  }, [type, duration]);

  const today = date || todayLocalIso();

  const saveManual = async () => {
    if (!duration && !kcal) { setError('Enter at least duration or calories.'); return; }
    const entry = {
      id: 'ex_' + Date.now(), date: today, type,
      duration: parseFloat(duration) || null,
      distance: parseFloat(distance) || null,
      kcal: parseFloat(kcal) || null,
      notes: notes.trim() || '',
      details: type === 'Run' && runSubtype ? { runType: runSubtype } : null,
    };
    onSave(entry);
    onClose();
  };

  const parseWithAI = async () => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) { setError('Set your Anthropic API key in Profile → Settings first.'); return; }
    if (!aiText.trim()) { setError('Describe the workout first.'); return; }
    setBusy(true); setError(null);
    const prompt = `Parse this workout into structured JSON. Return ONLY JSON (no prose, no markdown):
{
  "entries": [
    {
      "type": "Run|Cycling|Walk|Strength|Calisthenics|HIIT|Mobility|Other",
      "duration_min": 0,
      "distance_km": 0,
      "kcal": 0,
      "notes": "",

- details:
  - For Run, include {"runType":"Easy|Long|Speed|Steady"} when the description suggests one (e.g. "easy pace"/"recovery"→Easy, "long run"/"LSD"→Long, "intervals"/"tempo"/"sprint"/"speed"→Speed, "steady"/"moderate"→Steady). Omit runType if unclear.
  - For Strength, {"sets":[{"name":"","reps":0,"weight_kg":0}, ...]}.
  - For Calisthenics, {"movements":[{"name":"","reps":0}, ...]}.
  - Otherwise omit details.

Workout: ${aiText.trim()}`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }],

      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const textBlock = (j.content || []).find(b => b.type === 'text');
