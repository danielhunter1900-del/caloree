// First-run onboarding. Collects the profile fields we need to give
// honest macro estimates (name, sex, age, height, weight, activity,
// goal) and seeds the user's targets + first weight entry.
//
// Uses Mifflin-St Jeor for BMR and a standard activity multiplier
// for TDEE, then a goal delta (-18% / 0 / +12%). Protein scales
// with bodyweight, fat is 25% of kcal (min 0.6 g/kg), carbs are
// the remainder.
function OnboardingSheet({ theme, onComplete }) {
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState(() => localStorage.getItem('cal_display_name') || '');
  const [sex, setSex] = React.useState('male'); // 'male' | 'female'
  const [age, setAge] = React.useState('');
  const [heightCm, setHeightCm] = React.useState('');
  const [weightKg, setWeightKg] = React.useState('');
  const [activity, setActivity] = React.useState('moderate');
  const [goal, setGoal] = React.useState('maintain');

  const ACTIVITY = {
    sedentary:   { k: 'sedentary',   label: 'Sedentary',   hint: 'Desk job, little movement',           mult: 1.20 },
    light:       { k: 'light',       label: 'Light',       hint: '1–3 sessions / week',                 mult: 1.375 },
    moderate:    { k: 'moderate',    label: 'Moderate',    hint: '3–5 sessions / week',                 mult: 1.55 },
    active:      { k: 'active',      label: 'Active',      hint: '6–7 sessions / week',                 mult: 1.725 },
    very_active: { k: 'very_active', label: 'Very active', hint: 'Twice-a-day training or manual job',  mult: 1.90 },
  };
  const GOALS = {
    cut:      { k: 'cut',      label: 'Lose weight', hint: '~0.3–0.6 kg/week deficit',          delta: 0.82 },
    maintain: { k: 'maintain', label: 'Maintain',    hint: 'Hold current weight',               delta: 1.00 },
    gain:     { k: 'gain',     label: 'Gain weight', hint: 'Add lean mass, modest surplus',     delta: 1.12 },
  };

  const computed = React.useMemo(() => {
    const kg = +weightKg; const cm = +heightCm; const a = +age;
    if (!kg || !cm || !a) return null;
    const bmr = sex === 'male'
      ? 10 * kg + 6.25 * cm - 5 * a + 5
      : 10 * kg + 6.25 * cm - 5 * a - 161;
    const tdee = bmr * (ACTIVITY[activity]?.mult || 1.55);
    const goalKcal = tdee * (GOALS[goal]?.delta || 1);
    const kcal = Math.round(goalKcal / 50) * 50;
    const proteinPerKg = goal === 'cut' ? 2.0 : goal === 'gain' ? 1.8 : 1.6;
    const p = Math.round((kg * proteinPerKg) / 5) * 5;
    const fatKcal = kcal * 0.25;
    const f = Math.max(Math.round(kg * 0.6 / 5) * 5, Math.round(fatKcal / 9 / 5) * 5);
    const remaining = kcal - (p * 4) - (f * 9);
    const c = Math.max(0, Math.round((remaining / 4) / 5) * 5);
    return {
      bmr: Math.round(bmr), tdee: Math.round(tdee),
      kcal, c, p, f,
      satFat: Math.max(15, Math.round(f * 0.35 / 5) * 5),
      sugar:  50,
      fibre:  Math.max(25, Math.round(kcal / 1000 * 14 / 5) * 5),
      exKcal: goal === 'gain' ? 300 : 400,
      exMin:  30,
    };
  }, [weightKg, heightCm, age, sex, activity, goal]);

  const steps = [
    {
      title: 'Welcome to Caloree',
      subtitle: 'A 60-second setup so the app can give you real numbers, not generic ones.',
      content: null,
      canNext: true,
    },
    {
      title: "What should we call you?",
      subtitle: 'Shown at the top of the Home screen.',
      content: (
        <input value={name} onChange={(e) => setName(e.target.value)}
          placeholder="Your name" autoFocus
          style={fieldStyle(theme)}/>
      ),
      canNext: name.trim().length > 0,
    },
    {
      title: 'About you',
      subtitle: "Needed for calorie estimates. Won't be shown anywhere.",
      content: (
        <React.Fragment>
          <div style={{
            fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            color: theme.inkMute, letterSpacing: '0.1em', marginBottom: 6,
          }}>SEX</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['male','female'].map(s => (
              <button key={s} onClick={() => setSex(s)} style={{
                flex: 1, padding: '10px 0', borderRadius: theme.radius.btn,
                border: `1px solid ${sex === s ? theme.ink : theme.line}`,
                background: sex === s ? theme.ink : 'transparent',
                color: sex === s ? theme.bg : theme.inkSoft,
                fontFamily: theme.font, fontSize: 13, fontWeight: sex === s ? 700 : 500,
                cursor: 'pointer', textTransform: 'capitalize',
              }}>{s}</button>
            ))}
          </div>
          <Field label="Age" theme={theme}>
            <input type="number" inputMode="numeric" value={age}
              onChange={(e) => setAge(e.target.value)} placeholder="e.g. 27"
              style={fieldStyle(theme)}/>
          </Field>
        </React.Fragment>
      ),
      canNext: sex && +age > 0 && +age < 120,
    },
    {
      title: 'Height',
      subtitle: 'In centimetres.',
      content: (
        <input type="number" inputMode="numeric" value={heightCm}
          onChange={(e) => setHeightCm(e.target.value)} placeholder="e.g. 178"
          autoFocus
          style={fieldStyle(theme)}/>
      ),
      canNext: +heightCm > 80 && +heightCm < 260,
    },
    {
      title: 'Current weight',
      subtitle: "We'll log this as your first weigh-in too.",
      content: (
        <input type="number" inputMode="decimal" value={weightKg}
          onChange={(e) => setWeightKg(e.target.value)} placeholder="e.g. 72.5"
          autoFocus step="0.1"
          style={fieldStyle(theme)}/>
      ),
      canNext: +weightKg > 25 && +weightKg < 400,
    },
    {
      title: 'How active are you?',
      subtitle: 'Counts job + exercise combined.',
      content: (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {Object.values(ACTIVITY).map(a => (
            <button key={a.k} onClick={() => setActivity(a.k)} style={{
              padding: '12px 14px', borderRadius: theme.radius.btn,
              border: `1.5px solid ${activity === a.k ? theme.ink : theme.line}`,
              background: activity === a.k ? theme.surfaceAlt : 'transparent',
              cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{ fontFamily: theme.font, fontSize: 14, fontWeight: 600, color: theme.ink }}>
                {a.label}
              </div>
              <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2 }}>
                {a.hint} · ×{a.mult} TDEE
              </div>
            </button>
          ))}
        </div>
      ),
      canNext: !!activity,
    },
    {
      title: "What's your goal?",
      subtitle: 'Determines the calorie and protein targets.',
      content: (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {Object.values(GOALS).map(g => (
            <button key={g.k} onClick={() => setGoal(g.k)} style={{
              padding: '12px 14px', borderRadius: theme.radius.btn,
              border: `1.5px solid ${goal === g.k ? theme.ink : theme.line}`,
              background: goal === g.k ? theme.surfaceAlt : 'transparent',
              cursor: 'pointer', textAlign: 'left',
            }}>
              <div style={{ fontFamily: theme.font, fontSize: 14, fontWeight: 600, color: theme.ink }}>
                {g.label}
              </div>
              <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2 }}>
                {g.hint}
              </div>
            </button>
          ))}
        </div>
      ),
      canNext: !!goal,
    },
    {
      title: 'Your plan',
      subtitle: computed ? `${ACTIVITY[activity]?.label} × ${GOALS[goal]?.label.toLowerCase()} · maintenance ~${computed.tdee} kcal` : '',
      content: computed ? (
        <div style={{
          background: theme.surfaceAlt, borderRadius: theme.radius.card,
          padding: '14px 14px', display: 'grid',
          gridTemplateColumns: '1fr 1fr', gap: '10px 12px',
        }}>
          {[
            ['Calories',  `${computed.kcal}`],
            ['Protein',   `${computed.p} g`],
            ['Carbs',     `${computed.c} g`],
            ['Fat',       `${computed.f} g`],
            ['Sat fat',   `${computed.satFat} g`],
            ['Sugar',     `${computed.sugar} g`],
            ['Fibre',     `${computed.fibre} g`],
            ['Exercise',  `${computed.exMin} min`],
          ].map(([k, v]) => (
            <div key={k}>
              <div style={{
                fontFamily: theme.font, fontSize: 10, fontWeight: 600,
                color: theme.inkMute, letterSpacing: '0.08em', textTransform: 'uppercase',
              }}>{k}</div>
              <div style={{
                fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
                color: theme.ink, marginTop: 2,
              }}>{v}</div>
            </div>
          ))}
        </div>
      ) : null,
      canNext: !!computed,
    },
  ];

  const cur = steps[step];
  const last = step === steps.length - 1;

  const finish = () => {
    if (!computed) return;
    const profile = {
      name: name.trim(),
      sex, age: +age, heightCm: +heightCm, weightKg: +weightKg,
      activity, goal,
      onboardedAt: new Date().toISOString(),
    };
    const targets = {
      kcal: computed.kcal, c: computed.c, p: computed.p, f: computed.f,
      satFat: computed.satFat, sugar: computed.sugar, fibre: computed.fibre,
      exKcal: computed.exKcal, exMin: computed.exMin,
    };
    localStorage.setItem('cal_display_name', profile.name);
    onComplete({ profile, targets, firstWeightKg: +weightKg });
  };

  return ReactDOM.createPortal(
    <div style={{
      position: 'fixed', inset: 0, zIndex: 10050,
      background: theme.bg,
      display: 'flex', flexDirection: 'column',
      padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 20px calc(env(safe-area-inset-bottom, 0px) + 20px)',
    }}>
      {/* Progress dots */}
      <div style={{
        display: 'flex', gap: 4, marginBottom: 24, paddingTop: 6, flexShrink: 0,
      }}>
        {steps.map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 2,
            background: i <= step ? theme.ink : theme.line,
            transition: 'background 0.2s',
          }}/>
        ))}
      </div>

      {/* Title */}
      <div style={{
        fontFamily: theme.titleFont,
        fontSize: 26, fontWeight: theme.titleWeight,
        color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.15,
      }}>{cur.title}</div>
      {cur.subtitle && (
        <div style={{
          fontFamily: theme.font, fontSize: 13, color: theme.inkSoft,
          marginTop: 6, marginBottom: 24, lineHeight: 1.4,
        }}>{cur.subtitle}</div>
      )}

      {/* Step body */}
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {cur.content}
      </div>

      {/* Nav */}
      <div style={{ display: 'flex', gap: 8, marginTop: 16, flexShrink: 0 }}>
        {step > 0 && (
          <button onClick={() => setStep(s => s - 1)} style={{
            padding: '14px 18px', border: `1px solid ${theme.line}`,
            background: 'transparent', color: theme.inkSoft,
            borderRadius: theme.radius.btn, fontFamily: theme.font,
            fontSize: 14, fontWeight: 600, cursor: 'pointer',
          }}>Back</button>
        )}
        <button onClick={() => last ? finish() : setStep(s => s + 1)}
          disabled={!cur.canNext} style={{
            flex: 1, padding: '14px 0', border: 'none',
            background: cur.canNext ? theme.accent : theme.surfaceAlt,
            color: cur.canNext ? theme.accentInk : theme.inkMute,
            borderRadius: theme.radius.btn, fontFamily: theme.font,
            fontSize: 15, fontWeight: 700, cursor: cur.canNext ? 'pointer' : 'default',
            letterSpacing: theme.letter,
          }}>{last ? 'Start using Caloree' : (step === 0 ? "Let's go" : 'Next')}</button>
      </div>
    </div>,
    document.body
  );
}

function PasteFromClaudeSheet({ theme, onClose, session, onDone }) {
  const [text, setText] = React.useState('');
  const [parsed, setParsed] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [copied, setCopied] = React.useState(false);

  const today = todayLocalIso();
  const prompt = `Parse my meal notes into JSON. Return ONLY this JSON (no prose, no markdown, no code fences):
{
  "days": [
    {
      "date": "YYYY-MM-DD",
      "meals": [
        {
          "meal": "Breakfast" | "Lunch" | "Dinner" | "Snack",
          "items": [
            { "name": "", "brand": "", "kcal": 0, "c": 0, "p": 0, "f": 0, "satFat": 0, "sugar": 0, "fibre": 0, "g": 0 }
          ]
        }
      ]
    }
  ],
  "note": "one sentence"
}

Rules:
- All macros are per-item totals. c/p/f/satFat/sugar/fibre are grams. g = total grams. kcal = calories.
- Resolve dates to YYYY-MM-DD. If not specified, use ${today}.
- Never omit satFat/sugar/fibre — estimate conservatively.
- Keep names concise.

My meal(s):
`;

  const copyPrompt = async () => {
    try {
      await navigator.clipboard.writeText(prompt);
      setCopied(true); setTimeout(() => setCopied(false), 1500);
    } catch {
      setError('Copy failed — select the prompt manually.');
    }
  };

  const tryParse = (v) => {
    setText(v);
    if (!v.trim()) { setParsed(null); setError(null); return; }
    try {
      const clean = v.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      const p = JSON.parse(clean);
      let days;
      if (p.days && Array.isArray(p.days)) days = p.days;
      else if (p.meals && Array.isArray(p.meals)) days = [{ date: today, meals: p.meals }];
      else if (p.items && Array.isArray(p.items)) days = [{ date: today, meals: [{ meal: p.meal || 'Snack', items: p.items }] }];
      else throw new Error('expected days[], meals[], or items[]');
      setParsed({ days });
      setError(null);
    } catch (e) { setParsed(null); setError(e.message); }
  };

  const commit = async () => {
    if (!parsed || !session) return;
    setBusy(true);
    const uid = session.user.id;
    const sb = window.sb;
    const foodRows = [];
    const logRows = [];
    parsed.days.forEach((day, di) => {
      (day.meals || []).forEach((g, gi) => {
        (g.items || []).forEach((it, i) => {
          const id = 'ai_' + Date.now() + '_' + di + '_' + gi + '_' + i;
          foodRows.push({
            id, user_id: uid,
            name: it.name || 'Item', brand: it.brand || 'Claude',
            serving_g: it.g || 100,
            kcal: it.kcal || 0, c: it.c || 0, p: it.p || 0, f: it.f || 0,
            sat_fat: it.satFat ?? null, sugar: it.sugar ?? null, fibre: it.fibre ?? null,
          });
          logRows.push({
            id: 'l_' + id, user_id: uid, date: day.date,
            meal: g.meal || 'Snack', food_id: id, qty: 1, time: null,
          });
          FOODS.push({
            id, name: it.name || 'Item', brand: it.brand || 'Claude',
            servingG: it.g || 100,
            kcal: it.kcal || 0, c: it.c || 0, p: it.p || 0, f: it.f || 0,
            satFat: it.satFat, sugar: it.sugar, fibre: it.fibre,
            photo: null,
          });
        });
      });
    });
    try {
      if (foodRows.length) {
        const r = await sb.from('foods').upsert(foodRows, { onConflict: 'id' });
        if (r.error) throw r.error;
      }
      if (logRows.length) {
        const r = await sb.from('meal_logs').insert(logRows);
        if (r.error) throw r.error;
      }
      onDone && onDone(parsed.days, logRows);
      onClose();
    } catch (e) { setError(e.message || 'Failed to save.'); }
    setBusy(false);
  };

  const totalItems = parsed ? parsed.days.reduce((s, d) =>
    s + (d.meals || []).reduce((ss, g) => ss + (g.items || []).length, 0), 0) : 0;

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '92vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
              color: theme.ink, letterSpacing: theme.letter,
            }}>From Claude app</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>Use claude.ai directly — no API cost</div>
          </div>
          <button onClick={onClose} style={{
            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
          }}>×</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
          {/* Step 1 */}
          <div style={{
            background: theme.surface, borderRadius: theme.radius.card,
            padding: '14px 16px', marginBottom: 12,
            border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
              marginBottom: 8,
            }}>Step 1 · Copy prompt</div>
            <div style={{
              fontFamily: theme.font, fontSize: 13, color: theme.ink, marginBottom: 10, lineHeight: 1.5,
            }}>
              Tap to copy the prompt. Open <b>claude.ai</b>, paste, then describe your meal(s).
              Copy the JSON reply and paste below.
            </div>
            <button onClick={copyPrompt} style={{
              padding: '9px 14px', border: `1px solid ${theme.line}`,
              background: copied ? '#E8F5E9' : theme.surfaceAlt,
              color: copied ? '#1C5A3F' : theme.ink, cursor: 'pointer',
              borderRadius: theme.radius.chip,
              fontFamily: theme.font, fontSize: 13, fontWeight: 600,
            }}>{copied ? '✓ Copied' : 'Copy prompt template'}</button>
          </div>

          {/* Step 2 */}
          <div style={{
            background: theme.surface, borderRadius: theme.radius.card,
            padding: '8px', marginBottom: 12,
            border: `1px solid ${error ? '#E74C3C' : (parsed ? theme.accent : theme.line)}`,
            transition: 'border 0.2s',
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
              padding: '6px 10px 4px',
            }}>Step 2 · Paste JSON reply</div>
            <textarea value={text} onChange={(e) => tryParse(e.target.value)}
              placeholder='{ "days": [ ... ] }' rows={8}
              style={{
                width: '100%', border: 'none', outline: 'none', background: 'transparent',
                resize: 'vertical', padding: '8px 10px',
                fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
                fontSize: 12, color: theme.ink, lineHeight: 1.5,
              }}/>
          </div>

          {error && (
            <div style={{
              padding: '10px 14px', borderRadius: theme.radius.chip,
              background: '#FDECEA', color: '#B3261E', fontSize: 13, marginBottom: 12,
              fontFamily: theme.font,
            }}>Invalid JSON: {error}</div>
          )}

          {parsed && (
            <div>
              <div style={{
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 10,
              }}>Parsed: {parsed.days.length} day{parsed.days.length === 1 ? '' : 's'}, {totalItems} item{totalItems === 1 ? '' : 's'}</div>
              {parsed.days.map((d, i) => (
                <div key={i} style={{
                  background: theme.surface, borderRadius: theme.radius.card,
                  border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
                  padding: '12px 14px', marginBottom: 10,
                }}>
                  <div style={{
                    fontFamily: theme.numFont, fontSize: 13, fontWeight: 600,
                    color: theme.ink, marginBottom: 8,
                  }}>{d.date}</div>
                  {(d.meals || []).map((g, gi) => (
                    <div key={gi} style={{ marginBottom: 6 }}>
                      <div style={{
                        fontFamily: theme.font, fontSize: 10, fontWeight: 700,
                        color: theme.accent, letterSpacing: '0.08em', textTransform: 'uppercase',
                      }}>{g.meal}</div>
                      {g.items.map((it, ii) => (
                        <div key={ii} style={{
                          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
                          padding: '4px 0', borderBottom: ii < g.items.length - 1 ? `0.5px dashed ${theme.line}` : 'none',
                        }}>
                          <span style={{ fontFamily: theme.font, fontSize: 13, color: theme.ink }}>{it.name}</span>
                          <span style={{ fontFamily: theme.numFont, fontSize: 11, color: theme.inkSoft }}>
                            {Math.round(it.kcal||0)} · C{Math.round(it.c||0)} P{Math.round(it.p||0)} F{Math.round(it.f||0)}
                          </span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{
          padding: '10px 16px 16px', borderTop: `1px solid ${theme.line}`,
          background: theme.surface, display: 'flex', gap: 8,
        }}>
          <button onClick={onClose} style={{
            padding: '12px 18px', border: `1px solid ${theme.line}`,
            background: 'transparent', color: theme.inkSoft,
            borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Cancel</button>
          <button onClick={commit} disabled={!parsed || busy} style={{
            flex: 1, padding: '12px 0', border: 'none',
            background: parsed && !busy ? theme.accent : theme.surfaceAlt,
            color: theme.accentInk, borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 14, fontWeight: 600,
            cursor: parsed && !busy ? 'pointer' : 'default',
          }}>{busy ? 'Saving…' : parsed ? `Log ${totalItems} items` : 'Paste JSON to continue'}</button>
        </div>
      </div>
    </div>
  );
}

function BulkNotesSheet({ theme, onClose, session, onDone }) {
  const [text, setText] = React.useState(() => localStorage.getItem('cal_bulk_draft') || '');
  const [busy, setBusy] = React.useState(false);
  const [preview, setPreview] = React.useState(null); // { days: [{ date, meals: [...] }] }
  const [error, setError] = React.useState(null);
  const [savedNote, setSavedNote] = React.useState(null);
  const [photos, setPhotos] = React.useState([]); // [{ dataUrl, mediaType }]
  const fileRef = React.useRef(null);

  const onPickPhotos = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1024;
          const scale = Math.min(1, MAX / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
          setPhotos(prev => [...prev, { dataUrl, mediaType: 'image/jpeg' }]);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(f);
    });
    e.target.value = ''; // allow picking same file again
  };

  // Auto-save draft as user types
  React.useEffect(() => {
    const id = setTimeout(() => {
      if (text) localStorage.setItem('cal_bulk_draft', text);
      else localStorage.removeItem('cal_bulk_draft');

    return () => clearTimeout(id);
  }, [text]);

  const saveAndClose = () => {

  const example = `19/04/26

Lunch: chicken caesar salad

Dinner: salmon, rice, broccoli

20/04/26
Breakfast: overnight oats with berries
Lunch: turkey sandwich
Dinner: pasta bolognese, glass of red wine`;

  const parseNotes = async () => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) { setError('Set your Anthropic API key in Profile → Settings first.'); return; }
    if (!text.trim() && photos.length === 0) { setError('Add notes or photos first.'); return; }
    setBusy(true); setError(null);
    const prompt = `Parse these meal notes into JSON. The user writes one date per section (formats: DD/MM/YY, YYYY-MM-DD, "April 19", "Sat", etc). Below each date, meals are described freeform.

Return ONLY this JSON (no prose, no markdown, no code fences):
{
  "days": [
    {
      "date": "YYYY-MM-DD",
      "meals": [
        {
          "meal": "Breakfast" | "Lunch" | "Dinner" | "Snack",
          "items": [
            { "name": "", "brand": "", "kcal": 0, "c": 0, "p": 0, "f": 0, "satFat": 0, "sugar": 0, "fibre": 0, "g": 0, "photo_index": null }
          ]
        }
      ]
    }
  ]
}

Rules:
- Resolve every date to YYYY-MM-DD. If only month/day given, assume the nearest past occurrence (today is ${new Date().toISOString().slice(0,10)}).
- Infer meal (Breakfast/Lunch/Dinner/Snack) from context. If unclear, use Snack.
- Estimate macros conservatively. Never omit satFat/sugar/fibre.
- kcal/c/p/f/satFat/sugar/fibre are per-item totals. g = total grams.
- Keep item names concise.
- COMBINE everything in one meal into ONE item (don't split a "burrito bowl" into chicken + rice + beans as separate items).
- If photos are included, they appear in the same order they were attached. Match each photo to the meal it depicts and set "photo_index" on that item to the 0-based photo number (0 for the first attached photo, 1 for second, etc). If a photo doesn't match any meal, ignore it. If a meal has no photo, leave photo_index as null.
- Use info from text + photos together to determine date/meal/contents.

Notes:
${text.trim() || '(see attached photos)'}`;
    try {
      const userContent = [];
      // Attach all photos first
      photos.forEach(p => {
        userContent.push({
          type: 'image',
          source: { type: 'base64', media_type: p.mediaType, data: p.dataUrl.split(',')[1] },
        });
      });
      userContent.push({ type: 'text', text: prompt });
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',

        body: JSON.stringify({

function GlobalToast() {
  const [toast, setToast] = React.useState(null);
  const timerRef = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => {
      const { message, undo, durationMs } = e.detail;
      if (timerRef.current) clearTimeout(timerRef.current);
      setToast({ message, undo });
      timerRef.current = setTimeout(() => setToast(null), durationMs || 5000);
    };
    window.addEventListener('caloree:toast', h);
    return () => window.removeEventListener('caloree:toast', h);
  }, []);
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 130, left: '50%', transform: 'translateX(-50%)',
      background: '#FFFFFF', color: '#1A1A1A',
      padding: '10px 10px 10px 16px', borderRadius: 22,
      display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.18)',
      border: '1px solid rgba(0,0,0,0.06)',
      zIndex: 400,
      fontFamily: '-apple-system, system-ui', fontSize: 14, fontWeight: 500,
      maxWidth: 'calc(100vw - 32px)',
    }}>
      <span>{toast.message}</span>
      {toast.undo && (
        <button onClick={() => {
          try { toast.undo(); } catch (e) { console.warn(e); }
          if (timerRef.current) clearTimeout(timerRef.current);
          setToast(null);
        }} style={{
          background: '#1A1A1A', border: 'none', color: '#FFFFFF',
          cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
          padding: '6px 12px', borderRadius: 14,
        }}>Undo</button>
      )}
      <button onClick={() => setToast(null)} style={{
        background: 'transparent', border: 'none', color: '#999',
        cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '2px 4px',
      }}>×</button>
    </div>
  );
}

function App({ session }) {
  const [themeKey, setThemeKey] = useStateApp(() =>
    localStorage.getItem('cal_theme') || 'clinical'
  );
  // Always start on Today after a login (don't restore last tab)
  const [tab, setTab] = useStateApp('home');
  // Rehydrate synthetic AI-added foods into FOODS before restoring log
  const [log, setLog] = useStateApp(() => {
    try {
      const foods = JSON.parse(localStorage.getItem('cal_ai_foods') || '[]');
      foods.forEach(f => { if (!FOODS.some(x => x.id === f.id)) FOODS.push(f); });
      // Apply locally saved favourites to FOODS
      const favIds = new Set(JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]'));
      FOODS.forEach(f => { if (favIds.has(f.id)) f.isFavourite = true; });
      const saved = JSON.parse(localStorage.getItem('cal_log'));
      if (saved) return saved;
    } catch {}
    return TODAY_LOG;
  });
  const [logScreenMeal, setLogScreenMeal] = useStateApp(null);
  const [detailFood, setDetailFood] = useStateApp(null);

  const [targets, setTargetsRaw] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_targets')) || DEFAULT_TARGETS; }
    catch { return DEFAULT_TARGETS; }
  });
  const [targetHistory, setTargetHistory] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_target_history')) || []; }
    catch { return []; }
  });
  // Wrap setTargets so any change snapshots the new targets into history with today's from_date.
  // Callers may attach `_why` on the incoming object to annotate the history entry; it's stripped
  // before storing as the current targets.
  const setTargets = (next) => {
    const why = next && next._why ? String(next._why) : null;
    const clean = { ...next };
    delete clean._why;
    setTargetsRaw(clean);
    const today = todayLocalIso();
    setTargetHistory(prev => {
      const filtered = (prev || []).filter(h => h.from_date !== today);
      const entry = { from_date: today, targets: clean };
      if (why) entry.why = why;
      return [...filtered, entry];
    });
  };
  // Helper: targets that were active on `date`
  const targetsForDate = (date) => {
    const sorted = [...(targetHistory || [])]
      .filter(h => h.from_date && h.targets)
      .sort((a, b) => a.from_date.localeCompare(b.from_date));
    let best = null;
    for (const h of sorted) {
      if (h.from_date <= date) best = h.targets;
    }
    return best || targets;
  };
  const [weightLog, setWeightLog] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_weight')) || DEFAULT_WEIGHT; }
    catch { return DEFAULT_WEIGHT; }
  });
  const [settings, setSettings] = useStateApp(() => {
    try {
      return JSON.parse(localStorage.getItem('cal_settings')) || {
        reminders: true, haptics: true, quickAdd: true, weeklySummary: false,
        customExerciseTypes: [],
      };
    } catch {
      return { reminders: true, haptics: true, quickAdd: true, weeklySummary: false, customExerciseTypes: [] };
    }
  });

  const [exerciseLog, setExerciseLog] = useStateApp(() => {
    try { return JSON.parse(localStorage.getItem('cal_exercise') || '[]'); } catch { return []; }
  });
  // Wellness map keyed by ISO date — each date has its own slot
  const [wellnessMap, setWellnessMap] = useStateApp(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('cal_wellness_map'));
      if (saved && typeof saved === 'object' && !Array.isArray(saved)) return saved;
      // Migrate from old single-object format if present
      const old = JSON.parse(localStorage.getItem('cal_wellness') || 'null');
      if (old && typeof old === 'object') {
        const today = todayLocalIso();
        return { [today]: old };
      }
    } catch {}
    return {};
  });
  const wellnessDefaults = { coffees: 0, sleepHrs: 0, stress: 0, water: 0, energy: 0, readingMin: 0, rehab: false, mobility: {}, restDay: false };
  const wellness = (date) => wellnessMap[date] || { ...wellnessDefaults };
  const setWellness = (date, patch) => {
    setWellnessMap(prev => ({
      ...prev,
      [date]: { ...wellnessDefaults, ...(prev[date] || {}), ...patch },
    }));
  };

  const theme = THEMES[themeKey];

  // Cloud sync: pull on login, push on every change.
  const hydratingRef = React.useRef(true);
  React.useEffect(() => {
    if (!session) return;
    (async () => {
      const uid = session.user.id;
      const sb = window.sb;
      const [logsR, foodsR, profileR, weightR, wellnessR, exerciseR] = await Promise.all([
        sb.from('meal_logs').select('*').eq('user_id', uid),
        sb.from('foods').select('*').eq('user_id', uid),
        sb.from('profiles').select('*').eq('user_id', uid).maybeSingle(),
        sb.from('weight_logs').select('*').eq('user_id', uid).order('iso'),
        sb.from('wellness_logs').select('*').eq('user_id', uid).order('date', { ascending: false }).limit(1),
        sb.from('exercise_logs').select('*').eq('user_id', uid).order('date', { ascending: false }),
      ]);
      // Batch-sign photo URLs for foods with photo_path
      const photoPaths = (foodsR.data || [])
        .map(f => f.photo_path).filter(Boolean);
      let pathToUrl = {};
      if (photoPaths.length) {
        const { data: signed } = await sb.storage.from('meal-photos')
          .createSignedUrls(photoPaths, 3600);
        (signed || []).forEach(s => {
          if (s.path && s.signedUrl) pathToUrl[s.path] = s.signedUrl;
        });
      }
      (foodsR.data || []).forEach(f => {
        const existing = FOODS.findIndex(x => x.id === f.id);
        const rec = {
          id: f.id, name: f.name, brand: f.brand, servingG: +f.serving_g,
          kcal: +f.kcal, c: +f.c, p: +f.p, f: +f.f,
          satFat: f.sat_fat != null ? +f.sat_fat : undefined,
          sugar: f.sugar != null ? +f.sugar : undefined,
          fibre: f.fibre != null ? +f.fibre : undefined,
          photoPath: f.photo_path || null,
          photo: f.photo_path ? (pathToUrl[f.photo_path] || null) : null,
          isFavourite: !!f.is_favourite,
          ingredients: f.ingredients || null,
        };
        if (existing === -1) FOODS.push(rec);
        else FOODS[existing] = { ...FOODS[existing], ...rec };
      });
      if (logsR.data) {
        setLog(logsR.data.map(l => ({
          id: l.id, foodId: l.food_id, qty: +l.qty, meal: l.meal, time: l.time,
          date: l.date,
        })));
      }
      if (profileR.data) {
        if (profileR.data.targets) setTargetsRaw(profileR.data.targets);
        if (profileR.data.settings) setSettings(profileR.data.settings);
        if (profileR.data.theme) setThemeKey(profileR.data.theme);
        if (Array.isArray(profileR.data.target_history)) setTargetHistory(profileR.data.target_history);
      }
      if (weightR.data) {
        // Always replace local state with cloud (even empty), so a previous
        // account's cal_weight cache can't bleed into a new session.
        setWeightLog(weightR.data.map(w => ({ iso: w.iso, kg: +w.kg })));
      }
      // (wellness map populated via allWellness query below)
      if (exerciseR.data) {
        setExerciseLog(exerciseR.data.map(r => ({
          id: r.id, date: r.date, type: r.type,
          duration: r.duration_min != null ? +r.duration_min : null,
          distance: r.distance_km != null ? +r.distance_km : null,
          kcal: r.kcal != null ? +r.kcal : null,
          notes: r.notes || '', details: r.details || null,
        })));
      }

      // Rebuild HISTORY from cloud data so Trends populates
      const allWellness = await sb.from('wellness_logs').select('*').eq('user_id', uid);
      const wellnessByDate = {};
      (allWellness.data || []).forEach(w => { wellnessByDate[w.date] = w; });
      const foodById = {};
      (foodsR.data || []).forEach(f => { foodById[f.id] = f; });
      const byDate = {};
      (logsR.data || []).forEach(l => {
        const f = foodById[l.food_id]; if (!f) return;
        const q = +l.qty || 1;
        if (!byDate[l.date]) byDate[l.date] = { kcal: 0, c: 0, p: 0, f: 0, satFat: 0, sugar: 0, fibre: 0 };
        const d = byDate[l.date];
        d.kcal += (+f.kcal || 0) * q;
        d.c += (+f.c || 0) * q;
        d.p += (+f.p || 0) * q;
        d.f += (+f.f || 0) * q;
        d.satFat += (+f.sat_fat || 0) * q;
        d.sugar  += (+f.sugar  || 0) * q;
        d.fibre  += (+f.fibre  || 0) * q;
      });
      // Combine all dates that have any signal
      const allDates = new Set([...Object.keys(byDate), ...Object.keys(wellnessByDate)]);
      HISTORY.length = 0;
      [...allDates].sort().forEach(iso => {
        const d = new Date(iso + 'T00:00:00');
        const macros = byDate[iso] || { kcal:0, c:0, p:0, f:0, satFat:0, sugar:0, fibre:0 };
        const w = wellnessByDate[iso] || {};
        HISTORY.push({
          y: d.getFullYear(), m: d.getMonth(), d: d.getDate(),
          dow: d.getDay(), iso,
          kcal: Math.round(macros.kcal),
          c: Math.round(macros.c), p: Math.round(macros.p), f: Math.round(macros.f),
          satFat: Math.round(macros.satFat),
          sugar:  Math.round(macros.sugar),
          fibre:  Math.round(macros.fibre),
          coffees: w.coffees || 0,
          water: w.water || 0,
          sleepHrs: +w.sleep_hrs || 0,
          stress: w.stress || 0,
          energy: w.energy || 0,
          readingMin: +w.reading_min || 0,
          rehab: (w.extras && w.extras.rehab) ? 1 : 0,
          mobility: (w.extras && w.extras.mobility)
            ? Object.values(w.extras.mobility).filter(Boolean).length : 0,
          restDay: (w.extras && w.extras.restDay) ? 1 : 0,
        });
      });

      // Build wellness map from cloud
      const map = {};
      (allWellness.data || []).forEach(w => {
        const extras = w.extras || {};
        map[w.date] = {
          coffees: w.coffees || 0,
          water: w.water || 0,
          sleepHrs: +w.sleep_hrs || 0,
          stress: w.stress || 0,
          energy: w.energy || 0,
          readingMin: +w.reading_min || 0,
          rehab: !!extras.rehab,
          mobility: extras.mobility || {},
          restDay: !!extras.restDay,
        };
      });
      setWellnessMap(map);

      hydratingRef.current = false;

      // If this user already has meals, exercise, weight, or custom targets,
      // they're a returning user — silently mark onboarded so we don't force
      // them through the intro. Truly empty accounts get the OnboardingSheet.
      const hasExistingData = (logsR.data && logsR.data.length > 0)
        || (exerciseR.data && exerciseR.data.length > 0)
        || (weightR.data && weightR.data.length > 0)
        || (profileR.data?.targets && profileR.data.targets.kcal && profileR.data.targets.kcal !== DEFAULT_TARGETS.kcal);
      const prevSettings = profileR.data?.settings || {};
      if (hasExistingData && !prevSettings.onboarded) {
        setSettings({ ...prevSettings, onboarded: true });
      }
    })();
  }, [session]);

  // Strava OAuth return handler. If the URL has ?code=... (Strava sends the
  // user back here after consent), hand the code to the strava-exchange
  // edge function, strip the code from the URL, and dispatch an event so
  // the Profile card re-fetches its connection state.
  React.useEffect(() => {
    if (!session) return;
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const scope = params.get('scope');
    if (!code) return;
    (async () => {
      try {
        const r = await window.sb.functions.invoke('strava-exchange', { body: { code, scope } });
        if (r.error) throw r.error;
        // Clean the URL so reloads don't re-fire this.
        const url = new URL(window.location.href);
        ['code', 'scope', 'state'].forEach(k => url.searchParams.delete(k));
        window.history.replaceState({}, '', url.pathname + (url.search ? url.search : '') + url.hash);
        window.dispatchEvent(new CustomEvent('caloree:strava-connected', { detail: r.data }));
        // Auto-kick an initial sync.
        window.sb.functions.invoke('strava-sync', { body: { full: false, weightKg: 75 } })
          .then(() => window.dispatchEvent(new CustomEvent('caloree:strava-synced')))
          .catch(() => {});
      } catch (e) {
        console.warn('strava exchange:', e.message || e);
      }
    })();
  }, [session]);

  // After a Strava sync, re-pull exercise logs so new activities show up
  // immediately without needing a full page reload.
  React.useEffect(() => {
    const refresh = async () => {
      if (!session) return;
      const r = await window.sb.from('exercise_logs').select('*').eq('user_id', session.user.id);
      if (r.data) setExerciseLog(r.data.map(x => ({
        id: x.id, date: x.date, type: x.type,
        duration: x.duration_min != null ? +x.duration_min : null,
        distance: x.distance_km != null ? +x.distance_km : null,
        kcal: x.kcal != null ? +x.kcal : null,
        notes: x.notes || '', details: x.details || null,
      })));
    };
    window.addEventListener('caloree:strava-synced', refresh);
    return () => window.removeEventListener('caloree:strava-synced', refresh);
  }, [session]);

  // Push profile (targets/settings/theme) — queued so flaky networks
  // don't drop goal changes.
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    window.sbQueue.run({
      op: 'upsert', table: 'profiles',
      rows: {
        user_id: session.user.id, targets, settings, theme: themeKey,
        target_history: targetHistory, updated_at: new Date().toISOString(),
      },
      opts: { onConflict: 'user_id' },
    }).catch(err => console.warn('profile sync:', err?.message));
  }, [targets, settings, themeKey, targetHistory, session]);

  // Push weight (queued)
  React.useEffect(() => {
    if (hydratingRef.current || !session || !weightLog.length) return;
    const rows = weightLog.map(w => ({ user_id: session.user.id, iso: w.iso, kg: w.kg }));
    window.sbQueue.run({
      op: 'upsert', table: 'weight_logs', rows,
      opts: { onConflict: 'user_id,iso' },
    }).catch(err => console.warn('weight sync:', err?.message));
  }, [weightLog, session]);

  // Push wellness map — upsert all dates that have entries (queued)
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    const rows = Object.entries(wellnessMap).map(([date, w]) => ({
      user_id: session.user.id, date,
      coffees: w.coffees || 0, water: w.water || 0,
      sleep_hrs: w.sleepHrs || 0, stress: w.stress || 0, energy: w.energy || 0,
      reading_min: w.readingMin || 0,
      extras: {
        rehab: !!w.rehab,
        mobility: w.mobility || {},
        restDay: !!w.restDay,
      },
    }));
    if (!rows.length) return;
    window.sbQueue.run({
      op: 'upsert', table: 'wellness_logs', rows,
      opts: { onConflict: 'user_id,date' },
    }).catch(err => console.warn('wellness sync:', err?.message));
  }, [wellnessMap, session]);

  // Push log + synthetic foods (queued — most data-loss-prone site)
  React.useEffect(() => {
    if (hydratingRef.current || !session) return;
    const uid = session.user.id;
    const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'));
    const foodRows = aiFoods.map(f => ({
      id: f.id, user_id: uid, name: f.name, brand: f.brand || null,
      serving_g: f.servingG || 100,
      kcal: f.kcal || 0, c: f.c || 0, p: f.p || 0, f: f.f || 0,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      photo_path: f.photoPath || null,
      is_favourite: !!f.isFavourite,
      ingredients: f.ingredients || null,
    }));
    const today = todayLocalIso();
    const logRows = log.map(l => ({
      id: l.id, user_id: uid, date: l.date || today,
      meal: l.meal, food_id: l.foodId, qty: l.qty || 1, time: l.time || null,
    }));
    (async () => {
      if (foodRows.length) {
        await window.sbQueue.run({
          op: 'upsert', table: 'foods', rows: foodRows,
          opts: { onConflict: 'id' },
        }).catch(err => console.warn('food sync:', err?.message));
      }
      // Replace only today's logs (multi-day entries are inserted directly by bulk paths)
      await window.sbQueue.run({
        op: 'delete', table: 'meal_logs',
        filters: [{ op: 'eq', col: 'user_id', val: uid }, { op: 'eq', col: 'date', val: today }],
      }).catch(err => console.warn('log delete:', err?.message));
      const todayRows = logRows.filter(r => r.date === today);
      if (todayRows.length) {
        await window.sbQueue.run({
          op: 'insert', table: 'meal_logs', rows: todayRows,
        }).catch(err => console.warn('log insert:', err?.message));
      }
    })();
  }, [log, session]);

  React.useEffect(() => {
    try {
      localStorage.setItem('cal_log', JSON.stringify(log));
      // Persist only synthetic AI foods (ids that start with 'ai_')
      const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'));
      localStorage.setItem('cal_ai_foods', JSON.stringify(aiFoods));
    } catch (e) {
      // Likely quota exceeded (photos too big). Strip photos and retry once.
      try {
        const aiFoods = FOODS.filter(f => typeof f.id === 'string' && f.id.startsWith('ai_'))
          .map(f => ({ ...f, photo: null }));
        localStorage.setItem('cal_ai_foods', JSON.stringify(aiFoods));
        localStorage.setItem('cal_log', JSON.stringify(log));
        console.warn('Photo(s) dropped from storage — localStorage quota hit.');
      } catch {}
    }
  }, [log]);
  React.useEffect(() => { localStorage.setItem('cal_theme', themeKey); }, [themeKey]);
  React.useEffect(() => { localStorage.setItem('cal_tab', tab); }, [tab]);
  React.useEffect(() => { localStorage.setItem('cal_targets', JSON.stringify(targets)); window.TARGETS = targets; }, [targets]);
  // Merge user's custom exercise types into the global color/icon/met maps
  // so every render path (picker, calendar, chart) picks them up automatically.
  React.useEffect(() => {
    applyCustomExerciseTypes(settings.customExerciseTypes || []);
  }, [settings.customExerciseTypes]);
  React.useEffect(() => { localStorage.setItem('cal_target_history', JSON.stringify(targetHistory)); }, [targetHistory]);
  React.useEffect(() => { localStorage.setItem('cal_weight', JSON.stringify(weightLog)); }, [weightLog]);
  React.useEffect(() => { localStorage.setItem('cal_settings', JSON.stringify(settings)); }, [settings]);
  React.useEffect(() => { localStorage.setItem('cal_exercise', JSON.stringify(exerciseLog)); }, [exerciseLog]);

  // Push exercise logs (id-based upsert, queued)
  React.useEffect(() => {
    if (hydratingRef.current || !session || !exerciseLog.length) return;
    const uid = session.user.id;
    const rows = exerciseLog.map(e => ({
      id: e.id, user_id: uid, date: e.date,
      type: e.type, duration_min: e.duration || null,
      distance_km: e.distance || null, kcal: e.kcal || null,
      notes: e.notes || null, details: e.details || null,
    }));
    window.sbQueue.run({
      op: 'upsert', table: 'exercise_logs', rows,
      opts: { onConflict: 'id' },
    }).catch(err => console.warn('exercise sync:', err?.message));
  }, [exerciseLog, session]);

  React.useEffect(() => {
    localStorage.setItem('cal_wellness_map', JSON.stringify(wellnessMap));
  }, [wellnessMap]);

  const openLog = (meal) => setLogScreenMeal(meal || 'Snack');
  const closeLog = () => setLogScreenMeal(null);
  const [showAddPicker, setShowAddPicker] = useStateApp(false);
  // Carries the meal section the user came from when they launch AI.
  // Cleared when the AI tab is left so a later generic entry defaults
  // back to the neutral "Snack".
  const [aiMealHint, setAiMealHint] = useStateApp(null);
  const [showBulk, setShowBulk] = useStateApp(false);
  const [showPaste, setShowPaste] = useStateApp(false);
  const [showExercise, setShowExercise] = useStateApp(false);
  // Date the user is currently focused on (drives Home view + where AI/Bulk logs land)
  const [logDate, setLogDate] = useStateApp(() => todayLocalIso());
  const openDetail = (foodId, meal, entryId) => setDetailFood({ foodId, meal, entryId });
  const closeDetail = () => setDetailFood(null);

  const addEntry = ({ foodId, qty, meal }) => {
    setLog([...log, { id: 'l' + Date.now(), foodId, qty, meal, time: '14:00' }]);
    setDetailFood(null);
    setLogScreenMeal(null);
  };

  // Bulk-add from AI: items come with inline nutrition (not from FOODS list).
  // Register each as a synthetic food so existing components keep working.
  // Accepts new shape { meals: [{meal, items, photo?}] } OR legacy { meal, items }.
  const addMany = async (payload) => {
    const groups = payload.meals
      ? payload.meals
      : (payload.meal && payload.items ? [{ meal: payload.meal, items: payload.items }] : []);
    const newFoods = [];
    const newEntries = [];
    const targetDate = logDate || todayLocalIso();
    // Upload photos first (if a group has a data-URL photo)
    for (const g of groups) {
      if (g.photo && g.photo.startsWith('data:') && session) {
        try {
          g.photoPath = await window.uploadMealPhoto(g.photo, session.user.id);
        } catch (e) { console.warn('photo upload failed:', e); }
      }
    }
    groups.forEach((g, gi) => {
      (g.items || []).forEach((it, i) => {
        const id = 'ai_' + Date.now() + '_' + gi + '_' + i;
        newFoods.push({
          id, name: it.name || 'Item',
          brand: it.brand || 'AI estimate',
          serving: 'serving', servingG: it.g || 100,
          kcal: it.kcal || 0, c: it.c || 0, p: it.p || 0, f: it.f || 0,
          satFat: it.satFat, sugar: it.sugar, fibre: it.fibre,
          ingredients: Array.isArray(it.ingredients) ? it.ingredients : null,
          // Photo only attaches to the FIRST item in a meal group (avoid duplicates)
          photo: i === 0 ? (g.photo || null) : null,
          photoPath: i === 0 ? (g.photoPath || null) : null,
        });
        newEntries.push({
          id: 'l_' + id, foodId: id, qty: 1, meal: g.meal || 'Snack', time: '14:00', date: targetDate,
        });
      });
    });
    newFoods.forEach(f => FOODS.push(f));
    setLog([...log, ...newEntries]);
    // If logging to a past date, push directly to Supabase (App's push only syncs today)
    const today = todayLocalIso();
    if (window.sb && session && targetDate !== today && newEntries.length) {
      const uid = session.user.id;
      try {
        await window.sb.from('foods').upsert(newFoods.map(f => ({
          id: f.id, user_id: uid, name: f.name, brand: f.brand || null,
          serving_g: f.servingG || 100,
          kcal: f.kcal || 0, c: f.c || 0, p: f.p || 0, f: f.f || 0,
          sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
          ingredients: f.ingredients || null,
          photo_path: f.photoPath || null,
        })), { onConflict: 'id' });
        await window.sb.from('meal_logs').insert(newEntries.map(e => ({
          id: e.id, user_id: uid, date: e.date, meal: e.meal,
          food_id: e.foodId, qty: e.qty || 1, time: e.time || null,
        })));
      } catch (err) { console.warn('past-date sync:', err.message); }
    }
    setTab('home');
    // One-tap undo of the last AI batch
    if (newEntries.length && window.showToast) {
      const entryIds = newEntries.map(e => e.id);
      const foodIds  = newFoods.map(f => f.id);
      window.showToast(
        `Logged ${newEntries.length} AI item${newEntries.length === 1 ? '' : 's'}`,
        async () => {
          setLog(prev => prev.filter(e => !entryIds.includes(e.id)));
          for (let i = FOODS.length - 1; i >= 0; i--) {
            if (foodIds.includes(FOODS[i].id)) FOODS.splice(i, 1);
          }
          if (window.sb && session) {
            try {
              await window.sb.from('meal_logs').delete().in('id', entryIds);
              await window.sb.from('foods').delete().in('id', foodIds);
            } catch (e) { console.warn('undo sync:', e.message); }
          }
        },
      );
    }
  };

  return (
    <div style={{
      minHeight: '100vh', background: theme.bg,
      fontFamily: '-apple-system, system-ui',
      position: 'relative',
    }}>
        <div style={{
          width: '100%', minHeight: '100vh', position: 'relative',
          background: theme.bg, overflow: 'hidden',
        }}>
          {/* Main scrollable content */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
            overflow: 'auto',
          }}>
            {tab === 'home' && (
              <HomeScreen theme={theme} log={log} setLog={setLog}
                targets={targets} settings={settings} setSettings={setSettings}
                targetsForDate={targetsForDate}
                wellness={wellness} setWellness={setWellness}
                wellnessMap={wellnessMap}
                exerciseLog={exerciseLog} setExerciseLog={setExerciseLog}
                weightLog={weightLog}
                onAddMeal={openLog} onOpenFood={openDetail}
                onOpenProfile={() => setTab('profile')}
                onAddExercise={() => setShowExercise(true)}
                onOpenWeight={() => {
                  setTab('progress');
                  // Wait for Trends screen to mount, then scroll the card
                  // into view inside the app's scroll container.
                  setTimeout(() => {
                    const el = document.querySelector('[data-weight-card]');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  }, 80);
                }}
                session={session}
                logDate={logDate} setLogDate={setLogDate} />
            )}
            {tab === 'ai' && <AIScreen theme={theme} defaultMeal={aiMealHint}
              onAddMany={(payload) => { addMany(payload); setAiMealHint(null); }} />}
            {tab === 'progress' && <ProgressScreen theme={theme} targets={targets} setTargets={setTargets}
              exerciseLog={exerciseLog} weightLog={weightLog} setWeightLog={setWeightLog} log={log}
              setTab={setTab} setLogDate={setLogDate}
              wellnessMap={wellnessMap || {}}
              settings={settings} setSettings={setSettings} />}
            {tab === 'profile' && (
              <ProfileScreen theme={theme}
                themeKey={themeKey} setThemeKey={setThemeKey}
                targets={targets} setTargets={setTargets}
                targetHistory={targetHistory} setTargetHistory={setTargetHistory}
                weightLog={weightLog} setWeightLog={setWeightLog}
                settings={settings} setSettings={setSettings}
                log={log} session={session}
                exerciseLog={exerciseLog} wellnessMap={wellnessMap} />
            )}
          </div>

          {/* Tab bar */}
          <TabBar active={tab} setActive={setTab} theme={theme}
            onLogTap={() => setShowAddPicker(true)} />

          {/* First-run onboarding. Only shows when we've hydrated and the
              user truly has no history. */}
          {session && !hydratingRef.current && settings && settings.onboarded !== true && (
            <OnboardingSheet theme={theme} onComplete={({ profile, targets: newTargets, firstWeightKg }) => {
              setSettings({ ...(settings || {}), onboarded: true, profile });
              setTargets(newTargets);
              if (firstWeightKg && (!weightLog || weightLog.length === 0)) {
                const iso = todayLocalIso();
                setWeightLog([{ iso, kg: firstWeightKg }]);
              }
              if (profile.name) localStorage.setItem('cal_display_name', profile.name);
            }}/>
          )}

          {showAddPicker && (
            <AddPickerSheet theme={theme}
              onClose={() => setShowAddPicker(false)}
              onManual={() => { setShowAddPicker(false); openLog('Snack'); }}
              onAI={() => { setShowAddPicker(false); setTab('ai'); }}
              onBulk={() => { setShowAddPicker(false); setShowBulk(true); }}
              onPaste={() => { setShowAddPicker(false); setShowPaste(true); }}
              onExercise={() => { setShowAddPicker(false); setShowExercise(true); }}/>
          )}

          {showExercise && (
            <ExerciseLogSheet theme={theme} session={session}
              customTypes={settings.customExerciseTypes || []}
              onAddCustomType={(t) => {
                const next = [...(settings.customExerciseTypes || []), t];
                applyCustomExerciseTypes([t]);
                setSettings({ ...settings, customExerciseTypes: next });
              }}
              date={logDate || todayLocalIso()}
              isRestDay={!!(wellnessMap[logDate || todayLocalIso()] || {}).restDay}
              onToggleRestDay={() => {
                const d = logDate || todayLocalIso();
                setWellness(d, { restDay: !(wellnessMap[d] || {}).restDay });
              }}
              onClose={() => setShowExercise(false)}
              onSave={(entry) => setExerciseLog(prev => [...prev, entry])}/>
          )}

          {showBulk && (
            <BulkNotesSheet theme={theme} session={session}
              onClose={() => setShowBulk(false)}
              onDone={() => {}}/>
          )}

          {showPaste && (
            <PasteFromClaudeSheet theme={theme} session={session}
              onClose={() => setShowPaste(false)}
              onDone={() => {}}/>
          )}

          {/* Modals */}
          {logScreenMeal && (
            <LogScreen theme={theme} defaultMeal={logScreenMeal}
              log={log}
              onClose={closeLog} onAdd={addEntry} onOpenFood={openDetail}
              onUseAI={(meal) => { setAiMealHint(meal || null); closeLog(); setTab('ai'); }} />
          )}
          {detailFood && (
            <DetailScreen theme={theme}
              foodId={detailFood.foodId} defaultMeal={detailFood.meal}
              entryId={detailFood.entryId}
              log={log} setLog={setLog} session={session}
              onClose={closeDetail} onAdd={addEntry} />
          )}
        </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);



</script>
</body>
</html>
