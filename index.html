                {matchingFavs.map((f, i) => (
                  <FoodResultRow key={f.id} food={f} theme={theme}
                    onTap={() => onOpenFood(f.id, meal)}
                    onAdd={() => onAdd({ foodId: f.id, qty: 1, meal })}
                    isLast={i === matchingFavs.length - 1}
                    query={query}
                  />
                ))}
              </div>
            </>
          );
        })()}

        <SectionHeader theme={theme}>
          {query ? `${results.length} result${results.length === 1 ? '' : 's'}` : 'Recent'}
        </SectionHeader>
        <div style={{ margin: '0 16px', background: theme.surface,
          borderRadius: theme.radius.card, overflow: 'hidden',
          border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        }}>
          {(query ? results : recent).map((f, i, arr) => (
            <FoodResultRow key={f.id} food={f} theme={theme}
              onTap={() => onOpenFood(f.id, meal)}
              onAdd={() => onAdd({ foodId: f.id, qty: 1, meal })}
              isLast={i === arr.length - 1}
              query={query}
            />
          ))}
          {query && results.length === 0 && (
            <div style={{
              padding: '24px 20px', textAlign: 'center',
              fontFamily: theme.font, fontSize: 14, color: theme.inkMute,
            }}>No matches. Try a different name.</div>
          )}
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ theme, children }) {
  return (
    <div style={{
      padding: '8px 24px 8px',
      fontFamily: theme.font, fontSize: 11, fontWeight: 600,
      color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
    }}>{children}</div>
  );
}

function FoodResultRow({ food, theme, onTap, onAdd, isLast, query }) {
  const highlight = (text) => {
    if (!query) return text;
    const i = text.toLowerCase().indexOf(query.toLowerCase());
    if (i < 0) return text;
    return (
      <>
        {text.slice(0, i)}
        <span style={{ background: theme.accent + '33', borderRadius: 2 }}>
          {text.slice(i, i + query.length)}
        </span>
        {text.slice(i + query.length)}
      </>
    );
  };

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px',
      borderBottom: isLast ? 'none' : `0.5px solid ${theme.line}`,
      cursor: 'pointer',
    }} onClick={onTap}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: theme.font, fontSize: 15, fontWeight: 500,
          color: theme.ink, letterSpacing: theme.letter,
        }}>{highlight(food.name)}</div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
        }}>{food.brand} · {food.kcal} kcal / {food.serving}</div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onAdd(); }} style={{
        width: 28, height: 28, borderRadius: 14, border: 'none', cursor: 'pointer',
        background: theme.accent, color: theme.accentInk,
        fontFamily: theme.font, fontSize: 16, lineHeight: 1, paddingBottom: 2,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>+</button>
    </div>
  );
}

window.LogScreen = LogScreen;


// ===== screen-detail.jsx =====
// Food detail — full nutrition breakdown + portion slider.

const { useState: useStateDetail } = React;

function DetailScreen({ theme, foodId, defaultMeal, onClose, onAdd, entryId, log = [], setLog, session }) {
  // Respect the per-date lock so you can't edit portion/meal of a
  // finished day. The locked map is read from localStorage directly
  // since DetailScreen doesn't receive it as a prop.
  const lockedByDate = (() => {
    try { return JSON.parse(localStorage.getItem('cal_marked_complete') || '{}') || {}; }
    catch { return {}; }
  })();
  const [bump, setBump] = useStateDetail(0); // force re-read food after mutation
  const [showEmojiPicker, setShowEmojiPicker] = useStateDetail(false);
  const food = foodById(foodId);
  // When we're editing an existing log entry, seed qty + meal from it.
  const existingEntry = entryId ? log.find(e => e.id === entryId) : null;
  const [qty, setQty] = useStateDetail(existingEntry ? +existingEntry.qty || 1 : 1);
  const [meal, setMeal] = useStateDetail((existingEntry ? existingEntry.meal : defaultMeal) || 'Snack');
  const [showModify, setShowModify] = useStateDetail(false);
  const [showIngredients, setShowIngredients] = useStateDetail(false);
  const [editingIng, setEditingIng] = useStateDetail(null); // index of ingredient being edited
  const [pickAction, setPickAction] = useStateDetail(null); // 'move' | 'copy' | null
  const [pickDate, setPickDate] = useStateDetail(() => todayLocalIso());
  const isEdit = !!existingEntry;
  const entryLocked = isEdit && !!lockedByDate[existingEntry.date];
  const qtyChanged = isEdit && Math.abs(qty - (+existingEntry.qty || 1)) > 0.0001;
  const mealChanged = isEdit && meal !== existingEntry.meal;
  const dirty = qtyChanged || mealChanged;

  const saveEdits = async () => {
    if (!existingEntry || !setLog) return;
    setLog(prev => prev.map(e => e.id === entryId ? { ...e, qty, meal } : e));
    if (window.sb && session) {
      const r = await window.sb.from('meal_logs')
        .update({ qty, meal }).eq('id', entryId);
      if (r.error) console.warn('edit sync:', r.error.message);
    }
    onClose && onClose();
  };

  const performCopyMove = async () => {
    if (!existingEntry || !setLog || !pickDate || !pickAction) return;
    if (pickAction === 'move') {
      setLog(prev => prev.map(e => e.id === entryId ? { ...e, date: pickDate } : e));
      if (window.sb && session) {
        const r = await window.sb.from('meal_logs')
          .update({ date: pickDate }).eq('id', entryId);
        if (r.error) console.warn('move sync:', r.error.message);
      }
      if (window.showToast) window.showToast(`Moved to ${pickDate}`);
    } else {
      const newId = 'l_copy_' + Date.now();
      const cloned = { ...existingEntry, id: newId, date: pickDate };
      setLog(prev => [...prev, cloned]);
      if (window.sb && session) {
        const r = await window.sb.from('meal_logs').insert([{
          id: newId, user_id: session.user.id, date: pickDate, meal: cloned.meal,
          food_id: cloned.foodId, qty: cloned.qty || 1, time: cloned.time || null,
        }]);
        if (r.error) console.warn('copy sync:', r.error.message);
      }
      if (window.showToast) window.showToast(`Copied to ${pickDate}`);
    }
    setPickAction(null);
    onClose && onClose();
  };

  const recomputeFoodTotals = (f) => {
    const ings = f.ingredients || [];
    if (!ings.length) return;
    const sum = (k) => ings.reduce((s, i) => s + (+i[k] || 0), 0);
    f.kcal = +sum('kcal').toFixed(1);
    f.c = +sum('c').toFixed(1);
    f.p = +sum('p').toFixed(1);
    f.f = +sum('f').toFixed(1);
    f.satFat = +sum('satFat').toFixed(1);
    f.sugar = +sum('sugar').toFixed(1);
    f.fibre = +sum('fibre').toFixed(1);
    f.servingG = Math.max(1, Math.round(sum('g')));
  };

  const persistFood = async (f) => {
    if (!window.sb) return;
    const r = await window.sb.from('foods').update({
      kcal: f.kcal, c: f.c, p: f.p, f: f.f,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      serving_g: f.servingG, ingredients: f.ingredients || null,
    }).eq('id', f.id);
    if (r.error) console.warn('ingredient sync:', r.error.message);
  };

  const deleteIngredient = (idx) => {
    food.ingredients = (food.ingredients || []).filter((_, i) => i !== idx);
    recomputeFoodTotals(food);
    setBump(b => b + 1);
    persistFood(food);
    window.dispatchEvent(new Event('caloree:foodschanged'));
  };

  const updateIngredient = (idx, patch) => {
    const ing = food.ingredients[idx];
    if (!ing) return;
    // If grams changed, scale macros proportionally. Guard empty /
    // NaN / zero inputs so a transient "" from clearing the field
    // doesn't zero out all the stored macros.
    if (patch.g != null) {
      const raw = patch.g;
      const valid = raw !== '' && !Number.isNaN(+raw) && +raw > 0;
      if (valid && +raw !== +ing.g) {
        const oldG = +ing.g || 1;
        const newG = +raw;
        const ratio = oldG > 0 ? newG / oldG : 1;
        ing.g = newG;
        ['kcal','c','p','f','satFat','sugar','fibre'].forEach(k => {
          if (ing[k] != null) ing[k] = +(((+ing[k]) || 0) * ratio).toFixed(1);
        });
      }
      delete patch.g;
    }
    Object.assign(ing, patch);
    recomputeFoodTotals(food);
    setBump(b => b + 1);
    persistFood(food);
    window.dispatchEvent(new Event('caloree:foodschanged'));
  };

  const m = {
    kcal: food.kcal * qty,
    c: food.c * qty,
    p: food.p * qty,
    f: food.f * qty,
    g: food.servingG * qty,
  };

  const animKcal = useAnimatedNum(m.kcal, 250);
  const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  // Macro % of total kcal
  const totalMacroKcal = m.c * 4 + m.p * 4 + m.f * 9;
  const cPct = totalMacroKcal > 0 ? (m.c * 4 / totalMacroKcal) * 100 : 0;
  const pPct = totalMacroKcal > 0 ? (m.p * 4 / totalMacroKcal) * 100 : 0;
  const fPct = totalMacroKcal > 0 ? (m.f * 9 / totalMacroKcal) * 100 : 0;

  return (
    <div style={{
      position: 'absolute', inset: 0, background: theme.bg, zIndex: 200,
      display: 'flex', flexDirection: 'column',
      animation: 'slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1)',
    }}>
      {/* Header */}
      <div style={{
        padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 16px 8px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 8,
        }}>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M14 5l-7 6 7 6" stroke={theme.accent} strokeWidth="2.2"
              strokeLinecap="round" strokeLinejoin="round" fill="none"/>
          </svg>
        </button>
        <div style={{
          fontFamily: theme.font, fontSize: 13, color: theme.inkSoft,
          textTransform: 'uppercase', letterSpacing: '0.08em',
        }}>Nutrition</div>
        <button onClick={async () => {
          food.isFavourite = !food.isFavourite;
          setBump(b => b + 1);
          // localStorage
          try {
            const favs = JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]');
            const set = new Set(favs);
            if (food.isFavourite) set.add(food.id); else set.delete(food.id);
            localStorage.setItem('cal_favourite_ids', JSON.stringify([...set]));
          } catch {}
          // Supabase upsert
          const sb = window.sb;
          if (sb) {
            const uid = (await sb.auth.getUser()).data?.user?.id;
            if (uid) {
              await sb.from('foods').upsert([{
                id: food.id, user_id: uid,
                name: food.name, brand: food.brand || null,
                serving_g: food.servingG || 100,
                kcal: food.kcal || 0, c: food.c || 0, p: food.p || 0, f: food.f || 0,
                sat_fat: food.satFat ?? null, sugar: food.sugar ?? null, fibre: food.fibre ?? null,
                is_favourite: !!food.isFavourite,
                photo_path: food.photoPath || null,
              }], { onConflict: 'id' });
            }
          }
          window.dispatchEvent(new Event('caloree:foodschanged'));
        }} title={food.isFavourite ? 'Unfavourite' : 'Favourite'}
        style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 4,
          color: theme.accent,
        }}>
          <svg width="22" height="22" viewBox="0 0 20 20" fill={food.isFavourite ? '#E0A24A' : 'none'}>
            <path d="M10 2.5l1.5 5h5L12.5 11l1.5 5L10 13l-4 3 1.5-5L3 7.5h5L10 2.5z"
              stroke={food.isFavourite ? '#E0A24A' : theme.accent} strokeWidth="1.8" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>

      <div style={{ flex: 1, overflow: 'auto', paddingBottom: 110 }}>
        {/* Title */}
        <div style={{ padding: '8px 20px 16px' }}>
          <div style={{
            fontFamily: theme.font, fontSize: 12, color: theme.accent,
            letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600,
            marginBottom: 4,
          }}>{food.brand}</div>
          <div style={{
            fontFamily: theme.titleFont,
            fontSize: theme.name === 'Editorial' ? 36 : 28,
            fontWeight: theme.titleWeight, color: theme.ink,
            letterSpacing: theme.letter, lineHeight: 1.05,
            textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
          }}>{food.name}</div>
        </div>

        {/* Icon (emoji) — shown when no photo; tap to change/hide */}
        {!food.photo && (() => {
          const overrides = window.__FOOD_EMOJI_OVERRIDES || {};
          const hasOverride = Object.prototype.hasOwnProperty.call(overrides, food.id);
          const cur = foodEmoji(food);
          const auto = autoFoodEmoji(food);
          return (
            <div style={{
              margin: '0 16px 16px', padding: 10,
              background: theme.surface, borderRadius: theme.radius.card,
              border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
              display: 'flex', gap: 12, alignItems: 'center',
            }}>
              <div style={{
                width: 56, height: 56, borderRadius: 10, flexShrink: 0,
                background: theme.surfaceAlt,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 30, lineHeight: 1,
              }}>{cur || '·'}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 2,
                }}>Icon {hasOverride ? '· custom' : '· auto'}</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  <button onClick={() => setShowEmojiPicker(true)} style={{
                    padding: '6px 12px', border: `1px solid ${theme.line}`,
                    background: theme.surfaceAlt, color: theme.ink,
                    borderRadius: 999, cursor: 'pointer',
                    fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                  }}>Change</button>
                  <button onClick={() => { setFoodEmojiOverride(food.id, ''); setBump(b => b + 1); }}
                    style={{
                      padding: '6px 12px', border: `1px solid ${theme.line}`,
                      background: 'transparent', color: '#D96B5C',
                      borderRadius: 999, cursor: 'pointer',
                      fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                    }}>Hide</button>
                  {hasOverride && (
                    <button onClick={() => { setFoodEmojiOverride(food.id, undefined); setBump(b => b + 1); }}
                      style={{
                        padding: '6px 12px', border: `1px solid ${theme.line}`,
                        background: 'transparent', color: theme.inkSoft,
                        borderRadius: 999, cursor: 'pointer',
                        fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                      }}>Use auto ({auto})</button>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Photo preview + remove */}
        {food.photo && (
          <div style={{
            margin: '0 16px 16px', padding: 10,
            background: theme.surface, borderRadius: theme.radius.card,
            border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
            display: 'flex', gap: 12, alignItems: 'center',
          }}>
            <img src={food.photo} alt="" style={{
              width: 72, height: 72, borderRadius: 10, objectFit: 'cover',
            }}/>
            <div style={{ flex: 1 }}>
              <div style={{
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
                marginBottom: 6,
              }}>Attached photo</div>
              <button onClick={async () => {
                if (!confirm('Remove photo from this food?')) return;
                food.photo = null;
                food.photoPath = null;
                setBump(b => b + 1);
                if (window.sb && session) {
                  const r = await window.sb.from('foods')
                    .update({ photo_path: null }).eq('id', food.id);
                  if (r.error) console.warn('photo remove:', r.error.message);
                }
                window.dispatchEvent(new Event('caloree:foodschanged'));
              }} style={{
                padding: '6px 12px', border: `1px solid ${theme.line}`,
                background: 'transparent', color: '#D96B5C',
                borderRadius: 999, cursor: 'pointer',
                fontFamily: theme.font, fontSize: 12, fontWeight: 600,
              }}>Remove photo</button>
            </div>
          </div>

        {/* Big calorie display + macro split bar */}
        <div style={{
          margin: '0 16px 16px', padding: '24px 20px',
          background: theme.surface, borderRadius: theme.radius.card,
          border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <div style={{
              fontFamily: theme.numFont,
              fontSize: 64, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1,
            }}>{Math.round(animKcal)}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 14, color: theme.inkSoft,
            }}>kcal</div>
          </div>
          <div style={{
            fontFamily: theme.font, fontSize: 13, color: theme.inkMute, marginTop: 4,
          }}>{m.g.toFixed(0)} g · {qty.toFixed(2)} {food.serving}{qty !== 1 ? 's' : ''}</div>

          {/* Stacked macro bar */}
          <div style={{
            marginTop: 18, height: 8, borderRadius: theme.radius.chip > 8 ? 4 : 1,
            overflow: 'hidden', background: theme.ring.track, display: 'flex',
          }}>
            <div style={{ width: `${cPct}%`, background: theme.macros.carbs, transition: 'width 0.3s' }} />
            <div style={{ width: `${pPct}%`, background: theme.macros.protein, transition: 'width 0.3s' }} />
            <div style={{ width: `${fPct}%`, background: theme.macros.fat, transition: 'width 0.3s' }} />
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 12 }}>
            {[
              ['Carbs',   m.c, theme.macros.carbs,   cPct],
              ['Protein', m.p, theme.macros.protein, pPct],
              ['Fat',     m.f, theme.macros.fat,     fPct],
            ].map(([lbl, val, col, pct]) => (
              <div key={lbl} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                  color: theme.inkSoft, letterSpacing: '0.06em', textTransform: 'uppercase',
                }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: col }} />
                  {lbl}
                </div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 18, fontWeight: theme.numWeight,
                  color: theme.ink, letterSpacing: theme.letter,
                }}>{val.toFixed(1)}<span style={{
                  fontSize: 11, color: theme.inkMute, marginLeft: 2,
                }}>g</span></div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 11, color: theme.inkMute,
                }}>{Math.round(pct)}%</div>
              </div>
            ))}
          </div>
        </div>

        {/* Portion slider */}
        <div style={{
          margin: '0 16px 16px', padding: '18px 20px',
          background: theme.surface, borderRadius: theme.radius.card,
          border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>Portion size</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter,
            }}>{qty.toFixed(2)} <span style={{
              fontSize: 12, color: theme.inkSoft, fontWeight: 400,
            }}>{food.serving}{qty !== 1 ? 's' : ''}</span></div>
          </div>

          <PortionSlider qty={qty} setQty={setQty} theme={theme} />

          <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
            {[0.25, 0.5, 1, 1.5, 2].map(q => (
              <button key={q} onClick={() => setQty(q)} style={{
                flex: 1, padding: '8px 0', border: 'none', cursor: 'pointer',
                borderRadius: theme.radius.chip,
                background: Math.abs(qty - q) < 0.01 ? theme.ink : theme.surfaceAlt,
                color: Math.abs(qty - q) < 0.01 ? theme.bg : theme.ink,
                fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
                letterSpacing: theme.letter, transition: 'all 0.15s',
              }}>{q}×</button>

                flex: 1, padding: '6px 0', border: `1px solid ${theme.line}`,

                background: 'transparent', color: theme.inkSoft,
                fontFamily: theme.font, fontSize: 11, fontWeight: 600,

          <div style={{
            fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
            marginTop: 6,

        {/* Detailed nutrition table */}
        <div style={{
          margin: '0 16px 16px', padding: '6px 20px',
          background: theme.surface, borderRadius: theme.radius.card,
          border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        }}>
          {Array.isArray(food.ingredients) && food.ingredients.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <button onClick={() => setShowIngredients(!showIngredients)} style={{
                width: '100%', padding: '8px 24px', background: 'transparent', border: 'none',
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              }}>
                <span style={{
                  fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                  color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
                }}>Ingredients <span style={{ color: theme.inkMute, fontWeight: 500 }}>· {food.ingredients.length}</span></span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
                  style={{ transform: showIngredients ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.15s' }}>
                  <path d="M2 4l4 4 4-4" stroke={theme.inkMute} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
              {showIngredients && food.ingredients.map((ing, i) => (
                <div key={i} style={{
                  margin: '0 16px',
                  borderBottom: i < food.ingredients.length - 1 ? `0.5px solid ${theme.line}` : 'none',
                }}>
                  <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '8px 0', gap: 8,
                  }}>

function ModifyWithClaudeSheet({ theme, food, qty, onClose, onApply }) {
  const [text, setText] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null);

  const run = async () => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) { setError('Set your Anthropic API key in Profile → Settings first.'); return; }
    if (!text.trim()) { setError('Describe what changed.'); return; }
    setBusy(true); setError(null);
    const prompt = `The user has this food logged:
${JSON.stringify({
  name: food.name, brand: food.brand || '',
  kcal: food.kcal, c: food.c, p: food.p, f: food.f,
  satFat: food.satFat, sugar: food.sugar, fibre: food.fibre,
  servingG: food.servingG,
}, null, 2)}

They want to modify it: "${text.trim()}"

Return ONLY a JSON object, no prose, no code fences, no explanation.
Even if the user asks a question, respond with your best estimate as a JSON object —
never reply in natural language.

{
  "name": "new name reflecting the change",
  "brand": "short prep note",
  "kcal": 0, "c": 0, "p": 0, "f": 0,
  "satFat": 0, "sugar": 0, "fibre": 0,
  "servingG": 0
}

Rules:
- All values are per-serving totals. Recompute based on the described change.
- If the user is asking "are these macros correct?" — reassess the original food
  against typical values for that food/brand/serving size and return your best
  estimate. If values look roughly right, return them unchanged.
- Keep the same serving size concept unless the change implies otherwise.
- Never omit satFat/sugar/fibre — estimate conservatively.
- Keep the name concise and reflect the swap.`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 600,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const textBlock = (j.content || []).find(b => b.type === 'text');
      const raw = textBlock ? textBlock.text : '';
      // Strip code fences if present, then tolerate leading prose by
      // extracting the first JSON object we can find in the response.
      const fenced = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      let parsed = null;
      try { parsed = JSON.parse(fenced); }
      catch {
        const match = raw.match(/\{[\s\S]*\}/);
        if (match) {
          try { parsed = JSON.parse(match[0]); } catch {}
        }
      }
      if (!parsed) throw new Error('Claude didn\'t return usable JSON. Try rephrasing as a change (e.g. "less butter, add spinach").');
      setPreview(parsed);
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  return (
    <div onClick={onClose} style={{
      position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 300,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '85%', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '18px 18px 22px', overflowY: 'auto',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: theme.line,
          margin: '0 auto 14px', flexShrink: 0,
        }}/>
        <div style={{
          fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
          color: theme.ink, marginBottom: 4,
        }}>Modify with Claude</div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 12,
        }}>Describe what's different. Claude will recompute the macros.</div>

        <textarea value={text} onChange={(e) => setText(e.target.value)}
          rows={3}
          placeholder='e.g. "swap aubergine for tofu, rest same"'
          style={{
            width: '100%', padding: '10px 12px',
            border: `1px solid ${theme.line}`, borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 14, background: theme.surface,
            color: theme.ink, outline: 'none', resize: 'vertical',
          }}/>

        {error && <div style={{
          marginTop: 10, padding: '10px 12px', borderRadius: 8,
          background: '#FDECEA', color: '#B3261E', fontSize: 13, fontFamily: theme.font,
        }}>{error}</div>}

        {preview && (
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: theme.surface, borderRadius: theme.radius.card,
            border: `1px solid ${theme.accent}`,
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,
            }}>{preview.name}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>{preview.brand}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, marginTop: 8,
            }}>
              {Math.round(preview.kcal)} kcal · C{Math.round(preview.c)} P{Math.round(preview.p)} F{Math.round(preview.f)}
              {preview.satFat != null && ` · Sat${Math.round(preview.satFat)}`}
              {preview.sugar  != null && ` · Sug${Math.round(preview.sugar)}`}
              {preview.fibre  != null && ` · Fi${Math.round(preview.fibre)}`}
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
          <button onClick={onClose} style={{
            padding: '11px 16px', border: `1px solid ${theme.line}`,
            background: 'transparent', color: theme.inkSoft,
            borderRadius: theme.radius.btn, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Cancel</button>
          {!preview ? (
            <button onClick={run} disabled={busy || !text.trim()} style={{
              flex: 1, padding: '11px 0', border: 'none',
              background: text.trim() && !busy ? theme.accent : theme.surfaceAlt,
              color: theme.accentInk,
              borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600,
              cursor: busy || !text.trim() ? 'default' : 'pointer',
            }}>{busy ? 'Thinking…' : 'Ask Claude'}</button>
          ) : (
            <button onClick={() => onApply(preview)} style={{
              flex: 1, padding: '11px 0', border: 'none',
              background: theme.accent, color: theme.accentInk,
              borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>Apply changes</button>
          )}
        </div>
      </div>
    </div>
  );
}

function PortionSlider({ qty, setQty, theme }) {
  const trackRef = React.useRef(null);
  const dragging = React.useRef(false);
  const max = 3;
  const pct = Math.min(qty / max, 1) * 100;

  const update = (clientX) => {
    if (!trackRef.current) return;
    const rect = trackRef.current.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width;
    const v = Math.max(0.05, Math.min(max, x * max));
    setQty(Math.round(v * 20) / 20);
  };

  React.useEffect(() => {
    const move = (e) => dragging.current && update(e.touches ? e.touches[0].clientX : e.clientX);
    const up = () => { dragging.current = false; };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move);
    window.addEventListener('touchend', up);
    return () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move);
      window.removeEventListener('touchend', up);
    };
  }, []);

  const trackH = theme.name === 'Editorial' ? 4 : 6;

  return (
    <div ref={trackRef}
      onMouseDown={(e) => { dragging.current = true; update(e.clientX); }}
      onTouchStart={(e) => { dragging.current = true; update(e.touches[0].clientX); }}
      style={{
        position: 'relative', height: 28, marginTop: 12, cursor: 'pointer',
        display: 'flex', alignItems: 'center',
      }}>
      <div style={{
        width: '100%', height: trackH, borderRadius: trackH/2,
        background: theme.ring.track,
      }}>
        <div style={{
          width: `${pct}%`, height: '100%', background: theme.accent,
          borderRadius: trackH/2,
          transition: dragging.current ? 'none' : 'width 0.15s',
        }} />
      </div>
      {/* tick marks */}
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center' }}>
        {[0.5, 1, 1.5, 2, 2.5].map(v => (
          <div key={v} style={{
            position: 'absolute', left: `${(v/max) * 100}%`,
            width: 1, height: 8, background: theme.inkMute, opacity: 0.3,
            transform: 'translateX(-0.5px)',
          }} />
        ))}
      </div>
      {/* thumb */}
      <div style={{
        position: 'absolute', left: `${pct}%`, top: '50%',
        transform: 'translate(-50%, -50%)',
        width: 24, height: 24, borderRadius: theme.name === 'Editorial' ? 4 : 12,
        background: theme.surface,
        border: `2px solid ${theme.accent}`,
        boxShadow: '0 2px 6px rgba(0,0,0,0.15)',
        transition: dragging.current ? 'none' : 'left 0.15s',
      }} />
    </div>
  );
}

// ===== screen-progress.jsx =====
// Trends — scrollable Week/Month/Year with historical navigation.

const { useState: useStateProg } = React;

// Group HISTORY into buckets for a given range
function bucketFor(range, offset) {
  // offset: 0 = current period, 1 = previous, ...
  const all = HISTORY;
  if (range === 'Week') {
    const end = all.length - 1 - offset * 7;
    const start = Math.max(0, end - 6);
    const days = all.slice(start, end + 1);
    if (days.length === 0) return null;
    const first = days[0], last = days[days.length - 1];
    const label = `${monthShort(first.m)} ${first.d} — ${monthShort(last.m)} ${last.d}`;
    return {
      label, bars: days.map(d => ({
        ...d,
        barLabel: ['S','M','T','W','T','F','S'][d.dow],
        dateLabel: `${monthShort(d.m)} ${d.d}`,
        isToday: offset === 0 && d === last,
      })),
    };
  }
  if (range === 'Month') {
    // buckets by week within the current month, going backwards by month
    const today = new Date();
    const targetMonth = new Date(today.getFullYear(), today.getMonth() - offset, 1);
    const y = targetMonth.getFullYear(), m = targetMonth.getMonth();
    const daysInMonth = all.filter(d => d.y === y && d.m === m);
    if (daysInMonth.length === 0) return null;
    const label = `${monthLong(m)} ${y}`;
    return {
      label, bars: daysInMonth.map(d => ({
        ...d,
        barLabel: String(d.d),
        dateLabel: `${monthShort(m)} ${d.d}`,
        isToday: offset === 0 && d.iso === all[all.length-1].iso,
      })),
    };
  }
  // Year — group by month
  const today = new Date();
  const targetYear = today.getFullYear() - offset;
  const months = [];
  for (let mi = 0; mi < 12; mi++) {
    const monthDays = all.filter(d => d.y === targetYear && d.m === mi);
    if (monthDays.length === 0) continue;
    const avg = monthDays.reduce((s, d) => s + d.kcal, 0) / monthDays.length;
    const avgKey = (k) => Math.round(monthDays.reduce((s, d) => s + (+d[k] || 0), 0) / monthDays.length);
    months.push({
      y: targetYear, m: mi, d: 1,
      kcal:   Math.round(avg),
      c:      avgKey('c'),
      p:      avgKey('p'),
      f:      avgKey('f'),
      satFat: avgKey('satFat'),
      sugar:  avgKey('sugar'),
      fibre:  avgKey('fibre'),
      barLabel: monthShort(mi)[0],
      dateLabel: `${monthLong(mi)} ${targetYear}`,
      isToday: offset === 0 && mi === today.getMonth(),
    });
  }
  if (months.length === 0) return null;
  return { label: String(targetYear), bars: months };
}

function monthShort(m) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }
function monthLong(m) { return ['January','February','March','April','May','June','July','August','September','October','November','December'][m]; }

function WeightCard({ theme, weightLog, setWeightLog, targets }) {
  const [showWeightEntry, setShowWeightEntry] = React.useState(false);
  const [askWeight, setAskWeight] = React.useState(false);

  const [hoverIdx, setHoverIdx] = React.useState(null);
  const latest = weightLog[weightLog.length - 1];
  const first = weightLog[0];
  const delta = latest && first ? (latest.kg - first.kg) : 0;
  const todayMs = Date.now();
  const lastDate = latest ? new Date(latest.iso) : null;
  const daysSince = lastDate ? Math.floor((todayMs - lastDate.getTime()) / 86400000) : null;
  const stale = daysSince != null && daysSince > 7;
  const needsUpdate = daysSince != null && daysSince >= 10;
  // Next weigh-in = last weigh-in + 7 days. Red when overdue, highlight on due-day.
  const nextWeighIsoStr = lastDate
    ? todayLocalIso(new Date(lastDate.getTime() + 7 * 86400000)) : null;
  const daysUntilNext = daysSince != null ? (7 - daysSince) : null;
  const weighInToday = daysUntilNext === 0;
  const weighInOverdue = daysUntilNext != null && daysUntilNext < 0;

  const weightTrend = (() => {
    if (weightLog.length < 2) return null;
    const cutoff = todayMs - 28 * 86400000;
    const pts = weightLog
      .map(w => ({ t: new Date(w.iso).getTime(), kg: +w.kg }))
      .filter(p => p.t >= cutoff)
      .sort((a, b) => a.t - b.t);
    if (pts.length < 2) return null;
    const n = pts.length;
    const mx = pts.reduce((s, p) => s + p.t, 0) / n;
    const my = pts.reduce((s, p) => s + p.kg, 0) / n;
    let num = 0, den = 0;
    pts.forEach(p => { num += (p.t - mx) * (p.kg - my); den += (p.t - mx) ** 2; });
    const slope = den ? num / den : 0;
    const perWeek = slope * 7 * 86400000;
    const spanDays = Math.round((pts[pts.length - 1].t - pts[0].t) / 86400000);
    return { perWeek, spanDays, count: pts.length };
  })();

  const wMin = weightLog.length ? Math.min(...weightLog.map(w => w.kg)) - 0.5 : 0;
  const wMax = weightLog.length ? Math.max(...weightLog.map(w => w.kg)) + 0.5 : 1;

  return (
    <React.Fragment>
      <div data-weight-card style={{
        margin: '0 16px 12px', padding: '18px 20px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>Current weight</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 36, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.1, marginTop: 4,
            }}>{latest ? latest.kg.toFixed(1) : '—'}<span style={{
              fontSize: 14, color: theme.inkMute, marginLeft: 4, fontWeight: 400,
            }}>kg</span></div>
            {latest && first && first !== latest && (
              <div style={{
                fontFamily: theme.font, fontSize: 12,
                color: delta < 0 ? theme.macros.protein : theme.inkSoft, marginTop: 2,
              }}>
                {delta > 0 ? '+' : ''}{delta.toFixed(1)} kg since first entry
              </div>
            )}
            {!latest && (
              <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkMute, marginTop: 2 }}>
                Tap "Log weight" to start
              </div>
            )}
            {weightTrend && Math.abs(weightTrend.perWeek) > 0.02 && (
              <div style={{
                display: 'inline-flex', alignItems: 'center', gap: 6,
                marginTop: 8, padding: '4px 10px',
                background: Math.abs(weightTrend.perWeek) < 0.8 ? 'rgba(79,138,112,0.15)' : 'rgba(224,162,74,0.15)',
                borderRadius: theme.radius.chip,
                fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                color: Math.abs(weightTrend.perWeek) < 0.8 ? '#2B7A5C' : '#8A5A1F',
                letterSpacing: '0.04em',
              }}>
                {weightTrend.perWeek < 0 ? '↓' : '↑'}
                {' '}{Math.abs(weightTrend.perWeek).toFixed(2)} kg/wk
                <span style={{ color: theme.inkMute, fontWeight: 500 }}>· {weightTrend.spanDays}d</span>
              </div>
            )}
          </div>
          <button onClick={() => setShowWeightEntry(true)} style={{
            padding: '10px 14px', borderRadius: theme.radius.btn,
            background: theme.ink, color: theme.surface, border: 'none',
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
            letterSpacing: theme.letter,
          }}>Log weight</button>
        </div>

        {weightLog.length > 0 && (() => {
          // SVG line chart — reads much better than bars for a monotonic trend.
          const W = 300, H = 80, padX = 4, padY = 6;
          const n = weightLog.length;
          const xAt = (i) => n === 1 ? W / 2 : padX + (i / (n - 1)) * (W - padX * 2);
          const yAt = (kg) => {
            if (wMax === wMin) return H / 2;
            return padY + (1 - (kg - wMin) / (wMax - wMin)) * (H - padY * 2);
          };
          const pts = weightLog.map((w, i) => `${xAt(i)},${yAt(w.kg)}`);
          const linePath = 'M' + pts.join(' L');
          const areaPath = linePath + ` L${xAt(n - 1)},${H} L${xAt(0)},${H} Z`;
          const lastW = weightLog[n - 1];
          const firstW = weightLog[0];
          const staleColor = '#B3261E';
          const accentForLast = stale ? staleColor : theme.accent;

          const handleSvgMove = (e) => {
            const svg = e.currentTarget;
            const rect = svg.getBoundingClientRect();
            const x = (e.clientX != null ? e.clientX : e.touches?.[0]?.clientX);
            if (x == null) return;
            const px = ((x - rect.left) / rect.width) * W;
            // Find nearest data point
            let best = 0, bestDist = Infinity;
            weightLog.forEach((_, i) => {
              const dx = Math.abs(px - xAt(i));
              if (dx < bestDist) { bestDist = dx; best = i; }
            });
            setHoverIdx(best);
          };

          const hovered = hoverIdx != null ? weightLog[hoverIdx] : null;

          return (
            <div style={{ marginTop: 18, width: '100%', position: 'relative' }}>
              {/* Hover/tap tooltip */}
              {hovered && (
                <div style={{
                  position: 'absolute', top: -2, left: 0, right: 0, zIndex: 2,
                  display: 'flex', justifyContent: 'center', pointerEvents: 'none',
                }}>
                  <div style={{
                    padding: '4px 10px', borderRadius: 999,
                    background: theme.ink, color: theme.bg,
                    fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                    letterSpacing: '0.02em',
                  }}>
                    {new Date(hovered.iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}
                    {' · '}
                    <span style={{ fontFamily: theme.numFont }}>{(+hovered.kg).toFixed(1)} kg</span>
                  </div>
                </div>
              )}
              <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
                onMouseMove={handleSvgMove}
                onMouseLeave={() => setHoverIdx(null)}
                onTouchStart={handleSvgMove}
                onTouchMove={handleSvgMove}
                onTouchEnd={() => setTimeout(() => setHoverIdx(null), 1500)}
                style={{
                  display: 'block', width: '100%', height: 80,
                  cursor: 'crosshair', touchAction: 'pan-y',
                }}>
                <defs>
                  <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor={theme.accent} stopOpacity="0.22"/>
                    <stop offset="100%" stopColor={theme.accent} stopOpacity="0"/>
                  </linearGradient>
                </defs>
                {n >= 2 && <path d={areaPath} fill="url(#weightFill)"/>}
                {n >= 2 && (
                  <path d={linePath}
                    fill="none" stroke={theme.accent} strokeWidth="1.8"
                    strokeLinejoin="round" strokeLinecap="round"/>
                )}
                {/* Vertical marker for hovered point */}
                {hoverIdx != null && (
                  <line x1={xAt(hoverIdx)} y1={0} x2={xAt(hoverIdx)} y2={H}
                    stroke={theme.inkMute} strokeWidth="0.5" strokeDasharray="2 2" opacity="0.6"/>
                )}
                {weightLog.map((w, i) => {
                  const isLast = i === n - 1;
                  const isHover = i === hoverIdx;
                  const fillColor = isLast ? accentForLast : (isHover ? theme.accent : theme.surface);
                  const strokeColor = isLast ? accentForLast : theme.accent;
                  return (
                    <circle key={w.iso + '_' + i}
                      cx={xAt(i)} cy={yAt(w.kg)}
                      r={isHover ? 5 : (isLast ? 3.5 : 2)}
                      fill={fillColor}
                      stroke={strokeColor} strokeWidth={isLast ? 0 : (isHover ? 0 : 1.4)}>
                      <title>{new Date(w.iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} · {(+w.kg).toFixed(1)} kg</title>
                    </circle>
                  );
                })}
              </svg>
              <div style={{
                display: 'flex', justifyContent: 'space-between', marginTop: 4,
                fontFamily: theme.font, fontSize: 10, color: theme.inkMute,
                letterSpacing: '0.04em',
              }}>
                <span>{firstW.iso}</span>
                <span style={{ color: stale ? staleColor : theme.inkMute }}>
                  {lastW.iso}{stale ? ` · ${daysSince}d ago` : ''}
                </span>
              </div>
            </div>
          );
        })()}

        {weightLog.length >= 2 && (
          <button onClick={() => setAskWeight(true)} style={{
            width: '100%', marginTop: 14, padding: '10px 14px',
            border: `1px solid ${theme.line}`, background: theme.surfaceAlt,
            color: theme.ink, cursor: 'pointer',
            borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z"
                stroke={theme.accent} strokeWidth="1.8" strokeLinejoin="round"
                fill={theme.accent} fillOpacity={0.12}/>
            </svg>
            Ask Claude about my weight trend
          </button>
        )}

        {needsUpdate && (
          <div style={{
            marginTop: 14, padding: '10px 12px',
            background: theme.surfaceAlt, borderRadius: theme.radius.btn,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <div style={{
              width: 6, height: 6, borderRadius: 3, background: theme.accent, flexShrink: 0,
            }}/>
            <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, flex: 1 }}>
              Last weigh-in was {daysSince} days ago. Log a new one to keep your trend accurate.
            </div>
          </div>
        )}

        {/* Next weigh-in reminder */}
        {lastDate && nextWeighIsoStr && (
          <div onClick={() => setShowWeightEntry(true)} style={{
            marginTop: 10, padding: '10px 12px', cursor: 'pointer',
            background: weighInOverdue
              ? 'rgba(217,107,92,0.12)'
              : (weighInToday ? 'rgba(224,162,74,0.14)' : theme.surfaceAlt),
            border: `1px solid ${weighInOverdue ? 'rgba(217,107,92,0.45)'
              : (weighInToday ? 'rgba(224,162,74,0.5)' : theme.line)}`,
            borderRadius: theme.radius.btn,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 700,
              color: weighInOverdue ? '#B23A2A' : (weighInToday ? '#8A5A1F' : theme.inkSoft),
              letterSpacing: '0.08em', textTransform: 'uppercase',
            }}>{weighInOverdue ? 'Overdue'
              : weighInToday ? 'Weigh in today'
              : 'Next weigh-in'}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 13, fontWeight: 600,
              color: weighInOverdue ? '#B23A2A' : (weighInToday ? '#8A5A1F' : theme.ink),
            }}>
              {weighInOverdue
                ? `${Math.abs(daysUntilNext)}d late`
                : weighInToday ? 'Tap to log'
                : `in ${daysUntilNext}d · ${nextWeighIsoStr}`}
            </div>
          </div>
        )}

        {weightLog.length > 0 && (
          <button onClick={async () => {
            const n = weightLog.length;
            if (!confirm(`Delete all ${n} weight ${n === 1 ? 'entry' : 'entries'}? This cannot be undone.`)) return;
            try {
              const u = (await window.sb.auth.getUser()).data?.user;
              if (u) {
                const r = await window.sb.from('weight_logs').delete().eq('user_id', u.id);
                if (r.error) { alert('Cloud delete failed: ' + r.error.message); return; }
              }
              setWeightLog([]);
              try { localStorage.removeItem('cal_weight'); } catch {}
            } catch (e) { alert('Delete failed: ' + e.message); }
          }} style={{
            marginTop: 10, padding: '6px 10px', border: 'none',
            background: 'transparent', color: theme.inkMute, cursor: 'pointer',
            fontFamily: theme.font, fontSize: 11, fontWeight: 500,
            textDecoration: 'underline', textUnderlineOffset: 3,
          }}>Clear weight history</button>
        )}
      </div>

      {askWeight && (
        <AskWeightSheet theme={theme}
          weightLog={weightLog} targets={targets}
          onClose={() => setAskWeight(false)}/>
      )}

      {showWeightEntry && (
        <WeightEntrySheet theme={theme}
          onClose={() => setShowWeightEntry(false)}
          onSave={kg => {
            const iso = todayLocalIso();
            const filtered = weightLog.filter(w => w.iso !== iso);
            setWeightLog([...filtered, { iso, kg }].sort((a, b) => a.iso.localeCompare(b.iso)));
            setShowWeightEntry(false);
          }}
          current={latest ? latest.kg : 75}/>
      )}
    </React.Fragment>
  );
}

// ─────────────────────────────────────────────────────────────
// Exercise calendar — Week / Month / Year views with filter chips
// ─────────────────────────────────────────────────────────────
function ExerciseCalendar({ theme, bucket, range, exByDate, selectedType, setSelectedType, EX_COLOR_MAP, onOpenDate, restDays = new Set() }) {
  const [chipExpanded, setChipExpanded] = React.useState(false);
  if (!bucket || !bucket.bars || !bucket.bars.length) return null;
  const todayIso = todayLocalIso();

  // Collect the list of ISO dates to scan for per-type totals.
  // Month & Week: bars are days. Year: bars are months, so walk each month's days.
  const scanDates = React.useMemo(() => {
    if (range === 'Year') {
      const out = [];
      bucket.bars.forEach(b => {
        const dim = new Date(b.y, b.m + 1, 0).getDate();
        for (let d = 1; d <= dim; d++) {
          const mm = String(b.m + 1).padStart(2, '0');
          const dd = String(d).padStart(2, '0');
          out.push(`${b.y}-${mm}-${dd}`);
        }
      });
      return out;
    }
    return bucket.bars.map(b => b.iso);
  }, [bucket, range]);

  // Per-type totals (minutes + distance) for chip labels
  const typeTotals = {};
  scanDates.forEach(iso => {
    const ex = exByDate[iso];
    if (!ex || !ex.byType) return;
    Object.entries(ex.byType).forEach(([t, v]) => {
      if ((v.min || 0) > 0 || (v.km || 0) > 0 || (v.kcal || 0) > 0) {
        if (!typeTotals[t]) typeTotals[t] = { min: 0, km: 0 };
        typeTotals[t].min += v.min || 0;
        typeTotals[t].km  += v.km  || 0;
      }
    });
  });
  const types = Object.keys(typeTotals).sort((a, b) => typeTotals[b].min - typeTotals[a].min);

  const fmtChipValue = (t) => {
    const v = typeTotals[t];
    const parts = [];
    if (v.km > 0) parts.push(`${v.km.toFixed(v.km < 10 ? 1 : 0)} km`);
    parts.push(`${Math.round(v.min)} min`);
    return parts.join(' · ');
  };

  // Day cell renderer — shared by Week + Month + Year
  const DayCell = ({ iso, dayNum, size, fontSize, dotSize }) => {
    const ex = exByDate[iso];
    const dayTypes = ex && ex.byType
      ? Object.entries(ex.byType)
          .filter(([, v]) => (v.min || 0) > 0 || (v.km || 0) > 0 || (v.kcal || 0) > 0)
          .map(([t]) => t)
      : [];
    const isToday = iso === todayIso;
    const isFuture = iso > todayIso;
    const isRest = restDays.has(iso);
    const hasSelected = selectedType && dayTypes.includes(selectedType);
    const anyLogged = dayTypes.length > 0;
    const dimCell = selectedType && anyLogged && !hasSelected;
    const borderColor = hasSelected
      ? (EX_COLOR_MAP[selectedType] || theme.accent)
      : (isToday ? theme.ink : (isRest ? '#7A8BD1' : theme.line));
    const borderWidth = hasSelected || isToday || isRest ? 1.5 : 1;
    return (
      <div
        onClick={() => !isFuture && onOpenDate && onOpenDate(iso)}
        style={{
          width: size, height: size,
          background: isFuture ? theme.bg : (isRest ? 'rgba(122,139,209,0.12)' : theme.surface),
          border: `${borderWidth}px ${isToday ? 'dashed' : 'solid'} ${borderColor}`,
          borderRadius: 8, position: 'relative',
          cursor: isFuture ? 'default' : 'pointer',
          opacity: isFuture ? 0.5 : (dimCell ? 0.5 : 1),
          transition: 'opacity 0.15s, border 0.15s',
        }}
        title={`${iso}${isRest ? ' · Rest day' : ''}${anyLogged ? ` · ${dayTypes.join(', ')}` : ''}`}
      >
        {isRest && (
          <div style={{
            position: 'absolute', top: 2, right: 3,
            fontSize: Math.max(8, fontSize - 2), lineHeight: 1,
          }}>🌙</div>
        )}
        <div style={{
          position: 'absolute', top: 3, left: 5,
          fontFamily: theme.font, fontSize,
          fontWeight: isToday ? 700 : (anyLogged ? 600 : 400),
          color: isFuture ? theme.inkMute : theme.ink,
        }}>{dayNum}</div>
        {anyLogged && (
          <div style={{
            position: 'absolute', bottom: 4, left: 0, right: 0,
            display: 'flex', justifyContent: 'center', gap: 2, flexWrap: 'wrap',
          }}>
            {dayTypes.slice(0, 4).map((t, di) => {
              const faded = selectedType && t !== selectedType;
              return (
                <div key={di} style={{
                  width: dotSize, height: dotSize, borderRadius: dotSize / 2,
                  background: faded ? '#E6E3DC' : (EX_COLOR_MAP[t] || '#8A8A8A'),
                }}/>
              );
            })}
            {dayTypes.length > 4 && (
              <div style={{ fontSize: 8, color: theme.inkMute, lineHeight: 1 }}>+{dayTypes.length - 4}</div>
            )}
          </div>
        )}
      </div>
    );
  };

  // Build the grid body depending on range
  let gridNode = null;

  if (range === 'Week') {
    // bars are 7 days already in order
    const cellSize = 46;
    const gap = 4;
    const gridW = cellSize * 7 + gap * 6;
    gridNode = (
      <div>
        <div style={{
          display: 'grid', gridTemplateColumns: `repeat(7, ${cellSize}px)`,
          gap: `${gap}px`, marginBottom: 6, maxWidth: gridW,
        }}>
          {bucket.bars.map((b, i) => (
            <div key={i} style={{
              textAlign: 'center', fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkMute, letterSpacing: '0.04em',
            }}>{['S','M','T','W','T','F','S'][b.dow]}</div>
          ))}
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: `repeat(7, ${cellSize}px)`,
          gap: `${gap}px`, maxWidth: gridW,
        }}>
          {bucket.bars.map((b, i) => (
            <DayCell key={i} iso={b.iso} dayNum={b.d} size={cellSize} fontSize={11} dotSize={7}/>
          ))}
        </div>
      </div>
    );
  } else if (range === 'Month') {
    const first = bucket.bars[0];
    const y = first.y, m = first.m;
    const monthStart = new Date(y, m, 1);
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const firstDowMon = (monthStart.getDay() + 6) % 7;
    const cells = firstDowMon + daysInMonth;
    const rows = Math.ceil(cells / 7);
    const cellSize = 42;
    const gap = 4;
    const gridW = cellSize * 7 + gap * 6;
    const buildIso = (day) => {
      const mm = String(m + 1).padStart(2, '0');
      const dd = String(day).padStart(2, '0');
      return `${y}-${mm}-${dd}`;
    };
    gridNode = (
      <div>
        <div style={{
          display: 'grid', gridTemplateColumns: `repeat(7, ${cellSize}px)`,
          gap: `${gap}px`, marginBottom: 6, maxWidth: gridW,
        }}>
          {['M','T','W','T','F','S','S'].map((d, i) => (
            <div key={i} style={{
              textAlign: 'center', fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkMute, letterSpacing: '0.04em',
            }}>{d}</div>
          ))}
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: `repeat(7, ${cellSize}px)`,
          gap: `${gap}px`, maxWidth: gridW,
        }}>
          {Array.from({ length: rows * 7 }).map((_, i) => {
            const dayNum = i - firstDowMon + 1;
            if (dayNum < 1 || dayNum > daysInMonth) {
              return <div key={i} style={{ width: cellSize, height: cellSize }} />;
            }
            return <DayCell key={i} iso={buildIso(dayNum)} dayNum={dayNum} size={cellSize} fontSize={10} dotSize={6}/>;
          })}
        </div>
      </div>
    );
  } else {
    // Year: month summary cards — each shows that month's total minutes + top 3 type dots
    gridNode = (
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8,
      }}>
        {Array.from({ length: 12 }).map((_, mi) => {
          const y = bucket.bars[0].y;
          const dim = new Date(y, mi + 1, 0).getDate();
          const monthTotals = {};
          let anyData = false;
          for (let d = 1; d <= dim; d++) {
            const mm = String(mi + 1).padStart(2, '0');
            const dd = String(d).padStart(2, '0');
            const iso = `${y}-${mm}-${dd}`;
            const ex = exByDate[iso];
            if (!ex || !ex.byType) continue;
            Object.entries(ex.byType).forEach(([t, v]) => {
              const minutes = v.min || 0;
              if (minutes <= 0) return;
              monthTotals[t] = (monthTotals[t] || 0) + minutes;
              anyData = true;
            });
          }
          const monthFirstIso = `${y}-${String(mi + 1).padStart(2, '0')}-01`;
          const isFuture = monthFirstIso > todayIso;
          const topTypes = Object.entries(monthTotals).sort((a, b) => b[1] - a[1]).slice(0, 3);
          const totalMin = Object.values(monthTotals).reduce((s, v) => s + v, 0);
          const hasSelected = selectedType && monthTotals[selectedType];
          const dim_ = selectedType && anyData && !hasSelected;
          return (
            <div key={mi} onClick={() => !isFuture && onOpenDate && onOpenDate(monthFirstIso)}
              style={{
                padding: '8px 10px', height: 68,
                background: isFuture ? theme.bg : theme.surface,
                border: `1px solid ${hasSelected ? (EX_COLOR_MAP[selectedType] || theme.accent) : theme.line}`,
                borderRadius: 8, cursor: isFuture ? 'default' : 'pointer',
                opacity: isFuture ? 0.5 : (dim_ ? 0.5 : 1),
                display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              }}>
              <div style={{
                fontFamily: theme.font, fontSize: 11, fontWeight: 600, color: theme.ink,
              }}>{['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mi]}</div>
              {anyData ? (
                <div>
                  <div style={{ display: 'flex', gap: 2, marginBottom: 2 }}>
                    {topTypes.map(([t], di) => {
                      const faded = selectedType && t !== selectedType;
                      return (
                        <div key={di} style={{
                          width: 6, height: 6, borderRadius: 3,
                          background: faded ? '#E6E3DC' : (EX_COLOR_MAP[t] || '#8A8A8A'),
                        }}/>
                      );
                    })}
                  </div>
                  <div style={{ fontFamily: theme.font, fontSize: 10, color: theme.inkSoft }}>
                    {Math.round(totalMin)} min
                  </div>
                </div>
              ) : (
                <div style={{ fontFamily: theme.font, fontSize: 10, color: theme.inkMute }}>—</div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div style={{
      margin: '0 16px 12px', padding: '18px 20px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
        }}>Exercise · {bucket.label}</div>
        {selectedType && (
          <button onClick={() => setSelectedType(null)} style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: theme.accent, fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            letterSpacing: '0.04em', padding: 0,
          }}>× Clear filter</button>
        )}
      </div>
      <div style={{ fontFamily: theme.font, fontSize: 11, color: theme.inkMute, marginBottom: 12 }}>
        {selectedType ? `Showing ${selectedType} only` : (
          range === 'Year' ? 'Tap a type to filter · tap a month to jump there' : 'Tap a type to filter · tap a day to open it'
        )}
      </div>

      {gridNode}

      {types.length > 0 && (() => {
        const MAX_VISIBLE = 6;
        const [expanded, setExpanded] = [chipExpanded, setChipExpanded];
        const visible = expanded ? types : types.slice(0, MAX_VISIBLE);
        const hiddenCount = types.length - visible.length;
        // Always keep the selected chip visible even if it's past the cap
        const withSelected = selectedType && !visible.includes(selectedType)
          ? [...visible, selectedType]
          : visible;
        return (
          <div style={{ marginTop: 16 }}>
            <div style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkMute, letterSpacing: '0.1em', marginBottom: 8,
            }}>TAP TO FILTER</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {withSelected.map(t => {
                const active = selectedType === t;
                const color = EX_COLOR_MAP[t] || '#8A8A8A';
                return (
                  <button key={t}
                    onClick={() => setSelectedType(active ? null : t)}
                    style={{
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      padding: '6px 12px', borderRadius: 14,
                      background: active ? color : 'transparent',
                      border: `1px solid ${active ? color : theme.line}`,
                      cursor: 'pointer',
                      fontFamily: theme.font, fontSize: 12,
                      fontWeight: active ? 700 : 600,
                      color: active ? '#FFFFFF' : theme.inkSoft,
                      letterSpacing: '0.02em',
                    }}>
                    <span style={{
                      width: 8, height: 8, borderRadius: 4,
                      background: active ? '#FFFFFF' : color,
                    }}/>
                    {t} · {fmtChipValue(t)}
                  </button>
                );
              })}
              {hiddenCount > 0 && !expanded && (
                <button onClick={() => setExpanded(true)} style={{
                  padding: '6px 12px', borderRadius: 14,
                  background: 'transparent', border: `1px dashed ${theme.line}`,
                  cursor: 'pointer',
                  fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                  color: theme.inkSoft,
                }}>+{hiddenCount} more</button>
              )}
              {expanded && types.length > MAX_VISIBLE && (
                <button onClick={() => setExpanded(false)} style={{
                  padding: '6px 12px', borderRadius: 14,
                  background: 'transparent', border: `1px dashed ${theme.line}`,
                  cursor: 'pointer',
                  fontFamily: theme.font, fontSize: 12, fontWeight: 600,
                  color: theme.inkSoft,
                }}>Show less</button>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function ProgressScreen({ theme, targets, setTargets, exerciseLog = [], weightLog = [], setWeightLog, log = [], setTab, setLogDate, settings = {}, setSettings, wellnessMap = {} }) {
  const [range, setRange] = useStateProg('Week');
  const [offset, setOffset] = useStateProg(0);
  const [selIdx, setSelIdx] = useStateProg(null); // index within bucket
  const [selSet, setSelSet] = useStateProg(() => new Set()); // multi-select
  const [askOpen, setAskOpen] = React.useState(false);
  const [trendDrill, setTrendDrill] = React.useState(null); // { key, label, unit, color }
  const [chartMetric, setChartMetric] = React.useState('kcal'); // 'kcal' | 'exKcal' | 'exMin'
  const [selectedExType, setSelectedExType] = React.useState(null);

  // Exercise totals per ISO date (overall + per-type breakdown)
  const exByDate = React.useMemo(() => {
    const m = {};
    (exerciseLog || []).forEach(e => {
      if (!e.date) return;
      if (!m[e.date]) m[e.date] = { kcal: 0, min: 0, km: 0, byType: {} };
      m[e.date].kcal += (+e.kcal || 0);
      m[e.date].min += (+e.duration || 0);
      m[e.date].km += (+e.distance || 0);
      const t = e.type || 'Other';
      if (!m[e.date].byType[t]) m[e.date].byType[t] = { kcal: 0, min: 0, km: 0 };
      m[e.date].byType[t].kcal += (+e.kcal || 0);
      m[e.date].byType[t].min += (+e.duration || 0);
      m[e.date].byType[t].km += (+e.distance || 0);
    });
    return m;
  }, [exerciseLog]);
  const EX_COLOR_MAP = (typeof window !== 'undefined' && window.EX_COLORS) || {};

  const bucket = bucketFor(range, offset);
  const data = bucket ? bucket.bars : [];
  const effSel = selIdx != null ? Math.min(selIdx, data.length - 1) : data.length - 1;
  const sel = data[effSel];

  const valueOf = (d) => {
    if (chartMetric === 'exKcal') return exByDate[d.iso]?.kcal || 0;
    if (chartMetric === 'exMin')  return exByDate[d.iso]?.min  || 0;
    return d.kcal || 0;
  };
  const chartGoal = chartMetric === 'kcal' ? targets.kcal
    : chartMetric === 'exKcal' ? (targets.exKcal || 400)
    : (targets.exMin || 30);
  const unitLabel = chartMetric === 'exMin' ? 'min' : 'kcal';
  const avg = data.length ? Math.round(data.reduce((s, d) => s + valueOf(d), 0) / data.length) : 0;
  const maxK = Math.max(...data.map(valueOf), chartGoal);

  React.useEffect(() => { setSelIdx(null); setSelSet(new Set()); }, [range, offset]);

  const canGoForward = offset > 0;
  const canGoBack = bucketFor(range, offset + 1) != null;

  const ranges = ['Week', 'Month', 'Year'];

  return (
    <div style={{
      paddingBottom: 110, background: theme.bg, minHeight: '100%',
    }}>
      {/* Header */}
      <div style={{ padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 20px 16px' }}>
        <div style={{
          fontFamily: theme.titleFont,
          fontSize: theme.name === 'Editorial' ? 40 : 32,
          fontWeight: theme.titleWeight,
          color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.05, marginTop: 2,
          textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
        }}>Trends</div>
      </div>

      {/* Range selector */}
      <div style={{
        margin: '0 16px 12px', padding: 4,
        background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        display: 'flex', gap: 2,
      }}>
        {ranges.map(r => (
          <button key={r} onClick={() => { setRange(r); setOffset(0); }} style={{
            flex: 1, padding: '8px 0', border: 'none', cursor: 'pointer',
            background: range === r ? theme.surface : 'transparent',
            borderRadius: Math.max(0, theme.radius.btn - 4),
            fontFamily: theme.font, fontSize: 13, fontWeight: 600,
            color: range === r ? theme.ink : theme.inkSoft,
            boxShadow: range === r ? '0 1px 2px rgba(0,0,0,0.06)' : 'none',
          }}>{r}</button>
        ))}
      </div>

      {/* Period navigator */}
      <div style={{
        margin: '0 16px 12px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '4px 2px',
      }}>
        <button onClick={() => canGoBack && setOffset(offset + 1)} disabled={!canGoBack} style={{
          width: 32, height: 32, borderRadius: 16, border: 'none',
          background: theme.surface, cursor: canGoBack ? 'pointer' : 'default',
          opacity: canGoBack ? 1 : 0.3,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M8 2L4 6l4 4" stroke={theme.ink} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        <div style={{
          fontFamily: theme.font, fontSize: 14, fontWeight: 600, color: theme.ink,
          letterSpacing: theme.letter,
        }}>{bucket?.label || '—'}</div>
        <button onClick={() => canGoForward && setOffset(offset - 1)} disabled={!canGoForward} style={{
          width: 32, height: 32, borderRadius: 16, border: 'none',
          background: theme.surface, cursor: canGoForward ? 'pointer' : 'default',
          opacity: canGoForward ? 1 : 0.3,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M4 2l4 4-4 4" stroke={theme.ink} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>

      {/* Chart card */}
      {sel && <div style={{
        margin: '0 16px 12px', padding: '20px 20px 16px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>{sel.isToday ? 'Today' : sel.dateLabel}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 36, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1.1, marginTop: 4,
            }}>{Math.round(valueOf(sel)).toLocaleString()}<span style={{
              fontSize: 14, color: theme.inkMute, marginLeft: 4, fontWeight: 400,
            }}>{range === 'Year' ? ' avg/day' : ' ' + unitLabel}</span></div>
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
            }}>
              {(() => {
                const v = Math.round(valueOf(sel));
                return v > chartGoal
                  ? `+${v - chartGoal} over goal`
                  : `${chartGoal - v} under goal`;
              })()}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>{range === 'Year' ? 'Year avg' : range === 'Month' ? 'Month avg' : 'Week avg'}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 22, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, marginTop: 4,
            }}>{avg.toLocaleString()}</div>
          </div>
        </div>

        {/* Primary toggle: Eaten / Exercise */}
        <div style={{
          display: 'flex', gap: 2, padding: 2, marginTop: 14,
          background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        }}>
          {[
            { group: 'food',     label: 'Calories', activeWhen: 'kcal',  setTo: 'kcal' },
            { group: 'exercise', label: 'Exercise', activeWhen: ['exKcal','exMin'], setTo: 'exMin' },
          ].map(({ group, label, activeWhen, setTo }) => {
            const isActive = Array.isArray(activeWhen)
              ? activeWhen.includes(chartMetric)
              : chartMetric === activeWhen;
            return (
              <button key={group} onClick={() => setChartMetric(setTo)} style={{
                flex: 1, padding: '8px 0', border: 'none',
                background: isActive ? theme.surface : 'transparent',
                color: theme.ink, cursor: 'pointer',
                borderRadius: theme.radius.btn - 2,
                fontFamily: theme.font, fontSize: 12,
                fontWeight: isActive ? 700 : 500,
                boxShadow: isActive ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
              }}>{label}</button>
            );
          })}
        </div>

        {/* Secondary toggle: Exercise view — kcal vs min */}
        {(chartMetric === 'exKcal' || chartMetric === 'exMin') && (
          <div style={{
            display: 'flex', gap: 4, marginTop: 10, justifyContent: 'center',
          }}>
            {[['exMin', 'Minutes'], ['exKcal', 'Calories']].map(([k, l]) => (
              <button key={k} onClick={() => setChartMetric(k)} style={{
                padding: '4px 12px', border: `1px solid ${chartMetric === k ? theme.ink : theme.line}`,
                background: chartMetric === k ? theme.ink : 'transparent',
                color: chartMetric === k ? theme.bg : theme.inkSoft,
                borderRadius: 999, cursor: 'pointer',
                fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              }}>{l}</button>
            ))}
          </div>
        )}

        {/* Chart */}
        <div style={{
          marginTop: 16, height: 180, position: 'relative',
          display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
          gap: range === 'Month' ? 2 : (range === 'Year' ? 4 : 6),
        }}>
          <div style={{
            position: 'absolute', left: 0, right: 0,
            bottom: `${(chartGoal / maxK) * 100}%`,
            borderTop: `1px dashed ${theme.inkMute}`, opacity: 0.5,
          }}>
            <span style={{
              position: 'absolute', right: 0, top: -16,
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.06em', textTransform: 'uppercase',
              background: theme.surface, padding: '0 4px',
            }}>Goal {chartGoal}</span>
          </div>

          {data.map((d, i) => {
            const total = valueOf(d);
            const h = (total / maxK) * 100;
            // Selection is driven solely by selSet so tap-to-deselect
            // actually visually deselects. effSel stays for the bucket
            // "default latest" highlight via d.isToday.
            const isSel = selSet.has(i);
            const isExercise = chartMetric === 'exKcal' || chartMetric === 'exMin';
            const exDay = exByDate[d.iso];
            // Build stacked segments for exercise metric
            const segments = isExercise && exDay
              ? Object.entries(exDay.byType || {}).map(([type, vals]) => ({
                  type,
                  v: chartMetric === 'exKcal' ? vals.kcal : vals.min,
                  color: selectedExType && type !== selectedExType
                    ? '#E6E3DC'
                    : (EX_COLOR_MAP[type] || '#8A8A8A'),
                })).filter(s => s.v > 0)
              : null;
            return (
              <div key={i} onClick={() => {
                setSelSet(prev => {
                  const next = new Set(prev);
                  if (next.has(i)) {
                    next.delete(i);
                    // If this was the "focus" idx, clear that too so the
                    // drilldown/inspector doesn't still point to the
                    // just-deselected bar.
                    if (selIdx === i) setSelIdx(null);
                  } else {
                    next.add(i);
                    setSelIdx(i);
                  }
                  return next;
                });
              }} style={{
                flex: 1, display: 'flex', flexDirection: 'column',
                alignItems: 'center', gap: 6, cursor: 'pointer', height: '100%',
                justifyContent: 'flex-end', minWidth: 0,
              }}>
                {segments && segments.length > 0 ? (
                  <div style={{
                    width: '100%', maxWidth: range === 'Month' ? 14 : 28, height: `${h}%`,
                    display: 'flex', flexDirection: 'column-reverse',
                    borderRadius: theme.name === 'Editorial' ? 0 : (theme.name === 'Warm' ? 6 : 3),
                    overflow: 'hidden', opacity: isSel ? 1 : 0.85,
                    border: isSel ? `1px solid ${theme.ink}` : 'none',
                  }}>
                    {segments.map((s, si) => (
                      <div key={si} style={{
                        height: `${(s.v / total) * 100}%`, background: s.color,
                        transition: 'background 0.15s',
                      }}/>
                    ))}
                  </div>
                ) : (
                <div style={{
                  width: '100%', maxWidth: range === 'Month' ? 14 : 28, height: `${h}%`,
                  background: isSel ? theme.accent : (d.isToday ? theme.ink : theme.surfaceAlt),
