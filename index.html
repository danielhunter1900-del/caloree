// Shared exercise type → color / icon / MET maps.
// Mutated at runtime to merge in user-defined custom types from settings.
const EX_COLORS = {
  Run: '#5FA8C9', Cycling: '#7A8BD1', Walk: '#A0725A',
  Strength: '#D96B5C', Calisthenics: '#E0A24A',
  HIIT: '#C25A8E', Mobility: '#5C9A6E', Other: '#8A8A8A',
};
const EX_ICONS = {
  Run: '🏃', Cycling: '🚴', Walk: '🚶', Strength: '🏋️',
  Calisthenics: '🤸', HIIT: '🔥', Mobility: '🧘', Other: '⚡',
};
const EX_METS = {
  Run: 9.8, Cycling: 7.5, Walk: 3.8, Strength: 5.0,
  Calisthenics: 6.0, HIIT: 8.0, Mobility: 2.5, Other: 5.0,
};
// Palette used to auto-assign colors to newly added custom types
const EX_PALETTE = [
  '#6DAF6D', '#3FA3C2', '#B87A3A', '#9B7AD6',
  '#D6A74A', '#5570A8', '#8FA33F', '#DC8A6E',
  '#6BAF92', '#C47A9A',
];
window.EX_COLORS = EX_COLORS;
window.EX_ICONS = EX_ICONS;
window.EX_METS = EX_METS;

// Apply user-defined custom types (from settings.customExerciseTypes)
// into the global maps so existing render paths auto-pick them up.
function applyCustomExerciseTypes(custom) {
  (custom || []).forEach(c => {
    if (!c || !c.name) return;
    EX_COLORS[c.name] = c.color || EX_PALETTE[0];
    EX_ICONS[c.name]  = c.icon  || '⚡';
    EX_METS[c.name]   = +c.met  || 5.0;
  });
}
window.applyCustomExerciseTypes = applyCustomExerciseTypes;

function nextCustomExerciseColor(custom, defaults = EX_COLORS) {
  const used = new Set([
    ...Object.values(defaults),
    ...(custom || []).map(c => c.color).filter(Boolean),
  ]);
  return EX_PALETTE.find(c => !used.has(c)) || EX_PALETTE[(custom || []).length % EX_PALETTE.length];
}
window.nextCustomExerciseColor = nextCustomExerciseColor;

function ExerciseCard({ theme, entries, exerciseLog = [], onAdd, onDelete, onUpdateType, onUpdate, customTypes = [], onAddCustomType, locked }) {
  const ICONS = { ...(window.EX_ICONS || {}) };
  customTypes.forEach(c => { if (c && c.name) ICONS[c.name] = c.icon || '⚡'; });
  const TYPES = Object.keys(ICONS);
  const [editingFull, setEditingFull] = React.useState(null); // the entry being edited
  const [detailEntry, setDetailEntry] = React.useState(null); // read-only detail view
  const [open, setOpen] = React.useState(true);
  const totalKcal = entries.reduce((s, e) => s + (+e.kcal || 0), 0);
  const totalMin = entries.reduce((s, e) => s + (+e.duration || 0), 0);
  return (
    <div style={{
      margin: '0 16px 12px', background: theme.surface,
      borderRadius: theme.radius.card, overflow: 'hidden',
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      boxShadow: theme.name === 'Editorial' ? 'none' : '0 1px 2px rgba(0,0,0,0.03)',
    }}>
      <button onClick={() => entries.length && setOpen(!open)} style={{
        width: '100%', padding: '14px 18px 10px', border: 'none',
        cursor: entries.length ? 'pointer' : 'default',
        background: 'transparent',
        borderBottom: (open && entries.length) ? `0.5px solid ${theme.line}` : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
          <span style={{
            fontFamily: theme.titleFont, fontSize: 17, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
            textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
          }}>Exercise</span>
          {entries.length > 0 && (
            <span style={{
              fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
              color: theme.inkSoft, letterSpacing: theme.letter,
            }}>{totalMin} min · {Math.round(totalKcal)} kcal</span>
          )}
          {!open && entries.length > 0 && (
            <span style={{ fontSize: 11, color: theme.inkMute }}>
              ({entries.map(e => ICONS[e.type]).join(' ')})
            </span>
          )}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {!locked && (
            <span onClick={(ev) => { ev.stopPropagation(); onAdd(); }} style={{
              width: 26, height: 26, borderRadius: 13,
              background: theme.surfaceAlt, cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: theme.ink, fontFamily: theme.font, fontSize: 18, lineHeight: 1,
              paddingBottom: 2,
            }}>+</span>
          )}
          {entries.length > 0 && (
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
              style={{ transform: open ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.15s' }}>
              <path d="M2 4l4 4 4-4" stroke={theme.inkMute} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
      </button>
      {open && entries.map((e, i) => (
        <div key={e.id} style={{
          padding: '10px 18px',
          display: 'flex', alignItems: 'center', gap: 12,
          borderBottom: i < entries.length - 1 ? `0.5px solid ${theme.line}` : 'none',
        }}>
          <span style={{ fontSize: 20 }}>{ICONS[e.type] || '⚡'}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div onClick={() => setDetailEntry(e)}
              style={{
                fontFamily: theme.font, fontSize: 14, fontWeight: 500, color: theme.ink,
                cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4,
              }}>{e.details?.name || e.type}{e.details?.name ? ` · ${e.type}` : ''}{e.type === 'Run' && e.details?.runType ? ` · ${e.details.runType}` : ''}{e.distance ? ` · ${(+e.distance).toFixed(2)} km` : ''}
              <span style={{ color: theme.inkMute, fontSize: 10 }}>›</span>
            </div>
            {(e.notes || e.duration) && (
              <div style={{
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              }}>{e.duration ? `${e.duration} min` : ''}{e.duration && e.notes ? ' · ' : ''}{e.notes || ''}</div>
            )}
          </div>
          <div style={{
            fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight, color: theme.ink,
          }}>{e.kcal ? `${Math.round(e.kcal)} kcal` : ''}</div>
          {!locked && (
            <button onClick={() => onDelete(e.id)} title="Delete" style={{
              border: 'none', background: 'none', cursor: 'pointer',
              fontSize: 16, color: theme.inkMute, padding: '0 4px', lineHeight: 1,
            }}>×</button>
          )}
        </div>
      ))}
      {editingFull && (
        <ExerciseEditSheet theme={theme} entry={editingFull}
          customTypes={customTypes}
          onAddCustomType={onAddCustomType}
          onClose={() => setEditingFull(null)}
          onSave={(updated) => { onUpdate && onUpdate(updated); setEditingFull(null); setDetailEntry(updated); }}/>
      )}
      {detailEntry && !editingFull && (
        <ExerciseDetailSheet theme={theme} entry={detailEntry} exerciseLog={exerciseLog}
          onClose={() => setDetailEntry(null)}
          onEdit={() => setEditingFull(detailEntry)}
          onDelete={(id) => { setDetailEntry(null); onDelete(id); }}/>
      )}
    </div>
  );
}

const RUN_SUBTYPES = ['Easy', 'Long', 'Speed', 'Steady'];

// Read-only detail view for an exercise entry. Shows rich data
// (HR, pace, splits, laps, best efforts, power, cadence, elevation)
// for Strava-sourced activities; falls back to basic fields for
// manually logged ones.
function ExerciseDetailSheet({ theme, entry, exerciseLog = [], onClose, onEdit, onDelete }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { const id = requestAnimationFrame(() => setVisible(true)); return () => cancelAnimationFrame(id); }, []);

  // Lock body scroll + swallow backdrop touchmoves (iOS scroll-trap fix).
  const panelRef = React.useRef(null);
  React.useEffect(() => {
    const onTouchMove = (e) => {
      const panel = panelRef.current;
      if (panel && panel.contains(e.target)) {
        if (panel.scrollHeight > panel.clientHeight + 1) return;
      }
      if (e.cancelable) e.preventDefault();
    };
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    return () => document.removeEventListener('touchmove', onTouchMove);
  }, []);

  const d = entry.details || {};
  const ICONS = (window.EX_ICONS || {});
  const icon = ICONS[entry.type] || '⚡';
  const isStrava = d.source === 'strava';

  const fmt2 = (n) => (n == null ? null : (+n).toFixed(2));
  const fmtInt = (n) => (n == null ? null : Math.round(+n));
  const fmtDuration = (min) => {
    if (!min) return null;
    const h = Math.floor(min / 60); const m = Math.round(min % 60);
    return h > 0 ? `${h}h ${m}m` : `${m} min`;
  };
  const fmtPace = (s) => {
    if (!s) return null;
    const m = Math.floor(s / 60); const r = Math.round(s % 60);
    return `${m}:${String(r).padStart(2, '0')}/km`;
  };

  // Big stats row
  const hero = [
    entry.duration ? { label: 'Duration', value: fmtDuration(+entry.duration) } : null,
    entry.distance ? { label: 'Distance', value: `${fmt2(entry.distance)} km` } : null,
    entry.kcal    ? { label: 'Calories', value: `${fmtInt(entry.kcal)}` } : null,
  ].filter(Boolean);

  // Secondary stats grid
  const secondary = [
    d.pace_sec_per_km    ? { k: 'Pace',         v: fmtPace(d.pace_sec_per_km) } : null,
    d.average_heartrate  ? { k: 'Avg HR',       v: `${fmtInt(d.average_heartrate)} bpm` } : null,
    d.max_heartrate      ? { k: 'Max HR',       v: `${fmtInt(d.max_heartrate)} bpm` } : null,
    d.average_cadence    ? { k: 'Cadence',      v: entry.type === 'Run'
        ? `${fmtInt(d.average_cadence * 2)} spm`
        : `${fmtInt(d.average_cadence)} rpm` } : null,
    d.average_watts      ? { k: 'Avg power',    v: `${fmtInt(d.average_watts)} W` } : null,
    d.max_watts          ? { k: 'Max power',    v: `${fmtInt(d.max_watts)} W` } : null,
    d.elevation_gain_m   ? { k: 'Elev gain',    v: `${fmtInt(d.elevation_gain_m)} m` } : null,
    d.suffer_score       ? { k: 'Effort',       v: `${fmtInt(d.suffer_score)}` } : null,
    d.average_speed_mps && !d.pace_sec_per_km
      ? { k: 'Avg speed',   v: `${(d.average_speed_mps * 3.6).toFixed(1)} km/h` } : null,
  ].filter(Boolean);

  const dateLabel = d.start_date_local
    ? new Date(d.start_date_local).toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
    : (entry.date || '');

  const labelStyle = {
    fontFamily: theme.font, fontSize: 10, fontWeight: 600,
    color: theme.inkSoft, letterSpacing: '0.08em', textTransform: 'uppercase',
  };

  return ReactDOM.createPortal(
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0,
      background: `rgba(0,0,0,${visible ? 0.5 : 0})`,
      zIndex: 10002, display: 'flex', alignItems: 'flex-end',
      transition: 'background 0.25s ease-out',
    }}>
      <div ref={panelRef}
        onClick={(e) => e.stopPropagation()}
        style={{
          width: '100%', background: theme.bg,
          borderTopLeftRadius: 20, borderTopRightRadius: 20,
          height: '92vh', overflowY: 'auto',
          WebkitOverflowScrolling: 'touch', overscrollBehavior: 'contain',
          touchAction: 'pan-y',
          transform: visible ? 'translateY(0)' : 'translateY(100%)',
          transition: 'transform 0.42s cubic-bezier(0.2, 1.15, 0.3, 1)',
          display: 'flex', flexDirection: 'column',
        }}>
        {/* Header */}
        <div style={{ padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}` }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: theme.line, margin: '0 auto 12px' }}/>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10 }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center', minWidth: 0, flex: 1 }}>
              <span style={{ fontSize: 28 }}>{icon}</span>
              <div style={{ minWidth: 0 }}>
                <div style={{
                  fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
                  color: theme.ink, letterSpacing: theme.letter,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                }}>{d.name || entry.type}</div>
                <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2 }}>
                  {entry.type}{d.runType ? ` · ${d.runType}` : ''}{isStrava ? ' · Strava' : ''}{dateLabel ? ` · ${dateLabel}` : ''}
                </div>
              </div>
            </div>
            <button onClick={onClose} style={{
              background: 'none', border: 'none', color: theme.inkSoft, cursor: 'pointer',
              fontSize: 22, padding: 4, lineHeight: 1, flexShrink: 0,
            }}>×</button>
          </div>
        </div>

        {/* Scrollable content */}
        <div style={{ flex: 1, padding: '18px 18px 100px' }}>
          {/* Hero stats */}
          {hero.length > 0 && (
            <div style={{
              display: 'grid', gridTemplateColumns: `repeat(${hero.length}, 1fr)`, gap: 12,
              padding: '14px 16px', background: theme.surface,
              borderRadius: theme.radius.card, marginBottom: 14,
              border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
            }}>
              {hero.map(h => (
                <div key={h.label}>
                  <div style={labelStyle}>{h.label}</div>
                  <div style={{
                    fontFamily: theme.numFont, fontSize: 22, fontWeight: theme.numWeight,
                    color: theme.ink, letterSpacing: theme.letter, marginTop: 4,
                  }}>{h.value}</div>
                </div>
              ))}
            </div>
          )}

          {/* Map — decoded Strava summary_polyline. Pure SVG, no external deps. */}
          {d.map_polyline && (() => {
            // Google polyline decoder — returns array of [lat, lng] points.
            const decode = (s) => {
              const pts = []; let idx = 0, lat = 0, lng = 0;
              while (idx < s.length) {
                let result = 1, shift = 0, b;
                do { b = s.charCodeAt(idx++) - 63 - 1; result += b << shift; shift += 5; } while (b >= 0x1f);
                lat += (result & 1) ? ~(result >> 1) : (result >> 1);
                result = 1; shift = 0;
                do { b = s.charCodeAt(idx++) - 63 - 1; result += b << shift; shift += 5; } while (b >= 0x1f);
                lng += (result & 1) ? ~(result >> 1) : (result >> 1);
                pts.push([lat * 1e-5, lng * 1e-5]);
              }
              return pts;
            };
            let pts;
            try { pts = decode(d.map_polyline); } catch { return null; }
            if (!pts || pts.length < 2) return null;
            const lats = pts.map(p => p[0]), lngs = pts.map(p => p[1]);
            const minLat = Math.min(...lats), maxLat = Math.max(...lats);
            const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
            const W = 320, H = 140, PAD = 10;
            const spanLat = maxLat - minLat || 1;
            const spanLng = maxLng - minLng || 1;
            // Keep aspect ratio for the path
            const scale = Math.min((W - 2 * PAD) / spanLng, (H - 2 * PAD) / spanLat);
            const offsetX = (W - spanLng * scale) / 2;
            const offsetY = (H - spanLat * scale) / 2;
            const path = pts.map(([la, ln], i) => {
              const x = offsetX + (ln - minLng) * scale;
              const y = offsetY + (maxLat - la) * scale;
              return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const firstX = offsetX + (lngs[0] - minLng) * scale;
            const firstY = offsetY + (maxLat - lats[0]) * scale;
            const lastX = offsetX + (lngs[lngs.length-1] - minLng) * scale;
            const lastY = offsetY + (maxLat - lats[lats.length-1]) * scale;
            return (
              <div style={{
                marginBottom: 14, padding: 0, overflow: 'hidden',
                borderRadius: theme.radius.card,
                border: `1px solid ${theme.line}`,
                background: 'linear-gradient(135deg, #E8F0E8 0%, #C9DDD0 100%)',
              }}>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
                  <path d={path} fill="none" stroke="#FC4C02"
                    strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  <circle cx={firstX} cy={firstY} r="4" fill="#2B7A5C" stroke="#fff" strokeWidth="1.5"/>
                  <circle cx={lastX} cy={lastY} r="4" fill="#D96B5C" stroke="#fff" strokeWidth="1.5"/>
                </svg>
              </div>
            );
          })()}

          {/* Per-km splits — bars sized by pace (faster = taller). */}
          {Array.isArray(d.splits_km) && d.splits_km.length >= 2 && (() => {
            const splits = d.splits_km;
            const paces = splits.map(s => s.pace_sec_per_km || (s.seconds && s.distance ? Math.round(s.seconds / ((s.distance || 1) / 1000)) : null)).filter(p => p);
            if (paces.length < 2) return null;
            const minPace = Math.min(...paces), maxPace = Math.max(...paces);
            const avgPace = paces.reduce((a, b) => a + b, 0) / paces.length;
            const fmt = (p) => { const m = Math.floor(p / 60); const s = p % 60; return `${m}:${String(s).padStart(2,'0')}`; };
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4, display: 'flex', justifyContent: 'space-between' }}>
                  <span>Splits (km)</span>
                  <span style={{ color: theme.inkMute, fontWeight: 500, textTransform: 'none', letterSpacing: 0 }}>
                    avg {fmt(Math.round(avgPace))}/km
                  </span>
                </div>
                <div style={{
                  padding: '16px 14px 10px', background: theme.surface,
                  borderRadius: theme.radius.btn, border: `1px solid ${theme.line}`,
                  display: 'flex', alignItems: 'flex-end', gap: 4, height: 80,
                }}>
                  {splits.map((s, i) => {
                    const p = s.pace_sec_per_km || (s.seconds && s.distance ? Math.round(s.seconds / ((s.distance || 1) / 1000)) : null);
                    if (!p) return <div key={i} style={{ flex: 1 }}/>;
                    // Faster pace = smaller number = taller bar.
                    const rel = (maxPace - p) / Math.max(1, maxPace - minPace);
                    const h = 16 + rel * 48;
                    const isFaster = p < avgPace;
                    return (
                      <div key={i} title={`km ${s.km || i+1} · ${fmt(p)}/km`}
                        style={{
                          flex: 1, minWidth: 8, height: h,
                          background: isFaster ? '#2B7A5C' : '#7A8BD1',
                          borderRadius: '3px 3px 0 0',
                          opacity: 0.85,
                        }}/>
                    );
                  })}
                </div>
                <div style={{
                  display: 'flex', justifyContent: 'space-between',
                  padding: '4px 2px 0', fontSize: 10, color: theme.inkMute,
                  fontVariantNumeric: 'tabular-nums',
                }}>
                  <span>km 1</span>
                  <span>km {splits.length}</span>
                </div>
              </div>
            );
          })()}

          {/* Best efforts — PRs from this run (if Strava returned them). */}
          {Array.isArray(d.best_efforts) && d.best_efforts.length > 0 && (() => {
            const prs = d.best_efforts.filter(b => b.pr_rank && b.pr_rank <= 3);
            const all = prs.length ? prs : d.best_efforts.slice(0, 5);
            const fmt = (s) => { const m = Math.floor(s / 60); const r = s % 60; return `${m}:${String(r).padStart(2,'0')}`; };
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>
                  {prs.length ? `Personal records · ${prs.length}` : 'Best efforts'}
                </div>
                <div style={{
                  background: theme.surface, borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`, overflow: 'hidden',
                }}>
                  {all.map((b, i) => (
                    <div key={i} style={{
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                      padding: '9px 14px',
                      borderTop: i > 0 ? `1px solid ${theme.line}` : 'none',
                    }}>
                      <div style={{
                        fontFamily: theme.font, fontSize: 13,
                        color: theme.ink, fontWeight: 500,
                      }}>
                        {b.pr_rank && b.pr_rank <= 3 && (
                          <span style={{
                            display: 'inline-block', marginRight: 8,
                            padding: '1px 6px', borderRadius: 4,
                            background: b.pr_rank === 1 ? '#E0A24A' : (b.pr_rank === 2 ? '#A8A8A8' : '#B8865B'),
                            color: '#fff', fontSize: 10, fontWeight: 700,
                          }}>PR{b.pr_rank > 1 ? ` #${b.pr_rank}` : ''}</span>
                        )}
                        {b.name}
                      </div>
                      <div style={{
                        fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
                        color: theme.ink, fontVariantNumeric: 'tabular-nums',
                      }}>{b.moving_time ? fmt(b.moving_time) : '—'}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* HR zones donut — only when Strava returned a per-zone breakdown. */}
          {Array.isArray(d.hr_zones) && d.hr_zones.length > 0 && (() => {
            const zones = d.hr_zones;
            const total = zones.reduce((s, z) => s + (z.time_s || 0), 0);
            if (!total) return null;
            const ZC = ['#7A8BD1', '#5FA8C9', '#2B7A5C', '#E0A24A', '#D96B5C'];
            const CX = 50, CY = 50, R = 34, SW = 10;
            const C = 2 * Math.PI * R;
            let offset = 0;
            const arcs = zones.map((z, i) => {
              const frac = (z.time_s || 0) / total;
              const len = frac * C;
              const node = (
                <circle key={i} cx={CX} cy={CY} r={R}
                  fill="none" stroke={ZC[i] || '#888'}
                  strokeWidth={SW}
                  strokeDasharray={`${len} ${C}`}
                  strokeDashoffset={-offset}
                  transform={`rotate(-90 ${CX} ${CY})`}/>
              );
              offset += len;
              return node;
            });
            const fmtMin = (s) => {
              const m = Math.floor(s / 60);
              return m > 0 ? `${m}m` : `${s}s`;
            };
            const avg = entry.details?.average_heartrate ? Math.round(entry.details.average_heartrate) : null;
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>
                  Heart-rate zones
                </div>
                <div style={{
                  display: 'flex', gap: 14, padding: '14px 14px',
                  background: theme.surface, borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`, alignItems: 'center',
                }}>
                  <div style={{ position: 'relative', width: 100, height: 100, flexShrink: 0 }}>
                    <svg width="100" height="100" viewBox="0 0 100 100">
                      <circle cx={CX} cy={CY} r={R} fill="none"
                        stroke={theme.surfaceAlt} strokeWidth={SW}/>
                      {arcs}
                    </svg>
                    {avg && (
                      <div style={{
                        position: 'absolute', inset: 0, display: 'flex',
                        flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                        fontFamily: theme.font, fontSize: 10, color: theme.inkSoft,
                      }}>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 18, fontWeight: theme.numWeight,
                          color: theme.ink, lineHeight: 1,
                        }}>{avg}</div>
                        <div>avg bpm</div>
                      </div>
                    )}
                  </div>
                  <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 12px' }}>
                    {zones.map((z, i) => {
                      const pct = Math.round((z.time_s / total) * 100);
                      const label = z.min != null && z.max != null && z.max !== -1
                        ? `Z${i+1} ${z.min}–${z.max}`
                        : `Z${i+1} ${z.min || ''}+`;
                      return (
                        <div key={i} style={{
                          display: 'flex', alignItems: 'center', gap: 5,
                          fontFamily: theme.font, fontSize: 11,
                        }}>
                          <span style={{
                            width: 8, height: 8, borderRadius: 4,
                            background: ZC[i] || '#888', flexShrink: 0,
                          }}/>
                          <span style={{ color: theme.inkSoft, flex: 1, minWidth: 0,
                            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {label}
                          </span>
                          <span style={{
                            fontFamily: theme.numFont, fontWeight: 600, color: theme.ink,
                            fontVariantNumeric: 'tabular-nums',
                          }}>{fmtMin(z.time_s)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Vs last 4 sessions of the same type — computed from exerciseLog.
              Shows the most informative of duration / distance / avg HR / pace. */}
          {(() => {
            if (!entry.type || !exerciseLog || exerciseLog.length < 2) return null;
            const sameType = exerciseLog
              .filter(e => e.type === entry.type && e.id !== entry.id && e.date && e.date <= (entry.date || entry.details?.start_date_local || ''))
              .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
              .slice(0, 4);
            if (sameType.length < 2) return null;
            const metrics = [];
            const curDur = +entry.duration || 0;
            const prevDur = sameType.map(e => +e.duration || 0).filter(v => v);
            if (curDur && prevDur.length >= 2) {
              const avg = prevDur.reduce((a,b)=>a+b,0)/prevDur.length;
              metrics.push({ k: 'Duration', cur: `${Math.round(curDur)}m`,
                delta: Math.round(curDur - avg), unit: 'm', good: null });
            }
            const curDist = +entry.distance || 0;
            const prevDist = sameType.map(e => +e.distance || 0).filter(v => v);
            if (curDist && prevDist.length >= 2) {
              const avg = prevDist.reduce((a,b)=>a+b,0)/prevDist.length;
              metrics.push({ k: 'Distance', cur: `${curDist.toFixed(1)}km`,
                delta: +(curDist - avg).toFixed(1), unit: 'km', good: 1 });
            }
            const curHR = +entry.details?.average_heartrate || 0;
            const prevHR = sameType.map(e => +e.details?.average_heartrate || 0).filter(v => v);
            if (curHR && prevHR.length >= 2) {
              const avg = prevHR.reduce((a,b)=>a+b,0)/prevHR.length;
              metrics.push({ k: 'Avg HR', cur: `${Math.round(curHR)}bpm`,
                delta: Math.round(curHR - avg), unit: 'bpm', good: -1 });
            }
            const curPace = +entry.details?.pace_sec_per_km || 0;
            const prevPace = sameType.map(e => +e.details?.pace_sec_per_km || 0).filter(v => v);
            if (curPace && prevPace.length >= 2) {
              const avg = prevPace.reduce((a,b)=>a+b,0)/prevPace.length;
              const d = Math.round(curPace - avg);
              const m = Math.floor(Math.abs(d)/60), s = Math.abs(d)%60;
              metrics.push({ k: 'Pace', cur: `${Math.floor(curPace/60)}:${String(curPace%60).padStart(2,'0')}/km`,
                delta: d, unit: null, good: -1,
                deltaStr: `${d < 0 ? '−' : '+'}${m > 0 ? `${m}:` : ''}${String(s).padStart(m>0?2:1,'0')}` });
            }
            if (!metrics.length) return null;
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>
                  Vs last {sameType.length} · {entry.type.toLowerCase()}
                </div>
                <div style={{
                  background: theme.surface, borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`, padding: '6px 14px',
                }}>
                  {metrics.map(m => {
                    const positive = m.good == null ? null
                      : (m.good > 0 ? m.delta > 0 : m.delta < 0);
                    const color = positive == null ? theme.inkMute
                      : (positive ? '#2B7A5C' : '#D96B5C');
                    const deltaStr = m.deltaStr || (m.delta > 0 ? '+' : '') + m.delta + (m.unit || '');
                    return (
                      <div key={m.k} style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
                        padding: '7px 0',
                        fontFamily: theme.font, fontSize: 13,
                      }}>
                        <span style={{ color: theme.inkSoft, fontSize: 11,
                          textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>{m.k}</span>
                        <span style={{ display: 'flex', gap: 8, alignItems: 'baseline' }}>
                          <span style={{
                            fontFamily: theme.numFont, fontWeight: theme.numWeight,
                            color: theme.ink, fontVariantNumeric: 'tabular-nums',
                          }}>{m.cur}</span>
                          {Math.abs(m.delta) > 0.001 && (
                            <span style={{
                              fontSize: 11, fontWeight: 600, color,
                              minWidth: 50, textAlign: 'right',
                              fontVariantNumeric: 'tabular-nums',
                            }}>{deltaStr}</span>
                          )}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Secondary stats */}
          {secondary.length > 0 && (
            <div style={{
              display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 14,
            }}>
              {secondary.map(s => (
                <div key={s.k} style={{
                  padding: '10px 12px', background: theme.surface,
                  borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`,
                }}>
                  <div style={labelStyle}>{s.k}</div>
                  <div style={{
                    fontFamily: theme.numFont, fontSize: 15, fontWeight: theme.numWeight,
                    color: theme.ink, letterSpacing: theme.letter, marginTop: 2,
                  }}>{s.v}</div>
                </div>
              ))}
            </div>
          )}

          {/* Notes */}
          {entry.notes && (
            <div style={{
              marginBottom: 14, padding: '12px 14px',
              background: theme.surface, borderRadius: theme.radius.btn,
              border: `1px solid ${theme.line}`,
            }}>
              <div style={{ ...labelStyle, marginBottom: 4 }}>Notes</div>
              <div style={{ fontFamily: theme.font, fontSize: 13, color: theme.ink, lineHeight: 1.45 }}>
                {entry.notes}
              </div>
            </div>
          )}

          {/* Intervals (Laps) — promoted for Speed runs since the
              manual laps ARE the intervals; 1km auto-splits would
              obscure them. */}
          {(() => {
            const isSpeed = entry.type === 'Run' && (d.runType === 'Speed' || (Array.isArray(d.laps) && d.laps.length >= 3));
            if (!isSpeed || !Array.isArray(d.laps) || d.laps.length === 0) return null;
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>
                  Intervals ({d.laps.length})
                </div>
                <div style={{
                  background: theme.surface, borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`, overflow: 'hidden',
                }}>
                  {d.laps.map((l, i) => {
                    const dur = l.moving_time ? Math.round(l.moving_time / 60) : 0;
                    const sec = l.moving_time ? l.moving_time % 60 : 0;
                    const distKm = l.distance_m ? l.distance_m / 1000 : 0;
                    const pace = l.average_speed_mps && l.distance_m
                      ? Math.round(1000 / l.average_speed_mps) : null;
                    return (
                      <div key={i} style={{
                        display: 'grid', gridTemplateColumns: '28px 1fr 72px 72px 52px', gap: 8,
                        padding: '9px 14px',
                        borderTop: i > 0 ? `1px solid ${theme.line}` : 'none',
                        alignItems: 'center',
                      }}>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, fontWeight: 600,
                        }}>{i + 1}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 13, color: theme.ink, fontWeight: theme.numWeight,
                        }}>
                          {distKm ? `${distKm < 1 ? Math.round(distKm * 1000) + ' m' : distKm.toFixed(2) + ' km'}` : '—'}
                        </div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                        }}>{l.moving_time ? `${Math.floor(l.moving_time / 60)}:${String(sec).padStart(2,'0')}` : ''}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                        }}>{pace ? fmtPace(pace) : ''}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                        }}>{l.avg_hr ? `${Math.round(l.avg_hr)}` : ''}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{
                  fontFamily: theme.font, fontSize: 10, color: theme.inkMute,
                  marginTop: 4, paddingLeft: 4, display: 'grid',
                  gridTemplateColumns: '28px 1fr 72px 72px 52px', gap: 8, textAlign: 'right',
                }}>
                  <span/><span style={{ textAlign: 'left' }}>distance</span><span>time</span><span>pace</span><span>bpm</span>
                </div>
              </div>
            );
          })()}

          {/* Splits */}
          {(() => {
            // Hide auto km splits for Speed runs — the intervals are the real story there.
            const isSpeed = entry.type === 'Run' && d.runType === 'Speed';
            if (isSpeed) return null;
            if (!Array.isArray(d.splits_km) || d.splits_km.length === 0) return null;
            return true;
          })() && Array.isArray(d.splits_km) && d.splits_km.length > 0 && (() => {
            const paces = d.splits_km.map(s => s.pace_sec_per_km || 0).filter(p => p > 0);
            const best = paces.length ? Math.min(...paces) : 0;
            const worst = paces.length ? Math.max(...paces) : 1;
            return (
              <div style={{ marginBottom: 14 }}>
                <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>Splits</div>
                <div style={{
                  background: theme.surface, borderRadius: theme.radius.btn,
                  border: `1px solid ${theme.line}`, overflow: 'hidden',
                }}>
                  {d.splits_km.map((s, i) => {
                    const p = s.pace_sec_per_km || 0;
                    const frac = worst > best && p ? (worst - p) / (worst - best) : 0;
                    return (
                      <div key={i} style={{
                        position: 'relative',
                        display: 'grid', gridTemplateColumns: '32px 1fr 80px 60px', gap: 10,
                        padding: '8px 14px',
                        borderTop: i > 0 ? `1px solid ${theme.line}` : 'none',
                        alignItems: 'center',
                      }}>
                        <div style={{
                          position: 'absolute', left: 0, top: 0, bottom: 0,
                          width: `${Math.round(frac * 100)}%`, background: theme.accent, opacity: 0.08,
                        }}/>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, fontWeight: 600,
                        }}>{s.km}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 13, color: theme.ink, fontWeight: theme.numWeight,
                        }}>{fmtPace(p) || '—'}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                        }}>{s.avg_hr ? `${Math.round(s.avg_hr)} bpm` : ''}</div>
                        <div style={{
                          fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                        }}>{s.elev_diff != null ? `${s.elev_diff > 0 ? '+' : ''}${Math.round(s.elev_diff)}m` : ''}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Laps — skip when already shown as Intervals above */}
          {!(entry.type === 'Run' && (d.runType === 'Speed' || (Array.isArray(d.laps) && d.laps.length >= 3))) && Array.isArray(d.laps) && d.laps.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>Laps</div>
              <div style={{
                background: theme.surface, borderRadius: theme.radius.btn,
                border: `1px solid ${theme.line}`, overflow: 'hidden',
              }}>
                {d.laps.map((l, i) => (
                  <div key={i} style={{
                    display: 'grid', gridTemplateColumns: '1fr 70px 70px 60px', gap: 10,
                    padding: '8px 14px',
                    borderTop: i > 0 ? `1px solid ${theme.line}` : 'none',
                    alignItems: 'center',
                  }}>
                    <div style={{
                      fontFamily: theme.font, fontSize: 12, color: theme.ink, fontWeight: 500,
                      whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                    }}>{l.name || `Lap ${i + 1}`}</div>
                    <div style={{
                      fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                    }}>{l.moving_time ? fmtDuration(Math.round(l.moving_time / 60)) : ''}</div>
                    <div style={{
                      fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                    }}>{l.distance_m ? `${(l.distance_m / 1000).toFixed(2)} km` : ''}</div>
                    <div style={{
                      fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, textAlign: 'right',
                    }}>{l.avg_hr ? `${Math.round(l.avg_hr)} bpm` : ''}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Best efforts */}
          {Array.isArray(d.best_efforts) && d.best_efforts.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ ...labelStyle, marginBottom: 6, paddingLeft: 4 }}>Best efforts</div>
              <div style={{
                background: theme.surface, borderRadius: theme.radius.btn,
                border: `1px solid ${theme.line}`, overflow: 'hidden',
              }}>
                {d.best_efforts.map((b, i) => (
                  <div key={i} style={{
                    display: 'flex', justifyContent: 'space-between',
                    padding: '8px 14px',
                    borderTop: i > 0 ? `1px solid ${theme.line}` : 'none',
                  }}>
                    <div style={{ fontFamily: theme.font, fontSize: 12, color: theme.ink }}>
                      {b.name}{b.pr_rank ? ` · PR ${b.pr_rank}` : ''}
                    </div>
                    <div style={{ fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft }}>
                      {b.moving_time ? fmtDuration(Math.round(b.moving_time / 60)) : ''}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer actions */}
        <div style={{
          position: 'sticky', bottom: 0, left: 0, right: 0,
          padding: '12px 18px calc(env(safe-area-inset-bottom, 0px) + 14px)',
          background: theme.bg, borderTop: `1px solid ${theme.line}`,
          display: 'flex', gap: 8,
        }}>
          <button onClick={() => onDelete(entry.id)} style={{
            padding: '12px 18px', borderRadius: theme.radius.btn,
            background: 'transparent', color: '#B3261E',
            border: `1px solid #F3CFCA`,
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Delete</button>
          <button onClick={onEdit} style={{
            flex: 1, padding: '12px 0', border: 'none',
            background: theme.accent, color: theme.accentInk,
            borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600, cursor: 'pointer',
          }}>Edit</button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function ExerciseEditSheet({ theme, entry, onClose, onSave, customTypes = [], onAddCustomType }) {
  const ICONS = { ...(window.EX_ICONS || {}) };
  customTypes.forEach(c => { if (c && c.name) ICONS[c.name] = c.icon || '⚡'; });
  const TYPES = Object.keys(ICONS);
  const [type, setType] = React.useState(entry.type);
  const [showNewType, setShowNewType] = React.useState(false);
  const [name, setName] = React.useState((entry.details && entry.details.name) || '');
  const [duration, setDuration] = React.useState(entry.duration != null ? String(entry.duration) : '');
  const [distance, setDistance] = React.useState(entry.distance != null ? (+entry.distance).toFixed(2) : '');
  const [kcal, setKcal] = React.useState(entry.kcal != null ? String(entry.kcal) : '');
  const [notes, setNotes] = React.useState(entry.notes || '');
  const [runSubtype, setRunSubtype] = React.useState((entry.details && entry.details.runType) || null);

  const save = () => {
    const baseDetails = { ...(entry.details || {}) };
    if (name.trim()) baseDetails.name = name.trim();
    else delete baseDetails.name;
    const detailsOut = type === 'Run'
      ? { ...baseDetails, runType: runSubtype || null }
      : (Object.keys(baseDetails).length ? baseDetails : null);
    onSave({
      ...entry,
      type,
      duration: duration === '' ? null : parseFloat(duration),
      distance: distance === '' ? null : parseFloat(distance),
      kcal: kcal === '' ? null : parseFloat(kcal),
      notes: notes.trim(),
      details: detailsOut,
    });
  };

  return (
    <React.Fragment>
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '88vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '18px 18px 22px', overflowY: 'auto',
      }}>
        <div style={{ width: 40, height: 4, borderRadius: 2, background: theme.line, margin: '0 auto 14px' }}/>
        <div style={{
          fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
          color: theme.ink, marginBottom: 14,
        }}>Edit exercise</div>

        <Field label="Name (optional — e.g. Calisthenics)" theme={theme}>
          <input type="text" value={name} placeholder={entry.type}
            onChange={e => setName(e.target.value)} style={fieldStyle(theme)}/>
        </Field>

        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          marginBottom: 8,
        }}>Type</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 14 }}>
          {TYPES.map(t => (
            <button key={t} onClick={() => setType(t)} style={{
              padding: '10px 4px', border: 'none',
              background: type === t ? theme.ink : theme.surface,
              color: type === t ? theme.bg : theme.ink,
              borderRadius: theme.radius.btn, cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            }}>
              <span style={{ fontSize: 18 }}>{ICONS[t]}</span>
              <span style={{ fontFamily: theme.font, fontSize: 10, fontWeight: 600 }}>{t}</span>
            </button>
          ))}
          {onAddCustomType && (
            <button onClick={() => setShowNewType(true)} style={{
              padding: '10px 4px',
              border: `1.5px dashed ${theme.line}`, background: 'transparent',
              color: theme.inkSoft, cursor: 'pointer',
              borderRadius: theme.radius.btn,
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            }}>
              <span style={{ fontSize: 18 }}>＋</span>
              <span style={{ fontFamily: theme.font, fontSize: 10, fontWeight: 600 }}>New</span>
            </button>
          )}
        </div>

        {type === 'Run' && (
          <div style={{ marginBottom: 14 }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
              marginBottom: 8,
            }}>Run type</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {RUN_SUBTYPES.map(s => {
                const sel = runSubtype === s;
                return (
                  <button key={s} onClick={() => setRunSubtype(sel ? null : s)} style={{
                    padding: '8px 14px', borderRadius: 999,
                    border: `1.5px solid ${sel ? theme.ink : theme.line}`,
                    background: sel ? theme.ink : 'transparent',
                    color: sel ? theme.bg : theme.ink,
                    fontFamily: theme.font, fontSize: 13, fontWeight: 600,
                    cursor: 'pointer',
                  }}>{s}</button>
                );
              })}
            </div>
          </div>
        )}

        <Field label="Duration (min)" theme={theme}>
          <input type="number" inputMode="numeric" value={duration}
            onChange={e => setDuration(e.target.value)} style={fieldStyle(theme)}/>
        </Field>
        {['Run','Cycling','Walk'].includes(type) && (
          <Field label="Distance (km)" theme={theme}>
            <input type="number" inputMode="decimal" value={distance}
              onChange={e => setDistance(e.target.value)} style={fieldStyle(theme)}/>
          </Field>
        )}
        <Field label="Calories burned" theme={theme}>
          <input type="number" inputMode="numeric" value={kcal}
            onChange={e => setKcal(e.target.value)} style={fieldStyle(theme)}/>
        </Field>
        <Field label="Notes" theme={theme}>
          <textarea value={notes} onChange={e => setNotes(e.target.value)}
            rows={2} style={{ ...fieldStyle(theme), resize: 'vertical' }}/>
        </Field>

        <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
          <button onClick={onClose} style={{
            padding: '12px 18px', border: `1px solid ${theme.line}`,
            background: 'transparent', color: theme.inkSoft,
            borderRadius: theme.radius.btn, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Cancel</button>
          <button onClick={save} style={{
            flex: 1, padding: '12px 0', border: 'none',
            background: theme.accent, color: theme.accentInk,
            borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600, cursor: 'pointer',
          }}>Save</button>
        </div>
      </div>
    </div>
    {showNewType && (
      <NewExerciseTypeSheet theme={theme}
        existing={TYPES}
        customTypes={customTypes}
        onClose={() => setShowNewType(false)}
        onSave={(t) => {
          onAddCustomType && onAddCustomType(t);
          setType(t.name);
          setShowNewType(false);
        }}/>
    )}
    </React.Fragment>
  );
}

function MealSection({ meal, theme, entries, onDelete, onAdd, onOpen, onMoveEntry, onToggleFav, onCopyToDate, selectMode, selectedIds, onToggleSelect, locked }) {
  const subtotal = sumMacros(entries);
  const hasItems = entries.length > 0;
  const [dragOver, setDragOver] = React.useState(false);
  const sectionRef = React.useRef(null);

  // Just for visual feedback during touch drag
  React.useEffect(() => {
    const handler = (e) => {
      if (!sectionRef.current) return;
      const r = sectionRef.current.getBoundingClientRect();
      const x = e.detail.x, y = e.detail.y;
      const inside = x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      if (e.type === 'caloree:touchdrag-move') setDragOver(inside);
      else setDragOver(false);
    };
    window.addEventListener('caloree:touchdrag-move', handler);
    window.addEventListener('caloree:touchdrag-end', handler);
    return () => {
      window.removeEventListener('caloree:touchdrag-move', handler);
      window.removeEventListener('caloree:touchdrag-end', handler);
    };
  }, [meal]);

  return (
    <div ref={sectionRef}
      data-meal-section={meal}
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={(e) => {
        e.preventDefault(); setDragOver(false);
        const id = e.dataTransfer.getData('text/plain');
        if (id) onMoveEntry && onMoveEntry(id, meal);
      }}
      style={{
        margin: '0 16px 12px', background: theme.surface,
        borderRadius: theme.radius.card, overflow: 'hidden',
        border: dragOver ? `2px dashed ${theme.accent}` :
                (theme.name === 'Editorial' ? `1px solid ${theme.line}` : '1px solid transparent'),
        boxShadow: theme.name === 'Editorial' ? 'none' : '0 1px 2px rgba(0,0,0,0.03)',
        transition: 'border 0.12s',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 18px 10px',
        borderBottom: hasItems ? `0.5px solid ${theme.line}` : 'none',
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
          <span style={{
            fontFamily: theme.titleFont, fontSize: 17, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
            textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
          }}>{meal}</span>
          {hasItems && (
            <span style={{
              fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
              color: theme.inkSoft, letterSpacing: theme.letter,
            }}>{Math.round(subtotal.kcal)} kcal</span>
          )}
        </div>
        {!locked && (
          <button onClick={onAdd} style={{
            width: 26, height: 26, borderRadius: 13, border: 'none', cursor: 'pointer',
            background: theme.surfaceAlt,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: theme.ink, fontFamily: theme.font, fontSize: 18, lineHeight: 1,
            paddingBottom: 2,
          }}>+</button>
        )}
      </div>

      {hasItems && entries.map((e, i) => (
        <SwipeRow key={e.id} entry={e} theme={theme}
          onDelete={() => onDelete(e.id)}
          onTap={() => selectMode ? onToggleSelect(e.id) : onOpen(e.foodId, e.meal, e.id)}
          isLast={i === entries.length - 1}
          draggable={selectMode}
          onToggleFav={onToggleFav}
          onCopyToDate={onCopyToDate}
          onMoveEntry={selectMode ? onMoveEntry : null}
          selectMode={selectMode}
          selected={selectedIds && selectedIds.has(e.id)}
        />
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SwipeRow — touch + mouse drag to reveal delete button
// ─────────────────────────────────────────────────────────────
function SwipeRow({ entry, theme, onDelete, onTap, isLast, draggable, onToggleFav, onMoveEntry, selectMode, selected }) {

  // Touch drag — initiated immediately by tapping the drag handle
  const longPressTimer = React.useRef(null);
  const touchDragRef = React.useRef({ active: false, ghost: null, startX: 0, startY: 0 });
  const startTouchDrag = (e) => {
    if (!onMoveEntry) return;
    e.preventDefault(); e.stopPropagation();
    const t = e.touches ? e.touches[0] : e;
    // Cancel any swipe in progress
    dragging.current = false;
    setOffset(0);
    // Cleanup any orphan ghosts
    document.querySelectorAll('.caloree-drag-ghost').forEach(el => el.remove());
    // Build ghost
    const ghost = document.createElement('div');
    ghost.className = 'caloree-drag-ghost';
    ghost.style.cssText = `position:fixed; pointer-events:none; z-index:9999;
      left:${t.clientX - 100}px; top:${t.clientY - 24}px;
      width:200px; padding:10px 14px; background:${theme.surface};
      border:1px solid ${theme.line}; border-radius:10px;
      box-shadow:0 12px 32px rgba(0,0,0,0.25);
      font-family:${theme.font}; font-size:13px; color:${theme.ink};
      opacity:0.95; transform:rotate(-2deg);`;
      ghost.textContent = `Move ${food.name}`;
    document.body.appendChild(ghost);
    touchDragRef.current = { active: true, ghost, startX: t.clientX, startY: t.clientY };
    if (navigator.vibrate) navigator.vibrate(15);
    // Document-level move/end so we don't depend on the row receiving the events
    const move = (ev) => {
      const tt = ev.touches ? ev.touches[0] : ev;
      ev.preventDefault();
      ghost.style.left = (tt.clientX - 100) + 'px';
      ghost.style.top = (tt.clientY - 24) + 'px';
      window.dispatchEvent(new CustomEvent('caloree:touchdrag-move', {
        detail: { x: tt.clientX, y: tt.clientY, id: entry.id }
      }));
    };
    const end = (ev) => {
      const tt = (ev.changedTouches && ev.changedTouches[0]) || ev;
      ghost.style.display = 'none';
      const target = document.elementFromPoint(tt.clientX, tt.clientY);
      const targetRow = target?.closest('[data-meal-row-id]');
      const targetSection = target?.closest('[data-meal-section]');
      const targetRowId = targetRow?.getAttribute('data-meal-row-id');
      const targetMeal = targetSection?.getAttribute('data-meal-section');
      if (targetRowId && targetRowId !== entry.id) {
        window.dispatchEvent(new CustomEvent('caloree:merge-meals', {
          detail: { sourceId: entry.id, targetId: targetRowId }
        }));
      } else if (targetMeal && targetMeal !== entry.meal) {
        if (onMoveEntry) onMoveEntry(entry.id, targetMeal);
      }
      if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
      window.dispatchEvent(new CustomEvent('caloree:touchdrag-end', { detail: {} }));
      touchDragRef.current = { active: false, ghost: null, startX: 0, startY: 0 };
      document.removeEventListener('touchmove', move, { passive: false, capture: true });
      document.removeEventListener('touchend', end, true);
      document.removeEventListener('touchcancel', end, true);
      document.removeEventListener('mousemove', move, true);
      document.removeEventListener('mouseup', end, true);
    };
    if (e.touches) {
      document.addEventListener('touchmove', move, { passive: false, capture: true });
      document.addEventListener('touchend', end, true);
      document.addEventListener('touchcancel', end, true);
    } else {
      document.addEventListener('mousemove', move, true);
      document.addEventListener('mouseup', end, true);
    }
  };
  // Keep the legacy long-press handlers available but make them no-ops since the handle is the primary path
  const onTouchStartDrag = (e) => {
    if (!onMoveEntry) return;
    const t = e.touches[0];
    touchDragRef.current.startX = t.clientX;
    touchDragRef.current.startY = t.clientY;
    longPressTimer.current = setTimeout(() => {
      // Begin drag: cancel any in-progress swipe, reset offset
      dragging.current = false;
      setOffset(0);
      // Cleanup any orphan ghosts from previous drags
      document.querySelectorAll('.caloree-drag-ghost').forEach(el => el.remove());
      // Build ghost
      const ghost = document.createElement('div');
      ghost.className = 'caloree-drag-ghost';
      ghost.style.cssText = `position:fixed; pointer-events:none; z-index:9999;
        left:${t.clientX - 100}px; top:${t.clientY - 24}px;
        width:200px; padding:10px 14px; background:${theme.surface};
        border:1px solid ${theme.line}; border-radius:10px;
        box-shadow:0 12px 32px rgba(0,0,0,0.25);
        font-family:${theme.font}; font-size:13px; color:${theme.ink};
        opacity:0.95; transform:rotate(-2deg);`;
      ghost.textContent = `Move ${food.name}`;
      document.body.appendChild(ghost);
      touchDragRef.current.active = true;
      touchDragRef.current.ghost = ghost;
      if (navigator.vibrate) navigator.vibrate(20);

      // Document-level fallback to guarantee cleanup even if component unmounts
      const cleanup = () => {
        document.querySelectorAll('.caloree-drag-ghost').forEach(el => el.remove());
        window.dispatchEvent(new CustomEvent('caloree:touchdrag-end', { detail: {} }));
        touchDragRef.current = { active: false, ghost: null, startX: 0, startY: 0 };
        document.removeEventListener('touchend', docEnd, true);
        document.removeEventListener('touchcancel', docEnd, true);
      };
      const docEnd = () => cleanup();
      document.addEventListener('touchend', docEnd, true);
      document.addEventListener('touchcancel', docEnd, true);
    }, 400);
  };
  const onTouchMoveDrag = (e) => {
    if (!touchDragRef.current.active) {
      // Cancel long-press if user moves significantly before timer
      const t = e.touches[0];
      if (Math.abs(t.clientX - touchDragRef.current.startX) > 8 ||
          Math.abs(t.clientY - touchDragRef.current.startY) > 8) {
        if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
      }
      return;
    }
    e.preventDefault();
    const t = e.touches[0];
    const g = touchDragRef.current.ghost;
    if (g) { g.style.left = (t.clientX - 100) + 'px'; g.style.top = (t.clientY - 24) + 'px'; }
    window.dispatchEvent(new CustomEvent('caloree:touchdrag-move', {
      detail: { x: t.clientX, y: t.clientY, id: entry.id }
    }));
  };
  const onTouchEndDrag = (e) => {
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
    if (touchDragRef.current.active) {
      const t = e.changedTouches[0];
      // Use elementFromPoint to decide between merge (drop on row) vs move (drop on section)
      // Hide the ghost briefly so it doesn't intercept hit-test
      if (touchDragRef.current.ghost) touchDragRef.current.ghost.style.display = 'none';
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const targetRow = target?.closest('[data-meal-row-id]');
      const targetSection = target?.closest('[data-meal-section]');
      const targetRowId = targetRow?.getAttribute('data-meal-row-id');
      const targetMeal = targetSection?.getAttribute('data-meal-section');
      if (targetRowId && targetRowId !== entry.id) {
        // Merge with that row
        window.dispatchEvent(new CustomEvent('caloree:merge-meals', {
          detail: { sourceId: entry.id, targetId: targetRowId }
        }));
      } else if (targetMeal && targetMeal !== entry.meal) {
        // Move to that section
        if (onMoveEntry) onMoveEntry(entry.id, targetMeal);
      }
      // Cleanup
      if (touchDragRef.current.ghost && touchDragRef.current.ghost.parentNode) {
        touchDragRef.current.ghost.parentNode.removeChild(touchDragRef.current.ghost);
      }
      window.dispatchEvent(new CustomEvent('caloree:touchdrag-end', { detail: {} }));
      touchDragRef.current = { active: false, ghost: null, startX: 0, startY: 0 };
    }
  };
  const [offset, setOffset] = useStateHome(0);
  const startX = useRefHome(null);
  const dragging = useRefHome(false);
  const food = foodById(entry.foodId);
  const m = entryMacros(entry);

  const onDown = (e) => {
    startX.current = (e.touches ? e.touches[0].clientX : e.clientX);
    dragging.current = true;
  };
  const onMove = (e) => {
    if (!dragging.current) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const dx = x - startX.current;
    setOffset(Math.max(-90, Math.min(0, dx + (offset < 0 ? -80 : 0))));
  };
  const onUp = () => {
    dragging.current = false;
    setOffset(offset < -45 ? -80 : 0);
  };

  // Highlight when another row hovers over this one
  const [mergeHover, setMergeHover] = React.useState(false);
  React.useEffect(() => {
    const handler = (e) => {
      if (touchDragRef.current.active) { setMergeHover(false); return; }
      const t = document.elementFromPoint(e.detail.x, e.detail.y);
      const overRow = t?.closest(`[data-meal-row-id="${entry.id}"]`);
      const sourceId = e.detail.id;
      setMergeHover(!!overRow && sourceId && sourceId !== entry.id);
    };
    const reset = () => setMergeHover(false);
    window.addEventListener('caloree:touchdrag-move', handler);
    window.addEventListener('caloree:touchdrag-end', reset);
    return () => {
      window.removeEventListener('caloree:touchdrag-move', handler);
      window.removeEventListener('caloree:touchdrag-end', reset);
    };
  }, [entry.id]);

  return (
    <div data-meal-row-id={entry.id} style={{
      position: 'relative', overflow: 'hidden',
      borderBottom: isLast ? 'none' : `0.5px solid ${theme.line}`,
      background: mergeHover ? 'rgba(79,138,112,0.20)' : 'transparent',
      transition: 'background 0.15s',
    }}>
      <button onClick={onDelete} style={{
        position: 'absolute', right: 0, top: 0, bottom: 0, width: 80,
        background: '#E74C3C', border: 'none', color: '#fff',
        fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
      }}>Delete</button>
      <div
        draggable={draggable}
        onDragStart={selectMode ? (e) => {
          e.dataTransfer.setData('text/plain', entry.id);
          e.dataTransfer.effectAllowed = 'move';
        } : undefined}
        onMouseDown={selectMode ? onDown : undefined}
        onMouseMove={selectMode ? onMove : undefined}
        onMouseUp={selectMode ? onUp : undefined}
        onMouseLeave={selectMode ? onUp : undefined}
        onTouchStart={selectMode ? (e) => { onTouchStartDrag(e); if (!touchDragRef.current.active) onDown(e); } : undefined}
        onTouchMove={selectMode ? (e) => {
          if (touchDragRef.current.active) { onTouchMoveDrag(e); return; }
          onMove(e); onTouchMoveDrag(e);
        } : undefined}
        onTouchEnd={selectMode ? (e) => {
          const wasDragging = touchDragRef.current.active;
          onTouchEndDrag(e);
          if (!wasDragging) onUp(e); else setOffset(0);
        } : undefined}
        onClick={() => offset === 0 && !touchDragRef.current.active && onTap()}
        style={{
          background: theme.surface, padding: '12px 18px',
          transform: `translateX(${offset}px)`,
          transition: dragging.current ? 'none' : 'transform 0.25s',
          cursor: 'pointer', userSelect: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
        }}>
        {selectMode && (
          <div style={{
            width: 22, height: 22, borderRadius: 4, flexShrink: 0,
            border: `1.5px solid ${selected ? '#2B7A5C' : theme.line}`,
            background: selected ? '#2B7A5C' : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{selected && <span style={{ color: '#fff', fontSize: 14 }}>✓</span>}</div>
        )}
        {onMoveEntry && selectMode && (
          <div
            onTouchStart={startTouchDrag}
            onMouseDown={startTouchDrag}
            title="Hold and drag to move/merge"
            style={{
              width: 14, padding: '14px 0', cursor: 'grab', flexShrink: 0,
              touchAction: 'none', userSelect: 'none',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              marginLeft: -6, marginRight: -2,
            }}>
            <div style={{
              width: 3, height: 24, borderRadius: 2,
              background: theme.line,
            }}/>
          </div>
        )}
        {food.photo ? (
          <img src={food.photo} alt=""
            onClick={(e) => {
              e.stopPropagation();
              window.dispatchEvent(new CustomEvent('caloree:showphoto', { detail: {
                url: food.photo, caption: `${food.name} · ${entry.meal}`
              }}));
            }}
            style={{
              width: 40, height: 40, borderRadius: 8, objectFit: 'cover', flexShrink: 0,
              cursor: 'pointer',
            }}/>
        ) : (() => {
          const e = foodEmoji(food);
          if (!e) return null; // user hid it
          return (
            <div style={{
              width: 40, height: 40, borderRadius: 8, flexShrink: 0,
              background: theme.surfaceAlt,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 22, lineHeight: 1,
            }}>{e}</div>
          );
        })()}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontFamily: theme.font, fontSize: 15, fontWeight: 500,
            color: theme.ink, letterSpacing: theme.letter,
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          }}>{food.name}</div>
          <div style={{
            fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
          }}>{Math.round(m.g)} g · {food.brand}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{
            fontFamily: theme.numFont, fontSize: 15, fontWeight: theme.numWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{Math.round(m.kcal)}</div>
          <div style={{
            display: 'flex', gap: 4, marginTop: 3, justifyContent: 'flex-end',
          }}>
            {[
              [m.c, theme.macros.carbs],
              [m.p, theme.macros.protein],
              [m.f, theme.macros.fat],
            ].map(([v, c], i) => (
              <span key={i} style={{
                width: 4, height: 4, borderRadius: 2, background: c,
                opacity: v > 0 ? 1 : 0.2,
              }} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

window.HomeScreen = HomeScreen;

// Log meal — search w/ live typeahead, recent foods, meal selector.

const { useState: useStateLog, useMemo: useMemoLog, useEffect: useEffectLog } = React;

function LogScreen({ theme, defaultMeal, onClose, onAdd, onOpenFood, onUseAI, log = [] }) {
  const [meal, setMeal] = useStateLog(defaultMeal || 'Snack');
  const [query, setQuery] = useStateLog('');
  const [focused, setFocused] = useStateLog(false);

  const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];
  // Real "recent" — the user's most recently logged foods (most recent date
  // first, then most recent position in the array), de-duped by food id.
  const recent = useMemoLog(() => {
    const sorted = [...log].sort((a, b) =>
      (b.date || '').localeCompare(a.date || '')
    );
    const seen = new Set();
    const out = [];
    for (const e of sorted) {
      if (!e.foodId || seen.has(e.foodId)) continue;
      const f = foodById(e.foodId);
      if (!f) continue;
      seen.add(e.foodId);
      out.push(f);
      if (out.length >= 8) break;
    }
    return out;
  }, [log]);

  const results = useMemoLog(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return FOODS.filter(f =>
      f.name.toLowerCase().includes(q) || f.brand.toLowerCase().includes(q)
    ).slice(0, 8);
  }, [query]);

  return (
    <div style={{
      position: 'absolute', inset: 0, background: theme.bg, zIndex: 100,
      display: 'flex', flexDirection: 'column',
      animation: 'slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1)',
    }}>
      <style>{`
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
      `}</style>

      {/* Drag handle + header */}
      <div style={{ padding: 'calc(env(safe-area-inset-top, 0px) + 8px) 0 0', display: 'flex', justifyContent: 'center' }}>
        <div style={{
          width: 36, height: 5, borderRadius: 3,
          background: theme.inkMute, opacity: 0.4,

      <div style={{
        padding: '12px 20px 8px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          fontFamily: theme.font, fontSize: 16, color: theme.accent,
          fontWeight: 500, padding: '8px 4px',
        }}>Cancel</button>
        <div style={{
          fontFamily: theme.titleFont, fontSize: 17, fontWeight: theme.titleWeight,
          color: theme.ink, letterSpacing: theme.letter,
          textTransform: theme.name === 'Editorial' ? 'uppercase' : 'none',
        }}>Add Food</div>
        <div style={{ width: 50 }} />

      {/* Meal selector */}

        margin: '4px 16px 12px', padding: 4,
        background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        display: 'flex', gap: 2,

            flex: 1, padding: '8px 0', border: 'none', cursor: 'pointer',
            background: meal === m ? theme.surface : 'transparent',
            borderRadius: Math.max(0, theme.radius.btn - 4),
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
            color: meal === m ? theme.ink : theme.inkSoft,
            letterSpacing: '0.02em',
            boxShadow: meal === m ? '0 1px 2px rgba(0,0,0,0.06)' : 'none',
            transition: 'all 0.2s',
          }}>{m}</button>
        ))}
      </div>

      {/* AI shortcut */}
      {onUseAI && (
        <div style={{ padding: '0 16px 10px' }}>
          <button onClick={() => onUseAI(meal)} style={{
            width: '100%', padding: '12px 16px',
            border: `1px solid ${theme.line}`, background: theme.surfaceAlt,
            color: theme.ink, cursor: 'pointer',
            borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 14, fontWeight: 600,

          display: 'flex', alignItems: 'center', gap: 10,
          padding: '12px 14px', background: theme.surface,
          borderRadius: theme.radius.btn,
          border: `1px solid ${focused ? theme.accent : theme.line}`,
          transition: 'border 0.2s',

          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

                (f.name || '').toLowerCase().includes(q) ||

          if (!matchingFavs.length) return null;
          return (
            <>
              <SectionHeader theme={theme}>

              <div style={{ margin: '0 16px 14px', background: theme.surface,
                borderRadius: theme.radius.card, overflow: 'hidden',
