<script>
  const SUPABASE_URL = 'https://twvmaazfcpglrzknhsvr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_4XMUfqp1Bl7SkrbMDYds4w_AVqq4e7d';
  window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  // ─── Offline write queue ─────────────────────────────────────────
  // Wraps PostgREST mutations (upsert / insert / update / delete) so
  // that a flaky network doesn't silently drop writes. On network
  // failure the descriptor is persisted to localStorage; the queue
  // is drained on `online`, on tab focus, and every 30s.
  //
  // Call sites use window.sbQueue.run({ op, table, ... }) instead of
  // window.sb.from(table).upsert(...) etc. Anything transient (5xx,
  // offline) gets queued; anything permanent (RLS, bad column) is
  // re-thrown so the caller can surface it.
  (function installSbQueue() {
    const KEY = 'cal_write_queue_v1';
    let items = [];
    try { items = JSON.parse(localStorage.getItem(KEY) || '[]'); if (!Array.isArray(items)) items = []; } catch {}
    let listeners = [];
    let draining = false;

    const persist = () => { try { localStorage.setItem(KEY, JSON.stringify(items)); } catch {} };
    const notify  = () => { listeners.forEach(fn => { try { fn(items.length); } catch {} }); };

    const isRetryable = (err) => {
      if (!err) return false;
      const msg = String(err.message || err || '').toLowerCase();
      if (msg.includes('failed to fetch')) return true;
      if (msg.includes('network')) return true;
      if (msg.includes('timeout')) return true;
      const s = err.status || err.code || 0;
      if (s === 0) return true;
      if (typeof s === 'number' && s >= 500 && s < 600) return true;
      // Offline according to the browser
      if (typeof navigator !== 'undefined' && !navigator.onLine) return true;
      return false;
    };

    async function execOp(op) {
      if (!window.sb) throw new Error('sb not ready');
      let q = window.sb.from(op.table);
      if (op.op === 'upsert') {
        q = q.upsert(op.rows, op.opts || {});
      } else if (op.op === 'insert') {
        q = q.insert(op.rows);
      } else if (op.op === 'update') {
        q = q.update(op.patch);
      } else if (op.op === 'delete') {
        q = q.delete();
      } else {
        throw new Error('unknown op: ' + op.op);
      }
      for (const f of (op.filters || [])) {
        if (f.op === 'eq')       q = q.eq(f.col, f.val);
        else if (f.op === 'in')  q = q.in(f.col, f.val);
        else if (f.op === 'neq') q = q.neq(f.col, f.val);
      }
      const r = await q;
      if (r && r.error) throw r.error;
      return r;
    }

    const enqueue = (op) => {
      if (!op.id) op.id = `${op.table}:${op.op}:${Date.now()}:${Math.random().toString(36).slice(2, 6)}`;
      op.attempts = (op.attempts || 0) + 1;
      op.firstFailedAt = op.firstFailedAt || Date.now();
      if (!items.some(x => x.id === op.id)) items.push(op);
      persist(); notify();
    };

    const drain = async () => {
      if (draining) return;
      if (typeof navigator !== 'undefined' && !navigator.onLine) return;
      if (!window.sb) return;
      draining = true;
      try {
        while (items.length) {
          const op = items[0];
          try {
            await execOp(op);
            items.shift();
            persist(); notify();
          } catch (err) {
            if (isRetryable(err)) {
              op.attempts = (op.attempts || 0) + 1;
              persist();
              break; // stop; next trigger will retry
            }
            // Non-retryable — give up on this op and move on so it
            // doesn't block the queue forever.
            console.warn('sbQueue dropping non-retryable:', op.table, op.op, err?.message);
            items.shift();
            persist(); notify();
          }
        }
      } finally {
        draining = false;
      }
    };

    window.sbQueue = {
      run: async (op) => {
        try {
          await execOp(op);
          return { ok: true };
        } catch (err) {
          if (isRetryable(err)) { enqueue(op); return { queued: true }; }
          throw err;
        }
      },
      drain,
      size: () => items.length,
      list: () => items.slice(),
      clear: () => { items = []; persist(); notify(); },
      subscribe: (fn) => { listeners.push(fn); try { fn(items.length); } catch {}; return () => { listeners = listeners.filter(x => x !== fn); }; },
    };

    // Drain triggers
    window.addEventListener('online', drain);
    if (typeof document !== 'undefined') {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') drain();
      });
    }
    setInterval(drain, 30_000);
    setTimeout(drain, 1500); // after boot
  })();

  // Upload a data-URL JPEG to Supabase Storage; returns the storage path.
  window.uploadMealPhoto = async function(dataUrl, userId) {
    if (!dataUrl || !dataUrl.startsWith('data:')) return null;
    const blob = await (await fetch(dataUrl)).blob();
    const rand = Math.random().toString(36).slice(2, 10);
    const path = `${userId}/${Date.now()}-${rand}.jpg`;
    const { error } = await window.sb.storage.from('meal-photos')
      .upload(path, blob, { contentType: 'image/jpeg', upsert: false });
    if (error) { console.warn('photo upload:', error.message); return null; }
    return path;
  };

  // Register service worker for offline PWA support.
  //
  // Two things make deploys sticky without this care:
  //   1. The browser may cache sw.js itself for up to 24h. updateViaCache:'none'
  //      forces a revalidation every time the SW is fetched.
  //   2. Even when a new SW installs + activates, the current tab keeps running
  //      the old bundle until it reloads. We listen for controllerchange and
  //      reload once — so the next deploy lands on the next app focus.
  if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      // Give the new SW a tick to settle, then reload the page.
      setTimeout(() => location.reload(), 50);
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
        .then((reg) => {
          // Kick an update check now and every time the tab comes back.
          reg.update().catch(() => {});
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update().catch(() => {});
          });
        })
        .catch((e) => console.warn('SW:', e));
    });
  }

  // Resolve a storage path to a signed display URL (1h expiry)
  window.signedPhotoUrl = async function(path) {
    if (!path) return null;
    const { data, error } = await window.sb.storage.from('meal-photos')
      .createSignedUrl(path, 3600);
    if (error) { console.warn('photo sign:', error.message); return null; }
    return data?.signedUrl || null;
  };
</script>

// Local-date ISO helper — toISOString() returns UTC, which in timezones
// ahead of UTC makes the app think "today" is yesterday during the
// morning. Compute YYYY-MM-DD from local date parts instead.
function todayLocalIso(d) {
  const x = d || new Date();
  const y = x.getFullYear();
  const m = String(x.getMonth() + 1).padStart(2, '0');
  const day = String(x.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
window.todayLocalIso = todayLocalIso;
const __TODAY_ISO = todayLocalIso();
const TODAY_LOG = [];

// Daily targets — defaults; user can override in Settings
const DEFAULT_TARGETS = { kcal: 2150, c: 240, p: 160, f: 70, satFat: 20, sugar: 50, fibre: 30, exKcal: 400, exMin: 45 };
let TARGETS = { ...DEFAULT_TARGETS };

// Generate historical daily data for ~2 years so the user can scroll back
// Use a seeded pseudo-random so the chart looks natural but stable.
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}
// HISTORY is intentionally empty — all data comes from user logs.
// Dynamic entries are pushed into HISTORY from the user's actual log/wellness data at runtime.
const HISTORY = [];

// Sample weight log — last value is ~2 weeks old (prompt should trigger)
const DEFAULT_WEIGHT = [];

// Food emoji fallback — used on meal rows when no photo is attached.
// Veggie-friendly: protein-heavy foods default to 🫘 (beans) not a meat icon.
const FOOD_EMOJI_LOOKUP = (() => {
  const map = {
    // fruit
    apple: '🍎', banana: '🍌', orange: '🍊', lemon: '🍋', pear: '🍐',
    grape: '🍇', grapes: '🍇', strawberry: '🍓', berry: '🫐', berries: '🫐',

    carrot: '🥕', broccoli: '🥦', tomato: '🍅', potato: '🥔', sweet_potato: '🍠',
    corn: '🌽', onion: '🧅', garlic: '🧄', cucumber: '🥒', pepper: '🫑',
    lettuce: '🥬', salad: '🥗', spinach: '🥬', kale: '🥬', mushroom: '🍄',

    // grain / carb
    bread: '🍞', toast: '🍞', baguette: '🥖', croissant: '🥐', bagel: '🥯',

    // legume / plant protein (veggie defaults)
    beans: '🫘', bean: '🫘', lentil: '🫘', lentils: '🫘', chickpea: '🫘',
    chickpeas: '🫘', hummus: '🫘', tofu: '🧆', tempeh: '🧆', falafel: '🧆',
    nut: '🥜', nuts: '🥜', peanut: '🥜', almond: '🥜', cashew: '🥜',
    seed: '🌱', seeds: '🌱', edamame: '🫛', pea: '🫛', peas: '🫛',
    // dairy / egg
    milk: '🥛', cheese: '🧀', yogurt: '🥛', yoghurt: '🥛', butter: '🧈',
    egg: '🥚', eggs: '🥚', omelette: '🍳', omelet: '🍳',
    // prepared
    pizza: '🍕', burger: '🍔', sandwich: '🥪', taco: '🌮', burrito: '🌯',
    wrap: '🌯', soup: '🍲', curry: '🍛', stew: '🍲',
    fries: '🍟', chips: '🍟',
    // sweet
    cake: '🍰', cookie: '🍪', biscuit: '🍪', chocolate: '🍫', candy: '🍬',
    icecream: '🍦', ice_cream: '🍦', donut: '🍩', doughnut: '🍩',

})();
// Per-food user overrides: { [foodId]: emoji | '' }  ('' means hide).
// Loaded on boot from localStorage; edited via DetailScreen picker.
try {

} catch { window.__FOOD_EMOJI_OVERRIDES = {}; }
function setFoodEmojiOverride(foodId, emoji) {
  const map = window.__FOOD_EMOJI_OVERRIDES || {};
  if (emoji === undefined || emoji === null) delete map[foodId];
  else map[foodId] = emoji;
  window.__FOOD_EMOJI_OVERRIDES = map;
  try { localStorage.setItem('cal_food_emojis', JSON.stringify(map)); } catch {}
  window.dispatchEvent(new Event('caloree:foodschanged'));
}
window.setFoodEmojiOverride = setFoodEmojiOverride;

function autoFoodEmoji(food) {
  if (!food) return '🍽️';
  const name = (food.name || '').toLowerCase();
  const tokens = name.split(/[^a-z]+/).filter(Boolean).sort((a, b) => b.length - a.length);
  for (const t of tokens) {
    if (FOOD_EMOJI_LOOKUP[t]) return FOOD_EMOJI_LOOKUP[t];
  }
  const compact = name.replace(/[\s-]+/g, '_');
  if (FOOD_EMOJI_LOOKUP[compact]) return FOOD_EMOJI_LOOKUP[compact];
  const p = +food.p || 0, c = +food.c || 0, f = +food.f || 0;
  const total = p + c + f;
  if (total > 0) {
    if (p / total > 0.35) return '🫘';
    if (c / total > 0.55) return '🍞';
    if (f / total > 0.45) return '🥑';
  }
  return '🍽️';
}
// Returns '' when user has explicitly hidden the emoji for this food.
function foodEmoji(food) {
  if (!food) return '🍽️';
  const overrides = window.__FOOD_EMOJI_OVERRIDES || {};
  if (Object.prototype.hasOwnProperty.call(overrides, food.id)) {
    return overrides[food.id];
  }
  return autoFoodEmoji(food);
}
window.foodEmoji = foodEmoji;
window.autoFoodEmoji = autoFoodEmoji;

// Helpers
function foodById(id) { return FOODS.find(x => x.id === id); }

function entryMacros(entry) {
  const food = foodById(entry.foodId);
  return {
    kcal: food.kcal * entry.qty,
    c:    food.c    * entry.qty,
    p:    food.p    * entry.qty,
    f:    food.f    * entry.qty,
    satFat: (food.satFat || 0) * entry.qty,
    sugar:  (food.sugar  || 0) * entry.qty,
    fibre:  (food.fibre  || 0) * entry.qty,
    g:    food.servingG * entry.qty,
  };
}

function sumMacros(entries) {
  return entries.reduce((acc, e) => {
    const m = entryMacros(e);
    return {
      kcal: acc.kcal + m.kcal,
      c: acc.c + m.c, p: acc.p + m.p, f: acc.f + m.f,
      satFat: acc.satFat + m.satFat,
      sugar:  acc.sugar  + m.sugar,
      fibre:  acc.fibre  + m.fibre,
    };
  }, { kcal: 0, c: 0, p: 0, f: 0, satFat: 0, sugar: 0, fibre: 0 });
}

window.FOODS = FOODS;
window.TODAY_LOG = TODAY_LOG;
window.TARGETS = TARGETS;
window.DEFAULT_TARGETS = DEFAULT_TARGETS;
window.HISTORY = HISTORY;

// App version — bumped in lockstep with sw.js CACHE. Shown on Profile so you
// can verify the PWA picked up the latest deploy.
const APP_VERSION = 'v57';

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ===== primitives.jsx =====
// Shared UI primitives: progress ring, macro bar, segment chips, theme switcher.

const { useState, useEffect, useRef, useMemo } = React;

// ─────────────────────────────────────────────────────────────
// Animated number (counts up from 0 to target on mount/change)
// ─────────────────────────────────────────────────────────────
function useAnimatedNum(target, dur = 700) {
  const [v, setV] = useState(0);
  const start = useRef(null);
  const from = useRef(0);
  useEffect(() => {
    from.current = v;
    start.current = null;
    let raf;
    const step = (t) => {
      if (!start.current) start.current = t;
      const p = Math.min(1, (t - start.current) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(from.current + (target - from.current) * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
    // eslint-disable-next-line
  }, [target]);
  return v;
}

// ─────────────────────────────────────────────────────────────
// Progress ring (single)
// ─────────────────────────────────────────────────────────────
function Ring({ pct, size = 220, stroke = 14, theme, color, track, children, label }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const animated = useAnimatedNum(Math.min(pct, 1.2));
  const dash = c * Math.min(animated, 1);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={track || theme.ring.track} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r}
          stroke={color || theme.ring.stroke} strokeWidth={stroke} fill="none"
          strokeDasharray={`${dash} ${c}`} strokeLinecap={theme.ring.cap}
          style={{ transition: 'stroke 0.3s' }} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Macro bar (linear progress)
// ─────────────────────────────────────────────────────────────
function MacroBar({ label, value, target, color, theme, unit = 'g', onClick }) {
  const pct = Math.min(value / target, 1);
  const animated = useAnimatedNum(pct);
  return (
    <div onClick={onClick} style={{ display: 'flex', flexDirection: 'column', gap: 4, flex: 1, minWidth: 0, cursor: onClick ? 'pointer' : 'default' }}>
      <div style={{
        fontFamily: theme.font, fontSize: 11, fontWeight: 600,
        color: theme.inkSoft, letterSpacing: '0.06em', textTransform: 'uppercase',
        whiteSpace: 'nowrap',
      }}>{label}</div>
      <div style={{
        fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
        color: theme.ink, letterSpacing: theme.letter, marginBottom: 2,
      }}>{Math.round(value)}<span style={{ color: theme.inkMute }}>/{target}{unit}</span></div>
      <div style={{
        height: 6, borderRadius: theme.radius.chip > 8 ? 3 : 1,
        background: theme.ring.track, overflow: 'hidden',
      }}>
        <div style={{
          width: `${animated * 100}%`, height: '100%', background: color,
          borderRadius: 'inherit', transition: 'background 0.3s',
        }} />
      </div>
    </div>
  );
}

  const border = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

  const Icon = ({ name, active }) => {

    if (name === 'spark') return (

          stroke={c} strokeWidth={active ? 2.2 : 1.8} strokeLinejoin="round"

    if (name === 'user') return (

    );
  };

  const navTabs = tabs.filter(t => !t.primary);
  const primary = tabs.find(t => t.primary);
  const half = Math.ceil(navTabs.length / 2);
  const left = navTabs.slice(0, half);
  const right = navTabs.slice(half);

  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 40,
      paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 6px)', paddingTop: 4,
      background: bg, backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      borderTop: `0.5px solid ${border}`,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', padding: '0 24px',
      }}>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'space-around' }}>
          {left.map(t => (
            <button key={t.key} onClick={() => setActive(t.key)} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              background: 'none', border: 'none', cursor: 'pointer', padding: 4,
            }}>
              <Icon name={t.icon} active={active === t.key} />
              <span style={{
                fontFamily: theme.font, fontSize: 10, fontWeight: 500,
                color: active === t.key ? theme.ink : theme.inkMute,
                letterSpacing: '0.02em',
              }}>{t.label}</span>
            </button>
          ))}
        </div>
        <div style={{ width: 72, display: 'flex', justifyContent: 'center' }}/>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'space-around' }}>
          {right.map(t => (
            <button key={t.key} onClick={() => setActive(t.key)} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              background: 'none', border: 'none', cursor: 'pointer', padding: 4,
            }}>
              <Icon name={t.icon} active={active === t.key} />
              <span style={{
                fontFamily: theme.font, fontSize: 10, fontWeight: 500,
                color: active === t.key ? theme.ink : theme.inkMute,
                letterSpacing: '0.02em',
              }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      {primary && (
        <button onClick={onLogTap} style={{
          position: 'absolute', left: '50%', top: 6,
          transform: 'translateX(-50%)',
          width: 48, height: 48, borderRadius: theme.radius.btn === 4 ? 8 : 24,
          background: theme.accent, border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: `0 2px 10px ${theme.accent}44`,
        }}>
          <Icon name={primary.icon} active />
        </button>
      )}
    </div>
  );
}

const { useState: useStateHome, useRef: useRefHome } = React;

// ── Wellness quick-log card — coffee, water, sleep, stress, energy ──
function SummaryChip({ theme, icon, value, color }) {
  const icons = {
    coffee: <path d="M3 6h9v3a3 3 0 01-3 3H6a3 3 0 01-3-3V6z M12 7h1.5a1.5 1.5 0 010 3H12" stroke={color || theme.inkSoft} strokeWidth="1.3" fill="none"/>,
    water: <path d="M8 2.5c-2.5 3-4 5-4 7a4 4 0 008 0c0-2-1.5-4-4-7z" stroke={color || theme.inkSoft} strokeWidth="1.3" fill="none"/>,
    sleep: <path d="M12 9a5 5 0 11-5-5 4 4 0 005 5z" stroke={color || theme.inkSoft} strokeWidth="1.3" fill="none"/>,
    energy: <path d="M8.5 2L4 9h3l-.5 5L11 7H8l.5-5z" stroke={color || theme.inkSoft} strokeWidth="1.3" fill="none" strokeLinejoin="round"/>,

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
      <svg width="12" height="12" viewBox="0 0 16 16">{icons[icon]}</svg>

}

function ReorderArrows({ idx, total, onMove, theme, onHide }) {
  const canUp = idx > 0;
  const canDown = idx < total - 1;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginRight: 6 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        <button onClick={() => canUp && onMove(idx, -1)} disabled={!canUp} style={{
          width: 22, height: 14, padding: 0, lineHeight: 1,
          border: `1px solid ${theme.line}`, background: theme.surfaceAlt,
          borderRadius: 4, cursor: canUp ? 'pointer' : 'default',
          opacity: canUp ? 1 : 0.3, fontSize: 10, color: theme.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>▲</button>
        <button onClick={() => canDown && onMove(idx, 1)} disabled={!canDown} style={{
          width: 22, height: 14, padding: 0, lineHeight: 1,
          border: `1px solid ${theme.line}`, background: theme.surfaceAlt,
          borderRadius: 4, cursor: canDown ? 'pointer' : 'default',
          opacity: canDown ? 1 : 0.3, fontSize: 10, color: theme.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>▼</button>
      </div>
      {onHide && (
        <button onClick={onHide} title="Hide from Home + Trends" style={{
          width: 22, height: 22, padding: 0, lineHeight: 1,
          border: '1px solid rgba(217,107,92,0.4)', background: 'rgba(217,107,92,0.12)',
          borderRadius: 11, cursor: 'pointer',
          color: '#D96B5C', fontSize: 13, fontWeight: 700,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>×</button>
      )}
    </div>
  );
}

function WellnessCard({ theme, wellness, setWellness, locked, settings, setSettings }) {
  // When the day is locked, ignore every attempt to mutate wellness.
  const origSet = setWellness;
  setWellness = locked ? (() => {}) : origSet;
  const w = wellness;
  const [open, setOpen] = React.useState(() => {
    const saved = localStorage.getItem('cal_wellness_open');
    return saved === null ? true : saved === '1';
  });
  React.useEffect(() => { localStorage.setItem('cal_wellness_open', open ? '1' : '0'); }, [open]);

  const [reordering, setReordering] = React.useState(false);
  // Home row key → Trends metric key (settings.wellnessHidden uses Trends keys
  // so toggles here sync with the Trends signals edit UI automatically).
  const HOME_TO_TRENDS_KEY = {
    coffee: 'coffees', water: 'water', sleep: 'sleepHrs',
    reading: 'readingMin', stress: 'stress', energy: 'energy',
    rehab: 'rehab', mobility: 'mobility',
  };
  const HOME_ROW_LABELS = {
    coffee: 'Coffee', water: 'Water', sleep: 'Sleep', reading: 'Reading',
    stress: 'Stress', energy: 'Energy', rehab: 'Rehab', mobility: 'Mobility',
  };
  const hiddenSet = new Set((settings && settings.wellnessHidden) || []);
  const isHiddenHome = (homeKey) => hiddenSet.has(HOME_TO_TRENDS_KEY[homeKey]);
  const toggleHidden = (homeKey) => {
    if (!setSettings) return;
    const tKey = HOME_TO_TRENDS_KEY[homeKey];
    const next = new Set(hiddenSet);
    if (next.has(tKey)) next.delete(tKey); else next.add(tKey);
    setSettings({ ...(settings || {}), wellnessHidden: [...next] });
  };
  const DEFAULT_ROW_ORDER = ['coffee','water','sleep','reading','stress','energy','rehab','mobility'];
  const savedOrder = (settings && Array.isArray(settings.wellnessRowOrder)) ? settings.wellnessRowOrder : null;
  const rowOrder = (() => {
    if (!savedOrder) return DEFAULT_ROW_ORDER;
    const seen = new Set(savedOrder);
    return savedOrder.filter(k => DEFAULT_ROW_ORDER.includes(k))
      .concat(DEFAULT_ROW_ORDER.filter(k => !seen.has(k)));
  })();
  const moveRow = (fromIdx, dir) => {
    if (!setSettings) return;
    const toIdx = fromIdx + dir;
    if (toIdx < 0 || toIdx >= rowOrder.length) return;
    const next = rowOrder.slice();
    [next[fromIdx], next[toIdx]] = [next[toIdx], next[fromIdx]];
    setSettings({ ...(settings || {}), wellnessRowOrder: next });
  };
  const resetRowOrder = () => {
    if (!setSettings) return;
    setSettings({ ...(settings || {}), wellnessRowOrder: DEFAULT_ROW_ORDER });
  };

  // Shared row style
  const row = {
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '12px 0',
  };
  const label = {
    fontFamily: theme.font, fontSize: 13, fontWeight: 500, color: theme.ink,
    display: 'flex', alignItems: 'center', gap: 10,
  };
  const iconBox = {
    width: 28, height: 28, borderRadius: theme.name === 'Editorial' ? 4 : 8,
    background: theme.surfaceAlt, display: 'flex', alignItems: 'center', justifyContent: 'center',
  };

  const Stepper = ({ value, onInc, onDec, suffix, min = 0 }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <button onClick={onDec} disabled={value <= min} style={{
        width: 30, height: 30, borderRadius: 15,
        background: theme.surfaceAlt, border: `1px solid ${theme.line}`,
        cursor: value <= min ? 'default' : 'pointer', opacity: value <= min ? 0.4 : 1,
        fontFamily: theme.font, fontSize: 16, fontWeight: 500, color: theme.ink,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 0,
      }}>−</button>
      <div style={{
        minWidth: 56, textAlign: 'center',
        fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
        color: theme.ink, letterSpacing: theme.letter,
      }}>{value}{suffix && <span style={{
        fontSize: 11, color: theme.inkMute, marginLeft: 2, fontWeight: 400,
      }}>{suffix}</span>}</div>
      <button onClick={onInc} style={{
        width: 30, height: 30, borderRadius: 15,
        background: theme.ink, border: 'none', cursor: 'pointer',
        fontFamily: theme.font, fontSize: 16, fontWeight: 500, color: theme.surface,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 0,
      }}>+</button>
    </div>
  );

  const Scale = ({ value, onChange, colors }) => (
    <div style={{ display: 'flex', gap: 4 }}>
      {[1, 2, 3, 4, 5].map(n => {
        const active = n === value;
        return (
          <button key={n} onClick={() => onChange(n)} style={{
            width: 28, height: 28, borderRadius: theme.name === 'Editorial' ? 4 : 14,
            background: active ? (colors ? colors[n - 1] : theme.ink) : theme.surfaceAlt,
            border: active ? 'none' : `1px solid ${theme.line}`,
            color: active ? (colors ? '#fff' : theme.surface) : theme.inkSoft,
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
            cursor: 'pointer', padding: 0,
            transition: 'background 0.15s',
          }}>{n}</button>
        );
      })}
    </div>
  );

  const stressColors = ['#6BAF92', '#9BC27A', '#E5C568', '#E29758', '#D96B5C'];
  const energyColors = ['#D96B5C', '#E29758', '#E5C568', '#9BC27A', '#6BAF92'];

  return (
    <div style={{
      margin: '4px 16px 12px', padding: '6px 18px 14px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      opacity: locked ? 0.6 : 1,
      pointerEvents: locked ? 'none' : 'auto',
    }}>
      <div style={{
        width: '100%', padding: '12px 0 12px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button onClick={() => setOpen(!open)} style={{
            padding: 0, background: 'transparent', border: 'none', cursor: 'pointer',
            fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Wellness</button>
          {open && setSettings && !locked && (
            <React.Fragment>
              <button onClick={() => setReordering(!reordering)} style={{
                padding: '3px 8px', border: `1px solid ${reordering ? theme.ink : theme.line}`,
                background: reordering ? theme.ink : 'transparent',
                color: reordering ? theme.bg : theme.inkSoft,
                borderRadius: 999, cursor: 'pointer',
                fontFamily: theme.font, fontSize: 10, fontWeight: 700,
              }}>{reordering ? 'Done' : 'Edit'}</button>
              {reordering && (
                <button onClick={() => {
                  resetRowOrder();
                  setSettings({ ...(settings || {}), wellnessHidden: [] });
                }} style={{
                  padding: '3px 8px', border: `1px solid ${theme.line}`,
                  background: 'transparent', color: theme.inkSoft,
                  borderRadius: 999, cursor: 'pointer',
                  fontFamily: theme.font, fontSize: 10, fontWeight: 600,
                }}>Reset</button>
              )}
            </React.Fragment>
          )}
        </div>
        <button onClick={() => setOpen(!open)} style={{
          padding: 0, background: 'transparent', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {!open && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10,
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
            }}>
              <SummaryChip theme={theme} icon="coffee" value={`${w.coffees}`}/>
              <SummaryChip theme={theme} icon="water" value={`${Math.round((w.water || 0) / 250)} cups`}/>
              <SummaryChip theme={theme} icon="sleep" value={`${w.sleepHrs}h`}/>
              <SummaryChip theme={theme} icon="energy" value={`${w.energy}/5`} color="#6BAF92"/>
            </div>
          )}
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"
            style={{ transform: open ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>
            <path d="M2 3.5L5 6.5L8 3.5" stroke={theme.inkMute} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </button>
      </div>

      {open && <div style={{ display: 'flex', flexDirection: 'column' }}>
      {reordering && (() => {
        const hiddenHomeKeys = Object.keys(HOME_TO_TRENDS_KEY)
          .filter(k => isHiddenHome(k));
        if (!hiddenHomeKeys.length) return null;
        return (
          <div style={{
            order: -1,
            padding: '10px 0 4px',
            borderTop: `1px solid ${theme.line}`,
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 700,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
              marginBottom: 6,
            }}>Hidden · tap to restore</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {hiddenHomeKeys.map(k => (
                <button key={k} onClick={() => toggleHidden(k)} style={{
                  padding: '4px 10px', border: `1px dashed ${theme.line}`,
                  background: 'transparent', color: theme.inkSoft,
                  borderRadius: 999, cursor: 'pointer',
                  fontFamily: theme.font, fontSize: 11, fontWeight: 600,
                }}>+ {HOME_ROW_LABELS[k]}</button>
              ))}
            </div>
          </div>
        );
      })()}
      {/* Coffee */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('coffee'), display: isHiddenHome('coffee') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('coffee')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('coffee')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 6h9v3a3 3 0 01-3 3H6a3 3 0 01-3-3V6z" stroke={theme.ink} strokeWidth="1.5"/>
              <path d="M12 7h1.5a1.5 1.5 0 010 3H12" stroke={theme.ink} strokeWidth="1.5"/>
              <path d="M6 3c0 1 1 1 1 2M9 3c0 1 1 1 1 2" stroke={theme.ink} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          Coffee
        </div>
        <Stepper value={w.coffees} suffix=""
          onDec={() => setWellness({ ...w, coffees: Math.max(0, w.coffees - 1) })}
          onInc={() => setWellness({ ...w, coffees: w.coffees + 1 })}/>
      </div>

      {/* Water */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('water'), display: isHiddenHome('water') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('water')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('water')}/>}
          <div style={iconBox}>
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
              <path d="M7 1s5 5 5 9a5 5 0 01-10 0c0-4 5-9 5-9z" stroke={theme.ink} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </div>
          Water
        </div>
        <Stepper value={Math.round((w.water || 0) / 250)} suffix={(w.water || 0) === 250 ? 'cup' : 'cups'} min={0}
          onDec={() => setWellness({ ...w, water: Math.max(0, (w.water || 0) - 250) })}
          onInc={() => setWellness({ ...w, water: (w.water || 0) + 250 })}/>
      </div>

      {/* Sleep */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('sleep'), display: isHiddenHome('sleep') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('sleep')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('sleep')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 9A5 5 0 017 3a5 5 0 106 6z" stroke={theme.ink} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </div>
          Sleep
        </div>
        <Stepper value={w.sleepHrs} suffix="h"
          onDec={() => setWellness({ ...w, sleepHrs: +Math.max(0, w.sleepHrs - 0.5).toFixed(1) })}
          onInc={() => setWellness({ ...w, sleepHrs: +(w.sleepHrs + 0.5).toFixed(1) })}/>
      </div>

      {/* Reading */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('reading'), display: isHiddenHome('reading') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('reading')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('reading')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 3.5h5a2 2 0 012 2V13a1.5 1.5 0 00-1.5-1.5H2V3.5zM14 3.5H9a2 2 0 00-2 2V13a1.5 1.5 0 011.5-1.5H14V3.5z"
                stroke={theme.ink} strokeWidth="1.3" strokeLinejoin="round" fill="none"/>
            </svg>
          </div>
          Reading
        </div>
        <Stepper value={w.readingMin || 0} suffix="min"
          onDec={() => setWellness({ ...w, readingMin: Math.max(0, (w.readingMin || 0) - 5) })}
          onInc={() => setWellness({ ...w, readingMin: (w.readingMin || 0) + 5 })}/>
      </div>

      {/* Stress */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('stress'), display: isHiddenHome('stress') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('stress')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('stress')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 10c1-2 3-3 5-3s4 1 5 3" stroke={theme.ink} strokeWidth="1.5" strokeLinecap="round"/>
              <circle cx="6" cy="6" r="1" fill={theme.ink}/>
              <circle cx="10" cy="6" r="1" fill={theme.ink}/>
            </svg>
          </div>
          Stress
        </div>
        <Scale value={w.stress} onChange={v => setWellness({ ...w, stress: v })} colors={stressColors}/>
      </div>

      {/* Energy */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('energy'), display: isHiddenHome('energy') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('energy')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('energy')}/>}
          <div style={iconBox}>
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
              <path d="M8 1L2 9h4l-1 6 6-8H7l1-6z" stroke={theme.ink} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </div>
          Energy
        </div>
        <Scale value={w.energy} onChange={v => setWellness({ ...w, energy: v })} colors={energyColors}/>
      </div>

      {/* Rehab — did you do it today? */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, order: rowOrder.indexOf('rehab'), display: isHiddenHome('rehab') ? 'none' : 'flex' }}>
        <div style={label}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('rehab')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('rehab')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M5 10l2 2 4-5" stroke={theme.ink} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
              <circle cx="8" cy="8" r="6.5" stroke={theme.ink} strokeWidth="1.3" fill="none"/>
            </svg>
          </div>
          Rehab
        </div>
        <button onClick={() => setWellness({ ...w, rehab: !w.rehab })} style={{
          padding: '8px 16px', borderRadius: 999, border: 'none', cursor: 'pointer',
          background: w.rehab ? '#2B7A5C' : theme.surfaceAlt,
          color: w.rehab ? '#FFFFFF' : theme.inkSoft,
          fontFamily: theme.font, fontSize: 12, fontWeight: 700,
          letterSpacing: '0.02em',
        }}>{w.rehab ? 'Done ✓' : 'Not done'}</button>
      </div>

      {/* Mobility — morning / lunch / afternoon check-ins */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}`, alignItems: 'flex-start', order: rowOrder.indexOf('mobility'), display: isHiddenHome('mobility') ? 'none' : 'flex' }}>
        <div style={{ ...label, paddingTop: 4 }}>
          {reordering && <ReorderArrows idx={rowOrder.indexOf('mobility')} total={rowOrder.length} onMove={moveRow} theme={theme} onHide={() => toggleHidden('mobility')}/>}
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="3.5" r="1.8" stroke={theme.ink} strokeWidth="1.3" fill="none"/>
              <path d="M8 5.3v3m0 0l-3 3m3-3l3 3M4 9h8" stroke={theme.ink} strokeWidth="1.3" strokeLinecap="round" fill="none"/>
            </svg>
          </div>
          Mobility
        </div>
        <div style={{ display: 'flex', gap: 4, flex: 1, maxWidth: 200, marginLeft: 8 }}>
          {[
            ['morning',   'AM'],
            ['lunch',     'Lunch'],
            ['afternoon', 'PM'],
          ].map(([key, lbl]) => {
            const mob = w.mobility || {};
            const on = !!mob[key];
            return (
              <button key={key} onClick={() => setWellness({
                ...w, mobility: { ...mob, [key]: !on },
              })} style={{
                flex: 1, padding: '8px 0', borderRadius: 10,
                border: `1px solid ${on ? '#2B7A5C' : theme.line}`,
                background: on ? '#E8F5E9' : 'transparent',
                color: on ? '#2B7A5C' : theme.inkSoft,
                fontFamily: theme.font, fontSize: 11, fontWeight: on ? 700 : 500,
                cursor: 'pointer',
              }}>{lbl}{on ? ' ✓' : ''}</button>
            );
          })}
        </div>
      </div>

      </div>}
    </div>
  );
}

// ── Training plan: curated NRC guided-run catalog ──
// No public Nike API exists; this is a hand-maintained list matched by
// caloree_type so the planner can suggest a real session that exists in
// the NRC app. If Nike renames/removes one, the deep-link still opens
// NRC's home screen and the user picks manually.
const NRC_CATALOG = [
  { id: 'speed-5x3-threshold', nike: 'Speed Run · 5×3 @ Threshold', coach: 'Coach Bennett', caloree_type: 'tempo', minutes: 38 },
  { id: 'speed-8x400',         nike: 'Speed Run · 8×400m',          coach: 'Coach Bennett', caloree_type: 'speed', minutes: 42 },
  { id: 'speed-6x2-vo2',       nike: 'Speed Run · 6×2 @ VO₂',       coach: 'Coach Bennett', caloree_type: 'speed', minutes: 36 },
  { id: 'tempo-20',            nike: 'Tempo Run · 20 min',          coach: 'Coach Bennett', caloree_type: 'tempo', minutes: 35 },
  { id: 'tempo-30',            nike: 'Tempo Run · 30 min',          coach: 'Coach Bennett', caloree_type: 'tempo', minutes: 45 },
  { id: 'hill-6x1',            nike: 'Hill Repeats · 6×1 min',       coach: 'Coach Bennett', caloree_type: 'hills', minutes: 32 },
  { id: 'fartlek-45',          nike: 'Fartlek Play · 45 min',        coach: 'Coach Bennett', caloree_type: 'speed', minutes: 45 },
  { id: 'long-60',             nike: 'Long Run · 60 min',            coach: 'Coach Bennett', caloree_type: 'long', minutes: 60 },
  { id: 'long-90',             nike: 'Long Run · 90 min',            coach: 'Coach Bennett', caloree_type: 'long', minutes: 90 },
];
function findNRCMatch(session) {
  if (!session || !session.kind || session.kind !== 'run') return null;
  const t = (session.runType || '').toLowerCase();
  if (!['tempo', 'speed', 'hills', 'long'].includes(t)) return null; // easy/recovery: no NRC
  const pool = NRC_CATALOG.filter(x => x.caloree_type === t);
  if (!pool.length) return null;
  // Prefer the session whose minutes are closest to the prescription
  const target = +session.minutes || 40;
  return pool.sort((a, b) =>
    Math.abs(a.minutes - target) - Math.abs(b.minutes - target))[0];
}

function generatePlan(templateKey, startDateIso) {
  const tmpl = PLAN_TEMPLATES[templateKey];
  if (!tmpl) return null;
  // Anchor week 1 to the Monday of the week containing startDateIso.
  // Sessions that fall before startDateIso are skipped — so starting
  // mid-week just shortens week 1 rather than delaying everything.
  const start = new Date(startDateIso + 'T00:00:00');
  const startDow = start.getDay() || 7;           // Sun = 7, Mon = 1
  const monday = new Date(start);
  monday.setDate(start.getDate() - (startDow - 1));
  const sessions = [];
  for (let w = 0; w < tmpl.weeks; w++) {
    tmpl.shape.forEach(block => {
      const blockDow = block.dow === 0 ? 7 : block.dow; // Sun = 7
      const d = new Date(monday);
      d.setDate(monday.getDate() + w * 7 + (blockDow - 1));
      const iso = todayLocalIso(d);
      if (iso < startDateIso) return;               // pre-plan-start: skip
      sessions.push({ date: iso, week: w + 1, ...block });
    });
  }
  return {
    template: templateKey,
    start_date: startDateIso,
    weeks: tmpl.weeks,
    sessions,
    prefs: {
      min_cal_per_wk: 2,
      min_mob_per_wk: 1,
      min_plyo_per_wk: 1,
      max_weekly_increase_pct: 10,
      preferred_rest_dow: 3,
      long_run_dow: 6,
      deload_every: 4,
      wont_do: ['swim', 'treadmill'],
      equipment: ['plyo_box', 'kettlebell', 'pull_up_bar', 'rings', 'bands', 'mat'],
      prefer_nrc_for_structured: true,
    },
  };
}

// ── Planner view: today's session + this week + templates + prefs ──
function PlannerView({ theme, settings, setSettings, exerciseLog = [], selectedDate, onExit, onOpenPrefs }) {
  const plan = settings && settings.trainingPlan;
  const [pickingTemplate, setPickingTemplate] = React.useState(false);
  const [templateChoice, setTemplateChoice] = React.useState('hybrid-runner');
  // Start-date option: 'today' | 'tomorrow' | 'next-mon'
  const [startChoice, setStartChoice] = React.useState('today');
  // Week offset from selectedDate's calendar week (0 = this week, +1 next, -1 last)
  const [weekOffset, setWeekOffset] = React.useState(0);

  // ISO of the Monday of a given date's calendar week.
  const weekMonday = (iso) => {
    const d = new Date(iso + 'T00:00:00');
    const dow = d.getDay() || 7;                    // Sun = 7
    d.setDate(d.getDate() - (dow - 1));
    return todayLocalIso(d);
  };
  const addDaysIso = (iso, n) => {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return todayLocalIso(d);
  };

  const startPlan = (key, startKind) => {
    let startIso = todayLocalIso();
    if (startKind === 'tomorrow') startIso = addDaysIso(startIso, 1);
    else if (startKind === 'next-mon') {
      const t = new Date(startIso + 'T00:00:00');
      const dow = t.getDay() || 7;
      const shift = dow === 1 ? 7 : (8 - dow);
      startIso = addDaysIso(startIso, shift);
    }
    const newPlan = generatePlan(key, startIso);
    setSettings({ ...(settings || {}), trainingPlan: newPlan });
    setPickingTemplate(false);
    setWeekOffset(0);
  };
  const clearPlan = () => {
    if (!confirm('Discard current plan? This keeps your logged workouts but removes the schedule.')) return;
    const next = { ...(settings || {}) };
    delete next.trainingPlan;
    setSettings(next);
  };

  // If a stale plan was saved before the v54 schema fix (no sessions array,
  // or non-array sessions), force the user back into the template picker
  // rather than crashing.
  if (plan && !Array.isArray(plan.sessions)) {
    plan.sessions = [];
  }
  if (!plan || !plan.sessions?.length || pickingTemplate) {
    // ── No plan: template picker ──
    return (
      <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 120 }}>
        <div style={{ padding: '18px 18px 8px' }}>

        </div>
        <div style={{ padding: '8px 18px 18px' }}>

            const selected = templateChoice === key;
            return (
              <div key={key} onClick={() => setTemplateChoice(key)} style={{
                padding: 14, marginBottom: 10,

                      background: theme.bg, border: `1px solid ${theme.line}`,

            width: '100%', marginTop: 12, padding: 14, border: 'none',

              width: '100%', marginTop: 8, padding: 12, border: `1px solid ${theme.line}`,
              background: 'transparent', color: theme.inkSoft, borderRadius: 12,
              fontSize: 13, fontWeight: 500, cursor: 'pointer',
            }}>Cancel</button>
          )}
        </div>
      </div>
    );
  }

  // ── Plan exists ──
  const tmpl = PLAN_TEMPLATES[plan.template];
  // Which day's session to preview. Starts at selectedDate; user can tap
  // any cell in the ribbon below to peek at that day.
  const [previewDate, setPreviewDate] = React.useState(selectedDate);
  React.useEffect(() => { setPreviewDate(selectedDate); }, [selectedDate]);
  const todaySess = plan.sessions.find(s => s.date === previewDate);
  const previewIsToday = previewDate === selectedDate;
  // The Monday we're showing (this week ± offset).
  const viewMondayIso = addDaysIso(weekMonday(selectedDate), weekOffset * 7);
  // All 7 calendar days of that week — filter plan sessions into them.
  const weekDays = Array.from({ length: 7 }, (_, i) => addDaysIso(viewMondayIso, i));
  const weekSessions = weekDays
    .map(iso => ({ date: iso, session: plan.sessions.find(s => s.date === iso) }))
    .filter(x => x.session);
  // Plan-week number of the first session in the current view (for label).
  const planWeekNumber = weekSessions[0]?.session?.week || null;
  const thisWeekHasAny = weekSessions.length > 0;
  const planFirstDate = plan.sessions[0]?.date;

  const jumpToFirstWeek = () => {
    if (!planFirstDate) return;
    const fromMon = weekMonday(selectedDate);

    setWeekOffset(diff);

  // Completion: match plan sessions against exerciseLog by date + kind

  const completionsByWeek = (() => {

    return m;

  const matched = todaySess ? matchLog(todaySess) : null;

function HomeScreen({ theme, log, setLog, targets: baseTargets, settings = {}, setSettings, targetsForDate, wellness, setWellness, wellnessMap = {}, exerciseLog = [], setExerciseLog, weightLog = [], onAddMeal, onOpenFood, onOpenProfile, onAddExercise, onOpenWeight, session, logDate, setLogDate }) {
  // Tracker ↔ Planner. Persisted across reloads so the view feels stable.
  const [plannerMode, setPlannerMode] = React.useState(() => {
    try { return localStorage.getItem('cal_home_mode') === 'planner'; } catch { return false; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('cal_home_mode', plannerMode ? 'planner' : 'tracker'); } catch {}
  }, [plannerMode]);
  const [showPlanPrefs, setShowPlanPrefs] = React.useState(false);
  const [favBump, setFavBump] = React.useState(0);
  React.useEffect(() => {
    const h = () => setFavBump(b => b + 1);
    window.addEventListener('caloree:foodschanged', h);
    return () => window.removeEventListener('caloree:foodschanged', h);
  }, []);

  // Merge two meal entries into one combined entry
  React.useEffect(() => {
    const handler = async (e) => {
      const { sourceId, targetId } = e.detail;
      const src = log.find(x => x.id === sourceId);
      const tgt = log.find(x => x.id === targetId);
      if (!src || !tgt) return;
      const fSrc = foodById(src.foodId);
      const fTgt = foodById(tgt.foodId);
      if (!fSrc || !fTgt) return;
      const qS = src.qty || 1, qT = tgt.qty || 1;
      const sum = (k) => (+(fSrc[k] || 0) * qS) + (+(fTgt[k] || 0) * qT);
      const ingredients = [];
      const ingsFrom = (food, qty) => {
        if (Array.isArray(food.ingredients) && food.ingredients.length) {
          food.ingredients.forEach(ing => ingredients.push({
            ...ing,
            kcal: (+ing.kcal || 0) * qty,
            c: (+ing.c || 0) * qty,
            p: (+ing.p || 0) * qty,
            f: (+ing.f || 0) * qty,
            satFat: (+ing.satFat || 0) * qty,
            sugar: (+ing.sugar || 0) * qty,
            fibre: (+ing.fibre || 0) * qty,
            g: (+ing.g || 0) * qty,
          }));
        } else {
          ingredients.push({
            name: food.name, brand: food.brand,
            kcal: (+food.kcal || 0) * qty,
            c: (+food.c || 0) * qty,
            p: (+food.p || 0) * qty,
            f: (+food.f || 0) * qty,
            satFat: (+food.satFat || 0) * qty,
            sugar: (+food.sugar || 0) * qty,
            fibre: (+food.fibre || 0) * qty,
            g: (+food.servingG || 100) * qty,
          });
        }
      };
      ingsFrom(fTgt, qT);
      ingsFrom(fSrc, qS);
      const newId = 'ai_merge_' + Date.now();
      const merged = {
        id: newId,
        name: `${fTgt.name} + ${fSrc.name}`,
        brand: 'Combined',
        servingG: (+(fTgt.servingG || 100) * qT) + (+(fSrc.servingG || 100) * qS),
        kcal: sum('kcal'), c: sum('c'), p: sum('p'), f: sum('f'),
        satFat: sum('satFat'), sugar: sum('sugar'), fibre: sum('fibre'),
        ingredients,
        photo: fTgt.photo || fSrc.photo || null,
        photoPath: fTgt.photoPath || fSrc.photoPath || null,
      };
      FOODS.push(merged);
      const newEntry = {
        id: 'l_' + newId, foodId: newId, qty: 1,
        meal: tgt.meal, time: tgt.time || src.time || '',
        date: tgt.date || src.date,
      };
      // Snapshot for undo
      const undoSnapshot = { src: { ...src }, tgt: { ...tgt }, mergedId: newId, mergedFood: merged };
      setLog(prev => [...prev.filter(x => x.id !== sourceId && x.id !== targetId), newEntry]);
      // Sync to Supabase
      if (window.sb && session) {
        const uid = session.user.id;
        try {
          await window.sb.from('foods').upsert([{
            id: newId, user_id: uid,
            name: merged.name, brand: merged.brand,
            serving_g: merged.servingG,
            kcal: merged.kcal, c: merged.c, p: merged.p, f: merged.f,
            sat_fat: merged.satFat, sugar: merged.sugar, fibre: merged.fibre,
            ingredients: merged.ingredients, photo_path: merged.photoPath,
          }], { onConflict: 'id' });
          // Delete old log rows
          await window.sb.from('meal_logs').delete().in('id', [sourceId, targetId]);
          // Insert the merged log row directly (don't depend on App push, which only handles today)
          await window.sb.from('meal_logs').insert([{
            id: newEntry.id, user_id: uid,
            date: newEntry.date || todayLocalIso(),
            meal: newEntry.meal, food_id: newEntry.foodId,
            qty: newEntry.qty || 1, time: newEntry.time || null,
          }]);
        } catch (err) { console.warn('merge sync:', err.message); }
      }
      window.dispatchEvent(new Event('caloree:foodschanged'));
      window.showToast && window.showToast(`Merged into "${merged.name}"`, async () => {
        // Restore originals + remove merged
        setLog(prev => [...prev.filter(x => x.id !== 'l_' + newId), undoSnapshot.src, undoSnapshot.tgt]);
        if (window.sb && session) {
          const uid = session.user.id;
          try {
            // Restore original foods (in case they were ai_*)
            // Restore original log rows
            await window.sb.from('meal_logs').insert([
              { id: undoSnapshot.src.id, user_id: uid,
                date: undoSnapshot.src.date || new Date().toISOString().slice(0,10),
                meal: undoSnapshot.src.meal,
                food_id: undoSnapshot.src.foodId, qty: undoSnapshot.src.qty || 1,
                time: undoSnapshot.src.time || null },
              { id: undoSnapshot.tgt.id, user_id: uid,
                date: undoSnapshot.tgt.date || new Date().toISOString().slice(0,10),
                meal: undoSnapshot.tgt.meal,
                food_id: undoSnapshot.tgt.foodId, qty: undoSnapshot.tgt.qty || 1,
                time: undoSnapshot.tgt.time || null },
            ]);
            // Remove merged food + log
            await window.sb.from('meal_logs').delete().eq('id', 'l_' + newId);
            await window.sb.from('foods').delete().eq('id', newId);
          } catch (e) { console.warn('merge undo sync:', e.message); }
        }
        // Remove merged from local FOODS
        const idx = FOODS.findIndex(f => f.id === newId);
        if (idx !== -1) FOODS.splice(idx, 1);
        window.dispatchEvent(new Event('caloree:foodschanged'));
      }, 8000);
    };
    window.addEventListener('caloree:merge-meals', handler);
    return () => window.removeEventListener('caloree:merge-meals', handler);
  }, [log, session]);
  const toggleFavourite = async (foodId) => {
    const f = FOODS.find(x => x.id === foodId);
    if (!f) return;
    f.isFavourite = !f.isFavourite;
    setFavBump(b => b + 1);
    // Persist to localStorage so toggle survives reload even for seed foods
    try {
      const favs = JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]');
      const set = new Set(favs);
      if (f.isFavourite) set.add(foodId); else set.delete(foodId);
      localStorage.setItem('cal_favourite_ids', JSON.stringify([...set]));
    } catch {}
    // Sync to Supabase if signed in — upsert whole row so both ai_ and seed foods persist
    const sb = window.sb;
    if (!sb) return;
    const uid = (await sb.auth.getUser()).data?.user?.id;
    if (!uid) return;
    const r = await sb.from('foods').upsert([{
      id: f.id, user_id: uid,
      name: f.name, brand: f.brand || null,
      serving_g: f.servingG || 100,
      kcal: f.kcal || 0, c: f.c || 0, p: f.p || 0, f: f.f || 0,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      is_favourite: !!f.isFavourite,
      photo_path: f.photoPath || null,
    }], { onConflict: 'id' });
    if (r.error) console.warn('fav sync:', r.error.message);
  };
  const todayIso = todayLocalIso();
  const selectedDate = logDate || todayIso;
  const setSelectedDate = setLogDate || (() => {});
  const dayLog = log.filter(e => (e.date || todayIso) === selectedDate);
  // Resolve targets that were active on the selected date
  const targets = targetsForDate ? targetsForDate(selectedDate) : baseTargets;
  const totals = sumMacros(dayLog);
  const dayExBurn = (exerciseLog || [])
    .filter(e => (e.date || todayIso) === selectedDate)
    .reduce((s, e) => s + (+e.kcal || 0), 0);
  const effectiveKcalGoal = settings.adjustForExercise
    ? targets.kcal + Math.round(dayExBurn)
    : targets.kcal;
  const ringPct = totals.kcal / effectiveKcalGoal;
  const remaining = Math.max(0, effectiveKcalGoal - totals.kcal);
  const animKcal = useAnimatedNum(totals.kcal);
  const [drill, setDrill] = React.useState(null); // { key: 'c'|'p'|'f', label, unit, color }
  const exGoalKcal = targets.exKcal || 400;

  // Per-day select mode
  const [selectMode, setSelectMode] = React.useState(false);
  const [selectedIds, setSelectedIds] = React.useState(new Set());
  const [pickAction, setPickAction] = React.useState(null); // 'copy' | 'move' | null
  const [pickDate, setPickDate] = React.useState(todayIso);
  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const exitSelectMode = () => { setSelectMode(false); setSelectedIds(new Set()); setPickAction(null); };
  const performAction = async () => {
    const ids = [...selectedIds];
    if (!ids.length) return;
    const sb = window.sb;
    if (!sb || !session) return;
    if (pickAction === 'move') {
      const r = await sb.from('meal_logs').update({ date: pickDate }).in('id', ids);
      if (r.error) { window.showToast && window.showToast('Move failed: ' + r.error.message); return; }
      setLog(prev => prev.map(l => ids.includes(l.id) ? { ...l, date: pickDate } : l));
      window.showToast && window.showToast(`Moved ${ids.length} item${ids.length === 1 ? '' : 's'} to ${pickDate}`);
    } else if (pickAction === 'copy') {
      const uid = session.user.id;
      const picked = log.filter(l => ids.includes(l.id));
      const newRows = picked.map((e, i) => ({
        id: 'l_copy_' + Date.now() + '_' + i,
        user_id: uid, date: pickDate,
        meal: e.meal, food_id: e.foodId, qty: e.qty || 1, time: e.time || null,
      }));
      if (newRows.length) {
        const r = await sb.from('meal_logs').insert(newRows);
        if (r.error) { window.showToast && window.showToast('Copy failed: ' + r.error.message); return; }
        setLog(prev => [...prev, ...newRows.map(r => ({
          id: r.id, foodId: r.food_id, qty: +r.qty || 1, meal: r.meal, time: r.time, date: r.date,
        }))]);
        window.showToast && window.showToast(`Copied ${newRows.length} item${newRows.length === 1 ? '' : 's'} to ${pickDate}`);
      }
    }
    exitSelectMode();
  };
  const isToday = selectedDate === todayIso;
  const [markedMap, setMarkedMap] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('cal_marked_complete') || '{}'); }
    catch { return {}; }
  });
  const markedComplete = !!markedMap[selectedDate];
  const setComplete = (v) => {
    const next = { ...markedMap };
    if (v) next[selectedDate] = true; else delete next[selectedDate];
    setMarkedMap(next);
    localStorage.setItem('cal_marked_complete', JSON.stringify(next));
  };
  // Status: manual-complete > auto-detected based on kcal
  const dayStatus = markedComplete ? 'complete'
    : totals.kcal === 0 ? 'empty'
    : totals.kcal < 1000 ? 'incomplete'
    : 'complete';

  const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  // Top-left toggle between tracker and planner. Segmented pill: Track | Plan.
  const modeToggle = (
    <div style={{
      margin: '4px 16px 4px', alignSelf: 'flex-start',
      display: 'inline-flex', gap: 2, padding: 2, width: 'fit-content',
      background: theme.surfaceAlt, border: `1px solid ${theme.line}`,
      borderRadius: 999,
    }}>
      <button onClick={() => setPlannerMode(false)} style={{
        padding: '5px 11px', border: 'none',
        background: !plannerMode ? theme.surface : 'transparent',
        color: !plannerMode ? theme.ink : theme.inkSoft,
        borderRadius: 999, cursor: 'pointer',
        fontFamily: theme.font, fontSize: 11, fontWeight: !plannerMode ? 700 : 500,
        boxShadow: !plannerMode ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
        display: 'inline-flex', alignItems: 'center', gap: 4,
      }}>
        <span style={{ fontSize: 11 }}>🍽️</span>Track
      </button>
      <button onClick={() => setPlannerMode(true)} style={{
        padding: '5px 11px', border: 'none',
        background: plannerMode ? theme.surface : 'transparent',
        color: plannerMode ? '#5A3D9E' : theme.inkSoft,
        borderRadius: 999, cursor: 'pointer',
        fontFamily: theme.font, fontSize: 11, fontWeight: plannerMode ? 700 : 500,
        boxShadow: plannerMode ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
        display: 'inline-flex', alignItems: 'center', gap: 4,
      }}>
        <span style={{ fontSize: 11 }}>📋</span>Plan
      </button>
    </div>
  );

  if (plannerMode) {
    return (
      <div style={{ paddingBottom: 0, background: theme.bg, minHeight: '100%',
        display: 'flex', flexDirection: 'column' }}>
        <Header theme={theme} onOpenProfile={onOpenProfile}
          selectedDate={selectedDate} setSelectedDate={setSelectedDate}
          log={log} settings={settings} setSettings={setSettings} />
        {modeToggle}
        <PlannerView theme={theme}
          settings={settings} setSettings={setSettings}
          exerciseLog={exerciseLog}
          selectedDate={selectedDate}
          onExit={() => setPlannerMode(false)}
          onOpenPrefs={() => setShowPlanPrefs(true)} />
        {showPlanPrefs && (
          <PlanPrefsSheet theme={theme}
            settings={settings} setSettings={setSettings}
            onClose={() => setShowPlanPrefs(false)} />
        )}
        {modeToggle}
      </div>
    );
  }

  return (
    <div style={{
      paddingBottom: 110, background: theme.bg, minHeight: '100%',
    }}>
      {/* Header: greeting + date scrub */}
      <Header theme={theme} onOpenProfile={onOpenProfile}
        selectedDate={selectedDate} setSelectedDate={setSelectedDate}
        log={log} settings={settings} setSettings={setSettings} />

      {modeToggle}

      {/* HERO — Calorie ring */}
      <div style={{
        margin: '8px 16px 24px', padding: '28px 20px 24px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        boxShadow: theme.name === 'Editorial' ? 'none' : `0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.04)`,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          marginBottom: 8,
        }}>
          <div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>Calories</div>
            <div style={{
              fontFamily: theme.font, fontSize: 13, color: theme.inkMute, marginTop: 2,
            }}>
              Goal {effectiveKcalGoal.toLocaleString()} kcal{settings.adjustForExercise && dayExBurn > 0 ? ` (${targets.kcal} + ${Math.round(dayExBurn)} exercise)` : ''}
            </div>
          </div>
          <StatusBadge theme={theme}
            kcal={totals.kcal}
            target={effectiveKcalGoal}
            kind="food" />
        </div>

        <div onClick={() => setDrill({ key: 'kcal', label: 'Calories', unit: ' kcal', color: theme.accent })}
          style={{ display: 'flex', justifyContent: 'center', margin: '8px 0 4px', cursor: 'pointer' }}>
          <Ring pct={ringPct}
            size={228} stroke={theme.name === 'Editorial' ? 8 : 14} theme={theme}>
            <div style={{
              fontFamily: theme.numFont, fontSize: 56, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1,
            }}>{Math.round(animKcal).toLocaleString()}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
              marginTop: 6, letterSpacing: '0.06em', textTransform: 'uppercase',
            }}>{Math.round(remaining)} remaining</div>
          </Ring>
        </div>

        {/* Macro breakdown row */}
        <div style={{
          display: 'flex', gap: 14, marginTop: 20, padding: '0 4px',
        }}>
          <MacroBar label="Carbs"   value={totals.c} target={targets.c} color={theme.macros.carbs}   theme={theme}
            onClick={() => setDrill({ key: 'c', label: 'Carbs', unit: 'g', color: theme.macros.carbs })} />
          <MacroBar label="Protein" value={totals.p} target={targets.p} color={theme.macros.protein} theme={theme}
            onClick={() => setDrill({ key: 'p', label: 'Protein', unit: 'g', color: theme.macros.protein })} />
          <MacroBar label="Fat"     value={totals.f} target={targets.f} color={theme.macros.fat}     theme={theme}
            onClick={() => setDrill({ key: 'f', label: 'Fat', unit: 'g', color: theme.macros.fat })} />
        </div>
        {/* Secondary macros: sat fat, sugar, fibre */}
        <div style={{
          display: 'flex', gap: 14, marginTop: 14, padding: '0 4px',
        }}>
          {[
            ['Sat Fat', 'satFat', targets.satFat ?? 20,  '#B8824A'],
            ['Sugar',   'sugar',  targets.sugar  ?? 50,  '#C25A8E'],
            ['Fibre',   'fibre',  targets.fibre  ?? 30,  '#5C9A6E'],
          ].map(([label, key, target, color]) => (
            <MacroBar key={key} label={label} value={totals[key]} target={target} color={color} theme={theme}
              onClick={() => setDrill({ key, label, unit: 'g', color })} />

      </div>

        const bgColor = isEmpty ? '#FDECEA' : isLooksFull ? '#EEF3EB' : '#FFF4DE';
        const borderColor = isEmpty ? '#F5B7B1' : isLooksFull ? '#CBDDC0' : '#F1D08A';
        const dotColor = isEmpty ? '#D96B5C' : isLooksFull ? '#2B7A5C' : '#E0A24A';
        const titleColor = isEmpty ? '#B3261E' : isLooksFull ? '#1C5A3F' : '#8A5A1F';

        return (

              padding: '8px 12px', border: `1px solid ${theme.line}`,

              borderRadius: theme.radius.chip,
              fontFamily: theme.font, fontSize: 12, fontWeight: 600,

            <path d="M6 11V8a6 6 0 1112 0v3M4 11h16v10H4z" stroke="#2B7A5C" strokeWidth="2" strokeLinejoin="round"/>

          <div style={{
            flex: 1, fontFamily: theme.font, fontSize: 12, color: '#1C5A3F', fontWeight: 600,
          }}>
            {isToday ? 'Today is locked' : 'Day is locked'} · no changes can be made

            padding: '6px 10px', border: `1px solid #A8D5AE`,

            borderRadius: theme.radius.chip,

          }}>Unlock</button>

      )}

      {/* Wellness quick-log */}

        setWellness={(patch) => setWellness(selectedDate, patch)}
        settings={settings} setSettings={setSettings}/>

      {/* Exercise card */}
      <ExerciseCard theme={theme}
        locked={markedComplete}
        exerciseLog={exerciseLog || []}
        entries={(exerciseLog || []).filter(e => (e.date || todayIso) === selectedDate)}
        customTypes={settings.customExerciseTypes || []}
        onAddCustomType={(t) => {
          if (!setSettings) return;
          const next = [...(settings.customExerciseTypes || []), t];
          applyCustomExerciseTypes([t]);
          setSettings({ ...settings, customExerciseTypes: next });
        }}
        onAdd={onAddExercise}
        onUpdateType={(id, type) => {
          setExerciseLog && setExerciseLog(exerciseLog.map(e => e.id === id ? { ...e, type } : e));
        }}
        onUpdate={(updated) => {
          setExerciseLog && setExerciseLog(exerciseLog.map(e => e.id === updated.id ? updated : e));
        }}
        onDelete={(id) => {
          const removed = exerciseLog.find(e => e.id === id);
          setExerciseLog && setExerciseLog(exerciseLog.filter(e => e.id !== id));
          if (window.sb) window.sb.from('exercise_logs').delete().eq('id', id)
            .then(r => r.error && console.warn('exercise delete:', r.error.message));
          window.showToast(`Removed ${removed?.type || 'exercise'}`, () => {
            if (!removed) return;
            setExerciseLog(prev => prev.some(e => e.id === id) ? prev : [...prev, removed]);
            // Re-upsert to Supabase (delete was already sent; reinsert)
            if (window.sb && session) {
              window.sb.from('exercise_logs').upsert([{
                id: removed.id, user_id: session.user.id, date: removed.date,
                type: removed.type, duration_min: removed.duration || null,
                distance_km: removed.distance || null, kcal: removed.kcal || null,
                notes: removed.notes || null, details: removed.details || null,
              }]).then(r => r.error && console.warn('exercise undo:', r.error.message));
            }
          });
        }}/>

      {/* Rest day banner — under the exercise card when the day is flagged */}
      {(wellnessMap[selectedDate] && wellnessMap[selectedDate].restDay) && (
        <div style={{
          margin: '0 16px 12px', padding: '10px 14px',
          background: 'linear-gradient(90deg, rgba(122,139,209,0.14), rgba(122,139,209,0.06))',
          border: '1px solid rgba(122,139,209,0.35)',
          borderRadius: theme.radius.card,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 18 }}>🌙</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontFamily: theme.font, fontSize: 12, fontWeight: 700,
              color: '#4A5A9E', letterSpacing: '0.06em', textTransform: 'uppercase',
            }}>Rest day</div>
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
            }}>Light moves still count. Logged exercise won't change this flag.</div>
          </div>
        </div>

      {/* Edit toggle — hidden when the day is locked */}
      {dayLog.length > 0 && !markedComplete && (
        <div style={{
          margin: '0 16px 8px', display: 'flex', justifyContent: 'flex-end',

          <button onClick={() => selectMode ? exitSelectMode() : setSelectMode(true)} style={{
            padding: '6px 12px', border: `1px solid ${theme.line}`,
            background: selectMode ? theme.ink : 'transparent',
            color: selectMode ? theme.bg : theme.inkSoft,
            borderRadius: 999, cursor: 'pointer',
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
          }}>{selectMode ? (selectedIds.size > 0 ? `Done · ${selectedIds.size}` : 'Done') : 'Edit'}</button>

      {meals.map(m => (

            window.showToast(`Removed ${food?.name || 'item'}`, () => {
              setLog(prev => prev.some(e => e.id === id) ? prev : [...prev, removed]);

          onAdd={() => onAddMeal(m)}

          onMoveEntry={(id, newMeal) => {
            setLog(log.map(e => e.id === id ? { ...e, meal: newMeal } : e));

              window.sb.from('meal_logs').update({ meal: newMeal }).eq('id', id)
                .then(r => r.error && console.warn('meal move sync:', r.error.message));

          onCopyToDate={(id, date) => {
            const e = log.find(x => x.id === id);

            setLog([...log, { ...e, id: 'l_' + Date.now(), date }]);

        margin: '12px 16px 0', padding: '16px 18px',
        background: theme.surfaceAlt, borderRadius: theme.radius.card,

      }}>
        {(() => {
          // Consecutive days ending today (or yesterday if today not yet
          // logged) that have >=1 meal logged. Uses local dates throughout
          // so timezone offset can't miscount.
          const daysWithLogs = new Set(log.map(e => e.date || todayIso));
          let streak = 0;
          const cur = new Date();
          cur.setHours(0, 0, 0, 0);
          if (!daysWithLogs.has(todayLocalIso(cur))) cur.setDate(cur.getDate() - 1);
          while (true) {
            const iso = todayLocalIso(cur);
            if (daysWithLogs.has(iso)) {
              streak++;
              cur.setDate(cur.getDate() - 1);
            } else break;
          }
          const wl = (typeof weightLog !== 'undefined' && weightLog) || [];
          const latestWeight = wl.length
            ? `${wl[wl.length - 1].kg} kg` : '— kg';
          return [
            ['Logged', `${dayLog.length} items`, null],
            ['Weight', latestWeight, onOpenWeight],
            ['Streak', `${streak} day${streak === 1 ? '' : 's'}`, null],

          <div key={k} onClick={onTap || undefined} style={{
            cursor: onTap ? 'pointer' : 'default',

      {drill && (
        <MacroDrillSheet theme={theme} log={dayLog} drill={drill}

      {/* Select-mode action bar */}
      {selectMode && selectedIds.size > 0 && (
        <div style={{
          position: 'fixed', left: 12, right: 12, bottom: 90, zIndex: 50,
          background: theme.surface, padding: '10px 12px',
          borderRadius: 16, border: `1px solid ${theme.line}`,
          boxShadow: '0 12px 32px rgba(0,0,0,0.18)',
          display: 'flex', alignItems: 'center', gap: 8,

          <span style={{
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,

          <div style={{ flex: 1 }}/>

            padding: '8px 14px', border: `1px solid ${theme.line}`,

          <button onClick={() => { setPickAction('copy'); setPickDate(todayIso); }} style={{

      {/* Date picker for selected action */}
      {pickAction && (
        <div onClick={() => setPickAction(null)} style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,

          <div onClick={(e) => e.stopPropagation()} style={{

            borderRadius: 10, padding: 12, boxSizing: 'border-box',
          }}>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 14, fontWeight: theme.titleWeight,
              color: theme.ink, marginBottom: 2,

            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginBottom: 8,
            }}>{selectedIds.size} selected</div>

                fontSize: 13, outline: 'none', background: theme.bg, color: theme.ink,
                boxSizing: 'border-box',
                WebkitAppearance: 'none', appearance: 'none',
                minHeight: 30, lineHeight: '18px',
                fontFamily: theme.font,
              }}/>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => setPickAction(null)} style={{
                flex: 1, padding: '7px 0', border: `1px solid ${theme.line}`,
                background: 'transparent', color: theme.inkSoft,

                borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: 'pointer',
              }}>{pickAction === 'copy' ? 'Copy' : 'Move'}</button>
            </div>
          </div>
        </div>
      )}
          </div>
  );
}

function MacroDrillSheet({ theme, log, drill, onClose, onOpenFood }) {
  const contributors = log.map(e => {
    const f = foodById(e.foodId);
    if (!f) return null;
    const q = e.qty || 1;
    return { entry: e, food: f, amount: (f[drill.key] || 0) * q, kcal: (f.kcal || 0) * q };
  }).filter(Boolean).filter(r => r.amount > 0)
    .sort((a, b) => b.amount - a.amount);

  const total = contributors.reduce((s, r) => s + r.amount, 0);

  // State-driven slide-up so the animation is reliable across browsers.
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const id = requestAnimationFrame(() => setVisible(true));
    return () => cancelAnimationFrame(id);
  }, []);

  const panelRef = React.useRef(null);

  // iOS Safari scroll lock. The background uses an inner overflow:auto
  // container, so toggling body.style.overflow is not enough. We also
  // need to swallow touchmoves when the panel itself isn't scrollable,
  // otherwise iOS falls back to scrolling the nearest scrollable
  // ancestor (the page behind).
  React.useEffect(() => {
    const onTouchMove = (e) => {
      const panel = panelRef.current;
      if (panel && panel.contains(e.target)) {
        // Only allow native scroll when the panel actually has
        // overflow — otherwise iOS bubbles the drag to the page.
        const scrollable = panel.scrollHeight > panel.clientHeight + 1;
        if (scrollable) return;
      }
      if (e.cancelable) e.preventDefault();
    };
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    return () => document.removeEventListener('touchmove', onTouchMove);
  }, []);

  // Render via portal so `position: fixed` works regardless of the inner
  // `overflow: auto` ancestor that App uses for the main scroll container.
  // Without this, iOS Safari treats fixed-inside-overflow as absolute and
  // the page behind keeps scrolling when you drag.
  return ReactDOM.createPortal(
    <div onClick={onClose}
      style={{
        position: 'fixed', inset: 0,
        background: `rgba(0,0,0,${visible ? 0.4 : 0})`,

          WebkitOverflowScrolling: 'touch',

            padding: '24px 0', textAlign: 'center',

        ) : contributors.map((r, i) => {
          const pct = total ? (r.amount / total) * 100 : 0;
          return (
            <div key={r.entry.id} onClick={() => { onClose(); onOpenFood && onOpenFood(r.food.id); }}
              style={{
                padding: '10px 0', borderBottom: `1px solid ${theme.line}`, cursor: 'pointer',
                opacity: 1,
