                  borderRadius: theme.name === 'Editorial' ? 0 :
                    (theme.name === 'Warm' ? 6 : 3),
                  border: !isSel && !d.isToday ? `1px solid ${theme.line}` : 'none',
                  transition: 'background 0.2s',
                }} />
                )}
                {(() => {
                  const showLabel = range !== 'Month' || i % 5 === 0 || i === data.length - 1;
                  return (
                    <div style={{
                      fontFamily: theme.font, fontSize: range === 'Month' ? 9 : 11,
                      fontWeight: isSel ? 700 : 500,
                      color: isSel ? theme.ink : theme.inkMute,
                      letterSpacing: '0.04em',
                      visibility: showLabel ? 'visible' : 'hidden',
                      minHeight: range === 'Month' ? 11 : 13,
                    }}>{showLabel ? d.barLabel : '0'}</div>
                  );
                })()}
              </div>
            );
          })}
        </div>
        {/* Exercise type legend */}
        {(chartMetric === 'exKcal' || chartMetric === 'exMin') && (() => {
          const types = new Set();
          data.forEach(d => {
            const ex = exByDate[d.iso];
            if (ex && ex.byType) Object.keys(ex.byType).forEach(t => {
              if ((chartMetric === 'exKcal' ? ex.byType[t].kcal : ex.byType[t].min) > 0) types.add(t);
            });
          });
          if (types.size === 0) return null;
          return (
            <div style={{
              display: 'flex', flexWrap: 'wrap', gap: 10, marginTop: 12,
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft,
            }}>
              {[...types].map(t => (
                <span key={t} style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: EX_COLOR_MAP[t] || '#8A8A8A' }}/>
                  {t}
                </span>
              ))}
            </div>
          );
        })()}
      </div>}

      {/* No-rest-in-7-days warning — dismissable, auto-hides when a rest day is logged */}
      {(chartMetric === 'exKcal' || chartMetric === 'exMin') && (() => {
        const todayIso = todayLocalIso();
        const last7 = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(); d.setDate(d.getDate() - i);
          last7.push(todayLocalIso(d));
        }
        const hasRestInLast7 = last7.some(iso => (wellnessMap[iso] || {}).restDay);
        const dismissedUntil = settings?.restWarningDismissedUntil || null;
        const dismissed = dismissedUntil && dismissedUntil >= todayIso;
        if (hasRestInLast7 || dismissed) return null;
        return (
          <div style={{
            margin: '0 16px 10px', padding: '10px 14px',
            background: 'rgba(224,162,74,0.12)',
            border: '1px solid rgba(224,162,74,0.45)',
            borderRadius: theme.radius.card,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ fontSize: 18 }}>⚠️</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{
                fontFamily: theme.font, fontSize: 11, fontWeight: 700,
                color: '#8A5A1F', letterSpacing: '0.06em', textTransform: 'uppercase',
              }}>No rest day in 7 days</div>
              <div style={{
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
              }}>Flag a day as rest via Log exercise · 🌙 Rest day. Auto-clears once logged.</div>
            </div>
            <button onClick={() => {
              if (!setSettings) return;
              // Dismiss until 7 days from now — so the warning returns if still no rest.
              const until = new Date(); until.setDate(until.getDate() + 7);
              setSettings({ ...(settings || {}), restWarningDismissedUntil: todayLocalIso(until) });
            }} style={{
              padding: '5px 10px', border: `1px solid rgba(224,162,74,0.5)`,
              background: 'transparent', color: '#8A5A1F',
              borderRadius: 999, cursor: 'pointer',
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            }}>Dismiss</button>
          </div>
        );
      })()}

      {/* Exercise calendar / ribbon — shown for all ranges */}
      {bucket && (chartMetric === 'exKcal' || chartMetric === 'exMin') && (
        <ExerciseCalendar theme={theme} bucket={bucket} range={range}
          exByDate={exByDate}
          selectedType={selectedExType}
          setSelectedType={setSelectedExType}
          EX_COLOR_MAP={EX_COLOR_MAP}
          restDays={new Set(Object.entries(wellnessMap).filter(([,w]) => w && w.restDay).map(([d]) => d))}
          onOpenDate={(iso) => {
            if (setLogDate) setLogDate(iso);
            if (setTab) setTab('home');
          }}/>
      )}

      {/* Macro averages */}
      <div style={{
        margin: '0 16px 12px', padding: '18px 20px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          marginBottom: 14,
        }}>
          {(() => {
            const n = selSet.size;
            if (n === 0) return `Average macros · ${bucket?.label || ''}`;
            if (n === 1) {
              const idx = [...selSet][0];
              return `Macros · ${data[idx]?.dateLabel || data[idx]?.barLabel || 'Selected'}`;
            }
            return `Avg macros · ${n} days selected`;
          })()}
        </div>
        {data.length > 0 && (() => {
          // If the user has tapped bars, average only those; otherwise the
          // whole bucket.
          const scoped = selSet.size > 0
            ? [...selSet].map(i => data[i]).filter(Boolean)
            : data;
          const denom = scoped.length || 1;
          const avg = (key) => Math.round(scoped.reduce((s, d) => s + (d[key] || 0), 0) / denom);
          const rows = [
            ['Carbs',   'c',      avg('c'),      targets.c,                     theme.macros.carbs],
            ['Protein', 'p',      avg('p'),      targets.p,                     theme.macros.protein],
            ['Fat',     'f',      avg('f'),      targets.f,                     theme.macros.fat],
            ['Sat Fat', 'satFat', avg('satFat'), targets.satFat ?? 20,          '#B8824A'],
            ['Sugar',   'sugar',  avg('sugar'),  targets.sugar  ?? 50,          '#C25A8E'],
            ['Fibre',   'fibre',  avg('fibre'),  targets.fibre  ?? 30,          '#5C9A6E'],
          ];
          return rows.map(([k, key, v, t, c], i) => (
            <div key={k} style={{ marginBottom: i < rows.length - 1 ? 14 : 0 }}>
              <MacroBar label={k} value={v} target={t} color={c} theme={theme}
                onClick={() => setTrendDrill({ key, label: k, unit: 'g', color: c })} />
            </div>
          ));
        })()}
      </div>

      {/* Wellness vs Energy correlation */}
      {data.length > 0 && (
        <CorrelationCard theme={theme} data={data} bucketLabel={bucket?.label || ''} range={range}
          setRange={setRange} setOffset={setOffset}
          canGoBack={canGoBack} canGoForward={canGoForward}
          offset={offset} exerciseLog={exerciseLog}
          settings={settings} setSettings={setSettings} />
      )}

      {/* Weight (moved from Profile) */}
      <WeightCard theme={theme} weightLog={weightLog} setWeightLog={setWeightLog} targets={targets} />

      {/* Ask Claude */}
      <div style={{ margin: '0 16px 12px' }}>
        <button onClick={() => setAskOpen(true)} style={{
          width: '100%', padding: '14px 16px',
          border: `1px solid ${theme.line}`, background: theme.surface,
          borderRadius: theme.radius.card, cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left',
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2L12 3z"
              stroke={theme.accent} strokeWidth="1.8" strokeLinejoin="round"
              fill={theme.accent} fillOpacity={0.12}/>
          </svg>
          <div style={{ flex: 1 }}>
            <div style={{
              fontFamily: theme.font, fontSize: 14, fontWeight: 600, color: theme.ink,
            }}>Ask Claude about your data</div>
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginTop: 2,
            }}>Recap, anomalies, coaching, freeform questions</div>
          </div>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M1 1l6 6-6 6" stroke={theme.inkMute} strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </button>
      </div>

      {askOpen && (
        <AskCoachSheet theme={theme} range={range} bucketLabel={bucket?.label}
          data={data} targets={targets} setTargets={setTargets}
          exByDate={exByDate} weightLog={weightLog} exerciseLog={exerciseLog}
          onClose={() => setAskOpen(false)} />
      )}

      {trendDrill && (
        <TrendsMacroDrillSheet theme={theme} drill={trendDrill}
          bucket={bucket} range={range}
          onClose={() => setTrendDrill(null)} />
      )}
    </div>
  );
}

function TrendsMacroDrillSheet({ theme, drill, bucket, range, onClose }) {
  const [rows, setRows] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    (async () => {
      try {
        const sb = window.sb;
        const uid = (await sb.auth.getUser()).data?.user?.id;
        if (!uid) throw new Error('Not signed in');
        const bars = bucket?.bars || [];
        const startIso = bars[0]?.iso;
        const endIso = bars[bars.length - 1]?.iso;
        if (!startIso || !endIso) throw new Error('No range');
        const [mealsR, foodsR] = await Promise.all([
          sb.from('meal_logs').select('*').eq('user_id', uid)
            .gte('date', startIso).lte('date', endIso),
          sb.from('foods').select('*').eq('user_id', uid),
        ]);
        if (mealsR.error) throw mealsR.error;
        if (foodsR.error) throw foodsR.error;
        const foodById = {};
        (foodsR.data || []).forEach(f => { foodById[f.id] = f; });
        const agg = {};
        (mealsR.data || []).forEach(e => {
          const f = foodById[e.food_id];
          if (!f) return;
          const q = +e.qty || 1;
          const keyMap = { c: 'c', p: 'p', f: 'f', satFat: 'sat_fat', sugar: 'sugar', fibre: 'fibre' };
          const v = (+f[keyMap[drill.key]] || 0) * q;
          if (v <= 0) return;
          const k = f.id;
          if (!agg[k]) agg[k] = { food: f, amount: 0, count: 0 };
          agg[k].amount += v;
          agg[k].count += 1;
        });
        const list = Object.values(agg).sort((a, b) => b.amount - a.amount);
        setRows(list);
      } catch (e) { setError(e.message); }
    })();
  }, [drill, bucket]);

  const total = rows ? rows.reduce((s, r) => s + r.amount, 0) : 0;

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '82vh', background: theme.surface,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '18px 18px 24px', overflowY: 'auto',
      }}>
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: theme.line,
          margin: '0 auto 14px',
        }}/>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          marginBottom: 4,
        }}>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 22, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{drill.label}</div>
          <div style={{
            fontFamily: theme.numFont, fontSize: 14, color: drill.color, fontWeight: 600,
          }}>{bucket?.label}</div>
        </div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 14,
        }}>Top {drill.label.toLowerCase()} contributors across this {range.toLowerCase()} · {Math.round(total)}{drill.unit} total</div>

        {error && <div style={{
          padding: '10px 12px', borderRadius: 8,
          background: '#FDECEA', color: '#B3261E', fontSize: 13,
        }}>{error}</div>}
        {!rows && !error && (
          <div style={{ fontFamily: theme.font, fontSize: 13, color: theme.inkMute, padding: 14 }}>Loading…</div>
        )}
        {rows && rows.length === 0 && (
          <div style={{ fontFamily: theme.font, fontSize: 13, color: theme.inkMute, padding: 14 }}>
            No {drill.label.toLowerCase()} logged in this range.
          </div>
        )}
        {rows && rows.map((r) => {
          const pct = total > 0 ? (r.amount / total) * 100 : 0;
          return (
            <div key={r.food.id} style={{
              padding: '10px 0', borderBottom: `1px solid ${theme.line}`,
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <div style={{
                  fontFamily: theme.font, fontSize: 14, fontWeight: 500, color: theme.ink,
                }}>{r.food.name}</div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 14, color: theme.ink, fontWeight: theme.numWeight,
                }}>{r.amount.toFixed(1)}{drill.unit}</div>
              </div>
              <div style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                marginTop: 4, gap: 8,
              }}>
                <div style={{
                  flex: 1, height: 4, borderRadius: 2,
                  background: theme.ring.track, overflow: 'hidden',
                }}>
                  <div style={{
                    width: `${pct}%`, height: '100%', background: drill.color,
                  }}/>
                </div>
                <div style={{
                  fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
                  minWidth: 96, textAlign: 'right',
                }}>{r.count}× · {Math.round(pct)}%</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProposalRow({ proposal, theme, labelFor, currentTargets, onApply }) {
  const [applied, setApplied] = React.useState(false);
  const currentValue = proposal.action === 'set_target' ? currentTargets[proposal.key] : null;
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '8px 0', borderTop: `0.5px solid rgba(79,138,112,0.2)`,
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,
        }}>
          {proposal.action === 'set_target'
            ? `Set ${labelFor(proposal.key)} to ${proposal.value}`
            : proposal.action}
        </div>
        {proposal.action === 'set_target' && (
          <div style={{
            fontFamily: theme.numFont, fontSize: 11, color: theme.inkMute, marginTop: 2,
          }}>Current: {currentValue ?? '—'} → {proposal.value}</div>
        )}
        {proposal.why && (
          <div style={{
            fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
          }}>{proposal.why}</div>
        )}
      </div>
      <button onClick={() => { onApply(); setApplied(true); }}
        disabled={applied}
        style={{
          padding: '6px 12px', border: 'none',
          background: applied ? theme.surfaceAlt : '#2B7A5C',
          color: applied ? theme.inkSoft : '#fff',
          cursor: applied ? 'default' : 'pointer',
          borderRadius: theme.radius.chip,
          fontFamily: theme.font, fontSize: 12, fontWeight: 600,
        }}>{applied ? '✓ Applied' : 'Apply'}</button>
    </div>
  );
}

function AskCoachSheet({ theme, range, bucketLabel, data, targets, setTargets, exByDate = {}, weightLog = [], exerciseLog = [], onClose }) {
  const [messages, setMessages] = React.useState([
    { role: 'assistant', text: `I can see your last ${data.length} ${range === 'Year' ? 'months' : 'days'} (${bucketLabel}). Ask me anything — patterns, anomalies, coaching, or just "recap". If I suggest changes, you'll see an "Apply" button.` },
  ]);
  const [input, setInput] = React.useState('');
  const [busy, setBusy] = React.useState(false);

  // Build compact context: per-row summary so Claude has structured data.
  // Includes ALL macros (incl. sat fat / sugar / fibre), wellness (incl. reading),
  // plus exercise + weight so recaps can actually talk about them.
  const dataCtx = data.map(d => {
    const ex = d.iso ? exByDate[d.iso] : null;
    const w = weightLog.find(w => w.iso === d.iso);
    return {
      label: d.barLabel,
      iso: d.iso || null,
      kcal: Math.round(d.kcal),
      c: Math.round(d.c), p: Math.round(d.p), f: Math.round(d.f),
      satFat: d.satFat != null ? Math.round(d.satFat) : null,
      sugar:  d.sugar  != null ? Math.round(d.sugar)  : null,
      fibre:  d.fibre  != null ? Math.round(d.fibre)  : null,
      sleep: d.sleepHrs != null ? +d.sleepHrs.toFixed(1) : null,
      coffees: d.coffees ?? null, water: d.water ?? null,
      stress: d.stress ?? null, energy: d.energy ?? null,
      reading_min: d.readingMin ?? null,
      exercise_min: ex ? Math.round(ex.min) : 0,
      exercise_kcal: ex ? Math.round(ex.kcal) : 0,
      exercise_km: ex && ex.km ? +ex.km.toFixed(1) : 0,
      exercise_types: ex && ex.byType ? Object.keys(ex.byType) : [],
      rehab_done: d.rehab != null ? !!d.rehab : null,
      mobility_checkins: d.mobility != null ? +d.mobility : null, // 0-3
      rest_day: d.restDay != null ? !!d.restDay : null,
      weight_kg: w ? +w.kg.toFixed(1) : null,
    };
  });

  // Richer exercise context: per-type totals + top sessions across the range
  const exTypeTotals = {};
  const sessions = [];
  (exerciseLog || []).forEach(e => {
    if (!e || !e.date) return;
    const inRange = data.some(d => d.iso === e.date);
    if (!inRange) return;
    const t = e.type || 'Other';
    if (!exTypeTotals[t]) exTypeTotals[t] = { min: 0, km: 0, kcal: 0, count: 0 };
    exTypeTotals[t].min  += (+e.duration || 0);
    exTypeTotals[t].km   += (+e.distance || 0);
    exTypeTotals[t].kcal += (+e.kcal || 0);
    exTypeTotals[t].count += 1;
    sessions.push({
      date: e.date, type: t,
      name: e.details?.name || null,
      duration_min: +e.duration || null,
      distance_km:  +e.distance || null,
      kcal: +e.kcal || null,
      runType: e.details?.runType || null,
      source: e.details?.source || null,
      notes: e.notes || null,
    });
  });

  // Weight trend within the range
  const rangeStart = data[0]?.iso;
  const rangeEnd   = data[data.length - 1]?.iso;
  const weightsInRange = (weightLog || []).filter(w => (!rangeStart || w.iso >= rangeStart) && (!rangeEnd || w.iso <= rangeEnd));
  const weightCtx = weightsInRange.length ? {
    entries: weightsInRange.map(w => ({ iso: w.iso, kg: +w.kg.toFixed(1) })),
    first_kg: +weightsInRange[0].kg.toFixed(1),
    last_kg:  +weightsInRange[weightsInRange.length - 1].kg.toFixed(1),
    delta_kg: +(weightsInRange[weightsInRange.length - 1].kg - weightsInRange[0].kg).toFixed(1),
  } : null;

  const systemPrompt = `You are a nutrition & wellness coach looking at a user's data.
Range: ${range} · ${bucketLabel}
Targets: kcal ${targets.kcal}, carbs ${targets.c}g, protein ${targets.p}g, fat ${targets.f}g, sat fat ${targets.satFat || 20}g, sugar ${targets.sugar || 50}g, fibre ${targets.fibre || 30}g, exercise ${targets.exMin || 30} min/day

Per-day data (${data.length} rows, JSON):
${JSON.stringify(dataCtx)}

Exercise sessions across this range (${sessions.length} sessions):
${JSON.stringify(sessions.slice(0, 60))}

Exercise totals by type: ${JSON.stringify(exTypeTotals)}
Weight: ${weightCtx ? JSON.stringify(weightCtx) : 'no weigh-ins in range'}

Rules:
- You have the FULL dataset above: every macro (incl. sat fat, sugar, fibre), every
  wellness metric (incl. reading minutes, rehab done/not done, mobility check-ins 0-3,
  rest_day flag), every exercise session (incl. run subtype, distance, user-given
  name, source like 'strava' or manual), and weight history. Use it.
- Exercises named "Rehab", "Mobility", or similar are distinct practices from main
  workouts — factor them into recovery/consistency commentary, not raw training
  volume.
- Rest days matter: when computing training averages (minutes/week, kcal/week),
  EXCLUDE rest days from the denominator if the user asks about training load per
  active day. Clearly state whether you're averaging over calendar days or active days.
- Do not claim data is "missing" unless a specific field is literally null across the
  range.
- Be specific. Cite numbers from the data.
- Be concise (under 150 words unless asked for more).
- If asked for a "recap" or "summary", give: kcal avg vs goal, protein adherence,
  exercise minutes vs target, weight change if any, notable streaks, one suggestion.
- If asked about patterns, compute plausible correlations across the data.
- Never invent data. If uncertain, say so.
- No disclaimers about not being a doctor.

ACTION PROPOSALS:
If — and only if — you are recommending a specific, concrete change that would update the user's targets, end your reply with this marker on a new line:
<<PROPOSALS>>
[{"action":"set_target","key":"kcal|c|p|f|satFat|sugar|fibre","value":N,"why":"short reason"}]
- Include 1-3 proposals at most.
- Only include high-confidence recommendations; omit this block entirely if unsure.
- The user will see each proposal with an "Apply" button — they decide.`;

  const parseProposals = (text) => {
    const idx = text.indexOf('<<PROPOSALS>>');
    if (idx === -1) return { body: text, proposals: [] };
    const body = text.slice(0, idx).trim();
    const raw = text.slice(idx + '<<PROPOSALS>>'.length).trim()
      .replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
    try {
      const p = JSON.parse(raw);
      return { body, proposals: Array.isArray(p) ? p : [] };
    } catch { return { body, proposals: [] }; }
  };

  const applyProposal = (prop) => {
    if (prop.action === 'set_target' && prop.key && typeof prop.value === 'number') {
      setTargets({ ...targets, [prop.key]: prop.value });
      return true;
    }
    return false;
  };

  const presets = [
    'Weekly recap',
    "What's my biggest issue?",
    'How can I improve my energy?',
    'Any unusual days?',
  ];

  const send = async (override) => {
    const userText = (override ?? input).trim();
    if (!userText || busy) return;
    setInput('');
    setMessages(m => [...m, { role: 'user', text: userText }]);
    setBusy(true);
    try {
      const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
      if (!key) throw new Error('no-key');
      const apiMessages = messages
        .filter(m => m.role !== 'system')
        .concat({ role: 'user', text: userText })
        .map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text }));
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 800,
          system: systemPrompt,
          messages: apiMessages,
        }),
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(`API ${res.status}: ${t.slice(0, 200)}`);
      }
      const j = await res.json();
      const text = (j.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n') || '(no reply)';
      const { body, proposals } = parseProposals(text);
      setMessages(m => [...m, { role: 'assistant', text: body, proposals }]);
    } catch (e) {
      const msg = e.message === 'no-key'
        ? "Set your Anthropic API key in Profile → Settings first."
        : `Error: ${e.message}`;
      setMessages(m => [...m, { role: 'assistant', text: msg, error: true }]);
    }
    setBusy(false);
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '88vh', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '14px 18px 8px', borderBottom: `1px solid ${theme.line}`,
        }}>
          <div>
            <div style={{
              fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
              color: theme.ink, letterSpacing: theme.letter,
            }}>Ask Claude</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>Context: {range} · {bucketLabel} · {data.length} rows</div>
          </div>
          <button onClick={onClose} style={{
            border: 'none', background: 'none', cursor: 'pointer',
            fontSize: 22, color: theme.inkMute, padding: 4, lineHeight: 1,
          }}>×</button>
        </div>

        <div style={{
          flex: 1, overflowY: 'auto', padding: '14px 16px',
          display: 'flex', flexDirection: 'column', gap: 10,
        }}>
          {messages.map((m, i) => (
            <div key={i} style={{
              alignSelf: m.role === 'user' ? 'flex-end' : 'stretch',
              maxWidth: m.role === 'user' ? '85%' : '100%',
              display: 'flex', flexDirection: 'column', gap: 6,
            }}>
              <div style={{
                padding: '10px 14px', borderRadius: 14,
                background: m.role === 'user' ? theme.ink : theme.surface,
                color: m.role === 'user' ? theme.bg : (m.error ? '#C0392B' : theme.ink),
                fontFamily: theme.font, fontSize: 14, lineHeight: 1.45,
                whiteSpace: 'pre-wrap', alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
                maxWidth: '85%',
              }}>{m.text}</div>
              {m.proposals && m.proposals.length > 0 && (
                <div style={{
                  padding: '10px 12px', borderRadius: 12,
                  background: 'rgba(79,138,112,0.10)', border: `1px solid rgba(79,138,112,0.35)`,
                }}>
                  <div style={{
                    fontFamily: theme.font, fontSize: 10, fontWeight: 700,
                    color: '#2B7A5C', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8,
                  }}>Claude suggests</div>
                  {m.proposals.map((p, pi) => (
                    <ProposalRow key={pi} proposal={p} theme={theme}
                      labelFor={(k)=>({kcal:'Calories',c:'Carbs',p:'Protein',f:'Fat',satFat:'Sat Fat',sugar:'Sugar',fibre:'Fibre'}[k]||k)}
                      currentTargets={targets}
                      onApply={() => applyProposal(p)}/>
                  ))}
                </div>
              )}
            </div>
          ))}
          {busy && (
            <div style={{ display: 'flex', gap: 4, padding: '4px 10px' }}>
              {[0,1,2].map(i => (
                <div key={i} style={{
                  width: 6, height: 6, borderRadius: 3, background: theme.inkMute,
                  animation: `bounce 1.2s ${i * 0.15}s infinite ease-in-out`,
                }} />
              ))}
            </div>
          )}
        </div>

        {messages.length <= 1 && (
          <div style={{
            display: 'flex', gap: 6, flexWrap: 'wrap', padding: '0 16px 8px',
          }}>
            {presets.map(p => (
              <button key={p} onClick={() => send(p)} style={{
                padding: '6px 10px', border: `1px solid ${theme.line}`,
                background: theme.surface, borderRadius: 14,
                fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, cursor: 'pointer',
              }}>{p}</button>
            ))}
          </div>
        )}

        <div style={{
          padding: '8px 12px 16px', borderTop: `1px solid ${theme.line}`, background: theme.surface,
          display: 'flex', gap: 8, alignItems: 'flex-end',
        }}>
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            rows={1} placeholder="Ask about your data…"
            style={{
              flex: 1, padding: '10px 12px', border: `1px solid ${theme.line}`,
              borderRadius: 14, fontFamily: theme.font, fontSize: 14,
              resize: 'none', outline: 'none', background: theme.bg, color: theme.ink,
            }}/>
          <button onClick={() => send()} disabled={busy || !input.trim()} style={{
            width: 40, height: 40, borderRadius: 20, border: 'none',
            background: input.trim() && !busy ? theme.accent : theme.surfaceAlt,
            color: theme.accentInk, cursor: busy || !input.trim() ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8l12-5-5 12-2-5-5-2z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Wellness Strip Chart: all metrics on one synced timeline ──
function CorrelationCard({ theme, data, bucketLabel, range, setRange, setOffset, canGoBack, canGoForward, offset, exerciseLog = [], settings = {}, setSettings }) {
  const [reordering, setReordering] = React.useState(false);
  const [drill, setDrill] = React.useState(null);
  // Persisted hidden metrics live in settings.wellnessHidden (array of keys).
  // Local fade toggle is a separate state — tap-label fades but doesn't remove.
  const hiddenPersisted = React.useMemo(() =>
    new Set((settings && Array.isArray(settings.wellnessHidden)) ? settings.wellnessHidden : []),
    [settings && settings.wellnessHidden]);
  const [faded, setFaded] = React.useState(() => new Set());

  // Index exercise minutes by date (YYYY-MM-DD)
  const exByDate = React.useMemo(() => {
    const m = {};
    exerciseLog.forEach(e => {
      if (!e.date) return;
      m[e.date] = (m[e.date] || 0) + (+e.duration || 0);
    });
    return m;
  }, [exerciseLog]);
  // All metrics, each with color + min/max range + formatter.
  // The first one is always treated as hero; user can reorder the rest
  // via the reorder toggle on the card.
  const METRICS_BY_KEY = {
    energy:      { k: 'energy',    label: 'Energy',   unit: '/5',   color: '#2B7A5C', min: 1, max: 5,    fmt: v => (+v || 0).toFixed(1) },
    sleepHrs:    { k: 'sleepHrs',  label: 'Sleep',    unit: 'h',    color: '#7A8BD1', min: 4, max: 10,   fmt: v => (+v || 0).toFixed(1) },
    exerciseMin: { k: 'exerciseMin', label: 'Exercise', unit: 'min', color: '#4F8A70', min: 0, max: 90,  fmt: v => Math.round(+v || 0) },
    coffees:     { k: 'coffees',   label: 'Coffee',   unit: '',     color: '#A0725A', min: 0, max: 6,    fmt: v => (+v || 0).toFixed(1) },
    water:       { k: 'water',     label: 'Water',    unit: 'cups', color: '#5FA8C9', min: 0, max: 3500, fmt: v => Math.round((+v || 0)/250) },
    readingMin:  { k: 'readingMin', label: 'Reading', unit: 'min',  color: '#B87A3A', min: 0, max: 60,   fmt: v => Math.round(+v || 0) },
    stress:      { k: 'stress',    label: 'Stress',   unit: '/5',   color: '#D96B5C', min: 1, max: 5,    fmt: v => (+v || 0).toFixed(1) },
    kcal:        { k: 'kcal',      label: 'Calories', unit: '',     color: '#8A8A8A', min: 1400, max: 2700, fmt: v => Math.round(+v || 0) },
    mobility:    { k: 'mobility',  label: 'Mobility', unit: '/3',   color: '#6BAF92', min: 0, max: 3,    fmt: v => Math.round(+v || 0) },
    rehab:       { k: 'rehab',     label: 'Rehab',    unit: '',     color: '#2B7A5C', min: 0, max: 1,    fmt: v => (+v ? 'Done' : '—') },
  };
  const DEFAULT_ORDER = ['energy','sleepHrs','exerciseMin','coffees','water','readingMin','stress','kcal','mobility','rehab'];
  const savedOrder = (settings && Array.isArray(settings.wellnessOrder)) ? settings.wellnessOrder : null;
  const order = (() => {
    if (!savedOrder) return DEFAULT_ORDER;
    const seen = new Set(savedOrder);
    // Keep user's saved order, then append any new metrics added to the app
    // after they set a custom order.
    return savedOrder.filter(k => METRICS_BY_KEY[k])
      .concat(DEFAULT_ORDER.filter(k => !seen.has(k)));
  })();
  const visibleOrder = order.filter(k => !hiddenPersisted.has(k));
  const metrics = visibleOrder.map((k, i) => {
    const base = METRICS_BY_KEY[k];
    return { ...base, hero: i === 0 };
  });
  const hiddenMetrics = order.filter(k => hiddenPersisted.has(k))
    .map(k => METRICS_BY_KEY[k]).filter(Boolean);
  const toggleHidden = (key) => {
    if (!setSettings) return;
    const cur = new Set(hiddenPersisted);
    if (cur.has(key)) cur.delete(key); else cur.add(key);
    setSettings({ ...(settings || {}), wellnessHidden: [...cur] });
  };

  const moveMetric = (fromVisIdx, dir) => {
    if (!setSettings) return;
    const toVisIdx = fromVisIdx + dir;
    if (toVisIdx < 0 || toVisIdx >= visibleOrder.length) return;
    const fromKey = visibleOrder[fromVisIdx];
    const toKey = visibleOrder[toVisIdx];
    const next = order.slice();
    const a = next.indexOf(fromKey), b = next.indexOf(toKey);
    [next[a], next[b]] = [next[b], next[a]];
    setSettings({ ...(settings || {}), wellnessOrder: next });
  };
  const resetOrder = () => {
    if (!setSettings) return;
    setSettings({ ...(settings || {}), wellnessOrder: DEFAULT_ORDER, wellnessHidden: [] });
  };

  // If true, exercise-minute averages skip rest-day entries in the denominator.
  // Default true — the user's "active-day" view.
  const excludeRest = !(settings && settings.includeRestInAverages);

  // Normalize data to row objects per day/bucket
  const rows = (range === 'Year')
    ? data.map(d => {
        const monthDays = HISTORY.filter(x => x.y === d.y && x.m === d.m);
        const avg = (key) => monthDays.length
          ? monthDays.reduce((s, x) => s + (x[key] || 0), 0) / monthDays.length : 0;
        // Average exercise minutes across the month — optionally excluding rest days.
        const exDays = excludeRest ? monthDays.filter(x => !x.restDay) : monthDays;
        const exAvg = exDays.length
          ? exDays.reduce((s, x) => s + (exByDate[x.iso] || 0), 0) / exDays.length : 0;
        const o = { label: d.barLabel, exerciseMin: exAvg };
        metrics.forEach(m => { if (m.k !== 'exerciseMin') o[m.k] = avg(m.k); });
        return o;
      })
    : data.map(d => {
        const isRest = !!d.restDay;
        const minsToday = d.iso ? (exByDate[d.iso] || 0) : 0;
        const o = {
          label: d.barLabel,
          // Non-Year ranges show per-day value, not an average — but when
          // excludeRest is on, zero out rest-day minutes so the strip doesn't
          // mislead. The raw log still preserves the actual session data.
          exerciseMin: (excludeRest && isRest) ? 0 : minsToday,
        };
        metrics.forEach(m => { if (m.k !== 'exerciseMin') o[m.k] = d[m.k] || 0; });
        return o;
      });

  const n = rows.length;

  // Pearson helper (for correlation summaries)
  const pearson = (xs, ys) => {
    const mean = a => a.reduce((s, x) => s + x, 0) / a.length;
    const mx = mean(xs), my = mean(ys);
    let num = 0, dx2 = 0, dy2 = 0;
    for (let i = 0; i < xs.length; i++) {
      const dx = xs[i] - mx, dy = ys[i] - my;
      num += dx * dy; dx2 += dx * dx; dy2 += dy * dy;
    }
    return (dx2 && dy2) ? num / Math.sqrt(dx2 * dy2) : 0;
  };
  const energyVals = rows.map(r => r.energy);

  // Hovered column state
  const [hover, setHover] = React.useState(null);

  // Geometry per strip
  const STRIP_W = 320;
  const HERO_H = 62;
  const STRIP_H = 42;
  const PAD_L = 74;
  const PAD_R = 12;
  const plotW = STRIP_W - PAD_L - PAD_R;
  const stepX = n > 1 ? plotW / (n - 1) : 0;
  const xAt = (i) => PAD_L + (n === 1 ? plotW / 2 : i * stepX);

  const stripCount = metrics.length;
  const TOTAL_H = HERO_H + 10 + (STRIP_H + 6) * (stripCount - 1) + 22; // +22 x-axis strip

  // Label de-dup for x-axis
  const maxLabels = 7;
  const labelEvery = Math.max(1, Math.ceil(n / maxLabels));

  return (
    <div style={{
      margin: '0 16px 12px', padding: '18px 18px 16px',
      background: theme.surface, borderRadius: theme.radius.card,
      border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
    }}>
      {/* Header */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 10, gap: 10,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            fontFamily: theme.font, fontSize: 11, fontWeight: 600,
            color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>Wellness signals</div>
          {setSettings && (
            <button onClick={() => setReordering(!reordering)} title="Edit: reorder, remove, or add signals"
              style={{
                padding: '3px 10px', border: `1px solid ${reordering ? theme.ink : theme.line}`,
                background: reordering ? theme.ink : 'transparent',
                color: reordering ? theme.bg : theme.inkSoft,
                borderRadius: 999, cursor: 'pointer',
                fontFamily: theme.font, fontSize: 10, fontWeight: 700,
                display: 'inline-flex', alignItems: 'center', gap: 5,
              }}>
              {!reordering && (
                <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
                  <path d="M10 1l3 3-9 9H1v-3l9-9z" stroke="currentColor" strokeWidth="1.4"
                    strokeLinejoin="round" fill="none"/>
                </svg>
              )}
              {reordering ? 'Done' : 'Edit'}
            </button>
          )}
          {reordering && (
            <button onClick={resetOrder} style={{
              padding: '3px 8px', border: `1px solid ${theme.line}`,
              background: 'transparent', color: theme.inkSoft,
              borderRadius: 999, cursor: 'pointer',
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
            }}>Reset</button>
          )}
          {reordering && setSettings && (
            <button onClick={() => setSettings({
              ...(settings || {}), includeRestInAverages: !settings?.includeRestInAverages,
            })} title="Toggle whether rest days count in exercise averages"
            style={{
              padding: '3px 8px',
              border: `1px solid ${settings?.includeRestInAverages ? theme.ink : theme.line}`,
              background: settings?.includeRestInAverages ? theme.ink : 'transparent',
              color: settings?.includeRestInAverages ? theme.bg : theme.inkSoft,
              borderRadius: 999, cursor: 'pointer',
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
            }}>Rest: {settings?.includeRestInAverages ? 'in' : 'out'}</button>
          )}
        </div>
        {setRange && (
          <div style={{
            display: 'flex', gap: 2, padding: 2,
            background: theme.surfaceAlt, borderRadius: theme.radius.btn,
          }}>
            {['Week', 'Month', 'Year'].map(r => (
              <button key={r} onClick={() => { setRange(r); setOffset && setOffset(0); }} style={{
                padding: '4px 10px', border: 'none',
                background: range === r ? theme.surface : 'transparent',
                color: theme.ink, cursor: 'pointer',
                borderRadius: theme.radius.btn - 2,
                fontFamily: theme.font, fontSize: 11,
                fontWeight: range === r ? 600 : 500,
                boxShadow: range === r ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
              }}>{r[0]}</button>
            ))}
          </div>
        )}
      </div>
      {/* Range nav */}
      {setOffset && (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 10,
        }}>
          <button onClick={() => canGoBack && setOffset(offset + 1)}
            disabled={!canGoBack}
            style={{
              width: 28, height: 28, border: 'none', background: theme.surfaceAlt,
              borderRadius: 14, cursor: canGoBack ? 'pointer' : 'default',
              opacity: canGoBack ? 1 : 0.35,
            }}>
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M9 2L3 7l6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
          <div style={{
            fontFamily: theme.numFont, fontSize: 12, color: theme.ink, letterSpacing: theme.letter,
          }}>{bucketLabel}</div>
          <button onClick={() => canGoForward && setOffset(offset - 1)}
            disabled={!canGoForward}
            style={{
              width: 28, height: 28, border: 'none', background: theme.surfaceAlt,
              borderRadius: 14, cursor: canGoForward ? 'pointer' : 'default',
              opacity: canGoForward ? 1 : 0.35,
            }}>
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M5 2l6 5-6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
        </div>
      )}
      <div style={{
        fontFamily: theme.font, fontSize: 12, color: theme.inkMute, marginBottom: 14,
      }}>All metrics on one timeline. Scan for patterns — does energy dip with poor sleep?</div>

      {reordering && hiddenMetrics.length > 0 && (
        <div style={{
          marginBottom: 12, padding: '10px 12px',
          background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        }}>
          <div style={{
            fontFamily: theme.font, fontSize: 10, fontWeight: 700,
            color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            marginBottom: 8,
          }}>Hidden · tap to restore</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {hiddenMetrics.map(hm => (
              <button key={hm.k} onClick={() => toggleHidden(hm.k)} style={{
                padding: '4px 10px', border: `1px dashed ${hm.color}`,
                background: 'transparent', color: hm.color,
                borderRadius: 999, cursor: 'pointer',
                fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              }}>+ {hm.label}</button>
            ))}
          </div>
        </div>
      )}

      {/* Strip chart SVG */}
      <svg width="100%" viewBox={`0 0 ${STRIP_W} ${TOTAL_H}`}
        preserveAspectRatio="xMidYMid meet"
        style={{ display: 'block', overflow: 'visible' }}
        onMouseLeave={() => setHover(null)}>

        {/* Hover guide */}
        {hover !== null && (
          <line x1={xAt(hover)} x2={xAt(hover)}
            y1={0} y2={TOTAL_H - 22}
            stroke={theme.ink} strokeWidth="1" opacity="0.25"
            strokeDasharray="2 2"/>
        )}

        {/* Invisible hover columns */}
        {rows.map((r, i) => (
          <rect key={`h${i}`}
            x={xAt(i) - stepX / 2} y={0}
            width={Math.max(stepX, 8)} height={TOTAL_H - 22}
            fill="transparent"
            onMouseEnter={() => setHover(i)}
            style={{ cursor: 'pointer' }}/>
        ))}

        {metrics.map((m, mi) => {
          const isHero = !!m.hero;
          const isHidden = faded.has(m.k);
          const stripH = isHero ? HERO_H : STRIP_H;
          const yTop = isHero ? 0 : HERO_H + 10 + (STRIP_H + 6) * (mi - 1);
          const yBottom = yTop + stripH;
          const vals = rows.map(r => r[m.k]);
          const inner = 4; // padding inside strip
          const yFor = v => {
            const t = (v - m.min) / (m.max - m.min || 1);
            const clamped = Math.max(0, Math.min(1, t));
            return yBottom - inner - clamped * (stripH - inner * 2);
          };

          // Path for line
          const linePath = rows.map((r, i) => `${i === 0 ? 'M' : 'L'}${xAt(i)},${yFor(r[m.k])}`).join(' ');
          // Area
          const areaPath = linePath + ` L${xAt(n - 1)},${yBottom} L${xAt(0)},${yBottom} Z`;
          // Correlation w/ energy (skip for energy itself)
          const r = m.hero ? null : pearson(vals, energyVals);
          const gradId = `strip-${m.k}`;

          // Current value (latest OR hovered)
          const curIdx = hover !== null ? hover : n - 1;
          const curVal = rows[curIdx]?.[m.k];

          return (
            <g key={m.k} opacity={isHidden ? 0.2 : 1} style={{ transition: 'opacity 0.2s' }}>
              <defs>
                <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stopColor={m.color} stopOpacity={isHero ? 0.28 : 0.18}/>
                  <stop offset="100%" stopColor={m.color} stopOpacity="0.02"/>
                </linearGradient>
              </defs>

              {/* Strip background */}
              <rect x={PAD_L} y={yTop} width={plotW} height={stripH}
                fill={theme.surfaceAlt} opacity="0.35"
                rx={theme.name === 'Editorial' ? 0 : 4}
                pointerEvents="none"/>

              {/* Label (left) */}
              <text x={PAD_L - 10} y={yTop + stripH / 2 - 4}
                textAnchor="end"
                fontFamily={theme.font}
                fontSize={isHero ? 11 : 10}
                fontWeight={isHero ? 700 : 600}
                fill={m.color}
                letterSpacing="0.06em"
                style={{ textTransform: 'uppercase' }}>{m.label}</text>
              <text x={PAD_L - 10} y={yTop + stripH / 2 + 10}
                textAnchor="end"
                fontFamily={theme.numFont}
                fontSize={isHero ? 13 : 11}
                fontWeight={theme.numWeight}
                fill={theme.ink}
                letterSpacing={theme.letter}>
                {m.fmt(curVal)}{m.unit && <tspan fontSize={isHero ? 9 : 8} fill={theme.inkMute}> {m.unit}</tspan>}
              </text>

              {/* Label-area click: toggle fade OR show reorder arrows */}
              {!reordering && (
                <rect x={0} y={yTop} width={PAD_L} height={stripH}
                  fill="transparent" pointerEvents="all"
                  onClick={() => {
                    const next = new Set(faded);
                    if (next.has(m.k)) next.delete(m.k); else next.add(m.k);
                    setFaded(next);
                  }}
                  style={{ cursor: 'pointer' }}/>
              )}
              {reordering && (
                <React.Fragment>
                  {/* Up arrow */}
                  <g onClick={() => moveMetric(mi, -1)}
                    style={{ cursor: mi > 0 ? 'pointer' : 'default' }}>
                    <rect x={PAD_L - 26} y={yTop + 2} width={20} height={stripH/2 - 3}
                      fill={theme.surfaceAlt} opacity={mi > 0 ? 1 : 0.35} rx="3"/>
                    <path d={`M${PAD_L - 16},${yTop + 8} l-5,5 l10,0 z`}
                      fill={mi > 0 ? theme.ink : theme.inkMute}
                      opacity={mi > 0 ? 1 : 0.5}/>
                  </g>
                  {/* Down arrow */}
                  <g onClick={() => moveMetric(mi, 1)}
                    style={{ cursor: mi < metrics.length - 1 ? 'pointer' : 'default' }}>
                    <rect x={PAD_L - 26} y={yTop + stripH/2 + 1} width={20} height={stripH/2 - 3}
                      fill={theme.surfaceAlt} opacity={mi < metrics.length - 1 ? 1 : 0.35} rx="3"/>
                    <path d={`M${PAD_L - 16},${yTop + stripH - 9} l-5,-5 l10,0 z`}
                      fill={mi < metrics.length - 1 ? theme.ink : theme.inkMute}
                      opacity={mi < metrics.length - 1 ? 1 : 0.5}/>
                  </g>
                  {/* Remove (×) — right side */}
                  <g onClick={() => toggleHidden(m.k)} style={{ cursor: 'pointer' }}>
                    <rect x={STRIP_W - PAD_R - 20} y={yTop + stripH/2 - 9}
                      width={18} height={18} rx="9"
                      fill="rgba(217,107,92,0.15)"/>
                    <path d={`M${STRIP_W - PAD_R - 15},${yTop + stripH/2 - 4} l8,8 M${STRIP_W - PAD_R - 7},${yTop + stripH/2 - 4} l-8,8`}
                      stroke="#D96B5C" strokeWidth="1.6" strokeLinecap="round"/>
                  </g>
                </React.Fragment>
              )}
              {/* Plot-area click: open drilldown — disabled in edit mode
                  so the × button isn't swallowed by the row click. */}
              {!reordering && (
                <rect x={PAD_L} y={yTop} width={STRIP_W - PAD_L} height={stripH}
                  fill="transparent" pointerEvents="all"
                  onClick={() => setDrill(m)}
                  style={{ cursor: 'pointer' }}/>
              )}

              {/* Area fill */}
              {n > 1 && <path d={areaPath} fill={`url(#${gradId})`}/>}

              {/* Line */}
              {n > 1 && (
                <path d={linePath} fill="none"
                  stroke={m.color}
                  strokeWidth={isHero ? 2 : 1.5}
                  strokeLinecap="round" strokeLinejoin="round"
                  opacity={isHero ? 1 : 0.85}/>
              )}

              {/* Hover dot */}
              {hover !== null && (
                <circle cx={xAt(hover)} cy={yFor(rows[hover][m.k])}
                  r={isHero ? 3.5 : 2.5}
                  fill={theme.surface}
                  stroke={m.color}
                  strokeWidth={isHero ? 2 : 1.5}/>
              )}
            </g>
          );
        })}

        {/* X-axis labels */}
        {rows.map((r, i) => (
          (i % labelEvery === 0 || i === n - 1) && (
            <text key={`x${i}`}
              x={xAt(i)} y={TOTAL_H - 4}
              textAnchor="middle"
              fontFamily={theme.font} fontSize="9" fontWeight="500"
              fill={hover === i ? theme.ink : theme.inkMute}
              letterSpacing="0.04em">{r.label}</text>
          )
        ))}
      </svg>

      {/* Pattern summary — best/worst correlation */}
      {(() => {
        const corrs = metrics.filter(m => !m.hero).map(m => ({
          m, r: pearson(rows.map(r => r[m.k]), energyVals),
        }));
        const strong = corrs.filter(c => Math.abs(c.r) >= 0.3)
          .sort((a, b) => Math.abs(b.r) - Math.abs(a.r));
        if (!strong.length) return (
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: theme.surfaceAlt, borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, lineHeight: 1.4,
          }}>
            No strong patterns yet for {(bucketLabel || 'this range').toLowerCase()}. Log more days to surface trends.
          </div>
        );
        const top = strong[0];
        return (
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: theme.surfaceAlt, borderRadius: theme.radius.btn,
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.08em', textTransform: 'uppercase',
            }}>Top driver · {bucketLabel}</div>
            <div style={{
              fontFamily: theme.titleFont,
              fontSize: theme.name === 'Editorial' ? 16 : 14,
              fontWeight: theme.titleWeight, color: theme.ink,
              letterSpacing: theme.letter, marginTop: 4, lineHeight: 1.4,
            }}>
              Higher <span style={{ color: top.m.color, fontWeight: 700 }}>{top.m.label.toLowerCase()}</span> is linked to {top.r > 0 ? 'higher' : 'lower'} energy
              {strong[1] && <>. <span style={{ color: strong[1].m.color, fontWeight: 700 }}>{strong[1].m.label}</span> comes next.</>}
            </div>
          </div>
        );
      })()}

      {drill && (
        <WellnessDrillSheet theme={theme} metric={drill} rows={rows}
          bucketLabel={bucketLabel} onClose={() => setDrill(null)}/>
      )}
    </div>
  );
}

function WellnessDrillSheet({ theme, metric, rows, bucketLabel, onClose }) {
  const sorted = rows.map((r, i) => ({ ...r, idx: i }))
    .filter(r => r[metric.k] != null)
    .sort((a, b) => (b[metric.k] || 0) - (a[metric.k] || 0));
  const max = sorted.length ? Math.max(...sorted.map(r => r[metric.k] || 0)) : 0;
  const min = sorted.length ? Math.min(...sorted.map(r => r[metric.k] || 0)) : 0;
  const avg = sorted.length ? sorted.reduce((s, r) => s + (r[metric.k] || 0), 0) / sorted.length : 0;

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '82vh', background: theme.surface,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '18px 18px 24px', overflowY: 'auto',
      }}>
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: theme.line,
          margin: '0 auto 16px',
        }}/>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6,
        }}>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 22, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{metric.label}</div>
          <div style={{
            fontFamily: theme.numFont, fontSize: 14, color: metric.color, fontWeight: 600,
          }}>{bucketLabel}</div>
        </div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 14,
        }}>Days ranked by {metric.label.toLowerCase()}, highest to lowest.</div>

        {/* Summary row */}
        <div style={{
          display: 'flex', gap: 14, marginBottom: 14,
          padding: '10px 12px', background: theme.surfaceAlt,
          borderRadius: theme.radius.btn,
        }}>
          {[
            ['Avg', metric.fmt ? metric.fmt(avg) : avg.toFixed(1)],
            ['High', metric.fmt ? metric.fmt(max) : max.toFixed(1)],
            ['Low', metric.fmt ? metric.fmt(min) : min.toFixed(1)],
          ].map(([k, v]) => (
            <div key={k} style={{ flex: 1 }}>
              <div style={{
                fontFamily: theme.font, fontSize: 10, fontWeight: 600,
                color: theme.inkSoft, letterSpacing: '0.08em', textTransform: 'uppercase',
              }}>{k}</div>
              <div style={{
                fontFamily: theme.numFont, fontSize: 15, fontWeight: theme.numWeight,
                color: theme.ink, marginTop: 2,
              }}>{v}{metric.unit ? ' ' + metric.unit : ''}</div>
            </div>
          ))}
        </div>

        {sorted.length === 0 ? (
          <div style={{
            fontFamily: theme.font, fontSize: 13, color: theme.inkMute,
            textAlign: 'center', padding: '20px 0',
          }}>No data for this range.</div>
        ) : sorted.map((r) => {
          const pct = max > 0 ? ((r[metric.k] || 0) / max) * 100 : 0;
          const val = r[metric.k] || 0;
          return (
            <div key={r.idx} style={{
              padding: '8px 0', borderBottom: `1px solid ${theme.line}`,
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <div style={{
                  fontFamily: theme.font, fontSize: 13, fontWeight: 500, color: theme.ink,
                }}>{r.label}</div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 13, color: theme.ink, fontWeight: theme.numWeight,
                }}>{metric.fmt ? metric.fmt(val) : val.toFixed(1)}{metric.unit ? ' ' + metric.unit : ''}</div>
              </div>
              <div style={{
                marginTop: 4, height: 4, borderRadius: 2,
                background: theme.ring.track, overflow: 'hidden',
              }}>
                <div style={{
                  width: `${pct}%`, height: '100%', background: metric.color,
                }}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Chat with Claude ────────────────────────────────────────
function AIChat({ theme, onAddMany, defaultMeal }) {
  const [messages, setMessages] = React.useState([
    { role: 'assistant', text: "Tell me what you ate and I'll estimate the macros. E.g. \"2 scrambled eggs, 1 slice sourdough with butter, coffee with oat milk\"." },
  ]);
  const [input, setInput] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [pending, setPending] = React.useState(null); // {meals: [{meal, items, photo?}]}
  const [photo, setPhoto] = React.useState(null); // { dataUrl, mediaType }
  const [photoKind, setPhotoKind] = React.useState('food'); // 'food' | 'label'
  // Meal to log everything under — user-overridable.
  // Seed the meal selector from the section the user came from — if they
  // tapped "+" on Lunch and then "Describe with Claude", the pending card
  // should default to Lunch, not the generic Snack fallback.
  const [mealOverride, setMealOverride] = React.useState(defaultMeal || 'Snack');
  // Context kept so "Suggest change" can ask Claude to revise the
  // current pending estimate with extra feedback, not start over.
  const [lastContext, setLastContext] = React.useState(null);
  const taRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const [listening, setListening] = React.useState(false);
  const recognitionRef = React.useRef(null);
  const SR = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);

  const toggleVoice = () => {
    if (!SR) { alert('Voice not supported in this browser. Try Safari or Chrome.'); return; }
    if (listening) {
      recognitionRef.current?.stop();
      return;
    }
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = navigator.language || 'en-US';
    let finalText = '';
    rec.onresult = (evt) => {
      let interim = '';
      for (let i = evt.resultIndex; i < evt.results.length; i++) {
        const t = evt.results[i][0].transcript;
        if (evt.results[i].isFinal) finalText += t; else interim += t;
      }
      setInput((prev) => {
        // Replace interim append; keep prior final content
        return (finalText + interim).trim();
      });
    };
    rec.onend = () => { setListening(false); recognitionRef.current = null; };
    rec.onerror = (e) => { console.warn('SR error', e); setListening(false); };
    recognitionRef.current = rec;
    try { rec.start(); setListening(true); } catch (e) { console.warn(e); }
  };

  const promptSchema = `Return ONLY a single valid JSON object, no prose, no markdown, no code fences.
Shape:
{
  "meals": [
    {
      "meal": "Breakfast" | "Lunch" | "Dinner" | "Snack",
      "items": [
        {
          "name": "Whole dish name (e.g. 'Chipotle bowl with chicken & guac')",
          "brand": "short source/prep note",
          "kcal": 0, "c": 0, "p": 0, "f": 0,
          "satFat": 0, "sugar": 0, "fibre": 0, "g": 0,
          "ingredients": [
            { "name": "Chicken breast", "g": 120, "kcal": 200, "c": 0, "p": 38, "f": 5, "satFat": 1.5, "sugar": 0, "fibre": 0 },
            { "name": "Brown rice",     "g": 150, "kcal": 220, "c": 45, "p": 5, "f": 2, "satFat": 0.3, "sugar": 0, "fibre": 3 }
          ]
        }
      ]
    }
  ],
  "note": "one short sentence summary for the whole log"
}

Rules:
- COMBINE everything the user describes for ONE meal into ONE single item with summed macros at the top level.
- The "items" array should usually contain exactly one entry per meal section.
- Break the components out as "ingredients" — each ingredient gets its own line in the sub-array (e.g. chicken, rice, beans, cheese, guac all become separate ingredients of the parent item).
- Top-level kcal/c/p/f/satFat/sugar/fibre/g should equal the SUM of the ingredients (sanity check).
- Only ever return multiple items in one meal if the user explicitly ate them as distinct dishes (e.g. "starter then main").
- Values are per-item totals (not per 100g). c/p/f/satFat/sugar/fibre are grams.
- "g" is total grams/ml of the meal as eaten.
- If the user describes multiple meals (different times of day), return multiple entries in "meals". Otherwise return one.
- If unsure of satFat, sugar, or fibre, estimate conservatively — never omit the keys.
- Use a descriptive name that captures the whole dish.
- Keep item names concise.`;

  const onPickPhoto = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1024;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        setPhoto({ dataUrl, mediaType: 'image/jpeg' });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(f);
  };

  const callAnthropic = async (userText, photoData, kind) => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) throw new Error('no-key');
    const userContent = [];
    if (photoData) {
      userContent.push({
        type: 'image',
        source: {
          type: 'base64',
          media_type: photoData.mediaType,
          data: photoData.dataUrl.split(',')[1],
        },
      });
    }
    const kindNote = photoData
      ? (kind === 'label'
        ? `\n\nThe image is a NUTRITION LABEL (packaging). Read the facts panel PRECISELY — do not estimate where the label gives exact numbers.
Steps:
1. Find the "Serving size" / "Per serving" / "Per 100g" reference on the label.
2. Extract kcal, carbs, sugar, protein, fat, sat fat, fibre from the label.
3. From the user's message, determine the amount they actually ate (e.g. "250ml", "1 slice", "½ pack", "2 biscuits"). If unclear, assume ONE labelled serving.
4. SCALE the label values to that amount: (user_amount / label_reference) × label_value.
5. Use the product name exactly as shown on the label for "name".
6. Put the label's per-serving reference (e.g. "250ml serving") into "brand".
Output a single item with the scaled values. If the label is illegible or missing a nutrient, estimate conservatively and say so in "note".`
        : `\n\nThe image is a PHOTO OF A MEAL. Identify each visible item, estimate realistic portion sizes, and return per-item macros. Be conservative.`)
      : '';
    userContent.push({
      type: 'text',
      text: `${promptSchema}${kindNote}\n\nUser described: "${userText || '(see photo)'}"`
    });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        messages: [{ role: 'user', content: userContent }],
      }),
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`API ${res.status}: ${t.slice(0, 200)}`);
    }
    const data = await res.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    return textBlock ? textBlock.text : '';
  };

  const send = async () => {
    if ((!input.trim() && !photo) || busy) return;
    const userText = input.trim();
    const userPhoto = photo;
    setInput(''); setPhoto(null); setPhotoKind('food');
    if (taRef.current) taRef.current.style.height = 'auto';
    setMessages(m => [...m, { role: 'user', text: userText || '(photo)', photo: userPhoto }]);
    setBusy(true);

    try {
      let raw;
      const hasKey = !!localStorage.getItem('anthropic_api_key');
      if (hasKey) {
        raw = await callAnthropic(userText, userPhoto, photoKind);
      } else if (window.claude && typeof window.claude.complete === 'function') {
        raw = await window.claude.complete(`${promptSchema}\n\nUser described: "${userText}"`);
      } else {
        throw new Error('no-runtime');
      }
      const clean = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      const parsed = JSON.parse(clean);
      // Normalise: accept legacy {meal, items} shape too
      const meals = parsed.meals || (parsed.meal && parsed.items ? [{ meal: parsed.meal, items: parsed.items }] : []);
      // Label photos are just a scan aid — don't persist them to the meal log.
      if (userPhoto && meals[0] && photoKind !== 'label') meals[0].photo = userPhoto.dataUrl;
      setPending({ meals, note: parsed.note });
      setLastContext({ userText, photo: userPhoto, photoKind, prevJson: parsed });
      setMessages(m => [...m, {
        role: 'assistant', text: parsed.note || "Here's what I estimated:", parsed: { meals },
      }]);
    } catch (e) {
      const msg = e && e.message === 'no-runtime'
        ? "No Claude access configured. Add your Anthropic API key in Profile → Settings, or use the \"Paste JSON\" tab."
        : e && e.message === 'no-key'
        ? "Set your Anthropic API key in Profile → Settings first."
        : `Couldn't parse that. ${e && e.message ? '(' + e.message.slice(0, 100) + ')' : ''}`;
      setMessages(m => [...m, { role: 'assistant', text: msg, error: true }]);
    }
    setBusy(false);
  };

  const commit = () => {
    if (!pending) return;
    // Force every group to the meal the user picked in the selector —
    // Claude's own guess (dinner / snack / whatever) is overridden.
    const patched = {
      ...pending,
      meals: (pending.meals || []).map(g => ({ ...g, meal: mealOverride })),
    };
    onAddMany(patched);
    const total = patched.meals.reduce((s, g) => s + g.items.length, 0);
    setMessages(m => [...m, {
      role: 'system', text: `✓ Added ${total} item${total === 1 ? '' : 's'} to ${mealOverride}.`,
    }]);
    setPending(null);
    setLastContext(null);
  };

  const revise = async (feedback) => {
    const fb = (feedback || '').trim();
    if (!fb || !lastContext || busy) return;
    setMessages(m => [...m, { role: 'user', text: `Revise: ${fb}` }]);
    setBusy(true);
    try {
      const contextText = `I previously described: "${lastContext.userText || '(photo)'}"
You estimated the following JSON: ${JSON.stringify(lastContext.prevJson)}
I'd like you to revise based on this feedback: "${fb}"
Output a revised JSON in the SAME schema with corrected values. No prose outside the JSON.`;
      const raw = await callAnthropic(contextText, lastContext.photo, lastContext.photoKind);
      const clean = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      const parsed = JSON.parse(clean);
      const meals = parsed.meals || (parsed.meal && parsed.items ? [{ meal: parsed.meal, items: parsed.items }] : []);
      if (lastContext.photo && meals[0]) meals[0].photo = lastContext.photo.dataUrl;
      setPending({ meals, note: parsed.note });
      setLastContext({ ...lastContext, prevJson: parsed });
      setMessages(m => [...m, {
        role: 'assistant', text: parsed.note || 'Revised estimate:', parsed: { meals },
      }]);
    } catch (e) {
      setMessages(m => [...m, {
        role: 'assistant',
        text: `Couldn't revise. ${e && e.message ? '(' + e.message.slice(0, 120) + ')' : ''}`,
        error: true,
      }]);
    }
    setBusy(false);
  };

  return (
    <div style={{
      padding: '0 16px', display: 'flex', flexDirection: 'column',
      minHeight: 'calc(100vh - 240px)',
    }}>
      {/* Chat transcript */}
      <div style={{
        background: theme.surface, borderRadius: theme.radius.card,
        padding: '14px 16px', marginBottom: 12,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        display: 'flex', flexDirection: 'column', gap: 12,
        flex: 1,
      }}>
        {messages.map((msg, i) => (
          <Msg key={i} msg={msg} theme={theme} />
        ))}

        {pending && (
          <PendingCard pending={pending} theme={theme}
            mealOverride={mealOverride} setMealOverride={setMealOverride}
            onCommit={commit}
            onCancel={() => { setPending(null); setLastContext(null); }}
            onRevise={revise} canRevise={!!lastContext}/>
        )}

        {busy && (
          <div style={{ display: 'flex', gap: 4, padding: '6px 0' }}>
            {[0,1,2].map(i => (
              <div key={i} style={{
                width: 6, height: 6, borderRadius: 3, background: theme.inkMute,
                animation: `bounce 1.2s ${i * 0.15}s infinite ease-in-out`,
              }} />
            ))}
            <style>{`@keyframes bounce {
              0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
              40% { opacity: 1; transform: translateY(-3px); }
            }`}</style>
          </div>
        )}
      </div>

      {/* Composer — sticks to the bottom of the scroll container, above the tab bar */}
      <div style={{
        position: 'sticky', bottom: 100, zIndex: 5,
        paddingBottom: 8,
        background: `linear-gradient(to bottom, transparent 0%, ${theme.bg} 20%, ${theme.bg} 100%)`,
        marginTop: 'auto',
      }}>
        {photo && (
          <div style={{ marginBottom: 8 }}>
            <div style={{
              position: 'relative', display: 'inline-block', verticalAlign: 'top',
            }}>
              <img src={photo.dataUrl} alt="attached" style={{
                maxHeight: 80, borderRadius: theme.radius.chip, display: 'block',
              }}/>
              <button onClick={() => setPhoto(null)} style={{
                position: 'absolute', top: -6, right: -6,
                width: 22, height: 22, borderRadius: 11, border: 'none',
                background: theme.ink, color: theme.bg, cursor: 'pointer',
                fontSize: 14, lineHeight: '22px', padding: 0,
              }}>×</button>
            </div>
            <div style={{
              display: 'inline-flex', verticalAlign: 'middle',
              marginLeft: 10, gap: 2, padding: 2,
              background: theme.surfaceAlt, borderRadius: theme.radius.btn,
            }}>
              {[['food', 'Food'], ['label', 'Label']].map(([k, l]) => (
                <button key={k} onClick={() => setPhotoKind(k)} style={{
                  padding: '6px 12px', border: 'none',
                  background: photoKind === k ? theme.surface : 'transparent',
                  color: theme.ink, cursor: 'pointer',
                  borderRadius: theme.radius.btn - 2,

function AIPaste({ theme, onAddMany }) {
  const [text, setText] = React.useState('');
  const [parsed, setParsed] = React.useState(null);
  const [error, setError] = React.useState(null);

  const tryParse = (v) => {
    setText(v);
    if (!v.trim()) { setParsed(null); setError(null); return; }
    try {
      const clean = v.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      const p = JSON.parse(clean);
      // Normalise to { meals: [...] }
      let meals;
      if (p.meals && Array.isArray(p.meals)) meals = p.meals;
      else if (p.items && Array.isArray(p.items)) meals = [{ meal: p.meal || 'Snack', items: p.items }];
      else throw new Error('expected meals[] or items[]');
      setParsed({ meals, note: p.note });
      setError(null);
    } catch (e) {
      setParsed(null);
      setError(e.message);
    }
  };

  const template = `{
  "meals": [
    {
      "meal": "Lunch",
      "items": [
        {
          "name": "Chicken burrito bowl",
          "brand": "Chipotle",
          "kcal": 705, "c": 65, "p": 42, "f": 28,
          "satFat": 8, "sugar": 4, "fibre": 11, "g": 520
        }
      ]
    }
  ],
  "note": "Estimated."
}`;

  return (
    <div style={{ padding: '0 16px' }}>
      {/* Copy-prompt helper */}
      <div style={{
        background: theme.surface, borderRadius: theme.radius.card,
        padding: '14px 16px', marginBottom: 12,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
      }}>
        <div style={{
          fontFamily: theme.font, fontSize: 11, fontWeight: 600,
          color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
          marginBottom: 8,
        }}>How it works</div>
        <ol style={{
          margin: 0, paddingLeft: 18,
          fontFamily: theme.font, fontSize: 13, color: theme.ink, lineHeight: 1.5,
        }}>
          <li>Ask Claude (or any LLM): <em style={{ color: theme.accent }}>
            "Estimate macros for [your meal] as JSON matching the schema below"</em>
          </li>
          <li>Copy the JSON response</li>
          <li>Paste below — we'll validate and preview before logging</li>
        </ol>
        <button onClick={() => {
          const prompt = `Estimate macros for my meal(s) and return ONLY this JSON (no prose, no markdown). Use multiple entries in "meals" if I describe more than one meal.
{
  "meals": [
    {
      "meal": "Breakfast|Lunch|Dinner|Snack",
      "items": [
        {"name":"","brand":"","kcal":0,"c":0,"p":0,"f":0,"satFat":0,"sugar":0,"fibre":0,"g":0}
      ]
    }
  ],
  "note": "one sentence"
}
All macro values are per-item totals in grams (kcal in calories). Never omit satFat/sugar/fibre — estimate if unsure.
My meal: `;
          navigator.clipboard?.writeText(prompt);
        }} style={{
          marginTop: 10, padding: '8px 12px', border: `1px solid ${theme.line}`,
          background: theme.surfaceAlt, color: theme.ink, cursor: 'pointer',
          borderRadius: theme.radius.chip,
          fontFamily: theme.font, fontSize: 12, fontWeight: 600,
          display: 'inline-flex', alignItems: 'center', gap: 6,
        }}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="3" y="1" width="7" height="9" rx="1" stroke={theme.ink} strokeWidth="1.2"/>
            <path d="M8 3v7H2V4" stroke={theme.ink} strokeWidth="1.2" fill="none"/>
          </svg>
          Copy prompt template
        </button>
      </div>

      {/* Paste area */}
      <div style={{
        background: theme.surface, borderRadius: theme.radius.card,
        padding: 8, marginBottom: 12,
        border: `1px solid ${error ? '#E74C3C' : (parsed ? theme.accent : theme.line)}`,
        transition: 'border 0.2s',
      }}>
        <textarea
          value={text}
          onChange={(e) => tryParse(e.target.value)}
          placeholder={template}
          rows={10}
          style={{
            width: '100%', border: 'none', outline: 'none', background: 'transparent',
            resize: 'vertical', padding: '8px 10px',
            fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
            fontSize: 12, color: theme.ink, lineHeight: 1.5,
          }}
        />
      </div>

      {error && (
        <div style={{
          padding: '10px 14px', borderRadius: theme.radius.chip,
          background: '#E74C3C22', color: '#C0392B', marginBottom: 12,
          fontFamily: theme.font, fontSize: 12,
        }}>Invalid JSON: {error}</div>
      )}

      {parsed && (
        <PendingCard pending={parsed} theme={theme}
          onCommit={() => { onAddMany(parsed); setText(''); setParsed(null); }}
          onCancel={() => { setText(''); setParsed(null); }}
        />
      )}
    </div>
  );
}
