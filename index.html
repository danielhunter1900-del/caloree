<script>
  const SUPABASE_URL = 'https://twvmaazfcpglrzknhsvr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_4XMUfqp1Bl7SkrbMDYds4w_AVqq4e7d';
  window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true },
  });

  // Upload a data-URL JPEG to Supabase Storage; returns the storage path.
  window.uploadMealPhoto = async function(dataUrl, userId) {
    if (!dataUrl || !dataUrl.startsWith('data:')) return null;
    const blob = await (await fetch(dataUrl)).blob();
    const rand = Math.random().toString(36).slice(2, 10);
    const path = `${userId}/${Date.now()}-${rand}.jpg`;
    const { error } = await window.sb.storage.from('meal-photos')
      .upload(path, blob, { contentType: 'image/jpeg', upsert: false });
    if (error) { console.warn('photo upload:', error.message); return null; }
    return path;
  };

  // Register service worker for offline PWA support
  if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW:', e));
    });
  }

  // Resolve a storage path to a signed display URL (1h expiry)
  window.signedPhotoUrl = async function(path) {
    if (!path) return null;
    const { data, error } = await window.sb.storage.from('meal-photos')
      .createSignedUrl(path, 3600);
    if (error) { console.warn('photo sign:', error.message); return null; }
    return data?.signedUrl || null;
  };
</script>

// Generate historical daily data for ~2 years so the user can scroll back
// Use a seeded pseudo-random so the chart looks natural but stable.
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}
// HISTORY is intentionally empty — all data comes from user logs.
// Dynamic entries are pushed into HISTORY from the user's actual log/wellness data at runtime.
const HISTORY = [];

// Sample weight log — last value is ~2 weeks old (prompt should trigger)
const DEFAULT_WEIGHT = [];

// Helpers
function foodById(id) { return FOODS.find(x => x.id === id); }

function entryMacros(entry) {
  const food = foodById(entry.foodId);
  return {
    kcal: food.kcal * entry.qty,
    c:    food.c    * entry.qty,
    p:    food.p    * entry.qty,
    f:    food.f    * entry.qty,
    satFat: (food.satFat || 0) * entry.qty,
    sugar:  (food.sugar  || 0) * entry.qty,
    fibre:  (food.fibre  || 0) * entry.qty,
    g:    food.servingG * entry.qty,
  };
}

function sumMacros(entries) {
  return entries.reduce((acc, e) => {
    const m = entryMacros(e);
    return {
      kcal: acc.kcal + m.kcal,
      c: acc.c + m.c, p: acc.p + m.p, f: acc.f + m.f,
      satFat: acc.satFat + m.satFat,
      sugar:  acc.sugar  + m.sugar,
      fibre:  acc.fibre  + m.fibre,
    };
  }, { kcal: 0, c: 0, p: 0, f: 0, satFat: 0, sugar: 0, fibre: 0 });
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(

            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}

      {/* large title */}

        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,

    </div>
  );
}

// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons

const { useState, useEffect, useRef, useMemo } = React;

// ─────────────────────────────────────────────────────────────
// Animated number (counts up from 0 to target on mount/change)
// ─────────────────────────────────────────────────────────────
function useAnimatedNum(target, dur = 700) {
  const [v, setV] = useState(0);
  const start = useRef(null);
  const from = useRef(0);
  useEffect(() => {
    from.current = v;
    start.current = null;
    let raf;
    const step = (t) => {
      if (!start.current) start.current = t;
      const p = Math.min(1, (t - start.current) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(from.current + (target - from.current) * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
    // eslint-disable-next-line
  }, [target]);
  return v;
}

// ─────────────────────────────────────────────────────────────
// Progress ring (single)
// ─────────────────────────────────────────────────────────────
function Ring({ pct, size = 220, stroke = 14, theme, color, track, children, label }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const animated = useAnimatedNum(Math.min(pct, 1.2));
  const dash = c * Math.min(animated, 1);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={track || theme.ring.track} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r}
          stroke={color || theme.ring.stroke} strokeWidth={stroke} fill="none"
          strokeDasharray={`${dash} ${c}`} strokeLinecap={theme.ring.cap}
          style={{ transition: 'stroke 0.3s' }} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Macro bar (linear progress)
// ─────────────────────────────────────────────────────────────
function MacroBar({ label, value, target, color, theme, unit = 'g', onClick }) {
  const pct = Math.min(value / target, 1);
  const animated = useAnimatedNum(pct);
  return (
    <div onClick={onClick} style={{ display: 'flex', flexDirection: 'column', gap: 4, flex: 1, minWidth: 0, cursor: onClick ? 'pointer' : 'default' }}>
      <div style={{
        fontFamily: theme.font, fontSize: 11, fontWeight: 600,
        color: theme.inkSoft, letterSpacing: '0.06em', textTransform: 'uppercase',
        whiteSpace: 'nowrap',
      }}>{label}</div>
      <div style={{
        fontFamily: theme.numFont, fontSize: 13, fontWeight: theme.numWeight,
        color: theme.ink, letterSpacing: theme.letter, marginBottom: 2,
      }}>{Math.round(value)}<span style={{ color: theme.inkMute }}>/{target}{unit}</span></div>
      <div style={{
        height: 6, borderRadius: theme.radius.chip > 8 ? 3 : 1,
        background: theme.ring.track, overflow: 'hidden',
      }}>
        <div style={{
          width: `${animated * 100}%`, height: '100%', background: color,
          borderRadius: 'inherit', transition: 'background 0.3s',
        }} />
      </div>
    </div>
  );
}

          Sleep
        </div>
        <Stepper value={w.sleepHrs} suffix="h"
          onDec={() => setWellness({ ...w, sleepHrs: +Math.max(0, w.sleepHrs - 0.5).toFixed(1) })}
          onInc={() => setWellness({ ...w, sleepHrs: +(w.sleepHrs + 0.5).toFixed(1) })}/>
      </div>

      {/* Stress */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}` }}>
        <div style={label}>
          <div style={iconBox}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 10c1-2 3-3 5-3s4 1 5 3" stroke={theme.ink} strokeWidth="1.5" strokeLinecap="round"/>
              <circle cx="6" cy="6" r="1" fill={theme.ink}/>
              <circle cx="10" cy="6" r="1" fill={theme.ink}/>
            </svg>
          </div>
          Stress
        </div>
        <Scale value={w.stress} onChange={v => setWellness({ ...w, stress: v })} colors={stressColors}/>
      </div>

      {/* Energy */}
      <div style={{ ...row, borderTop: `1px solid ${theme.line}` }}>
        <div style={label}>
          <div style={iconBox}>
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
              <path d="M8 1L2 9h4l-1 6 6-8H7l1-6z" stroke={theme.ink} strokeWidth="1.5" strokeLinejoin="round"/>
            </svg>
          </div>
          Energy
        </div>
        <Scale value={w.energy} onChange={v => setWellness({ ...w, energy: v })} colors={energyColors}/>
      </div>
      </>}
    </div>
  );
}

function HomeScreen({ theme, log, setLog, targets, settings = {}, wellness, setWellness, exerciseLog = [], setExerciseLog, onAddMeal, onOpenFood, onOpenProfile, onAddExercise }) {
  const [favBump, setFavBump] = React.useState(0);
  React.useEffect(() => {
    const h = () => setFavBump(b => b + 1);
    window.addEventListener('caloree:foodschanged', h);
    return () => window.removeEventListener('caloree:foodschanged', h);
  }, []);
  const toggleFavourite = async (foodId) => {
    const f = FOODS.find(x => x.id === foodId);
    if (!f) return;
    f.isFavourite = !f.isFavourite;
    setFavBump(b => b + 1);
    // Persist to localStorage so toggle survives reload even for seed foods
    try {
      const favs = JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]');
      const set = new Set(favs);
      if (f.isFavourite) set.add(foodId); else set.delete(foodId);
      localStorage.setItem('cal_favourite_ids', JSON.stringify([...set]));
    } catch {}
    // Sync to Supabase if signed in — upsert whole row so both ai_ and seed foods persist
    const sb = window.sb;
    if (!sb) return;
    const uid = (await sb.auth.getUser()).data?.user?.id;
    if (!uid) return;
    const r = await sb.from('foods').upsert([{
      id: f.id, user_id: uid,
      name: f.name, brand: f.brand || null,
      serving_g: f.servingG || 100,
      kcal: f.kcal || 0, c: f.c || 0, p: f.p || 0, f: f.f || 0,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      is_favourite: !!f.isFavourite,
      photo_path: f.photoPath || null,
    }], { onConflict: 'id' });
    if (r.error) console.warn('fav sync:', r.error.message);
  };
  const todayIso = new Date().toISOString().slice(0, 10);
  const [selectedDate, setSelectedDate] = React.useState(todayIso);
  const dayLog = log.filter(e => (e.date || todayIso) === selectedDate);
  const totals = sumMacros(dayLog);
  const dayExBurn = (exerciseLog || [])
    .filter(e => (e.date || todayIso) === selectedDate)
    .reduce((s, e) => s + (+e.kcal || 0), 0);
  const effectiveKcalGoal = settings.adjustForExercise
    ? targets.kcal + Math.round(dayExBurn)
    : targets.kcal;
  const ringPct = totals.kcal / effectiveKcalGoal;
  const remaining = Math.max(0, effectiveKcalGoal - totals.kcal);
  const animKcal = useAnimatedNum(totals.kcal);
  const [drill, setDrill] = React.useState(null); // { key: 'c'|'p'|'f', label, unit, color }
  const [ringView, setRingView] = React.useState('kcal'); // 'kcal' | 'exercise'
  const exGoalKcal = targets.exKcal || 400;
  const isToday = selectedDate === todayIso;
  const [markedMap, setMarkedMap] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('cal_marked_complete') || '{}'); }
    catch { return {}; }
  });
  const markedComplete = !!markedMap[selectedDate];
  const setComplete = (v) => {
    const next = { ...markedMap };
    if (v) next[selectedDate] = true; else delete next[selectedDate];
    setMarkedMap(next);
    localStorage.setItem('cal_marked_complete', JSON.stringify(next));
  };
  // Status: manual-complete > auto-detected based on kcal
  const dayStatus = markedComplete ? 'complete'
    : totals.kcal === 0 ? 'empty'
    : totals.kcal < 1000 ? 'incomplete'
    : 'complete';

  const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  return (
    <div style={{
      paddingBottom: 110, background: theme.bg, minHeight: '100%',
    }}>
      {/* Header: greeting + date scrub */}
      <Header theme={theme} onOpenProfile={onOpenProfile}
        selectedDate={selectedDate} setSelectedDate={setSelectedDate} />

      {/* HERO — Calorie ring */}
      <div style={{
        margin: '8px 16px 24px', padding: '28px 20px 24px',
        background: theme.surface, borderRadius: theme.radius.card,
        border: theme.name === 'Editorial' ? `1px solid ${theme.line}` : 'none',
        boxShadow: theme.name === 'Editorial' ? 'none' : `0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.04)`,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
          marginBottom: 8,
        }}>
          <div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>{ringView === 'exercise' ? 'Exercise' : 'Calories'}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 13, color: theme.inkMute, marginTop: 2,
            }}>
              {ringView === 'exercise'
                ? `Goal ${exGoalKcal} kcal burned`
                : `Goal ${effectiveKcalGoal.toLocaleString()} kcal${settings.adjustForExercise && dayExBurn > 0 ? ` (${targets.kcal} + ${Math.round(dayExBurn)} exercise)` : ''}`}
            </div>
          </div>
          <StatusBadge theme={theme}
            kcal={ringView === 'exercise' ? dayExBurn : totals.kcal}
            target={ringView === 'exercise' ? exGoalKcal : effectiveKcalGoal}
            kind={ringView === 'exercise' ? 'exercise' : 'food'} />
        </div>

        {/* Ring view toggle */}
        <div style={{
          display: 'flex', gap: 2, padding: 2, marginBottom: 8,
          background: theme.surfaceAlt, borderRadius: theme.radius.btn,
        }}>
          {[['kcal', 'Calories'], ['exercise', 'Exercise']].map(([k, l]) => (
            <button key={k} onClick={() => setRingView(k)} style={{
              flex: 1, padding: '6px 0', border: 'none',
              background: ringView === k ? theme.surface : 'transparent',
              color: theme.ink, cursor: 'pointer',
              borderRadius: theme.radius.btn - 2,
              fontFamily: theme.font, fontSize: 12,
              fontWeight: ringView === k ? 600 : 500,
              boxShadow: ringView === k ? '0 1px 2px rgba(0,0,0,0.08)' : 'none',
            }}>{l}</button>
          ))}
        </div>

        <div onClick={() => ringView === 'kcal' && setDrill({ key: 'kcal', label: 'Calories', unit: ' kcal', color: theme.accent })}
          style={{ display: 'flex', justifyContent: 'center', margin: '8px 0 4px', cursor: ringView === 'kcal' ? 'pointer' : 'default' }}>
          <Ring pct={ringView === 'exercise' ? dayExBurn / exGoalKcal : ringPct}
            size={228} stroke={theme.name === 'Editorial' ? 8 : 14} theme={theme}>
            <div style={{
              fontFamily: theme.numFont, fontSize: 56, fontWeight: theme.numWeight,
              color: theme.ink, letterSpacing: theme.letter, lineHeight: 1,
            }}>{ringView === 'exercise'
              ? Math.round(dayExBurn).toLocaleString()
              : Math.round(animKcal).toLocaleString()}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 12, color: theme.inkSoft,
              marginTop: 6, letterSpacing: '0.06em', textTransform: 'uppercase',
            }}>{ringView === 'exercise'
              ? `${Math.max(0, exGoalKcal - Math.round(dayExBurn))} to goal`
              : `${Math.round(remaining)} remaining`}</div>
          </Ring>
        </div>

        {/* Macro breakdown row */}
        <div style={{
          display: 'flex', gap: 14, marginTop: 20, padding: '0 4px',
        }}>
          <MacroBar label="Carbs"   value={totals.c} target={targets.c} color={theme.macros.carbs}   theme={theme}
            onClick={() => setDrill({ key: 'c', label: 'Carbs', unit: 'g', color: theme.macros.carbs })} />
          <MacroBar label="Protein" value={totals.p} target={targets.p} color={theme.macros.protein} theme={theme}
            onClick={() => setDrill({ key: 'p', label: 'Protein', unit: 'g', color: theme.macros.protein })} />
          <MacroBar label="Fat"     value={totals.f} target={targets.f} color={theme.macros.fat}     theme={theme}
            onClick={() => setDrill({ key: 'f', label: 'Fat', unit: 'g', color: theme.macros.fat })} />
        </div>
        {/* Secondary macros: sat fat, sugar, fibre */}
        <div style={{
          display: 'flex', gap: 14, marginTop: 14, padding: '0 4px',
        }}>
          {[
            ['Sat Fat', 'satFat', targets.satFat || 20,  '#B8824A'],
            ['Sugar',   'sugar',  targets.sugar  || 50,  '#C25A8E'],
            ['Fibre',   'fibre',  targets.fibre  || 30,  '#5C9A6E'],
          ].map(([label, key, target, color]) => (
            <MacroBar key={key} label={label} value={totals[key]} target={target} color={color} theme={theme}
              onClick={() => setDrill({ key, label, unit: 'g', color })} />
          ))}
        </div>
      </div>

      {/* Day status banner */}
      {dayStatus !== 'complete' && (
        <div style={{
          margin: '0 16px 12px', padding: '12px 16px',
          background: dayStatus === 'empty' ? '#FDECEA' : '#FFF4DE',
          border: `1px solid ${dayStatus === 'empty' ? '#F5B7B1' : '#F1D08A'}`,
          borderRadius: theme.radius.card,
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <span style={{
            width: 10, height: 10, borderRadius: 5, flexShrink: 0,
            background: dayStatus === 'empty' ? '#D96B5C' : '#E0A24A',
          }}/>
          <div style={{ flex: 1 }}>
            <div style={{
              fontFamily: theme.font, fontSize: 13, fontWeight: 600,
              color: dayStatus === 'empty' ? '#B3261E' : '#8A5A1F',
            }}>{dayStatus === 'empty' ? 'Nothing logged yet' : 'Day in progress'}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>
              {dayStatus === 'empty'
                ? 'Add your first meal of the day'
                : `${Math.round(totals.kcal)} kcal logged · keep going or mark done`}
            </div>
          </div>
          <button onClick={() => setComplete(true)} style={{
            padding: '8px 12px', border: `1px solid ${theme.line}`,
            background: theme.surface, color: theme.ink, cursor: 'pointer',
            borderRadius: theme.radius.chip,
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
            whiteSpace: 'nowrap',
          }}>Mark done</button>
        </div>
      )}
      {dayStatus === 'complete' && markedComplete && (
        <div style={{
          margin: '0 16px 12px', padding: '10px 16px',
          background: '#E8F5E9', border: `1px solid #A8D5AE`,
          borderRadius: theme.radius.card,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ width: 8, height: 8, borderRadius: 4, background: '#2B7A5C' }}/>
          <div style={{
            flex: 1, fontFamily: theme.font, fontSize: 12, color: '#1C5A3F', fontWeight: 600,
          }}>Day marked complete</div>
          <button onClick={() => setComplete(false)} style={{
            border: 'none', background: 'none', color: '#2B7A5C', cursor: 'pointer',
            fontFamily: theme.font, fontSize: 12, fontWeight: 600,
            textDecoration: 'underline', padding: 0,
          }}>Undo</button>
        </div>
      )}

      {/* Wellness quick-log */}
      <WellnessCard theme={theme} wellness={wellness} setWellness={setWellness} />

      {/* Exercise card */}
      <ExerciseCard theme={theme}
        entries={(exerciseLog || []).filter(e => (e.date || todayIso) === selectedDate)}
        onAdd={onAddExercise}
        onUpdateType={(id, type) => {
          setExerciseLog && setExerciseLog(exerciseLog.map(e => e.id === id ? { ...e, type } : e));
        }}
        onUpdate={(updated) => {
          setExerciseLog && setExerciseLog(exerciseLog.map(e => e.id === updated.id ? updated : e));
        }}
        onDelete={(id) => {
          const removed = exerciseLog.find(e => e.id === id);
          setExerciseLog && setExerciseLog(exerciseLog.filter(e => e.id !== id));
          if (window.sb) window.sb.from('exercise_logs').delete().eq('id', id)
            .then(r => r.error && console.warn('exercise delete:', r.error.message));
          window.showToast(`Removed ${removed?.type || 'exercise'}`, () => {
            if (!removed) return;
            setExerciseLog(prev => prev.some(e => e.id === id) ? prev : [...prev, removed]);
            // Re-upsert to Supabase (delete was already sent; reinsert)
            if (window.sb && session) {
              window.sb.from('exercise_logs').upsert([{
                id: removed.id, user_id: session.user.id, date: removed.date,
                type: removed.type, duration_min: removed.duration || null,
                distance_km: removed.distance || null, kcal: removed.kcal || null,
                notes: removed.notes || null, details: removed.details || null,
              }]).then(r => r.error && console.warn('exercise undo:', r.error.message));
            }
          });
        }}/>

      {/* Meal sections */}
      {meals.map(m => (
        <MealSection key={m + favBump} meal={m} theme={theme}
          entries={dayLog.filter(e => e.meal === m)}
          onDelete={(id) => {
            const removed = log.find(e => e.id === id);
            setLog(log.filter(e => e.id !== id));
            const food = removed && foodById(removed.foodId);
            window.showToast(`Removed ${food?.name || 'item'}`, () => {
              setLog(prev => prev.some(e => e.id === id) ? prev : [...prev, removed]);
            });
          }}
          onAdd={() => onAddMeal(m)}
          onOpen={onOpenFood}
          onMoveEntry={(id, newMeal) => setLog(log.map(e => e.id === id ? { ...e, meal: newMeal } : e))}
          onToggleFav={toggleFavourite}
          onCopyToDate={(id, date) => {
            const e = log.find(x => x.id === id);
            if (!e) return;
            setLog([...log, { ...e, id: 'l_' + Date.now(), date }]);
          }}
        />
      ))}

      {/* Quick stats footer */}
      <div style={{
        margin: '12px 16px 0', padding: '16px 18px',
        background: theme.surfaceAlt, borderRadius: theme.radius.card,
        display: 'flex', justifyContent: 'space-between',
      }}>
        {(() => {
          // Compute streak: consecutive days ending today that have >=1 meal logged
          const daysWithLogs = new Set(log.map(e => e.date || todayIso));
          let streak = 0;
          const cur = new Date(todayIso + 'T00:00:00');
          while (true) {
            const iso = cur.toISOString().slice(0, 10);
            if (daysWithLogs.has(iso)) {
              streak++;
              cur.setDate(cur.getDate() - 1);
            } else break;
          }
          const wl = (typeof weightLog !== 'undefined' && weightLog) || [];
          const latestWeight = wl.length
            ? `${wl[wl.length - 1].kg} kg` : '— kg';
          return [
            ['Logged', `${dayLog.length} items`],
            ['Weight', latestWeight],
            ['Streak', `${streak} day${streak === 1 ? '' : 's'}`],
          ];
        })().map(([k,v]) => (
          <div key={k}>
            <div style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkSoft, letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>{k}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 16, fontWeight: theme.numWeight,
              color: theme.ink, marginTop: 2, letterSpacing: theme.letter,
            }}>{v}</div>
          </div>
        ))}
      </div>

      {drill && (
        <MacroDrillSheet theme={theme} log={dayLog} drill={drill}
          onClose={() => setDrill(null)} onOpenFood={onOpenFood} />
      )}
    </div>
  );
}

function MacroDrillSheet({ theme, log, drill, onClose, onOpenFood }) {
  const contributors = log.map(e => {
    const f = foodById(e.foodId);
    if (!f) return null;
    const q = e.qty || 1;
    return { entry: e, food: f, amount: (f[drill.key] || 0) * q, kcal: (f.kcal || 0) * q };
  }).filter(Boolean).filter(r => r.amount > 0)
    .sort((a, b) => b.amount - a.amount);

  const total = contributors.reduce((s, r) => s + r.amount, 0);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)',
      zIndex: 100, display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', background: theme.surface,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '20px 18px 28px', maxHeight: '72vh', overflowY: 'auto',
      }}>
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: theme.line,
          margin: '0 auto 16px',
        }}/>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          marginBottom: 4,
        }}>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 22, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{drill.label}</div>
          <div style={{
            fontFamily: theme.numFont, fontSize: 16, color: drill.color, fontWeight: 600,
          }}>{Math.round(total)}{drill.unit}</div>
        </div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 14,
        }}>Contributors today · highest to lowest</div>

        {contributors.length === 0 ? (
          <div style={{
            fontFamily: theme.font, fontSize: 13, color: theme.inkMute,
            padding: '24px 0', textAlign: 'center',
          }}>No {drill.label.toLowerCase()} logged yet.</div>
        ) : contributors.map((r) => {
          const pct = total ? (r.amount / total) * 100 : 0;
          return (
            <div key={r.entry.id} onClick={() => { onClose(); onOpenFood && onOpenFood(r.food.id); }}
              style={{
                padding: '10px 0', borderBottom: `1px solid ${theme.line}`, cursor: 'pointer',
              }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <div style={{
                  fontFamily: theme.font, fontSize: 14, fontWeight: 500, color: theme.ink,
                }}>{r.food.name}</div>
                <div style={{
                  fontFamily: theme.numFont, fontSize: 14, color: theme.ink, fontWeight: theme.numWeight,
                }}>{r.amount.toFixed(1)}{drill.unit}</div>
              </div>
              <div style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                marginTop: 4, gap: 8,
              }}>
                <div style={{
                  flex: 1, height: 4, borderRadius: 2,
                  background: theme.ring.track, overflow: 'hidden',
                }}>
                  <div style={{
                    width: `${pct}%`, height: '100%', background: drill.color,
                  }}/>
                </div>
                <div style={{
                  fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
                  minWidth: 80, textAlign: 'right',
                }}>{r.entry.meal} · {Math.round(pct)}%</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Header — greeting + horizontal date scrubber
// ─────────────────────────────────────────────────────────────
function Header({ theme, onOpenProfile, selectedDate, setSelectedDate }) {
  const [calOpen, setCalOpen] = React.useState(false);
  const displayName = localStorage.getItem('cal_display_name') || 'You';
  const headerInitials = displayName.split(/\s+/).filter(Boolean)
    .map(w => w[0]).slice(0, 2).join('').toUpperCase() || '?';
  const todayIso = new Date().toISOString().slice(0, 10);

  // Build a 7-day window ending on today (so today is the rightmost-1 cell, with 1 future day)
  const daysShort = ['S','M','T','W','T','F','S'];
  const days = [];
  const base = new Date(todayIso);
  for (let i = -5; i <= 1; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    days.push({
      d: daysShort[d.getDay()], n: d.getDate(), iso,
      isToday: iso === todayIso,
      future: iso > todayIso,
    });
  }
  const selectedIdx = days.findIndex(x => x.iso === selectedDate);
  const isEditorial = theme.name === 'Editorial';
  return (
    <div style={{ padding: 'calc(env(safe-area-inset-top, 0px) + 8px) 16px 12px' }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
        marginBottom: 14,
      }}>
        <div>
          <div style={{
            fontFamily: theme.font, fontSize: 13, color: theme.inkSoft,
            letterSpacing: '0.04em',
          }}>{(() => {
            const dt = new Date(selectedDate + 'T00:00:00');
            return dt.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
          })()}</div>
          <div style={{
            fontFamily: theme.titleFont,
            fontSize: isEditorial ? 40 : 32,
            fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
            lineHeight: 1.05, marginTop: 2,
            textTransform: isEditorial ? 'uppercase' : 'none',
          }}>{selectedDate === todayIso ? (isEditorial ? 'Today' : 'Good morning') : 'Day view'}</div>
        </div>
        <button onClick={onOpenProfile} style={{
          width: 36, height: 36, borderRadius: 18, border: 'none', cursor: 'pointer',
          background: theme.surfaceAlt,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <span style={{
            fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,
          }}>{headerInitials}</span>
        </button>
      </div>

      {/* Date scrubber — tap chevron to expand into calendar */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', gap: 4,
        alignItems: 'center',
      }}>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'space-between', gap: 4 }}>
          {days.map((d, i) => {
            const isSel = d.iso === selectedDate;
            const showDot = false; // dots live in calendar popover, keep scrubber clean
            return (
              <button key={i} onClick={() => !d.future && setSelectedDate(d.iso)} style={{
                flex: 1, padding: '10px 0 12px', border: 'none',
                cursor: d.future ? 'default' : 'pointer',
                background: isSel ? theme.ink : 'transparent',
                borderRadius: theme.radius.chip,
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                transition: 'background 0.2s', position: 'relative',
                opacity: d.future ? 0.4 : 1,
              }}>
                <span style={{

function CalendarSheet({ theme, onClose, onPickDate }) {
  // Start at current month (Apr 2026).
  const [y, setY] = React.useState(2026);
  const [m, setM] = React.useState(3); // April = 3

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay(); // 0=Sun

  const today = { y: 2026, m: 3, d: 18 };
  // Define "complete" as >= 50% of calorie goal (rough threshold to catch forgotten days)
  const completeThreshold = 1000;
  const dayStatus = (d) => {
    const h = HISTORY.find(x => x.y === y && x.m === m && x.d === d);
    if (!h || !h.kcal) return 'missed';
    if (h.kcal < completeThreshold) return 'incomplete';
    return 'logged';
  };

  const prev = () => { if (m === 0) { setY(y - 1); setM(11); } else setM(m - 1); };
  const next = () => { if (m === 11) { setY(y + 1); setM(0); } else setM(m + 1); };

  // Touch swipe to change months
  const touchX = React.useRef(null);
  const onTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (dx > 50) prev();
    else if (dx < -50) next();
    touchX.current = null;
  };

  // Grid cells: leading blanks + days
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      paddingTop: 60,
    }}>
      <div onClick={(e) => e.stopPropagation()}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        style={{
          width: '92%', maxWidth: 380, background: theme.surface,
          borderRadius: 18, padding: '18px 18px 22px',
          boxShadow: '0 20px 60px rgba(0,0,0,0.2)',
      }}>
        {/* Header: month nav */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 12,
        }}>
          <button onClick={prev} style={{
            width: 32, height: 32, border: 'none', background: theme.surfaceAlt,
            borderRadius: 16, cursor: 'pointer',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M9 2L3 7l6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
          <div style={{
            fontFamily: theme.titleFont, fontSize: 17, fontWeight: theme.titleWeight,
            color: theme.ink, letterSpacing: theme.letter,
          }}>{monthNames[m]} {y}</div>
          <button onClick={next} style={{
            width: 32, height: 32, border: 'none', background: theme.surfaceAlt,
            borderRadius: 16, cursor: 'pointer',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ display: 'block', margin: 'auto' }}>
              <path d="M5 2l6 5-6 5" stroke={theme.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </button>
        </div>

        {/* Day-of-week row */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4,
        }}>
          {['S','M','T','W','T','F','S'].map((d, i) => (
            <div key={i} style={{
              fontFamily: theme.font, fontSize: 10, fontWeight: 600,
              color: theme.inkMute, letterSpacing: '0.08em', textAlign: 'center',
            }}>{d}</div>
          ))}
        </div>

        {/* Day grid */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2,
        }}>
          {cells.map((d, i) => {
            if (d == null) return <div key={i}/>;
            const isToday = (y === today.y && m === today.m && d === today.d);
            const isFuture = (y > today.y) ||
              (y === today.y && m > today.m) ||
              (y === today.y && m === today.m && d > today.d);
            const status = dayStatus(d);
            const dotColor = status === 'logged' ? '#2B7A5C'
              : status === 'incomplete' ? '#E0A24A'
              : '#D96B5C';
            return (
              <button key={i} disabled={isFuture}
                onClick={() => {
                  if (isFuture) return;
                  const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                  onPickDate ? onPickDate(iso) : onClose();
                }} style={{
                aspectRatio: '1', border: 'none',
                background: isToday ? theme.ink : 'transparent',
                borderRadius: 8, cursor: isFuture ? 'default' : 'pointer',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', gap: 2,
                position: 'relative',
              }}>
                <span style={{
                  fontFamily: theme.numFont, fontSize: 14,
                  color: isToday ? theme.bg : (isFuture ? theme.inkMute : theme.ink),
                  fontWeight: isToday ? 700 : 500,
                }}>{d}</span>
                {!isFuture && (
                  <span style={{
                    width: 5, height: 5, borderRadius: 3,
                    background: isToday ? theme.bg : dotColor,
                  }}/>
                )}
              </button>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{
          display: 'flex', gap: 14, justifyContent: 'center', marginTop: 14, flexWrap: 'wrap',
          fontFamily: theme.font, fontSize: 11, color: theme.inkSoft,
        }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#2B7A5C' }}/>Logged
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#E0A24A' }}/>Incomplete
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: '#D96B5C' }}/>Missed
          </span>
        </div>
        <div style={{
          textAlign: 'center', marginTop: 8,
          fontFamily: theme.font, fontSize: 11, color: theme.inkMute,
        }}>Swipe left/right to change months</div>
      </div>
    </div>
  );
}

function StatusBadge({ theme, kcal, target, kind = 'food' }) {
  const pct = target > 0 ? kcal / target : 0;
  let label, bg, fg;
  const emptyMsg = kind === 'exercise' ? 'No exercise yet' : 'No food yet';
  const startedMsg = kind === 'exercise' ? 'Just starting' : 'Just started';
  if (kcal <= 0) { label = emptyMsg; bg = 'rgba(217,107,92,0.15)'; fg = '#B3261E'; }
  else if (pct > 1.1)  {
    label = kind === 'exercise' ? `Over goal by ${Math.round((pct - 1) * 100)}%` : `Over by ${Math.round((pct - 1) * 100)}%`;
    bg = kind === 'exercise' ? 'rgba(79,138,112,0.15)' : 'rgba(217,107,92,0.15)';
    fg = kind === 'exercise' ? '#2B7A5C' : '#B3261E';
  }
  else if (pct >= 0.9) { label = 'On track'; bg = 'rgba(79,138,112,0.15)'; fg = '#2B7A5C'; }
  else if (pct >= 0.3) { label = `${Math.round(pct * 100)}% of goal`; bg = theme.chipBg; fg = theme.chipInk; }
  else                 { label = startedMsg; bg = theme.chipBg; fg = theme.chipInk; }
  return (
    <div style={{
      padding: '4px 10px', borderRadius: theme.radius.chip,
      background: bg, color: fg,
      fontFamily: theme.font, fontSize: 10, fontWeight: 600,
      letterSpacing: '0.08em', textTransform: 'uppercase',
      whiteSpace: 'nowrap',
    }}>{label}</div>
  );
}

function SwipeRow({ entry, theme, onDelete, onTap, isLast, draggable, onToggleFav, onCopyToDate }) {
  const [showCopy, setShowCopy] = React.useState(false);
  const [offset, setOffset] = useStateHome(0);
  const startX = useRefHome(null);
  const dragging = useRefHome(false);
  const food = foodById(entry.foodId);
  const m = entryMacros(entry);

  const onDown = (e) => {
    startX.current = (e.touches ? e.touches[0].clientX : e.clientX);
    dragging.current = true;
  };
  const onMove = (e) => {
    if (!dragging.current) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const dx = x - startX.current;
    setOffset(Math.max(-90, Math.min(0, dx + (offset < 0 ? -80 : 0))));
  };
  const onUp = () => {
    dragging.current = false;
    setOffset(offset < -45 ? -80 : 0);
  };

  return (
    <div style={{
      position: 'relative', overflow: 'hidden',
      borderBottom: isLast ? 'none' : `0.5px solid ${theme.line}`,
    }}>
      <button onClick={onDelete} style={{
        position: 'absolute', right: 0, top: 0, bottom: 0, width: 80,
        background: '#E74C3C', border: 'none', color: '#fff',
        fontFamily: theme.font, fontSize: 13, fontWeight: 600, cursor: 'pointer',
      }}>Delete</button>
      <div
        draggable={draggable}
        onDragStart={(e) => {
          e.dataTransfer.setData('text/plain', entry.id);
          e.dataTransfer.effectAllowed = 'move';
        }}
        onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
        onClick={() => offset === 0 && onTap()}
        style={{

function FoodResultRow({ food, theme, onTap, onAdd, isLast, query }) {
  const highlight = (text) => {
    if (!query) return text;
    const i = text.toLowerCase().indexOf(query.toLowerCase());
    if (i < 0) return text;
    return (
      <>
        {text.slice(0, i)}
        <span style={{ background: theme.accent + '33', borderRadius: 2 }}>
          {text.slice(i, i + query.length)}
        </span>
        {text.slice(i + query.length)}

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px',

// ===== screen-detail.jsx =====
// Food detail — full nutrition breakdown + portion slider.

const { useState: useStateDetail } = React;

function DetailScreen({ theme, foodId, defaultMeal, onClose, onAdd }) {
  const [bump, setBump] = useStateDetail(0); // force re-read food after mutation
  const food = foodById(foodId);
  const [qty, setQty] = useStateDetail(1);
  const [meal, setMeal] = useStateDetail(defaultMeal || 'Snack');
  const [showModify, setShowModify] = useStateDetail(false);
  const [showIngredients, setShowIngredients] = useStateDetail(false);
  const [editingIng, setEditingIng] = useStateDetail(null); // index of ingredient being edited

  const recomputeFoodTotals = (f) => {
    const ings = f.ingredients || [];
    if (!ings.length) return;
    const sum = (k) => ings.reduce((s, i) => s + (+i[k] || 0), 0);
    f.kcal = +sum('kcal').toFixed(1);
    f.c = +sum('c').toFixed(1);
    f.p = +sum('p').toFixed(1);
    f.f = +sum('f').toFixed(1);
    f.satFat = +sum('satFat').toFixed(1);
    f.sugar = +sum('sugar').toFixed(1);
    f.fibre = +sum('fibre').toFixed(1);
    f.servingG = Math.max(1, Math.round(sum('g')));
  };

  const persistFood = async (f) => {
    if (!window.sb) return;
    const r = await window.sb.from('foods').update({
      kcal: f.kcal, c: f.c, p: f.p, f: f.f,
      sat_fat: f.satFat ?? null, sugar: f.sugar ?? null, fibre: f.fibre ?? null,
      serving_g: f.servingG, ingredients: f.ingredients || null,
    }).eq('id', f.id);
    if (r.error) console.warn('ingredient sync:', r.error.message);
  };

  const deleteIngredient = (idx) => {
    food.ingredients = (food.ingredients || []).filter((_, i) => i !== idx);
    recomputeFoodTotals(food);
    setBump(b => b + 1);
    persistFood(food);
    window.dispatchEvent(new Event('caloree:foodschanged'));
  };

  const updateIngredient = (idx, patch) => {
    const ing = food.ingredients[idx];
    if (!ing) return;
    // If grams changed, scale macros proportionally to keep them per-amount-eaten
    if (patch.g != null && +patch.g !== +ing.g) {
      const oldG = +ing.g || 1;
      const newG = Math.max(0, +patch.g);
      const ratio = oldG > 0 ? newG / oldG : 1;
      ing.g = newG;
      ['kcal','c','p','f','satFat','sugar','fibre'].forEach(k => {
        if (ing[k] != null) ing[k] = +(((+ing[k]) || 0) * ratio).toFixed(1);
      });
      delete patch.g;
    }
    Object.assign(ing, patch);
    recomputeFoodTotals(food);
    setBump(b => b + 1);
    persistFood(food);
    window.dispatchEvent(new Event('caloree:foodschanged'));
  };

  const m = {
    kcal: food.kcal * qty,
    c: food.c * qty,
    p: food.p * qty,
    f: food.f * qty,
    g: food.servingG * qty,
  };

  const animKcal = useAnimatedNum(m.kcal, 250);
  const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  // Macro % of total kcal
  const totalMacroKcal = m.c * 4 + m.p * 4 + m.f * 9;
  const cPct = totalMacroKcal > 0 ? (m.c * 4 / totalMacroKcal) * 100 : 0;
  const pPct = totalMacroKcal > 0 ? (m.p * 4 / totalMacroKcal) * 100 : 0;
  const fPct = totalMacroKcal > 0 ? (m.f * 9 / totalMacroKcal) * 100 : 0;

  return (
    <div style={{
      position: 'absolute', inset: 0, background: theme.bg, zIndex: 200,
      display: 'flex', flexDirection: 'column',
      animation: 'slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1)',
    }}>
      {/* Header */}
      <div style={{
        padding: 'calc(env(safe-area-inset-top, 0px) + 12px) 16px 8px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 8,
        }}>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M14 5l-7 6 7 6" stroke={theme.accent} strokeWidth="2.2"
              strokeLinecap="round" strokeLinejoin="round" fill="none"/>
          </svg>
        </button>
        <div style={{
          fontFamily: theme.font, fontSize: 13, color: theme.inkSoft,
          textTransform: 'uppercase', letterSpacing: '0.08em',
        }}>Nutrition</div>
        <button onClick={async () => {
          food.isFavourite = !food.isFavourite;
          setBump(b => b + 1);
          // localStorage
          try {
            const favs = JSON.parse(localStorage.getItem('cal_favourite_ids') || '[]');
            const set = new Set(favs);
            if (food.isFavourite) set.add(food.id); else set.delete(food.id);
            localStorage.setItem('cal_favourite_ids', JSON.stringify([...set]));
          } catch {}
          // Supabase upsert
          const sb = window.sb;
          if (sb) {
            const uid = (await sb.auth.getUser()).data?.user?.id;
            if (uid) {
              await sb.from('foods').upsert([{
                id: food.id, user_id: uid,
                name: food.name, brand: food.brand || null,
                serving_g: food.servingG || 100,
                kcal: food.kcal || 0, c: food.c || 0, p: food.p || 0, f: food.f || 0,
                sat_fat: food.satFat ?? null, sugar: food.sugar ?? null, fibre: food.fibre ?? null,
                is_favourite: !!food.isFavourite,
                photo_path: food.photoPath || null,
              }], { onConflict: 'id' });
            }
          }
          window.dispatchEvent(new Event('caloree:foodschanged'));
        }} title={food.isFavourite ? 'Unfavourite' : 'Favourite'}
        style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 4,
          color: theme.accent,

          <svg width="22" height="22" viewBox="0 0 20 20" fill={food.isFavourite ? '#E0A24A' : 'none'}>
            <path d="M10 2.5l1.5 5h5L12.5 11l1.5 5L10 13l-4 3 1.5-5L3 7.5h5L10 2.5z"
              stroke={food.isFavourite ? '#E0A24A' : theme.accent} strokeWidth="1.8" strokeLinejoin="round"/>

      <div style={{ flex: 1, overflow: 'auto', paddingBottom: 110 }}>

          }}>{food.brand}</div>
          <div style={{

function ModifyWithClaudeSheet({ theme, food, qty, onClose, onApply }) {
  const [text, setText] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null);

  const run = async () => {
    const key = (localStorage.getItem('anthropic_api_key') || '').replace(/\s+/g, '');
    if (!key) { setError('Set your Anthropic API key in Profile → Settings first.'); return; }
    if (!text.trim()) { setError('Describe what changed.'); return; }
    setBusy(true); setError(null);
    const prompt = `The user has this food logged:
${JSON.stringify({
  name: food.name, brand: food.brand || '',
  kcal: food.kcal, c: food.c, p: food.p, f: food.f,
  satFat: food.satFat, sugar: food.sugar, fibre: food.fibre,
  servingG: food.servingG,
}, null, 2)}

They want to modify it: "${text.trim()}"

Return ONLY JSON (no prose, no code fences):
{
  "name": "new name reflecting the change",
  "brand": "short prep note",
  "kcal": 0, "c": 0, "p": 0, "f": 0,
  "satFat": 0, "sugar": 0, "fibre": 0,
  "servingG": 0
}

Rules:
- All values are per-serving totals. Recompute based on the described change.
- Keep the same serving size concept unless the change implies otherwise.
- Never omit satFat/sugar/fibre — estimate conservatively.
- Keep the name concise and reflect the swap.`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6', max_tokens: 600,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) throw new Error(`API ${res.status}`);
      const j = await res.json();
      const textBlock = (j.content || []).find(b => b.type === 'text');
      const raw = textBlock ? textBlock.text : '';
      const clean = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
      setPreview(JSON.parse(clean));
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  return (
    <div onClick={onClose} style={{
      position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 300,
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxHeight: '85%', background: theme.bg,
        borderTopLeftRadius: 20, borderTopRightRadius: 20,
        padding: '18px 18px 22px', overflowY: 'auto',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: theme.line,
          margin: '0 auto 14px', flexShrink: 0,
        }}/>
        <div style={{
          fontFamily: theme.titleFont, fontSize: 18, fontWeight: theme.titleWeight,
          color: theme.ink, marginBottom: 4,
        }}>Modify with Claude</div>
        <div style={{
          fontFamily: theme.font, fontSize: 12, color: theme.inkSoft, marginBottom: 12,
        }}>Describe what's different. Claude will recompute the macros.</div>

        <textarea value={text} onChange={(e) => setText(e.target.value)}
          rows={3}
          placeholder='e.g. "swap aubergine for tofu, rest same"'
          style={{
            width: '100%', padding: '10px 12px',
            border: `1px solid ${theme.line}`, borderRadius: theme.radius.btn,
            fontFamily: theme.font, fontSize: 14, background: theme.surface,
            color: theme.ink, outline: 'none', resize: 'vertical',
          }}/>

        {error && <div style={{
          marginTop: 10, padding: '10px 12px', borderRadius: 8,
          background: '#FDECEA', color: '#B3261E', fontSize: 13, fontFamily: theme.font,
        }}>{error}</div>}

        {preview && (
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: theme.surface, borderRadius: theme.radius.card,
            border: `1px solid ${theme.accent}`,
          }}>
            <div style={{
              fontFamily: theme.font, fontSize: 13, fontWeight: 600, color: theme.ink,
            }}>{preview.name}</div>
            <div style={{
              fontFamily: theme.font, fontSize: 11, color: theme.inkSoft, marginTop: 2,
            }}>{preview.brand}</div>
            <div style={{
              fontFamily: theme.numFont, fontSize: 12, color: theme.inkSoft, marginTop: 8,
            }}>
              {Math.round(preview.kcal)} kcal · C{Math.round(preview.c)} P{Math.round(preview.p)} F{Math.round(preview.f)}
              {preview.satFat != null && ` · Sat${Math.round(preview.satFat)}`}
              {preview.sugar  != null && ` · Sug${Math.round(preview.sugar)}`}
              {preview.fibre  != null && ` · Fi${Math.round(preview.fibre)}`}
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
          <button onClick={onClose} style={{
            padding: '11px 16px', border: `1px solid ${theme.line}`,
            background: 'transparent', color: theme.inkSoft,
            borderRadius: theme.radius.btn, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>Cancel</button>
          {!preview ? (
            <button onClick={run} disabled={busy || !text.trim()} style={{
              flex: 1, padding: '11px 0', border: 'none',
              background: text.trim() && !busy ? theme.accent : theme.surfaceAlt,
              color: theme.accentInk,
              borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600,
              cursor: busy || !text.trim() ? 'default' : 'pointer',
            }}>{busy ? 'Thinking…' : 'Ask Claude'}</button>
          ) : (
            <button onClick={() => onApply(preview)} style={{
              flex: 1, padding: '11px 0', border: 'none',
              background: theme.accent, color: theme.accentInk,
              borderRadius: theme.radius.btn, fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>Apply changes</button>
          )}
        </div>
      </div>
    </div>
  );
}

function PortionSlider({ qty, setQty, theme }) {
  const trackRef = React.useRef(null);
  const dragging = React.useRef(false);
  const max = 3;
  const pct = Math.min(qty / max, 1) * 100;

  const update = (clientX) => {
    if (!trackRef.current) return;
    const rect = trackRef.current.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width;
    const v = Math.max(0.05, Math.min(max, x * max));
    setQty(Math.round(v * 20) / 20);
  };

  React.useEffect(() => {
    const move = (e) => dragging.current && update(e.touches ? e.touches[0].clientX : e.clientX);
    const up = () => { dragging.current = false; };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move);
    window.addEventListener('touchend', up);
    return () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move);
      window.removeEventListener('touchend', up);
    };
  }, []);

  const trackH = theme.name === 'Editorial' ? 4 : 6;

  return (
    <div ref={trackRef}
      onMouseDown={(e) => { dragging.current = true; update(e.clientX); }}
      onTouchStart={(e) => { dragging.current = true; update(e.touches[0].clientX); }}
      style={{
        position: 'relative', height: 28, marginTop: 12, cursor: 'pointer',
        display: 'flex', alignItems: 'center',
      }}>
      <div style={{
        width: '100%', height: trackH, borderRadius: trackH/2,
        background: theme.ring.track,
      }}>
        <div style={{
          width: `${pct}%`, height: '100%', background: theme.accent,
          borderRadius: trackH/2,
          transition: dragging.current ? 'none' : 'width 0.15s',
        }} />
      </div>
      {/* tick marks */}
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center' }}>
        {[0.5, 1, 1.5, 2, 2.5].map(v => (
          <div key={v} style={{
            position: 'absolute', left: `${(v/max) * 100}%`,
            width: 1, height: 8, background: theme.inkMute, opacity: 0.3,
            transform: 'translateX(-0.5px)',
          }} />
        ))}
      </div>
      {/* thumb */}
      <div style={{
        position: 'absolute', left: `${pct}%`, top: '50%',
        transform: 'translate(-50%, -50%)',
        width: 24, height: 24, borderRadius: theme.name === 'Editorial' ? 4 : 12,
        background: theme.surface,
        border: `2px solid ${theme.accent}`,
        boxShadow: '0 2px 6px rgba(0,0,0,0.15)',
        transition: dragging.current ? 'none' : 'left 0.15s',
      }} />
    </div>
  );
}
